body:
  text: 彭城集卷二十一宋劉攽撰內外制御史中丞孫覺可龍圖閣直學士提舉醴泉觀依舊兼侍讀制吾以風憲齊邦法而用經藝求多聞儒臣之任是者異事而同功此皆有益於朝者也具官某資性朴茂學問該達有子政之博識兼叔向之遺直近者擢置中司以從民望未得聞生之竒論乃固以疾而來解知其不欺在所從欲擢龍馬之峻秩仍虎門之詔徴兼總殊庭之事增重講闈之寵祗服休命母怠初心中散大夫天章閣待制知鄧州陳安石可龍圖閣直學士差遣如故制朝廷嚴侍從之聨待通博之士惟其器足以大受知可以重任望所歸者而後畀之延閣相望左職維叙眷兹遴柬義靡虛受具官某材實周用名允副實逮迫耆齒克成壯猷內參藻鑑之司外總藩宣之寄率有可紀不替崇譽宜示甄擢以疇義最惟河圗之所藏居石渠之右地學士之選儒者為榮寵數亟加懋恩思報勉力無怠對揚休命故鎮江軍節度使檢校太尉守司空開府儀同三司致仕康國公韓絳可特贈太傅餘如故制股肱之臣社稷是衛生則體貌盡禮以示老成之貴沒則哀榮稱情以著云亡之歎非其盛德曷膺異數具官某大器有容直道自任舉厝見乎事業忠厚發於性情再登上宰稱為賢相周公師保萬民惠澤浸廣召伯弼亮四世嘉績維多者老里居乃心王室風猷所竪毗益仍逺天不憗遺奄至淪喪朕用傷悼莫可逭贖宜加愍䇿進崇贈典躋帝傅之寵名賁袞章之禭服泥書蜜印以光泉壤靈其有知膺是休命皇城使昭州刺史郭忠紹可差知岷州制先帝斥廣邊圉控制西戎惟三軍之師與連城之守訓兵治民文武並用非有兼智曷嘗輕付以爾效力洮隴克有善譽屬他部引嫌以汝易地勉勤職業用副光寵朝請大夫新差知邠州蹇周輔可差知廬州朝散大夫知廬州史宗範可差知邠州制朝廷建官分職無有逺邇皆務以利民者也度材而任之以示大公至於從人之欲小濟其私是以天道無害於治以周輔耆艾久吏使蒞豳土而以情自上求所便安惟宗範合肥之政課最可稱命總邊瑣益用觀能易地而處俱謂宜允思所報效母孤任遇知滑州劉珵可知湖州知唐州王得臣可知邠州制壤地不齊南北殊俗吏治何先法令惟一智者足以興事敏者莫不有功顧惟大邦每擇良守以某悉為久吏亟更符守吳興南方之都會新平西道之要衝分以付之思所報效朝請郎試大理卿杜紘可直祕閣知齊州制漢制列卿郡守通為二千石其在朝㑹中都則見惟月之重矣夫其屏翰千里乃知連城之寵內外之别夫奚足云以某器術通博法律精明執事輦轂歲月逾久致位廷尉任遇亦重而勤勩己􅓈黽勉弗任思從息肩顧得補外朝廷俯從人欲付之郡章昔人以卿秩出守用為寵榮今汝貼職中祕臨治稷下恩數兼渥思所報效寶文閣直學士正議大夫謝景溫可知鄆州制機衡之任內則八座為重方嶽之寄外則十連稱貴愼選攸屬周材是膺將明所資出處奚異具官某立性挺特遭事開敏白黑明辦豫奪時當擢領秋官之長實處文昌之要朕惟鄒魯舊壤皥濟奧區賦政之優變道惟允輟聽履之妙選付連城之重寄敬服崇寵益其善最朝散郎孫賁可知邵州制湖湘之南蠻獠雜居乃或不䖍邊圉肆為侵暴夫豈足勞吾剪剃也莫若擇良守就而撫之震讋其姦猾存育某柔服斯無事矣以某健於為吏幹譽頗著付之連城其思逺略不孤寵命新知河中府葉康直可知秦州制先帝穰却胡狄斥大邊圉秦亭之地僅若內郡然其襟帶隴阺門戶巴蜀小戎車甲之盛夷漢走集之要方之前世固自若也擇帥之重尤所愼焉以某前奉使指臨安陜服智之所及事乃無曠至其攝蒞漢陽頗歷時序士服熟其訓練民便安其簡易審羌虜之情僞解山川之要害因而任之成效宜速俾易蒲中之寄以究隴上之治貼職龍馬寵命在先勉服恩榮益思盡瘁侍御史杜純可知相州制向繇卿寺擢二臺憲以某讞獄先帝常有確論乃兹登用實冀毗益而議者言其處事堅完持心近薄又臺中故事非繇科第不登是選重為不宜解白筆之重權付赤惟之優寄三臺舊壤千騎殊寵公朝未嘗棄材能吏思所報國西京作坊使知岢嵐軍王景仁可知原州制西方諸郡與羌戎接者皆為要衝五原其一也為其守者愛養士卒宜得其死力逺置斥堠使前知虜情將略之最莫先於此以某久習邊瑣因付重寄益務自勵不孤恩寵溫州刺史提舉萬夀觀公事向崇回可知蔡州制吾求循良之吏以付郡州之治才無所遺則不限文武之異功有所勸亦初無戚賢之别以爾謹身奉法强力從事其以為政宜無曠職汝南大郡生齒繁夥聼訟察獄愼而母怠服我休寵母致民謗龍圖閣待制知河中府王震可知鄭州制介二都之浩穰承千里之風化陪京之重是惟鄭邦擇守之愼非材莫處具官某寬裕容物豈弟信己治民之效所至見稱付東里之奧區按緇衣之舊俗務崇民譽以稱上恩中散大夫燕介可知棣州制齊之北境是曰無棣魚鹽之饒俗以富庶其於為治易使安輯以其更練民事通逹人情付之専城益觀成效知宿州呂溫卿可知湖州承議郎王鞏可權知宿州制有地千里而長百吏發政施令良民足以訓養猾民足使畏服有志之士知其可以有為莫不願之矣以某等通敏用務付之専城之寄符離吳興又東南之奧壤也思所建置以副休命知汝州邢恕可知襄州制江漢之域襄陽為大鳯林以為阻鹿門以為望呰窳之氓獄訟亦寡然隄防弗固則有昏墊之憂竹屋相比或致延燒之患往之良材以兹為先爾以敏材愼慮試於為郡既歷一邦頗有能效付漢陽之奧壤增符竹之寵榮祗服茂恩益期善政西上閣門使重种古可知鄜州制治民訓兵文武異道惟其兼才乃能適用西方諸郡疆圉羌狄鄜為次邊實當走集軍旅士馬之訓金榖獄訟之劇為守為將是以重矣以某久更吏職益間戎略付之左符屏兹要郡竭力盡慮副吾選擢朝議大夫馬淵可知泝州制束髮從仕至于耆老近臣之稱薦者章數十上是其有以過人者海沂大邦民物繁富庸付章韍以期善最夫治人之術譬猶養身母暴其氣正心以存之則有康寧之報汝愼之哉朝奉郎守鴻臚少卿黃隱可權知泗州朝奉大夫宋彭年可權知邢州制九寺之二是為要官前以鴻臚大農用隱彭年而議者謂處非其位不可虛授朝廷重於失士乃復試之民政右河左淮二郡為大邢兼趙衛之俗泗當舟楫之㑹有所施為易致功譽益務勤恪以稱付委朝請大夫韓晉卿可光祿少卿朝奉郎知相州杜純可知徐州制卿寺總集邦事州郡在宣王化二者之重非有左右豈其以內外而為輕重乎以晉卿純敏識强力通習律令試郡未幾民譽有在擢二光祿徙治西楚度材而處來效是期勉力愼修母敢豫怠知潤州朱服可知福州制閩嶺以南長樂為大生齒繁夥其養不足則獄訟易興風俗刓弊其教不篤則禮樂罕聞為之治者抑亦難矣以某既更吏事因付邦寄思所以裕民生敦禮與義庶無負委任矣其勉之哉朝奉郎邢平可知衡州制郡縣之逺於京師者其能使上恩宣布賦役均平民無愁歎之音惟守長之材爾衡山之陽湘水之左厥民呰窳為生甚薄生齒繁夥占數至廣命汝蒞而撫之勉力思效上謹詔條下盡民情夙夜匪懈斯得之矣右騏驥副使王良可權知黔州制西南諸蠻馴服聲教而黔中之地當其衝要內則嚴徼塞之走集外則總羈縻之琛賮郡守之寄朝選為重以某知慮有取武略己效宜試連城剖符之任以觀治戎訓民之術皇城副使王鑒知莫州制邊郡鎮守兼有民事以威武震憺戎落以律令聽察獄訟其亦難矣可無選者某纍更任使常著能效帥臣稱其材敏薦之於朝因而用之吾無推擇之煩其勉勵幹力勿負恩渥中散大夫裴士林可知同州制法令所以平民也得其情則文無害賦役所以用衆也處其中則下無怨是二者州郡之先務非良吏不能及之以某智慮詳敏達於從政薦歷繁劇常有稱述惟左馮之奧區自二漢而稱重付兹連城之寄用觀下車之效平民用衆汝宜愼之權發遣廣德軍邵才可權知滁州制凡工人之事習慣則其巧倍初學為政者亦若是矣爾前守軍壘卒戍無曠今復用汝為郡屬城生齒其數愈廣汝以習慣蒞之事將無難勉之愼之以集民譽朝散郎熊臯可知泰州制海陵故江都之屬邑也居江海之會民占魚稻之饒雖曰小邦實為沃壤以某前守辰陽克有善譽兹故付以虎符之重粵當麋㽭之墟察訟督賦期以裕民無怠爾心以集來效朝奉郎賈種民可知濮州制冉求政事之材也而曰如五六十求也為之此邑宰之任也賢者之於民事豈易之哉今州郡之寄總列城之富長郡吏之治利澤足以及物雖曰小邦為榮遇矣濮實古郡邇於王畿汝自請而得其有以幹固稱職乎供備庫使侍其瓘可知祁州制邊徼之郡戎馬所集將守之任文武兼用內輯民務外察虜情求其宜稱其亦難矣以某屢更繁使頗著能名付虎符之權當鳶鞮之境益勤逺略以就來效朝奉郎張徹可知沂州制山東諸郡臨沂為大其民雜有桑麻之業其田兼備魚稻之饒為守之貴仕宦之美推擇付汝寵光斯在聽獄察訟勤民急吏母有怠惰以就功緒殿中侍御史孫升可權知濟州制為耳目之官當風憲之任惟其直亮乃所稱職曾不是思輒敢誣上置廷臣鄙倍之愆既莫繩正肆己志朋比之素仍事詆欺義所弗容法其安舍宜奪蘭臺之職俾分竹使之符尚體寬恩無重前悔知京帥張祐可知隴州制隴阪之西為國門户羌戎向化而服內漢兵屯戍而禦侮宜得良材任為守帥以某練集軍事懷韞智略俾付左府之寄以總連城之固其克勤藎用副推擇皇城使郭祥可知龍州制邊徼之地夷漢雜處訓兵以律治民以政文武兼備乃為宜稱朝所愼選異於內郡今江油闕守推擇用爾勉務勤恪以就功緒司農少卿韓正彥可知滄州制卿秩出而為郡古之寵數也矧南皮奧壤渤海巨鎮魚鹽之饒則知編户之富邊圉所寄復見専城之重惟爾久從吏職嘗宣使指悉著能績迄無官謗是用付之左符虎竹之榮當此一道兵民之務實因往效以䝉新寵勉思職業用永休譽知濟州王廷禧可知登州制負海之邦文登為大肅愼是鄰遼碣在望烽火之警太平弗忘擇守之難其亦奚易以爾名臣之裔素風自修比守列邦皆有善最付爾之罘之城恪守嵎夷之奧勉循詔條以致民譽商州盧某可知台州制有地千里列城三四社稷人民之奉仕宦之達者也商於天台皆古名郡易地迭處汝榮多矣布宣上澤勤恤民隱母違詔條母爽夙譽汝其愼哉朝散大夫天章閣待制楊繪可知杭州制訓農養民之務聽訟察獄之要在於得情而居厚不可便文而趣辦兹所以儒生貴於俗吏法律輔以詩書我擇良守以是為凖具官某心慮端直學術純固接物而為簡易從政而號豈弟前守南邦亟聞治最輕揚善鬭之民機巧趨利之俗懷惠不舍去思迄今是宜復假左符以當一道其亦力崇來效嗣續前美夫飾㕑傳以稱使客志逍遙而忘政治前史以為譏風詩以示刺汝愼之哉無孤寵命供備庫副使魏公旦可知嵐州制樓煩要地戎馬走集震憺邊陲宣明漢德守將之任其亦重矣爾以武人之俊久經驅䇿付之連城實固吾圉思盡權略以酬恩遇新差知單州鄭佾可知懷州朝散郎安宗奭可知單州制昔子賤巫馬之為單父勞逸不同而皆稱治能者之於民事固常有為而非一道也然此衰周列侯之國小邑寡民之政何足為盛世言乎今列郡田閭富庶法令完備太守官儀之寵巍然千騎之長於以施教布政則加易而不難矣河內漢為大邦單武今則名郡以付爾等其亦有子賤巫馬之志副吾委寄乎勉之愼之勞逸無怠權兩浙轉運副使韓晉卿可知徐州制漢制刺史居部九歲乃為守相夫惟専城之重豈減傳車之寵爾奉使二浙即更歲月爰付左符俾臨西楚豈弟以裕民俗精察以平獄訟農畝無擾盜賊知畏勉而行之勿孤寵命通判滄州趙澤可權知商州制昔虞詡之治朝歌也方其盜賊之盛以盤根錯節而喻已為利刃者也後卒成功如其志焉有為者當若是矣今吾以商於大邦冦攘充斥思其弭安在於能吏汝以幹略素譽可當推擇拔於郡二付之専城分虎慿熊其寵多矣宜有顯效以堅補報朝散郎李機可知華州制關西之郡華隂為大居二周之衝道兼三輔之浩穰風俗豪盛獄訟繁多擇人付之乃得稱治以爾幹力可述付茲重委勉思自效用答休命新差知越州熊本可知杭州制良二千石朝所甚貴也夫其總千里之寄當一道之重平賦察訟行善備政使下不畏吏閭里無愁歎之聲可以言股肱之美宣力四方者矣具官某早以俊材躋於法從愷悌而濟之屢斷悃愊而至於無華薦假左符率致善譽今賦稅出東南二浙為盛舟車之所走集餘杭居要推擇付汝往哉惟諧夫事無劇易之辨民靡南北之異惟既乃心斯有成績夙夜恪居以副休寵新除吏部郎中章楶可知越州制出宣使指入居郎臺朝廷之選二者偕重而東南之邦㑹稽為大督輸財賦平治獄訟使閭里無歎聲農桑得其職長民之所寄又宜擇焉吾不以重外為嫌而忽共治之意以是命汝往惟欽哉知亳州李䦎可知明州中散大夫吕希道可知亳州制朝廷治民之具備于法令守帥以情視民而用法令輔之則獄訟可使無撓賦稅可使樂輸不然徒文具無惻隱之實無益也惟亳暨明皆為重鎮所置守臣未嘗輕授以某與某悉更久吏咸有能稱是用付兹二郡以期善效勉力就緒無沗成命朝奉大夫曹振可權知恩州制世稱龔遂之為良吏以其乘饑饉之餘安輯齊地也今夫河決水溢泛濫㴞陸瀕河之蕩析離居貝邱為當其衝擇守付治汝丁是選其亦以古人為法帥而行之冀佇成效朝奉郎李察可知濟州制朝廷之用材未嘗有遺收其來效不追既往期於便安元元從茂風化而已某向承使指兼預戎事雖成績無聞而宣力為劇既畢親勤肇還籍版是用付委連城之寄亟居千騎之長東州列壤濟陽為富禹貢巨野之名浸漢志昌邑之建國勉崇政術用副寵任觀文殿學士知河南府孫固可知鄭州制老成之臣體貌所重殿邦作屏雖曰共治優賢尚德抑維乃眷具官孫某器度深博謀謨醇厚事上以道正心不回治民以信善化維敏自均逸於宥密亟報政於蕃宣惟東里之舊邦實名都之比壤輟司管籥更付郡符間于二京相望千里河潤之喻冀皆䝉福矣光祿少卿杜常可集賢校理知梓州制朝廷之化所以周浹里閭而民情不隔者惟郡將之材良詔令之宣布也而遐陬之地逺於京師雜有夷貉其任尤重矧巴蜀之左梓潼為大擇守付委何宜弗愼以常器局夷曠材術寬裕於以靖安逺俗鎮服荒人其不為難處之宜矣既更郎曹之峻屬二卿寺之聨疇其久次貼以要職麗正之選儒者所榮勉思自效用副精選皇城使孫昭諫可差知隴州制總金革之事専民社之寄非有兼材不可兩任以某武足以守固疆圉文可以聽察獄訟是用付之郡符西當隴阪専城之寵實為美遷思勤績效以稱推擇龍圖閣直學士王克臣可知鄭州制二都相望千里而近介兹舊鄭實曰大邦馮翊王畿屏翰甸服宜得良守用壯右輔具官某俊德耆明通材强濟歷試文昌之重雍容龍馬之嚴咨其老成足宣風化爰付左符之寄俾當東里之奧惟汲黯之臥治洎方叔之壯猷思與厥齊勉從休譽朝奉郎韓宗古可知曹州制人為臺郎出分郡寄受朝廷之精選為儒者之榮遇爾歷職華省久次自言眷為東藩曹實左輔分以符竹試其治民蓋二漢之典丞郎滿秩自占大縣以示優異今爾為二千石其寵多矣勉其民務求稱詔恩泰寧軍節度使觀察留後李珣可知相州制朝廷愛民求治之意付之牧守高爵重祿國所尊禮委之為政上之可以専達下之可以有為於以崇豈弟之美乃無難矣具官某敏智通徹强力幹濟踐歷周行率致民譽惟鄴城之故壤實朔塞之要衝民務兵權且將且守選擇而用元寵貴隆思所副稱以報恩遇左藏庫副使紀昱可權知亷州制合浦之地古為珠官琦珍所聚掌握致富宜得亷吏為之守長且蠻蛋荒逺難馴易擾非夫武壯知略不能鎮服以是數者推擇用汝祗蒞恩寵益思善效提舉西京嵩山崇福宮范子竒可知晉州知婺州王彭可知濟州制昔賢守之為郡或以臥治報政者為其清淨為理責大指於丞史是以事無不辦此其為竒察繳繞厪身苦志僅能自既者相千萬矣子竒嚮者屢宣使指陳力甚久疾病言上求得自便既己數月惜其退處今以臥治之事付爾大邦晉陽㑹繁思所報稱惟彭臨蒞婺女民務自如稍令內徙實為寵命知晉州郭茂恂可知密州制長民之官不宜驟易送故迎新之勞簿書變易之弊前世良史固嘗記之矣茂恂治晉才數月爾當使之久任遂其成績者也㑹商利者言髙密海渚宜置市舶以來賈人收其贏餘惟茂恂精力勤恪可膺器使是用易地付之以觀智略勉崇善術副吾推擇朝奉大夫通判定州胡及可權知吉州制南州之民頴慧輕急習于文墨易于興訟為之長者明以周知其情重以鎮抑其浮如是則豈弟之政無愧于古矣某智慮詳敏更歷數事是用擢自倅二付之郡符江介都㑹廬陵為右爾其謹心詔條强力民務思有可紀以副遷寵朝議大夫充集賢殿修撰提舉崇福宫范子竒可知鄭州制陪京之右圃田為大當二都之衝道為三輔之繁㑹加以郡治初復民務至衆宜得良守以興善治惟某精于吏術屢宣使指向以辭疾退就散地蓋昔之能者或卧而為治是用付之左符俾居東里勿以淮陽為薄所期東海政清也西浙提刑張詢可知越州知濠州林顔可知䖍州唐坰可知舒州制列郡之治皆以承流宣化為事雖分地有大小處民有南北朝廷以為共治其重均焉以詢嘗為省郎出分使指以疾自上求得所便察其餘力固足卧治是以付之㑹稽當一都㑹以顔與坰率更劇任可以繁使惟䖍暨舒皆今名郡好訟之稱被於俗諺列仙之逰或在名嶽各務悉心以集民譽少府少監鍾離景伯可知夀州中散大夫李棻可知耀州制昔叔敖之興芍陂鄭國之溉關中民獲其利用無饑歲今夀春華原其遺蹟具存何古人用知之廣而流澤無窮也後之人見賢思齊不然守其舊規亦足以稱善矣某久更吏職祿秩崇重今付以二邦之事汝其盡心以就課最龍圖閣直學士知鄆州滕元發可知瀛州制敦詩說禮趙孟之言帥足食與兵宣父之言政朕惟河朔列鎮將閫攸寄所以外宣國威內輯民務折衝樽爼收功千城非得材良曷稱付委具官某學古輔志泛愛容衆臨義而知勇為遭事而能不惑回翔中外所至可紀兼資文武每著成效是用移此中都之政付爾河間之治夫訓士以威則其愛允濟養民以惠則犯難無怨是乃詩禮之要道兵食之本原爾其勉之母孤寵命資政殿學士知杭州蒲宗孟可知鄆州制海岱舊邦皥濟崇祀承伯禽之善俗有中都之餘化臨按百城控制一道是用舊德以副民望具官某智慮深廣樞機周密達於從政之方實備老成之美自輟綱轄之任屢更股肱之郡善最可紀餘力深壯輟此全吳之治付之東平之重夫江湖魚鹽之地其民呰窳而輕鬭爾能馴服之齊魯桑麻之墟其民朴重而好學事將無難矣勉崇終譽以副休命新差權發遣泉州朱服可知婺州朝散郎胡宗師可權發遣泉州制南方之劇郡泉山婺女並為稱首其民機巧趨利故多富室而訟牒亦繁其為守者常擇健敏而付之服前以便親為請今以泉易婺而宗師久吏習事真可以治泉矣祗服休命思所以稱河東運副井亮采可知滑州朝奉大夫張璹可知唐州制外計之任表率一道邦用莫重於金榖民務莫先於調度智弗及之矌職甚矣爾等前假使傳往蒞東土不知輕重之要曾無取豫之術以致民饑而無以賙賑糧絶而勞於發輸責其無狀宜有罰懲黜守一邦是惟寬典右諫議大夫梁燾可集賢殿修撰知潞州制詩云敬愼威儀維民之則蓋庭有變色則下多悖詞道民之愼何可忽也自古戒之義所不取具官某職在諫列地參法從不思朝著誾侃之美而忘公門鞠躬之愼敢肆倍言侵詆同列驚駭物聽虧損國體宜置深罰以警在位稍奪諫垣之秩出守上黨之地尚從貼職以示厚恩勉自省循母重愆謫承議郎侍御史王巖叟可直集賢院知齊州制朝廷樂聞讜議登進端士其言可用行之無疑如有弗及亦當忍貰吾之樂善盡美其亦信於中外以某自參邦憲頗著風論方將稍遷以示褒漸而某猶自以不得其言引喻請去進取不為元聖所與不及中行未倍直道吾既不汝責備完乃素守付民社之重寄分虎竹之左符貼職麗正専城歷下汝榮多矣思所為報新差知濟州王彭可改差知撫州制前守東陽孽火為沴使災眚應政汝宜民媚神者淺矣虐㷔流及廬舍延燒救護之術亦無聞焉有司議法適會恩降俾從薄懲以警有土不失専城之任當思省已之效知明州李萃可江東運副制財賦之人所以豐國用郡縣之治在乎甄人材監司之任柄是二者民樂輸而無憾吏服職而畏罪而後稱按察之最具將明之美矣以某通材濟務强力任術既崇豈弟之積加以老成之風是用付之漕臺總兹江介其使民無浚恆之歎吏去刻核之怨而邦用流衍士心知勸是為稱職汝其愼之彭城集卷二十一
