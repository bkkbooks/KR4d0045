body:
  text: 彭城集巻十六宋劉攽撰五言長律章武殿厯數歸真主乾坤仗義兵南夷長後服下國怨西征麋鹿荒呉苑梯航聚易京春螽那恃力朝菌欲長生雷雨隨金鼓鷹鸇起旆旌靈旗穊牛斗白羽射欃槍散地人誰保連甍火徹明晨門迎短箠死骨斷長鯨父老前流涕農夫未釋耕將軍薦牛酒愷樂㑹韶韺虢滅虞何恃崇亡紂亦傾一戎終薄伐再駕就昇平舊邑更脩武行宫即顧成奎芒埀篆刻天質望氛清羽衞嚴丹極潮音接化城欲回江海水都作頌歌聲溪上窄地穿茨拙高成晚日斜竹籬侵水面溪女浣汀沙老樹埀朱實懸藤結白花綠萍浮碎㸃芳杜上新芽一邑過千室十金無數家魚蝦與菰米惆悵此生涯和裴庫部十二韻懷人存蔽芾招隱賦窅窊賢傑多能事音徽自不瑕偶然新樸斵一笑為讙呀夏屋已隆棟清池非漚麻望賖隨朔鴈坐久至昏鴉好事逄諸彦佳聲播四遐燕游安以樂詩語正而葩霜應豐山石灰飛河内葭凉秋將落㡌斜漢挹浮槎老木圍岑寂蒼苔積鬖聲上髿瑤光天不逺圭影日無差莫怪長吟苦良金出汰沙南征二首漢皇開五嶺虞帝事三苖定有南征問遙知用武朝前籌皆廟略選士􅓈風颷潦水江湖大雲山故國遙天隂凝殺氣師老聽哀謡猿鶴愁君子黿鼉憶架橋繡衣方責戰虎節竟乗軺白骨不歸葬寃魂譙為招猶傳發閭左願得聽簫韶旅泊時流動何由問九霄楊越舊秦兵苗頒尚禹征初驚一使任那用萬人行友戸凝昏祲滄波觸駭鯨越裳無信息銅柱定將傾服嶺東南尉戈舩萬里程江通夜郎道秋入伏波營插羽頻封檄馳軺屢請纓介鱗悲物色猿鶴悵民生幾日封京觀歸時巻旆旌休聞七科戌無用五陽兵海國犀牛逺南琛紫貝輕平生一長劔嵗暮望欃槍寄橙與獻臣清霜夜漠漠佳實曉纍纍鵠鷇攢修榦金華耀夙曦狂酲香處析痏渇味餘衰採摘悲凡口漂零恐後時頌聲騷客誤原註屈原有橘頌錫貢禹書遺惆悵生南國煩君品藻詞酬臨濮劉推官治民非已長那得士心降為問來鳴鳯何如止吠厖壺餐慙鼎食鉛割謝矛鏦辯士更持節佳兵正上瀧薄田桑十畝小市釀千缸自喜庭無訟寧論智少䨇陪京開左輔振鐸服中邦禁臠分留印天枝涖建幢孤生老將至壹意信猶矼賴倚絃歌化餘風勉政龐送賈士彦延平知光化縣名家千里駒富學五車書柱史文無害絃歌智有餘素風存翰墨隂德在門閭江漢子男邑榖城桑柘墟曾為都尉治今亦萬家居安穩飛鳧舄新鮮縮項魚繡衣夸里父壽酒薦親輿不作期年别㸔君就詔除送高麗使絶域求通使皇華益藉才男兒萬里志笑語片帆開積鹵生隂火奔濤起晝雷曝鱗成島嶼吐氣誤樓臺城邑東迎日居人學用杯詩書自天性冠帯及家陪嵗月如勤止登臨亦壯哉威聲逾肅慎仙事指蓬萊鵬向南溟近槎常八月來言瞻析津次遙見二星回次韻和宋職方北樓勝事略就手兹樓無復加棟梁宏可愛丹碧麗非華風月登臨最川原眺望賖斗城知日近瀛海自雲遮杖屨歡乗興文移謹報衙畫閒禽語静嵗熟市聲譁柳影重重幕蓮香處處霞舳艫隨渚逺睥睨向人斜話聽游童樂詩煩上客誇國風麟趾應賔宴鹿鳴嘉鵰鶚無餘力騏驎不待撾衰遲竟何補襆被念還家復次前韻仙游欺緬邈古事厭増加自我新形勝因之翫物華不勞工子勸無價境天賖雲構森如畫翬飛勢莫遮静㸔梁燕賀閒聽野蜂衙曹事初無壅軍聲信不譁倚欄歌白雪為客進流霞快意凉風起餘歡素月斜呉趨應有始齊難詎為誇夏日思王粲名流得孟嘉優游琴八疊悲壯鼓三撾遍㸔題詩語飄然自一家旣和宋君佳篇因取加字韻中所未用者别為十二韻板築廢已久樓居仍可嗟敢辭才不逮何說智無涯史例同新作民謠異刻奢棟梁虹夭矯軒檻獸盤拏萬室瞻華宇千兵擁建牙浮雲生柱礎杲日透窓紗明滅穿林水稠重覆塹花長空指去鷺過雨亂鳴蛙屢獲詩人賦時紆長者車薦觴凝縹白諧語繆壺齟隱吏容攀桂終更遽及瓜多慙䨇鬢雪蕭颯對文緺合加字韻兩篇二十四字成一章更互次之詠曹之土風并叙出處寄呈司年職方漢郡王封寵周宗伯命加犬牙基自若麟趾歎于嗟陵谷隨人世春秋積嵗華洩雲餘薈蔚浮濟變津涯端木倦游學朱公精貸賖於今富而麗遺俗儉寧奢使轍常交錯京藩倚扞遮鋤鉤非盗用簫勺換兵拏樸直叨三組工夫盡兩衙戎容剖符虎士氣肅旗牙圜土幾無訟虛庭不禁譁對棊銷白晝清嘯岸烏紗池館澄潮水樓譙冠暝霞綠梢簷外柳紅朶砌前花徙倚危欄峻行來繚徑斜巢林安短翼擅壑愧跳蛙夙昔未更事游談多自誇奏盈方朔牘書過惠施車臧室初縻迹連城晩拜嘉華顛㸔欲落病齒不勝齟珠琲輕魚目桐絲陋馬撾敢論雞似鳯願食棗如𤓰臺妙前辭滿安輿久臥家最容高尚志那肯待青緺又十二韻絶境可遺老清心仍去邪樓頭喧燕雀川面動龍蛇碧瓦浮煙素朱甍麗日赮倚風時坐嘯乗月更吹笳庭樾交傾蓋池房雜舞􅀢凉秋乗爽塏吉嵗驗汙邪厨釀全欺魯兒歌習陋巴林珍餉桃李溪飯列魚蝦勝賞須神㑹浮名祗盗夸誰能貪課最本自學禪迦羇旅枝栖鵲田園舍負蝸蕭條㸔白鬢早晚得丹砂酬范判官喜雨一旬天再雨惠澤夜來深震發雷霆事榮華卉木心問年如隔併閲日屢辛壬安水江千里良田畝一金劭農非有術望嵗忽為霖雊雉依青隴跳魚出廢涔夢成池上作喜見洛生吟破敵聨飛鏃高張信雅琴緒風開晝色遲日媚花隂更有資清興連峯映碧潯赴官京東同舍諸公觀音院見餞有贈并簡不至者今日承人乏東州假傳車勞生復去國埀老欲捐書斗酒相為樂諸家食有魚華燈續光景鳴笛問吹嘘即事已陳迹懷人方跂予要官多謁禁數子莫情疎啼鳥春猶淺高花日勝初朝回應見念㑹語殿中廬景德寺河沙院餞蘇安上知泰州劉元忠河北都運分題得無字今朝一樽酒聊與故人俱非復少年日深驚别意殊燕雲低朔漠楚水向江湖報國不一事出門成異塗騰鱗安浩蕩雋翼就虚無應笑白頭老閉闗方據梧過太康縣此路入亳州云是先帝昔東幸時馳道也馬上口占行二十里成三十韻維昔東廵狩天王景宅朝金椎隱馳道象載下招搖呂應青雲近闗迎紫氣遙旄頭前詔羿陪乘後征僑奉引三司肅中堅萬馬調旂常亂辰象劔佩雜瓊瑤多士和相讓諸侯貴不驕海神來積雪仙馭㑹祥飇象帝初觀妙猶龍此見譙強名大樸著將隱德音昭上善泉仍潔知常檜後凋虛心明左契聞道首參寥絳節賔閒館璇宫盛綺寮洞天留白日書法祕青霄瑄玉嚴禋祀歌童采夜謠衆神如向座佳氣鬱通宵隴麥聞重秀房芝搴紫苗醴泉甘愈疾舞鳯樂儀韶舉翼王喬舄排雲子晉簫頌釐知簡簡奏賦欲飄飄麗澤驚雷雨鴻恩霈蓼蕭百年皆就見比屋幸寛徭牧馬猶如隗封人預祝堯歡聲喧望幸舊里不崇朝萬域車書混重明祲沴消鼎成因脱屣桑變忽觀潮雲霧常疑祀衣冠祗葬橋藏書思柱史問逺謬祈招躍馬遵遺轍談王就采樵生遲千一旦無所效芻蕘次韻和石曼卿泰山歩至東山表纔知嶽鎮尊百川趨渤碣一柱際乾坤託始無懷氏談更洛誦孫後王崇檢玉方士說天門巖石居凝命羣峯逺駿奔隂陽殊雨霽朝夕異凉温學者譏秦事功臣誓漢恩氣連滄海碧影變濁河渾候日來丁夜捫星待合昏仙真疑史闕宫殿謹司存落水雷穿谷危松珀擁根更尋宣父志雅意屬崦崐將至洛中先寄宋次道諸幕府頻年洛陽道秋月照征車闗口朝煙上伊川曉日初艤船㸔飲馬投䇿數游魚蟬嘒隨林静鐘鳴應谷虛夙齡懷勝尚吏役久愁予及此娯山水翻知喜簡書名都士淵藪盛德世璠璵羇旅如傾蓋詹言興有餘錢子高舉賢良中科寄賀子飛當世英雄彀連年伯仲賢友于聲競爽敵萬智無前讜議天人際馳辭日月邉㑹驚文得鳯真謂筆如椽萬乘親前席諸生敢比肩晚成無近器妙選悉青錢濟美高陽舊傳經韋氏専公侯將必復廊廟定誰先歩武青雲接官曹畫省聨軼羣㸔赤驥洵直想朱絃德賞今誰擬才難古亦然從容照棣萼聞望已陶甄夏屋方隆棟雲檣穩濟川那令得賢頌祇貴漢王淵送裴二知蘇州著書𤣥尚白送客鬼揶揄積水望江海秋風吹軸轤貴人千騎長紫綬左魚符遺愛留南國歡聲接舊呉曉霜繁橘柚過雨熟菰蒲安得如王子從君飛隻鳬和原父同江鄰幾過浄土院觀古殿呉道子畫楊惠之塑像及顯僧傳當世貴人形骨仁僧鼓琴作真賞非俗嗜雅游知勝緣百身化前佛方丈納諸天工以智自表名由高益傳呉生擅粉繪楊氏妙鈞埏能事古未盡希聲今亦然伻圖觀肖像撫㢩置鳴絃理㑹均聞見神交遺後先衣冠若對面山水欲忘年子墨臺中妙仙翁樹下賢新詩俱絶唱塵土更餘妍同徐監簿作水始氷霜落嵗將晏風生水始氷猶殘夏蟲怪初比玉壺凝氣襲璇源潔光搖寶鑑澄涵虛同凛凛履薄乍兢兢魚鱉悲潛伏江湖息沸騰凌隂如獻納㑹是却炎蒸送韓子華奉使安撫江南漢庭重八使同日出東都仗節年仍少埋輪氣不孤詔書敦直指懸弩肅前驅宣布君恩被周爰楚澤紆秋風捲旌旆桂楫上江湖遊子故鄉在相思天一隅送張益宣州法曹椽曹仁恕用郎選孝廉為之子文無害居延敢決疑一王除制作三尺著毫釐過眼皆成誦讎書自所宜原註王君編前後制敕為一書最精察廉時爾貴治道吏為師去去弦歌化當如别後思郊祀慶成詩聖瑞歸文子珍符屬原註音燭孝孫儲精凝景命端拱輯羣臣禮樂成中典人神定一尊亮章新物覩咸秩備司存成德兼明察彌文付討論積高參斗極因吉際乾坤候景迎長日萌芽發舊根律風乗廣莫卦氣起昆侖閶闔開黄道星辰拱紫垣奉瑄嚴太一推䇿夲軒轅八廟森重構諸侯盛駿奔薦馨光裸玉告嘏逮歸膰旄纛羅千乗旗旛徑九門龍蛇影搖動鵝鸛勢飛翻士勇歡鳧藻天暒候晏温幔城横象魏玉果㑹春園嚴警連宵鼜周廬次屬鞬望雲舒錦石揖月上金盆廣樂讙來格升烟續載燔頌釐如響答終事寂無喧輦路祥飈轉端門旭日暾天雞還自舞仙鶴為孤騫河漢驚垂象雷霆浹厚恩畫衣期不犯肺石更何寃長樂尊無貳椒房慶已蕃睿心先廣愛大䇿重臨軒瑞典兼河洛歡心極鎮藩名山已望幸天意肯周爰願上公車奏來趨白獸樽心知搢紳義展采詎難言次韻和王正仲熙寧郊祀二十韻駿命膺長發鴻圖本慎徽八方星拱極四海日升暉舊典増咸秩彌文示表微聖時均玉燭天統正璿璣南極迎陽復隂泉候氣歸積高常眷顧昭孝每母違羽衞來䨇闕和鑾並六飛風霆齊命令龍虎㑹旗旂帳殿層城暮金波列宿稀嚴更虛夜鼜雕輦下彤闈廣樂千人唱升煙萬目睎衆神知受記象物競來依陟降兼明察圓方比範圍送音仍鬻鬻畀福想霏霏霈澤蘇羣動春陽暢墐扉慶深周揭厲感極至歔欷多士參鳴玉㣲生厠皁衣肅雍瞻帝武奉引近天威儒館鵷鸞舊長謠錦繡輝因知子雲賦何足頌巍巍聞蜀中大水寄閬中諸弟蜀嶺參天近巴江向海迂百城同暗谷獨鳥視前途六月蒸雲甚長風驟雨俱漏天疇得補深峽不時輸回首虵蛟鬬傷心虎豹呼劔闗愁斷棧天漢逼乘桴臂飲通殊俗巢居自一隅遺黎待螺蚌小邑斷樵蘇絶域飛黃鵠仙人用隻鳬清秋已収潦問爾麗泥塗馮當世生日申甫維崧嶽東方夲嵗星舊書容盡信成事况親聆南紀浮江漢青煒變頊冥氣和方毓粹地勝已儲靈德宇何寥廓斯文實典刑龍駒來汗血霜刃脫青萍智略聯三㨗規模壯六經羽翰驚海運辰象屬天扃回首煙霄近横雲漢閣青河圖開秘奥龍節付儀形萬里風聲肅三年楚俗寧里甿羞螮蝀鄉校謹螟蛉聖主思霖雨羣生望大庭指期調鼎實洗眼頌椿齡授易嘗占晉論詩竊次駉莫言狂簡士足記景鐘銘陽月方開旦商行接素秋聲華臨盛際勲業動前修舊物詩兼禮公望礪與舟諌行扶廟算威克弊邦讎翻欲危晁氏皆能苦絳侯孤城雖莫可具美亦誰侜北闕虛前事南冠記昔遊客惟論藥餌書不號窮愁迥有閒中趣高於物外求賔朋依白傅潤澤借裴休跂也身方族時哉嵗欲遒愁無縮地術賴有置書郵理楫王猷拙稱觴小陸優傾心日夜急滾滾大江流送子惇出使河北禹績基壺口堯仁被冀方官迎赤車使詔選瑣闈郎力學推元稹高才屬長康壯懐來慷慨得志自軒昂愛直容知黙中和異吐剛一臺傳駮議二府見分章前效平原淺嚴威夏日長居常祗逢掖試躍即干將雲漢昭回地鵷鸞八九行穹廬休夕拜䪍弩備晨裝洚水成滔陸流庸頗異鄉挂冠勞畚鍤佩犢問耕桑哺乳増飦粥完膚滌痏瘡朴忠將漕最惇厚訓兵强冀馬羅馳傳河魚飽食魴細書夸睇視淳酎沃煩腸肯作田園計寧嫌鬢髮蒼能令老者奮直與大鵬翔處世當何語懷君豈易忘哂由終所畏與㸃自知狂卜居書懷漆雕未能信陽甫免歸居理以逍遙得材由濩落踈狹才輕勢利小隱幸林廬藿食由來事茅茨不願餘南簷容曝日側徑喜擕鋤筋力吾如此功名世有諸憶初干萬乘徒歩謁公車投射東堂䇿歸來北闕書先鳴煩指日弱羽愧吹噓雲雨非人力泥塗亦詔除江湖輕乘鴈鐘鼓陋鶢鶋有道翻羞巻迷津幸遂初幽棲謝車馬至樂狎樵漁述作稱狂簡誰能問起予渭水鳥鼠流清渭岍岐導衆山懸車循暗谷斷棧出重關長路去未已連峯深更艱秋高木落外天夐鳥飛間日出㸔羣動煙収認百蠻别腸逾九絶愁淚獨長潸立志薄軒冕隱居宜草菅自甘家食薄還愛綵衣斑從吏負夙願辭親何厚顔簡書今可畏幕府尚餘閒猨呌無勞思鴻冥不易攀歸來城闕望但見白雲還致齋中太一宫見屏風有唐賢和常舍人詩因次韻寄子瞻内翰子由侍郎子開舍人穆父待制數公皆嘗祠太一也禁掖下祠宫青槐輦道通薄雲収霽雨初夏接薫風將旦羣隂伏齋居百慮空夢遊如有遇反聽更能聰祕祝寧神外多儀拜貺中佐靈猶五帝執事本三宫象海鼇山峻翻堦藥秀紅守儒嚴講幄起草麗談叢夙昔嬉遊並神仙歩武同吹藜驚爝火抱法想江楓已老仍書癖懷賢愧易東君王問無擇留意屬谿工羽林通孝經聖治周方域儒風曁羽林一經嚴授業五孝得潛心騎獵宸遊簡嚴廬禁掖深披文知行在即事亦官箴訓勇寧慙晉専門詎屬參從兹六郡俗不羡滿籯金寄杭州通判蘇子瞻海州使君孫巨源原註時罷㤗州通判淛水三江外胊山百郡東專城須聞望半刺亦才雄浪海元無際呉潮近峽中茵憑那獨異翰墨自兼工追昔賢良舉殊時歩武同百篇傳冠古半䇿已全功咫尺騰霄使囘旋著籍通龍媒流汗血鳯羽雜鳬翁烈士猶難進清朝各願忠伏蒲寧曲學鳴鼓尚深攻物理安圓鑿人倫陋發䝉俟河愁敝箄破膽忤豐隆力擠膠西相廉欺第五公絶絃迷促軫折翼創虚弓卧閣寧多病治中有舊風從容付丞史咻噢及兒童使者誅求急王人禮數崇湯年偏一漑稷御不終窮高宴延仙伯閒遊厯梵宮怒濤翻練白浴日上霞紅沙鮚能藏蟹江鳬不慕鴻五雲瞻碣石七澤望青楓瓜戌留麋田耎原註音軟漢書作畯誤茅心憶桂叢賜環聊衮衮遺楪漫忡忡困學今將落生涯祗屢空頭風吹過雨鬢雪亂飛蓬龜死寧遺䇿鸞棲豈願籠勞生俱夢寐有道或瘖聾絶唱常難和幽光更待融知音懷感慨不獨寄絲桐寄梅聖俞江鄰幾韓持國直諒多聞友衣冠領䄂賢平生三逕樂少别四時遷曲䇿舂山秘絃歌璧水圜呉門真養性委吏故依然杖履兼閭里詩文孰後先風雲多變態鞭弭屢周旋清汝流無極維嵩地少偏微官非擇取勝事偶陳前遲日消棊局殘春賴醉眠時從謝客詠不廢逺公禪吏課輕涓露官箴恨􅀈牽裹粮嗟不遂回首鎮幽捐寄王子直謝師宰自昔東南美由來王謝郎提衡俱射䇿繼踵事専場凡馬驚騏驥羣蜚下鳯凰同時冠後進舉國誦成章賈子諸王服蕭生舊友光青冥㸔咫尺雲路更翺翔游東寺籃輿出乘興佳客不相遺水色鳴騶外林光倚蓋時寒餘草初變風煦柳先知複閣披襟久廻廊歩屧遲招提應不厭幽熟重前期㑹待花如霰壺觴約自隨江漢江漢繄常武苗民傒舞階百蠻時暴桀終古事威懷壤穴深潛蟻山林盛鬭豺墮鳶愁瘴霧吹蠱厭昏霾滛毒皆沙蜮跳梁自井蛙幾成分服嶺埀欲罷朱崖元帥全軍出天王太室齋鑿門資感奮負羽必誰差壯氣隨霆擊先聲甚雨偕遊魂蚩爾輩賈勇洎吾儕略野窮飛鳥圍城盡析骸饑啼兒宛轉怨哭鬼歐哇破竹餘銛刃焚原祗亂稭鯨掀才足膾狸搰可須埋王略過銅柱天威暢藁街斗牛光更潤溟海静無涯賈舶盈珠琲宫娥賤玳釵拜侯金篆斗犒士酒如淮神武千齡協歡娯萬國諧告成方厯吉名嶽望禋柴温湯和王法曹火井傳夷檄炎洲記海隅仙遊空詣絶方志每多誣汎濫浮清沼淵源自奥區洪鈞從鼓槖一氣審為爐烈熖方焚澤騰波盛濺珠沃焦難與並執熱諒誰須鼇抃終當釣鯨掀㑹學屠此中勝鼎鼐不復待樵蘇池館他年貴衣冠萬乘俱廢興仍在目惆悵指平蕪蔡州城枕汝水寒日水涸清淺可愛原父與郡守汎舟川上甚有佳境以書埀報緬想勝遊因形短什積水寒収潦深淵浄見沙冷光憐玉潔清鍳絶毫差鷗鳥居相樂漁樵近有家濟川新剡木載石去乘槎樹影魚鱗宻城隂瓠子斜夤緣忘向背頃刻變烟霞練白翻雲葉金鎔蕩日華照心同不隱滌慮愛無邪客醉風吹酒歸迷斗轉車林宗昔無暇范蠡去空賖鳬鴈晴餘喜波瀾雪後佳謝塘芳草夢依約向無涯登東山小魯惟昔宣尼氏登山俯大東隘然輕魯國不復夢周公洙泗秋毫外龜䝉聚米中浮埃殊擾擾鬬蟻竟匆匆遊觀情應類臨河事不同豈將千乘富一換舞雩風賀玉汝殿中御史世許忠臣子仍為憲府官自宜棠棣萼復正觸邪冠霜肅臺中柏香餘省署蘭鷹鸇與秋勁氷玉瑩心寒去路鄰霄漢無人怨鏌干流傳廟廊語聳激壯夫肝佚老堂為馬給事題膂力期方壯功名付衆才朝廷不能出軒冕儻時來賢者皆知此勞生亦念哉暮年均暇逸末路忍低回延閣通雲漢東垣接上台老成宜鶴髮絶足信龍媒脱落經綸際從容里地開圖書収舊素池籞就穿栽松竹依陶令兒童戲老萊尚知南郡富肯使少游哀詎有東家問端思齒杖陪㑹為三徑客幽屏謝塵埃灞涘望長安去國一回首憑高因肆觀清川㑹灞涘白日麗長安魏闕中天直南山並海寒樓居雲縹緲城象斗闌干即事感能賦有情知永嘆不勞歌倚瑟悽愴指邯鄲集英殿觀先帝御容墮淚不能禁彤庭北望深壽觴疑在眼宫漏獨驚心繪事應神助天光想下臨秋毫分萬一玉色辨侵尋未悟攀髯逺如聞棄屣音當時萬年木風動亦蕭森王四十監鴻慶宫沛邑祠原廟明年啟夀宫真遊追柱史吏隱即冥鴻苑路連修竹兒歌習大風海鳬隨歩武笙鶴下虛空司馬官園令千秋擢寢中書成大人賦夢識白頭翁北闕縻徐樂丹砂愧葛洪帝鄉那可問相望五雲東代魏秀才和明府敏為政經綸功已深無欺禮神意不擾愛民心直道容多梗良時避孔壬未成宣室召空賜潁川金茲日量天聽方春報雨霖望蜺舒黯黯笑電趣涔涔耒耜謹南畝歌謠變越吟和應光爇戸潤足俟薫琴久客羞王粲忘饑學漢隂鹿門那忍去留釣此江潯又和魏秀才川原惟漢廣雷雨向春深望望三農事悠悠一嵗心月離初候畢龍見亦推壬向夕風翻海中天電爍金農占不騎晦史例足書霖至治無饑穰元和蔑旱涔遷鸚殊自喜倦客獨悲吟未必魚生釡聊因酒貰琴奮身從嫖姚走馬過雕隂辜負封侯骨棲遲沔水潯答呉侍郎寄陜府天王相有三分陜按殽函列國依明德西人盛美談甘棠元聽訟綵服自調甘餘力斯文貴珍詞萬象含氣清融渤澥材絶聳楩柟請誦詩三百先知學召南次韻和韓持國雪二十韻層雲升蒼莽密雪亂高低巧緻欺工倕繁多感計倪因高宜嶽鎮善下及塗泥海變方朝若天通憶命黎懸簷埀齟齬投隙置刀圭冥頊豪無頼娥舒弱易迷清心還自照正色故思齊報曙端成誤驚春妄問奚林珍翔鷺鵠玉氣墮虹蜺獵野甘燔登川快臛蠵風回飄栁絮日暝亂醯雞蟲篆初難辨庖羔久未刲𠖇鴻愁徑度饑雀愴單棲律驗知陽復天旋測氣躋浮生共覊旅外境本筌蹄置酒容高㑹論文慰觧攜詩從載塗唱賦為騁妍題數聽波濤辨滔滔百仞溪詠雪朔雪三冬暮同雲萬里間昊天還質素長路失幽艱舞急低仍舉吹多去復還増高元稍稍投隙故閒閒積鹵輸鹽浦飄沙聚玉關怒濤狂振海疊巘坐移山喜厚猶多積憎繁詎得刪旗旛高巻野塵壒密通闤㸃綴林芳亂裝禠石蘚斑户斜遺尺劔窓缺置連環圭璧衣裳㑹閭閻米粟頒折篁終不屈喬樹頓堪攀紈潔栽歌扇珈明聳髻鬟運籌思巧厯語異叱神姦凍筆無由捉强弓不易彎鴈號隨雀瞀龍蟄並魚鰥坎辟威權厲陽芽勢力孱晦冥愁運促温燠愴時慳畛域通三壤塗泥洎百蠻暝雞矜喔喔宵犬事􅀈􅀈踠足傷騏驥迷羣失鷺鷴製書思籀頡議巧謝倕般蚊翼騰空曲芝英擢野菅藩籬容月魄軒陛絶人寰感物徒酸鼻明心肯汗顔露肌寒得胗直指凍成簷罅風號勁爐灰火逗殷獵狂懷塞漠漁樂記江灣飲乏枯瓢棄磨稀古鐡頑莫欺東郭履不愧半通綸賀幸開寳寺福聖院新閣帝圖天不極覺苑日融輝減原註音䧟刼寧無待直乘必應機化城非樸斵檀施自依歸香象開馳道珠瓔接尚衣梵音潮海會阿閣鳯凰飛清蹕通長樂齋居䕶郤非雨花交霰雪燎桂雜煙霏黙冀南山壽賢公已見幾原註易云幾者吉之先見原父舍人爰自春坊遷職史氏未更晦望旋有新命増秩諫省躋榮綸閣斐然成篇以伸歡賀近署銅龍貴仙山䇿府遙由來稱國士自致必雲霄太史題凡例彤庭奉日朝除書新翰墨受賜接晨朝池水通翔鳯星垣直建杓汎槎輕濟海逸御㨗凌飈獻納當宸扆絲綸聳具寮直詞明黼黻大冊粲瓊瑤拜舞腰金重歸來廐馬調泥書開鵠板法駕從雞翹高興吟紅藥珍辭賦洞簫宫花香永晝禁漏静通宵枝鵲聲何喜原鴒意自饒寄言江漢客無事老漁樵和秘閣趙光禄學士臘月夜閣宿見寄秘宇聳嚴凝名卿壽作朋臘殘琪樹雪夜寂𤨏窓燈交意嘗投漆高談亟引繩正憐湖海别况復嵗華增詩勇堅無敵材全問不能龍淵方出匣持以喻韓稜分題河決東郡漢郡金堤北黄河落日東波濤凝沴氣翻浪蹙長空鉅野鮫人室魚山水伯宫坐嗟山海變心恐地天通未就宣防築深懐夏禹功何當開嶺首西注出湖中陪馬守蜀山禱雨丘禱亦以久齋居先筮從鳴騶趁殘夜觸石㑹前峰簫鼓終椒奠風霆起蟄龍化工輕瞬息幽貺振舂容灑濯埃塵絶虚凉灝氣逢小人思學稼即事喜年豐彭城集巻十六
