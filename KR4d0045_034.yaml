body:
  text: 彭城集巻三十四宋劉攽撰序後漢書精要序案攽本傳云違于史學作東漢刋誤精要一書則奉詔所修可以補本傳所来及也臣聞學古建事王人貴乎多聞論世誦書前哲謂之尚友然惟述作異體簡編具文華實參并源派殊别是以繙十二經之説有太縵之嫌授三百篇之詩或一言可蔽宜其薈蕞樞要搴擷菁英張衆目于在綱察專車于觀節指掌可見括囊無遺而後博覽鮮寡要之虞好古有知言之選矣昔我仁祖皇帝聖由天縱道隆日躋惟睿以職教化之源惟深以通億兆之志參天兩地既成獨化之功聚精㑹神而以衆善為道聴覽餘暇無事棄日翺翔詩書之林攷合天人之際厯代善敗之效日陳于前百子是非之論壹概諸聖乃詔臣等以常所進讀漢書剟其精義與夫善謀别為短書槩見大略若夫政化之要禮刑之殊材良節義之風智勇名實之效間見層出悉使粲明介善毛惡咸可記省臣等無右尹之智不足知祈招之詩非班伯之才曷能出金華之業綿厯嵗序僅終鞏削流示方來永觀大訓有以見元聖之稽古上徳之知言隆禮羣儒折衷妙論豈特當瞍矇之賦充衡石之程而已哉伏惟皇帝陛下體道合于自然好善常若不及自百王之垂憲與多士之周爰未始有遺常以虚受矧復念繩武之至重思詒謀之有開固將續盛節于丕承加睿心于善述則新書之傳其邁越于前世矣臣等猥以末學親遘盛際藏書柱下竊自比于史儋注籍南宫曽莫階于楊賜仰誦休烈紬詞序端聲其荒蕪愧于崖略云爾公是先生集序公是先生總集七十五巻敘文字為五種古詩集二十巻律詩集十五巻諸五言七言歌行篇曲皆歸之詩内集二十巻諸議論辯説傳記書序古賦四言文詞箴贊碑刻誌行狀皆歸之内集外集十五巻諸制誥章表奏疏駁議齋文覆諡皆歸之外集小集五巻諸律賦書啟皆歸之小集大凡若干篇古今之文人多矣其能道胸中之藴積暢物理之有無合衆美以為已用超倫類而獨得使其語言如其心其馳騁極所欲瓌偉竒抃放肆自若非夫豪傑之士不能至是故自申韓管商慎墨屈原之倫其道未必皆是而其書傳焉雖然猶之貴文也若夫原性命之統貫誠明之本攷百子之雜博判其真偽雖至于六經可折衷也極帝王之治奉事有功雖在于今日可按行也是好古博物之士所以貴乎學聖人而得道真者嗚呼先生之文優出於前人者在是矣傳曰情深而文明氣盛而化神惟深故能通天下之志以極萬物之理則文有不明者乎盛如四時煦育賦予雕刻衆形萌芽夭條無有不備是之謂神故古今之士智有所不周文有所不明由其情之蹇淺也知其一不知其二善于此不善于彼由其氣窳而化狹也嗚呼先生可謂備矣傳曰不知言無以知人也先生之言孰有知之者哉言可知也先生為常存矣是故有志聖人者訊其通貫穿諸子者觀其辯濟用當世者尚其辭莫不有為師之道焉合而觀之若韶濩武象之天覆地載也離而聴之若琴瑟磬管之迭奏静深要妙歸于平心氣感神明而已矣先生論春秋易象七經説弟子記不載集中具别録云贈醫潘況秀才序始潘君以術游京師疾病之至門者日數人于是有知潘君者曰潘君相有病于未病治已病于無病潘君視隠如顯視遠如邇色喻于目脈喻于指聲喻于耳三者參用藥至病去用力少而見功多所謂國能也他日往則疾病之至者益多日數十百人則又有知潘君者曰潘君守學固而處心平不以人之向已而喜不以人之去已而沮汎然唯吾所以自任而已所謂有道者也他日又往則疾病至者無算舉京師之人將遷焉則又有知潘君者曰潘君不為利疚不為勢回治人以疾病輕重為差其視富貴如貧賤視布衣如王公得千金之謝猶簞食之饋所謂士君子也嗚呼天下之事莫難于持久持久則善惡自效賢不肖襲情若潘君者自始及終三譽益隆人之從之者百倍於初期以國能而卒至於有道士君子者豈非真賢也哉今夫世之為醫者誦數守法嚌甘調辛未有少得也則囂囂然以謂已足于是以人之生死徼倖乗人之急以濟其不仁之心設危辭詭説以恐喝富貴之人捩其手而邀之財得金玉錢帛滿意盈欲迺始從事益投毒藥與病相違煩憒昏眩使其不自聊賴然後徐徐解治幸而不死者有矣則固以為己功而妄叨其名厚求拜謝以復其勞若其不活則其所得金帛固多恬然持去不自愧恥其視貧賤無勢者則傲然不顧世皆曰醫賤與傭徒鬻賣者鈞豈醫之實若是哉昔岐伯和緩之能乃通于治國修身之際嗚呼君子孰能矯正之者若潘君者其復何尤嗚呼世之事多此類者獨醫乎哉僕感潘君守道出于流俗故作叙醫以示知者送胡因甫宰湘鄉序昔胡君求字于某某曰字子以因甫吾聞凡名有待事者叔孫豹是也有因生者趙岐是也字之者必稱其義今子生于湘而名湘是因生矣字子曰因甫庶㡬如趙岐乎胡君以為然今胡君乃復以王命宰湘郷非擇而處之適合耳意者其山川之神潛有以相夫子者故其始名之而今往治焉傳曰人神之主也夫子得邦家者民將被其澤信夫其必有神相之也昔陳蕃治魯百姓愛之不忍言其名而魯邑有與蕃同者更之曰皮至今猶稱焉胡君勉之哉以子之學施之于事吾未始知夫湘鄉之不為魯蕃也且山川之神既相子焉富貴不可辭務自愛而已送焦千之序某嘗論鄉舉里選之法難全行于今自三代之盛諸侯列國與郡縣不同及事久逺不傳且置不言夫東西漢之時賢士長者未嘗不仕郡縣也自曹掾書史馭吏亭長門幹街卒游徼嗇夫盡儒生士為之才試詩于事情見于物則賢不肖較然故遭事不惑則知其智犯難不避則知其節臨財不私則知其廉應對不疑則知其辯如此故察舉易而賢公卿大夫自此出矣今時士與吏徒異物吏徒治文書給厮役戇愚無智􅀢詬無節乗間窺隙詭法求貨笞傌僇辱安以為已物故無可以興善者而儒生學士之居于鄉里不過閉門養髙其外則游學四方以崇名譽然後可以出羣過人矣而欲法前世一使郡縣議其行實而察舉之固難矣前年天子祫祭宗廟施慶天下閔太平之時賢士有遺逸而不仕者因詔州郡推擇上名于朝間一嵗處士之應詔而至者十三人果多游學成名者天子皆以禮接之館于太學而使有司䇿問以經術之要當世之宜而爵命之皆得顯名美仕焉凡十三人吾所素識者焦君伯强焦君伯强介直好學數應進士舉至禮部輒罷去時人皆歎惜之謂之遺逸不亦宜乎夫州郡推擇之公也有司考試之明也方將為國得賢必且精心慎慮拔士于千萬豈其崇虚徇名苟得舉逸民之稱而已則夫十二人者吾雖未盡識之殆皆焦君之倫無疑于是焉使之從政治民譬猶發厫倉以賙貧乏決江河以灌下濕沛然其有餘矣然吾聞焦君之名在第三而他郡有辭禮命而不至者夫焦君之才既盡美矣況復有過其一二者乎彼辭禮命不至者又其故何哉彼以迎之致敬之禮未盡其數歟抑彼皆伊尹太公之儔至三聘而後幡然改立為太師然後載而與之歸乎天下之大未可誣也吾甚慕之故于焦君之行樂道之焉行狀為楊殿丞作五世祖系事狀楊氏本望虢略逺祖某嘗仕為湖州從事去官始家于宣州某縣是時五代喪亂壤地分裂稱號而王者六七姓南北斷絶存亡不相往來仕宦者局促方域不見廣大無所設施區畫故有志之士不願得官去而在田畝者多逺祖既來宣城則市田宅築室種樹春耕秋收教養子弟師帥鄉里以俟天下之平及終遂葬某縣某鄉某里子孫因為宣城人至璵五代傳矣髙祖某曾祖某祖某父某墳墓皆在某縣自曽祖以上率皆隠徳不耀猶逺祖志也從祖考以來天下甫大一統文教興行故兩世俱以儒術從進士貢然亦未有成也施不于人于其家有其志而無其功豈所謂必將鍾慶于其後者哉而璵孱弱奉承先訓不敢有墜天聖八年始以進士中第得官積十八嵗遷至殿中丞有位于朝今年上郊士大夫得推恩以及其先璵因是得贈其父某官為鄉里宗族子孫榮而逺祖之墓在焉者未有碑碣士大夫之遊而過焉者不知加禮于其所祖考之志不傳于後生子孫之慶不知所從來璵尚恨之昔子雲之先始居巴蜀亦五世而生雄雄仕漢有名能自記其祖系傳後璵材短無文不能有所稱道願得當世賢者記之以畢賤志故敢以累執事㐲惟少加採擇而垂纂錄焉謹狀賈公行狀公諱黯字直孺少聰悟好學九嵗時作詩有髙逺語人皆驚偉之十五能從進士舉慶厯六年中第為天下第一時年二十五釋褐授將作監承通判襄州官滿還朝召試學士院拜著作郎直集賢院祀明堂覃恩遷右正言公性方嚴直諒自任好惡是非明白較然無所阿倚用是為諫官其天資適宜慷慨引大體重于朝廷仁宗皇帝識公手書閱公章疏常嘉賞之公前後所上數十事掇其切至者著一二以見公志尚書郎杜樞受臺檄覆開封府獄事獄情不完樞將駁正之事連權貴人權貴人不便也罷樞勿預已而摭樞他過斥逐樞初御史中丞舉正有所諫爭於上弗能得因百官内朝留班將帥以見上樞時在廷中獨出前行問中丞所留班狀既數月矣因樞後事乃發舉以為愆尤人皆知樞以獄事見譴也公上疏極言救樞其後諫官御史進對論事諠譁上前宰相因禁制臺諫有請上殿者皆因閣門以白中書一候進止公上疏以為言路將自此大壅古者諫爭有折殿檻牽衣裾者今雖諠譁何傷于直固請如舊樞密副使狄青由卒伍起致位二府公以為自祖宗以武烈服天下是材武勇力之士其建勲勞者多矣猶未嘗有得在幃幄謨議者今天下方以文治而青身無陷陣破敵之功驟列樞近使外國聞之有輕中國之心又宿衞諸軍皆小人戇愚無知見青尊寵喜其黨類可以倚藉搖動人心不可之大者且朝廷之臣以禮義進者將恥與青偶非所以得賢者之心几公論議類皆若此厯遷三司判官賜緋同修起居注假某官使契丹遷右司諫至和元年八月以本官知制誥賜金紫權判流内銓天下承平日久百官職業皆有常憲共樂于因循而銓衡徒文書備具而已公始欲以風義整救其弊益州推官桑澤在蜀三年不知其父死後代還舉者甚多應格當遷故投牒自陳人皆知其嘗喪父莫肯為作文書澤知不可乃去發喪制服以不得家問為解澤既除喪求磨勘公以為澤三年不與其父通問亦有人子之愛于其親乎使澤雖非匿喪猶為不孝也言之于朝澤坐廢歸田里不齒終身晉州推官李亢故嘗入錢得官已而有私罪黙自引去匿所得官以白衣應舉及第積十嵗當磨勘乃自首言其初事公以律所謂罔冒也奏罷之奪其勞考又龐丞相婿雍邱主簿陳琪凡三調官未嘗由銓筦始因其父得官復再任皆因其妻父乞恩琪比他人未嘗逺宦而舉者二十四人公以謂此徼倖之尤者而士大夫承望權勢背公助私其風不可長又舉奏琪琪後引對才得循資云公前在修起居注天子退朝御邇英召見侍臣講説經書讀史傳而史官不預公以謂天子于此咨訪政體論議治道徳音聖問而史不記錄嘗以為闕及將修起居注因上奏言之自後修起居注官遂得預邇英行之至今公以少府老疾求守便郡出知陳州未行換許州後一年遷兵部員外郎徙襄州嘉祐元年十月祫祭畢加朝散大夫封長樂縣開國男食邑三百户少府還居鄧州公聞其疾篤將棄官去念以符印屬他官且將坐所不當受者因自移疾以府事付佐官既而脱身去即日上書自劾臺諌官聞之爭舉奏詆毁公然朝廷髙公所為且以厭言事者意徙公郢州公竟以憂去官居憂以善喪聞既除服還為兵部員外郎知制誥詔書稱之曰聞父之疾委政歸養孝也上章自劾不肯苟免忠也公猶以前嘗謫官不敢入朝詔復趣召差勾當三班院明年召為翰林學士判昭文館五年謫吏部郎中翰林侍讀學士知鄧州未行近臣臺諫多推言其忠孝宜在内省復留為翰林學士知審官院初有司議京朝官毎三嵗即自言求磨勘轉官使人人驟進非所以崇退讓養廉恥也于是詔有司為當遷者舉行其文書而人不自言矣而朝士之喜名者尚或辭讓求不磨勘有司移牒督之至于十數公以謂向者使人自言而士之恬于榮利恥不求進則其嘉尚旌擢之可也今有司舉行無復自陳之嫌矣且攷課之法豈徒進陟之而已哉亦擇其鮮功者而黜之則士大夫尚何以辭不磨勘也其容有矯妄之人虛竊不就之髙徼取恬退之譽隂冀進擢無益風化不可不為之防請使言未願及乞不磨勘者皆自列其意故有司因不復督索之必待其復自陳及更為按行中書異為籍以記之其有殊功異效皆可勿遷上從公議于是士大夫之為下情者皆息七年三月遷左司郎中知開封府九月上祀明堂加輕車都尉進封開國伯公以方嚴著稱所至人皆憚之及領京畿官吏謁見言事皆得傾竭盡意語有中理未嘗不委曲聴受皆過所望吏舊額七百員而諸嘗以罪去已而復叙者皆員外置之積數百人公以謂此皆僥倖且不足懲有罪乃奏為條約其以罪去復叙者須正員闕乃稍補之又府吏之給事他官者更七次則遷一資吏緣為奸他官之請從事者無窮或以一事未竟遣歸既又請之則累記為兩役矣公始命科條目某事以上若干種吏之從事在此數中者為以次數餘皆不聴及一事而再往者悉禁止之自後皆遵用賈尹故事府吏人人失望更相搆㑹語言取其斷獄行事者稍緣飾之以為不直冀以動搖公諸御史聞之果以為言攻之甚力天子終保持之執政見上問曰賈某所為誠公耶私耶對曰私則無之上曰何足以為咎視職事有與開封府等者易之以公同提舉在京諸司庫務今天子即位授中書舍人進封開國侯受詔修撰仁宗實錄領羣牧使治平二年拜給事中權御史中丞充理檢使上始親政事樂聞讜言公以直清見任毎進見從容論天下事甚衆上嘗諭公朝廷少得可任用者公對曰自前古治世皆選當世之賢以任當世之事不借賢于異代今天下豈嘗乏人耶國家養肓未至耳乃陳五事以言任人之法一曰知人之明二曰養育以漸三曰材不求備四曰以類薦舉五曰擇取自代天子納之是時詔為徳寧公主訪婚公見上言曰國朝公主出降皆以祖為父以父為兄遂廢公主事舅姑之禮臣常惜之臣願陛下詔諸公主下降其有舅姑者皆令備禮于以厚人倫正風俗無大于此矣禮官議濮王稱伯上疑未決奏議傅經意勸上從禮官言未報八月京師大雨水出壊民廬舍公時已卧疾皆再奏勸上側身修已以為前代水災皆隂勝陽大臣專政震主之應不可不察又簡宗廟逆天時則水不潤下濮王諡號宜以時定無使兩統貳父之説駭動羣聴以重取謫于宗廟其言甚懇至月餘公疾益甚求出補外郡除翰林侍讀學士知陳州未行以十月十二日薨于京師年四十四士大夫聞之皆相弔詔書贈公禮部侍郎錄三弟皆為某官公母陳氏繼母史氏公幼時陳歸其宗少府戒公能取名第作官則往視母及公登第日果得所願焉公迎陳母歸致其歡養陳封仁壽郡太君史封唐安郡太君公四娶馬氏任氏張氏皆早亡未娶薛氏故尚書郎直龍圖閣紳之女封延安郡君子男二人長元素蚤夭次士彦太常寺太祝五女皆幼公薨後若干日得十二月某甲子歸葬于鄧州某里祔于先塋謹具厯官行事如右伏惟采擇而加纂述焉謹狀彭城集巻三十四
