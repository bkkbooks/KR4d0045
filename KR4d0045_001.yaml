body:
  text: 彭城集卷一宋劉攽撰賦鴻慶宫三聖殿賦并序原案此賦見宋文與永樂大典本互有差訛今校改臣伏見陛下追述祖考崇奉明祀新作三聖殿以昭孝明功于天下臣以文學中第太常試官祕書目覩盛事不敢以鄙薄自絀輒作古賦一篇以歌詠盛德昔靈光景福之作世稱其美麗然其所謂壯大不出雕刻畫繢文彩之煌煌而已又盛道工人之巧民力之衆材木之多金玉之偉臣以謂王者有作則必智者獻其巧壯者輸其力山林不敢愛其材府庫之聚皆所供億也是物理之常不足以夸大臣愚竊陋之若夫天命廢興之際聖王授受之符非敏智通達未有能究知其始終者固難為寡見淺聞者道也臣竊大之是以略所陋而張所大不敢仰希風人雅頌之列庶幾有其志云爾蓋上帝之所以選建明聖命以天位者乃所以享德而報功焉未有德盛于前功播于後而其子孫寂寥千載無聲者也賢哲所談六籍之云德莫著于有虞功莫隆于五臣禹平水土夏姒以家司徒后稷是教是食肇商興周厯載數百臯陶大理五刑以明於其苖裔乃興于唐若夫董淳耀以攸司奏庶民之鮮食焚山烈澤害服妖息鳥獸咸若草木允殖固伯益之力焉天報以位俾秦周繼於其子孫誣祖不紹去火即水叛禮尚刑法以慘急然猶并六國一天下而不知變于初二世以斃非天不相朕虞之後乃其否德得罪于祖而斷棄也惟伯益之功未報是以大命復集于趙氏焉五代喪德九土分裂海水橫流民用墊溺鳥獸昌熾黔首失職滔滔惑惑蓋若洪流之未闢於是太祖乘火而帝繼益之功天胙吉土曰惟商丘是為星火大辰之居亦曰明堂布政之由出潛離隱或躍在淵以有九有百度正焉削禍戡亂出民塗炭風揮日舒天地正觀荆燕吳蜀楚越梁冀懾威懷仁奔走失氣崛強者執服柔從者加賜太宗承之真宗成之登封降禪矢直砥平巍巍乎邈三五而儔儷彼漢魏之瑣瑣曽何比京夫伯益始掌火而底績茂宋以火帝興于火墟天之報施豈不昭昭可推而類也哉且夫積功以凝命而創業因物以胙土由土以建號樂以反初禮不忘其本是故作于原廟建之别都三聖鼎列大厦以居以答景貺以昭成功俾子孫知厥所由億兆仰德而不窮也厥後烈風雲雨電雷震曜警戒于下濫炎流燒天子怵于大異反已正德伏念七年乃其有得曰天以德訓豫而以威震豫依類託諭豫敢不信夫政不變不足以日新禮不修不足以化民天之示人若曰政禮之敝雖祖宗之為猶當勿憚乎改更於是詔三事飭九卿和布揆于舊政載損載益以承天誡以舉聖職夫既天行而日白矣乃復閟宫奬夫神衷三后在天對越上穹經之營之不日成之閎偉竒麗所以使宫寢之勿踰也清間窅密又鬼神之所都也潔百圍而置楹兮度千仞以架棟擇一木于萬章兮顧餘羡者猶衆般倕􅚽人之儔獻巧而林立兮莫不心競而賈用亘長廓其如城兮闢重門其似洞欒栱粲其如星兮侏儒屹其承重如翬斯飛如鳥斯革兮誠可栗其將動闔隂房之密靜兮雖六月其必寒闢陽榮之敞麗兮蓋中夜而已旦涉廣除而徑上兮每百盡而一級歷青珉之瑩滑兮曽不得而側立顧風雨之在下兮足以避夫燥濕良非人力之所為兮宜鬼神之攸集於是使夫設色之工後素之巧想像形容圖寫必效夫其龍顔日角天質之顒昂兮臣乃今知真人之異表於是駕鑾輅登玉虯千乘萬騎雲動而景附兮想平生之豫遊旗常繽紛以赩翕兮鐘鼓軒轟簫管發而啁啾雜魚龍之竒技兮蜿蜒曼延於道周百神紛而並迎兮出閶闔而御夫龍舟爾乃川后靜波屏翳息風舳艫相銜若復道之延屬兮亘千里而相通百工備官而夙設兮棹夫歡呼而奏功惟吉行之五十兮餘日力而靡窮既屆既止威儀若初以幸夫夀宫乃即前楹以修祀事威神如在望之可畏殫金玉以備用罄飛潛以薦味帷帳管簟之安肆几杖筆研之儲偫靡一物之蓋闕兮所以廣孝思而盡心志也守臣侍祠罔不肹飾既事而旋閟而莫覿列仙之儒偓佺之倫迎神頌祇於其側若夫祝融重黎相土閼伯固已喜動乎魄情見乎色護清蹕而睎盛德也巍巍大哉不可得而記巳且夫天命之不忘人主之大寶也祖宗之有繼子孫之勿替也茲聖王所以正統垂業超商邁周恤嗣錫羡貽厥孫謀使萬有千歲得以晞風而承流也遂作頌曰崇崇商丘大火主兮曰宋之興道是配兮建邦設都以有九土兮有皇上帝明德輔兮伯益之功邈不可忘兮三聖承承有烈光兮奕奕寢廟神翺翔兮胥千萬年尚無疆兮葺所居賦并序治平三年秋京師大雨涌水出民舍多墊壞者豫所居獨完整無恙及雨止加葺其垣墻因為小賦賾至理之茫昧兮同寓形于一區任所遇之則然兮夫孰賢而孰愚彼每正而或禍兮亦用拙而自如雖背阪而向隍兮將愈乎廣厦之宴居嵗荒落之淫雨兮涌雖出而為災汩波流之罔極兮浩潺湲而無涯棟梁圯而弗支兮堂壇蕩而為溪何昔日之髙明兮今直委而汙泥彼攜持之與抱負兮或耄耋之與孩嬰念獨不保其闔廬兮亦有朱户之亡其閈閎將鬼瞰之使然兮固天理平其不平也愧豫居之僻陋兮豈擇處而淹留四鄰聳而逋逃兮恨衆人之我尤福莫大於無過兮顧舍此其何求葺垣墻而圬墁兮其托喻以監豫曰全生之近道兮念無厭其所居云爾寫憂賦悲四序之驟失兮哀逝者之不復春與秋其幾何兮霜與露其俱續稚呱呱而既食兮墓積草而已宿追音聲而在耳兮悼容色而記目願一見而無期兮情可殺而逾毒徴圖書於疑似兮索夢魂於因想雖可得其髣佛兮嗟暫覯而復往盻黃鵠之怨别兮余猶㤞其單飛雉朝雊而泄泄兮牧犢子感而陳詩心鬱悒而怊悵兮何使豫懷之不夷昔聞道於賢者兮雖忘而未信謂生為勞役兮謂死為歸人今吾百憂之叢中兮既積月而纍辰何重負之如是兮願脫去而奚因彼冥然而無知兮獨甘寢於巨室天地覆墜之不聞兮諒絶世而愈逸伊聖言之可徴兮悼吾學之不競不窒隙於未兆兮顧飲藥而加病遂迷途而不反兮非智士之能竟排多慮而去妄兮引至理而自鏡雖既往之不追兮庶來今之能定不寐賦忳鬱悒其馮中兮何鑒寐其弗夷方永夜之未艾兮廓靜處而長思悼既往之弗及兮慨來今之曷知緒將絶而復續兮精發越而淫移倐四海其再撫兮泯萬期乎須叟武勝殷而歸周兮天保定其千億叔旦兼乎三王兮仰勤思而有獲孔潛精於好學兮致憤悶於無益樂好善而用魯兮孟見喜乎顔色仁弗遇於衛頃兮願奮飛而不得繄視氛而見祥兮獻肇謀乎虞虢彼逺慮之與近思兮智與愚皆從其職良民生之多艱兮嗟以心為形役君子有不安其命兮小民有不度其力非蚊虻之噆膚兮曽內懷於大棘惟昔夢之蘧蘧兮既悵然而獨寤亮伐柯之不逺兮何內韄而罙固睎聖人之大覺兮綿萬世而不遇幸曲肱而自怡兮度無迷於初度鬭蟻賦邈乾覆而坤載兮固悠逺而無極叢萬族於厥中兮既生生而息息雖至大之可倪兮猶至精之可識諒擅已而自用兮羌是非之增積嗟子駒兮何為諡公字小兮紛紛而離離好惡利害之發兮誰其尸之慿怒積怨兮交戰而在斯何矜很之若是兮怙恃凌弱之不移欲一究其端而不得兮聊索數而推之夫其列壤分國穴垤重襲碩鼠之所不容兮蜉蝣不可以徑入豈天壤之逼隘兮曽分土之汲汲化飯以為子兮祝腐以為民其生孔易兮其衆實殷夫其子孫千億兮固鮮愛而靡親又豈有珠玉皮幣兮肇乎禍亂之因若是則鬭其可已羣嬉散遊足以已矣奪微篡寡何足美矣豈樹之君而患亂甫起抑天之有時兮故將雨而不能自止也嗟子兮汝獨何誅觀世之有鬬兮曽何足以爾殊叨他人之有兮慊已之無妄劫於無用兮矜多於有餘一已之不保兮顧有志於九區夫豈無大人之旁觀兮諡之陋而名之愚也嗚呼秋懷賦世量力以為智兮孰不自師其成心不強短以被修兮亦各濟其所任蓋周任之明清兮豫嘗服於德音性專直其似愚兮遂底滯而廢沈惟古人有不遇兮亦奚慨於斯今昔既冠而從仕兮冀陳力而帥職何日月之不淹兮亹亹至乎不惑世與我豈其異衷兮增余懷之默默數廢日而倍參兮願自竭而安得將奔而及事兮愧初心而變色譬遊者之無術兮念愈躁而愈沒荷衆賢之并容兮曽介善之不遺辱興亷之末舉兮遂以造夫攸司君之門不可以徑入兮既待詔而厯時惟褊心之狷狹兮曽繩墨其自持誠詭遇其猶獲兮雖得獸而恥之信天命之有在兮非知勇其孰勿疑時既秋而涼風兮草木落而變衰日月麗於西廂兮蟋蟀迅而鳴悲閲四序之代謝兮既逝者之如斯悼我心之弗獲兮起惆悵而稱詩射豹賦悲抗獨之難立兮何有用之必害不信孚於弗爭兮雖忘懷其獲罪齒恆足以自保兮而隕奪於多輩彼南山之珍獸喻變化於君子或隱霧而不食亦胥疏而視履猛毅資於天成文彩蔚乎自已伊麋鹿之強圉與麏麚之擬擬雖騰趠其不羈固指掌之所昧何衆吠之㹞㹞兮羌朋很而曹戾競張目而涎吻兮衆遮道而覷伺諒勇怯之不敵兮非乃心之攸畏忽機辟之潛發兮遂解脰而喪精爪牙曽不得而少用兮貽獫猲之成名吾固知夫皮毛之為患兮而黨與之足懲嗟物類之相召兮必機數之潛用非明哲之周萬兮未有不隳於衆故曰刳心去智萬人不謀和光同塵乃與道俱彼形諜而成光與飾慧以矜愚材愈大而增纍雖微末而可圖崆洞山賦并序臨汝西有崆洞山其下即廣成澤按莊子黃帝聞廣成子居于崆洞之上故往見之莊子雖多寓言無實然此崆洞廣成適皆同處意其真有所謂廣成子者也又大隗居具茨之山黃帝至襄城之野而迷皆與崆洞相近事未必皆虛也豫因作崆洞山賦馳平原之曠曠兮登隱弅之髙丘林蓁蓁而雲茂兮樹參天以相繆鳥哀矜而思侶兮獸銜草而羣逰即崆洞之舊址兮訪成子之所留烏乎服天下之為至美兮夫豈知聖人之緒餘獨修身為妙本兮窈靜默以玄虛何軒轅之徇齊兮而猶特室白茅三月而間居順下風而稽首兮曽南面而晏如彼非至人不能以下人兮信崇高之叵娛謂莊生之寓言兮羌林麓其未改瞻具茨之髣佛兮知大隗之所在嘗迷道於襄野兮七聖偕而無悔得要道於牧馬兮稱天師於再拜悲世俗之狹隘兮疑至言於否躗航汚瀆之淺狹兮僣瀛海之浮匯守穾奧之熒燭兮昧白日之輝曬追古人之不可及兮獨臨風而悲慨彼六相之輔治兮曷四海而弗寧名百物而垂衣裳兮雲門用而告成尚紆思於荒澤兮勉聞道於長生豈在野之不可蔽兮固前修之所營眇抽思而成章兮庶來今而作程棊賦惟夫太朴之未判兮圓方渾而無際倐物生而有象兮乃置同而立異逮數起而滋生兮紛萬彚而多事此奕棊之始置器也於是乎經緯縱橫封畛逺邇包穹昊之度數兮極厚地之疆理局有上於方罫兮信宇宙之異此念巧歷所不能究兮兹古今所以井心而不已也咨白黑之相反兮譬寒暑之進退寧我盈而彼虛兮況生殺之與成敗智詐殽然而並用兮莫不矜多而務大有一言可以行之者兮惟見幾而得先衆蚩蚩而我隨兮乃收功於萬全伊昧者之弗察兮雖服膺而拳拳暨應變而赴敵兮常操末而置顛或敗形已兆力鬬未悟忽焉顛仆兮乃悔其辨之晚暮與覆車以同軌兮孰若易轍而遵路或狃快小利死生契闊雖得雋於錙銖兮而外勢其已奪或決機兩陳間不容思彼多算其泰然兮既先據于便地謂戡敵而致果兮顧自戕而隕斃論兹藝之微眇兮奄衆技而首出語之有道兮用之有術誠巧拙其天豫兮莫可得而齊一貴不能得之於賤兮義況老耆而不屈太上貴德服不以力審布置以隂陽兮謹裁度於繩墨故攖之者無抗詐之者必北其次狙詐詭為奮其祕算或見易而守難兮或取近而先逺雖僥幸而全勝兮亦蹉跌而事反靡精心而極意兮每隨手而應疾貪彼虛之可乘兮忘已力之未實竊冀幸於弗覿兮故雖獲而逾失何度量之相越兮乃倍蓰而十百甘受責而無辭兮雖三五而不敵或騰口而攜詐兮或匿智而叵測或同行而習熟兮或旁觀而少得或乘勢而亟捷兮或衒利而加惑故每譬於用兵兮擅廟略於籌畫必知已而知彼兮保常勝而有獲詆風穴賦背嵩右洛兮維汝泱泱左界韓鄭兮前關魯陽陵丘曼延兮土膏脈良生植遂茂兮厥夭且長咨飄風兮胡很而狂乘冬肆威兮怒號以常通晝亘夕兮日月奪光宇宙昏惑兮顛倒玄黃折枝排根兮松桂毁傷衝空動楗兮披户登堂獸亡其曹兮鴻鵠失翔問誰尸之兮底此不祥曰兹穴之詭異兮竊神之機幽嶮窮竒兮狹中不夷鼓舞蜚亷兮招搖南箕平居無事兮淫樂而爾為歷九州而遐觀兮孰樂土其若此獨蠻夷之僻陋兮乃自古記之矣邈炎州之荒忽兮汩大海其千里上霧下潦兮墊隘瘴癘魑魅羣逰兮樂人之死蓄為颶風兮慘毒疵癘扶濤駕山兮舟航麋毁歷日旋時兮然後得已西極曠蕩兮隂磧無垠流沙不波兮瀚海無泉五穀不生兮蓬棘蓁蓁熱風之來兮天地翳昏觸肥為痏兮四肢若燔亦幸有老駝之先知兮嗚呼而告言歸命野獸兮厪焉得存彼鬼方之幽昧兮固宜以然慨中土之與鄰兮不僻不偏胡穴神之忍兮固蔽以頑用夏變夷兮至于髦蠻外百里而不同兮兹邑獨為匪民帝之高居兮臨照在下虎豹服仁兮九閽莫阻巫咸上訴兮帝命斯許巨靈夸娥兮幹其絶膂拔山投石兮北海之渚大野夷爽兮八風攸敘號令專一兮莫豫或侮蒙常聖時兮維民所取穴神雖悔兮夫孰閔汝彭城集卷一
