body:
  text: 彭城集巻九宋劉攽撰五言律詩庵嶺漁叟詩有序十原注時年四庵嶺髙數千百仞其下有溪才深五六尺左右多樹木自髙望之謂非人居有叟乘短䑧鈎罩于其中予甚嘉焉贈以此詩溪叟厭塵網移家臨水居開扉對山色堰水活嘉魚蓬棹自相得笑歌還自如猶嫌子陵傲老更就蒲車道人申演先生隱君子暮齒寄山林蒼鶴齊筋力清泉潄語音衣冠猶似俗心事獨非今歸去峩嵋路千峯何處尋幽居住處必松竹經年長自閒青苔仍有徑亂石更成山飲水却餘樂荷鋤誰愧顔悠然謝車馬聽客到門還小雨㣲雲興縹緲疎雨過森隂潤積衣裳膩涼生戸牖深塵埃聊洗眼宇宙快開襟寂寞城闉暮歸飛見水禽好風隨細雨蕭颯過吾廬野興鋤瓜後衡門隱几初積隂生綠縟清氣襲空虚耳目遺塵土還當讀我書宿雲留瞑色細雨逼殘春芳樹看紅濕垂楊亦翠顰高風吹燕翼定水漲魚鱗漸恐年華改桃源憶晉人立春得新矜白鬢數九喜和風菜甲成春事郊園付野翁天開池水碧雪盡樹梢紅頗復尋樵隱柴門歩武通挽故相國尚書令忠獻公四轉更注意兩朝公受遺大明開日月全徳冠臯䕫已悟騎箕事猶餘罷市悲太常難紀績天語詔豐碑意氣萬夫望衣冠八尺身有為悲鳳鳥不作畫麒麟餘烈周宗近英威漢相真召棠終勿翦晝錦仰鄉人殄瘁虚人望哀榮備寵章疇功蕭相國異數郭汾陽鼎實宵無味階星晝隕光惟應文考廟萬歲共烝嘗曽魯公挽詩扶陽詩禮樂丞相始安車世祚公之魯門風行在書三朝推帝賚九叙見民餘古有騎箕事今知定不虚雲臺存畫像畢陌想遺風文彩階符在儀型嶽鎮空考終方備福言念始為忠今日緇衣美能明善善功南公工説䜟故老筆通靈本自符千運宜然享百齡嵩高雄作鎮河潤溢為滎考卜佳城處無須石槨銘齊國公主挽詩湯沐侯家貴山林主第開天孫烏鵲水蕭史鳳凰臺遇事悲風燭新阡愴劫灰清秋降北渚不奈楚聲哀秋園晩步慘慘髙秋興蕭蕭欲暮天地荒逢敗葉日下聽殘蟬感物偏無頼悲秋私自憐如今已如此何待二毛年揺落西風早蒼茫晩日斜木蘭休紫艷籬菊委黄花興似陶潛賦愁如庾信家向來吟思苦直恐鬢霜華晚步日沒城隂合人歸草露涼淺池宜短艇高樹倚胡床清嘯激秋氣孤吟留月光敢言吾獨善魚鳥正相忘城西晚歸南山馬上口占塵土辜雙眼驅馳損壯顔夕陽銜遠樹馬首看南山應接都忘倦神明自覺還無心非自强最識白雲間便風掛帆欣然有作泛梗江流疾轉蓬風力強天時周必復吾道不終藏白鶴先余路飛烏送客檣掛帆資隱几北走萬山蒼巢湖天與水相通舟行去不窮無人能縮地何術可分風宿霧凝深黒朝曦浴嫩紅四山千里遠晴晦已難同晨至後園白露晨已重晚花秋正繁城隂到少息林下寂無喧圃老能呼鶴樵奴競戲猿山林何異此機事復誰存寄范佑之徽宗隨武後相與亦通家望氣如豐劒聞名省渥洼將門嚴棨㦸王略盡流沙好取封侯印誰能讀五車寄和父原註時自宋之任越州行李資章甫秋期看海濤埃塵乍振袂淮泗幸容舠颺舄雙鳧健飛烏五兩高須君菊花酒慰此寸心勞寄楊十七原註楊有詩道和父蕭山政善作此報之楊詩所稱説三事故首句及之宰邑成三異吾兄復妙年長愁越聲短不似古詩傳高唱今獨步知音深謂然還疑剡溪上紙貴幾多錢寄梅聖俞獨騎駑馬出強逐衆人行貧始怨寡與老仍畏後生吾子忘年友新詩獨步名秋風夢無限時過許昌城寄王深甫箕潁多奇士他年洗耳翁古人皆直道吾子嗣高風解榻迎徐孺名鄉禮鄭公正憐賢太守心賞與人同寄隱直遠身嗟道敝築室笑勞生應接知儕俗浮沈得避名陳家星不昧灌氏水長清往事今閭里悠悠旅客情洞庭寄張四壤俗三苗舊湖波八月寒天形漸水近秋氣逼楓丹漠漠萍號雨瀟瀟澧有蘭東流無限水一洗故人冠原注時聞隱直欲仕滑州罷為白馬縣舍弟司法省歸寄此詩散軍收棨㦸改邑壯三畿太守朝行在諸曹自免歸大河終北注旅鴈獨南飛遲爾寛相憶他時信息稀送韓太祝罷官歸許昌覲吏課三年最歸裝五日糧朋情惜分㪚子舍想輝光泉潔湖波白春融柳帶黄因君老萊戲遥奉使君觴自江南將歸先寄和甫五湖休作客八月去乘槎天地凝秋日山川照落霞寄聲西道主好在嗣宗家盛醞重陽酒登高飲菊花狂直非儕俗文章念及門無成似馮衍失路比虞翻抱罋機先息書空事不言江南香草地一一賦荃蓀風雨寄張野人宿雨萍號苦凄風虎嘯頻喜開蟲豸蟄悵阻物華春雞呌思君子鶯遷憶故人泥塗塞車轍相過獨無因寄張六十里一反顧去君垂五千遠身卑濕地歸意泬寥天南極多來鴈秋隂減跕鳶寄書江漢水好送北歸船寄張宜屈指張生老無人事隱淪鯨魚空自飽章甫向誰親丹荔充庭實明珠逐賈人如何滄海上甔石一生貧寄張六君為棄官去豪氣故風流無復池中物真能方外遊浮生都物變衰俗使人愁聞有桃源路歸來試力求省中寄王平甫簿領秃千禺中強一飡未為勤事吏空負寫書官奇獸名天祿層樓近井幹林花今正盛夢想月邊寒重寄蘇子瞻空胷迷舊學華髮悵頽齡江海容孤翼雲霄寄客星未堪循吏傳黙守太𤣥經正恐聲聞酒令人醉不醒寄仲馮府掾西曹貴星華使節雄我行千里鎬即敘百餘戎原註匈奴傳有百餘戎王畧持籌内邊山聚米中因成率然勢不陳取奇功夏木聞禽愛此南軒木親聞好鳥聲夏隂雙綠縟幽韻獨凄清帶霧知天曉因風覺晚晴忘機是幽客相見不相驚挽盧通議射䇿蘭成歲歸全韋相年聰明百齡事冠帶五朝賢賜几元知止臨雍尚缺然秋風正揺落哀挽向新阡山東推望族泉室閟歸真善政餘談舌清風在縉紳薤晞無復露草弱漫棲塵頼有傳家慶光華列世臣唐參政挽詩天奪悲楊綰人亡愴魏公終疑仁者壽尚想直臣風聽履餘榮在牽裾舊事空惟應司𨽻姓更使世知忠倜儻先言路經綸重鼎司武文兼二允愛直見雙遺無復靈臺論空傷薤露詩邢山向鄭國千古意同悲挽馮當世母朱太君郡封家邑盛羮遺主恩頻所以令勤貴由來得孟鄰文軒空舊事弔鶴怪來嬪揺落千山暮陔蘭不復春躬績維公父平反在不疑榮兼綵衣養孝著白華詩黄髪全天壽遺風盛女師畫輀丹旐遠寧記鹿車時挽王正仲母永壽太君天錫期頤壽恩疏石窌封母儀兼事事子貴亦重重歸旐滄江水新阡翠嶺松曽參無所係不待祿千鍾平日南陔養諸公為美談兒啼因戲綵羮遺復調甘盛事一知十修齡百與三青烏傳吉卜喬木藹相參濮王任夫人挽詞思齊疏慶族聖善積慈恩子貴哀榮在舟移謦欬存紼謳悲薤露象服照魚軒惟有秦原望東西見寢園挽韓侍郎夫人范郡君名卿俱令族慶善集清門珮玉師柔訓稱詩得婦言已嗟封馬鬛不待歸魚軒從此公侯事凄凉屬采蘩夫尊因受郡子貴亦通朝象服違偕老幽宫不復朝長川空滚滚落葉自飄飄哀挽青郊道悲風送大招西戎原註時元昊始死旄頭占虜候鳴鏑射單于哀死知明主和親愧腐儒邊鋒少南牧天馬自東趨看撤山西戍無勞議逺圖晩過西湖落日微雨好浮雲近水多空濛亂林樹涵泳著星河當極興不盡跡歸心更過猶須明月夜濯足弄金波泛舟西湖靡亹蘋萍合夤縁島嶼深操舟非有術鑒水㑹清心老樹成重蓋初荷㪚萬簪名園皆有主費日試幽尋懶意適自強舊游疑觸新如從剡溪客忽晤武陵人鐘磬高低寺漁樵來去津涼風水雲合天半是魚鱗鄭侍郎挽詞置驛無留客名卿擬上公應惟泣遺愛競欲頌寛中賜履靈臺隔開阡夢澤空秋音送歸旐依約認樵風治獄餘隂徳哀矜出片言千金無重比駟馬見髙門星落林烏暝愁悲薤露喧江風傷遠目楚些一招魂送張六入浙東君侯曽一仕已作棄官歸又欲過呉市還愁脱賜衣春風解冰雪澤國盡芳菲相望不可及孤雲天外飛上清宫花木自夏及秋相續信此神仙地經時玩物華殘紅未零落暗紫續矜夸掃石分文繡開林碎晚霞秋風蘭菊茂此去有黄花將去上清宫題梧桐舊日見春華圓隂羽蓋斜野軒何必掃小徑故從遮秋氣先摧葉春風別有花野夫心好靜異日到山家九日九日秋蕭瑟登髙亦少歡黄花宜澹泊碧樹早凋殘醉舞烏紗落彈歌短劒寒可憐西北望白日遠長安九日寄江北兄弟登髙雖有興羈旅亦消魂插鬢茱萸細題詩蟋蟀喧黄花一樽酒斜日最髙原囘首江天逈翩翩塞鴈翻張比部景真挽詩埋輪負壯志持節向炎墟反戸驚殊俗彤襜豈定居跕鳶愁瘴霧斷鴈哭來書天理真冥漠誰能問太虚五嶺瘴癘地宦遊前事存求為勾漏令臥念少游言夫子獨不返壯心誰復論凄涼大招賦不見入修門蘇度支挽詩翰墨兼能事功名自壯圖雲霄曽幾許意氣即通衢埋玉情何已修文理不誣敢忘徐穉禮絮酒望江湖前年伯鸞死卜葬近要離今日延陵墓仍書季子碑人琴俱已矣林壑助悽其心許千金劒終當挂樹枝建功挽詩燕祺歡受福陽祿痛離災胙土乘初載賓天遽不回弄璋迷夢幻壯髪變塵埃唯有華封祝能寛上聖哀題魯氏老檜堂當日山林客移根近小軒樹隂今百世人世亦曽孫堅節寒逾甚清風老更存猶餘雙白鶴終戀主人恩柏悅堂往説齊侯寢此堂申甫餘千齡畏秀聳衆木既消除杖履每多興冰霜罙自如涼風破蒸暑真賞復誰須華堂柏兩株清景喜多餘密影隨步武涼風自掃除蒼顔師尚父勁節藺相如寄謝繁華子榮枯可立須夜凉稀星映斜漢孤月靜前軒意喜凉風過遙看碧樹翻勞生共裘葛辭秩愧田園髙枕息羣動吟蛬依草根自蔡河之陳州扁舟去鳧鴈川路正龍蛇日色暝如午風烏端復斜漸漸過隴麥短短被堤花涕淚元無極那堪視物華重傷胡二逝水竟不復死生嗟可憐所思今已矣歸使一悽然尚想飛鳧舄終辜憶戴船神交如有騐㑹付廣陵絃五龍井禱雨湯年不過此丘禱亦何頻石井無多水泥蟠詎有神舞雩聲寂寞剪爪事酸辛萬古為霖意長嗟傅野人苦寒苦寒殊不意衰老若為謀賜隔青綾被貧餘白罽裘蟄龍才自脱過鴈可深憂靳靳西頽日墻隂肯為留秋過薦褔院竹亭入秋纔一到風物已凄凉舊篠全侵席新梢亂出墻蕭蕭吹葉雨稍稍墜枝霜為有留人意嘉遊不可忘開門金𤨏碎遶逕碧檀欒鐘唄風餘韻房櫳日暮寒老僧長入定好鳥故相看何事扁舟客殷勤覓釣竿濟川亭誰謂此池小遠將天漢通分明涵列宿迢逓引來風松竹凌虚碧軒窻倒影紅高明推李杜不負傅巖功自倚杖九節時擕書一通石橋照影水竹檻納凉風髙柳參天碧新蓮映日紅由來帝何力況數濟川功曬書幽事隨時有移書曬日華囊開魚蠧字眼暈石榴花病忘多三篋勞心愧五車賜書仍有品前輩羡吾家夜過曽孚先索我形骸内從君里巷居度阡仍越陌酌醴更焚魚殘雪春泥熟青燈缺月初誰能憚乘興歎息歲將除將赴官廬州寄張四隱直二首案攽監衡州鹽倉不應赴官廬州詩題疑有脱誤一為彈冠仕遂廢東臯田不至二千石行登四十年羈遊無定許鬢髪欲蒼然萬里南江路春風棹客船江路西南永風波歲月淹賴君同此役久客復誰嫌榜叟誇忠信津童識孝廉雲山仍在眼詩興力能兼賀隱直舉國皆儒服吾人智有餘焚舟濟河後埋劒發硎初天路騫黄鵠雲濤縱巨魚殷勤故人意青眼看鄉書送隱直歸扶離原註隱直近學南宗法故末句及之羈旅自無友非因七不堪逃空見人喜失學向君慙貧病意不展滯留情未甘相從欲有問空法本傳南雪中憶隱直北風吹朔雪遙想度關西覆閣眼初熟登樓望獨迷巧粧梅意密偏壓柳條低竟日思君飲空憐駿馬蹄哭張隱直結友兒童歲對門兄弟辭存亡殊不意晩暮可勝悲宰木歸呉遠輀車出劒遲善人鮮百福神理儻吾欺二星占使者九折見忠臣白髮猶強力青雲早致身勞生真夢寐過事悉埃塵已矣寢門淚石交兼懿親彭城集巻九
