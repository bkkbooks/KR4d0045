body:
  text: 彭城集卷二十宋劉攽撰制誥吏部尚書蘇頌等可並兼侍讀制朕惟聖王之要道天下之義理著於竹帛之編傳於師儒之論所以正身安人其術廣矣誠得直亮正固匪躬之士敷繹誦説日陳於前其為益者豈小補哉以某幼壯好學耆老成德以某天機深邃心術博通皆文足以輔治辨足以周物宜備金華之選以詔虎門之媺咸務勤盡用副虛佇宣德郎劉槩可祕書省正字制學問修於身而朋友稱之士之美致也爾效智太學師帥國子而近臣交口譽之其必有以信於士大夫矣蘭臺屬官吾以養育賢士兹為清選今以畀汝毋怠初心以永終譽皇叔祖故昭信將軍節度使開府儀同司宗瑗可贈太師追封崇王制惇敘之恩蓋本於公族尚德之選亦通於外朝哀榮並施隆殺有等地尊而屬近禮備而位顯矣具官某體麟趾之德厚居磐石之宗強好禮而身修雖曰未學必謂之學用嚴而家治施於有政是亦為政固已表儀宗室光顯本朝奚修塗之未央而朝露之遽及惻焉傷悼何恫如之稱情以文崇賁恤典龍袞禭服維師是以絶班金路啓封非劉未嘗胙土併疏異數以光窀穸冀其有知歆此休命皇兄故右金吾衛大將軍單州防禦使令儇可贈安化軍節度觀察留後追封髙密郡王制睦族之道莫不欲其貴富追逺之義又當均其存殁眷豫近屬宜有加等具官某賦性惇篤治身謹卓協麟趾振振之美芘葛藟綿綿之盛內列環衛外領使符無祿早世吾甚悼之俾崇恤典以示惇敘戎幕廉車之留後連城大郡之封王是謂豐恩足光逝魄故醴泉觀使武泰軍節度使贈開府儀同三司朱伯材特追封恩平郡王制保姓受氏享有死生哀榮之隆節惠一名相其春秋窀穸之事匪我近戚則維勳勞具官某生於髙明輔以禮樂小心而畏義強志而婉容用能維有歷年不失舊物朕眷言先后追正儷極之尊永念繼文嘉乃有子推原厥初聿圗王封適契朕志是用受兹青社壯威命於元戎賜爾公圭享鎮撫之彞器褒此異數光于九原匪豫爾私其服朕命大理少卿杜純可侍御史制風憲之任總於中司中司之二聨於御史是其繩愆糾謬舉直措枉惟不吐剛不茹柔者乃充其選焉具官某賦性端直臨義專固論法得簡稽之要祥刑協哀矜之中使之要白筆之任居正色之地必去邪不疑惟力是視推擇詳愼報稱實艱益務恪修以副虛佇右司員外郎王覿可侍御史制朝廷風憲付之臺率而侍御史為之佐焉吾欲得清直而信道忠厚而知體耳目元首繩墨衆材當是選者吾甚愼之具官某學敏才優忠徑有立前在諫省屢進讜言亟易都司仍有令譽是宜授豸冠之重居霜臺之二夫繩違糾謬劘上率下貴以義動而不求苟勝務於心競而勿為朋進戒之愼之以副虛佇祕書監張問除給事中制左右侍從之臣率皆讜直輔上者也而給事中復以駮正違失為職夫識非通逹則觀物無節器非宏厚則守善不固居是選者其亦艱矣具官某學術淵通幹力強濟歷職中外敏懋不怠其譽已試所至可紀白首一節誠心無二宜其備顧問於青瑣謹獻納於東臺庶幾羔羊素絲之美直諒多聞之益副吾旁求爾其愼哉監察御史韓川上官均可殿中侍御史制執法憲府繩督在位言屢上而忠一無二氣逾徑而溫厚不劌可謂有司直之風靖恭爾位者矣遷秩殿中實崇位望益堅素守罙著來效祠部員外郎翟思可殿中侍御史制御史之職皆耳目之寄至於殿中地益顯近今吾詔有司以資歷用人為其已試則臨時不苟老成則責義有準庶乎繩愆糾謬出於中正耳以爾前在憲府既有嘉聞比歷他任亦克永譽而近臣之言尚其徑直復正中臺之秩以當白筆之任勉力周務毋怠而志祕書省校書郎盛次仲可集賢校理依舊制圖書所藏聚于中祕校讎之官既為精選仍以歲月課最升於麗正儒林之榮莫與為比惟敏志敦學可以稱之以某效官治已士友所稱擢兹寵命益思勤恪朝請郎王彭年可監察御史制百官皆以職事奉上而御史以執法為稱法者貴於當義而果平而不回膺是選者其亦難矣吾詔臺率舉其屬官臣覺等以爾來上吾樂得材良而試之又以觀近臣之能愼守職業毋孤任遇御史臺檢法官楊康國可監察御史制風憲之任寄于中司使之升薦御史是為故事傳曰舉而所知其素在僚屬朝夕從事視其所以察其所安夫何廋哉用之不疑惟繩直之地白黑所判公則生明強則無撓勉思恪居以蘄休譽朝奉郎充集賢校理趙挺之等可監察御史制憲度者朝廷所以為治也犯之則為壞法御史得而糾之法正則主尊節義者人臣所以事上也失之則為悖德御史得而察之德修則俗厚耳目之官紀綱之最愼選所屬莫如御史爾等以力學自立藏器待用士友歸其美譽有司推為舉首風憲之任我其試哉詩云柔亦不茹剛亦不吐書云無虐惸獨而畏高眀本忠厚而輔義毋刻核而取譽是為稱職其戒之哉皇叔右監門衛大將軍叔過故所生母董氏可縣太君制宗祀之慶推顯以及幽廣惠也貴其子以及所生厚本也矧公族近屬職在環衛慰其反哺之心錫以漏泉之澤名城大邑疏為湯沐黃壤有知歆此殊渥右監門衛大將軍士香故父所生母和氏可安吉縣太君制公族內宗咸有爵秩而士香念及父之所生求得追賁願以妻之賜邑移為湯沐察其用心有足嘉者特疏縣封以光泉壤鄆州東阿縣尉孫彥卿母宋氏封夀縣太君制黃髮兒齒夀考之隆天之所以福夀德善也吾聞聖人後天而奉天時故吾於耋老率加禮焉至於九十者加以爵號恩之至也爾年齡應格而子方小官今疏大邑取其令名以昭逢辰之慶亦廣錫類之祉服我休寵益修母訓給事中顧臨可刑部侍郎制明辨惟良所以折獄也哀矜勿喜所以察情也合是二者乃弼邦教非夫忠信之長曷能稱其職濟吾事乎具官某志慮開爽學術通敏見義勇於有為立身果於自信試吏非一成效已著是宜付秋官二卿之選當尚書政本之重其克盡心廣裕用究刑成之美無或便文俯仰而致枉撓之咎祗服寵命以底休譽龍圖閣直學士蔡延慶除工部侍郎制朕以尚書總攬天下之務而六曹之副地峻望崇自非材略優裕事業已試者未嘗輕授也具官某質性通敏智術宏贍頃自先帝驟膺器使贊書出命薦歷內外董戎分閫率在西北文武兼允聲問逾劭使之當一官之二居四命之峻其有餘裕疇曰弗宜因龍馬之舊秩進冬卿之近列勉服光寵終譽夙夜皇叔故成德荆南等軍節度使守太尉開府儀同三司真定尹兼江陵君荆王頵可贈太師尚書令荆州徐州牧改封魏王制春秋之義惟母弟得以屬通詩書所稱蓋叔父著其殊禮國朝並建同姓惇敘懿親生榮沒哀厥有前訓備物典策以寓永懷皇叔具官某稟秀淵沖育材粹茂閲天下之義理為宗室之儀表富而好禮貴則忘勢推惻隱之心每隆於濟物廣孝敬之志用足以臨下河間之實事求是東平之為善最樂是宜永為藩輔光贊本朝淑命不融中道摧殞震悼傷怛何痛如之崇斂衮之舊典追賜履之介寵進陟師垣兼官大録九命作牧包南西於二楚千乘啓封雄魏大於三晉於以循曲阜之前躅繼睢陽之故事匪王盛德曷膺異數尚惟幽穸歆于顯休贈魏郡太君制春秋之義母以子貴子由宗祀之均福母以追逺而永寵貴在其中矣孝莫重於此焉具官某母氏積善在躬鍾福覃後克有令子進居法從既啓湯沐之封足尉凱風之念粵因慶賚更授雄藩資其魏大之名協乃繁衍之祉尚惟幽穸歆此殊休皇叔恩州防禦使仲隗所生母崇德縣太君李氏可安康郡太君皇兄惠州防禦使令鐸母金城縣君張氏可普寧郡太君制朝廷緣子貴而廣愛每崇錫慶眷母慈而示報無間所生粵因誕辰俾申懋典具官某母氏稟操端靜臨事肅恭柔訓有加色養無爽湯沐脂田之賜既祚邑封雄藩大郡之名益隆寵數秪膺優渥毋怠欽承皇伯右武衛大將軍渭州防禦使仲鸞等十人故新婦可並贈縣君制嬪于公族稱為良婦不夀而夭為可憫惻宜因夫貴錫之寵數名城大邑以為湯沐尚其有知歆此豐澤故朝議大夫充寶文閣待制王臨妻天興縣君盛氏可封仁夀縣君制稟粹幽間挺操端粹承夫則家事嚴整訓子而母道慈篤既疏大縣以啓湯邑宜因大賚更易名城取其佳稱以協光寵西作坊使杜諫左班殿直王賀三班差使王戟各轉一資制蠻賊蠆蜂也辛螫中人不可不除而爾等力鬬重傷有足嘉者進官一等以合軍賞藩官內殿崇班浪􅗹轉兩資制捕鹵蕃冦身被金夷亟上首功勇加部族宜疏顯秩增寵使聨秪服茂恩益圖來效新差湖北轉運副張安上可倉部郎中制地官之屬皆為劇曹非智能出倫不能勝任以某幹力強立內外踐更推擇付之任遇非淺其思盡瘁以復恩寵文某可兵部郎中制道著嘉猷德符清望必其幹力足以濟務智識可用為儀居是選者其亦艱哉某吏最籍聞家聲休顯由京兆之浩穰聨夏官之繁會已試之效既已可傳前將之績亦云停候姑務強乂毋怠欽承朝奉郎兵部員外葉祖洽可兵部郎中制文昌郎位號為上應列星惟六品可以當之期歲之後得以任子朝廷待之厚矣豈特出宰百里之比乎爾以文學政術得以臺選歲月之久資格宜進不移司馬之聨俾正依烏之秩欽承我命益思自修王安石可三司戶部副使張燾可兵部郎中制考績三歲進官一等先帝所以勵羣臣也具官某秉哲迪義有聲于時能勵厥修以宜官政序功增位其善厥承朝散郎致仕劉宗傑可落致仕比部郎中制朝廷資材能以為治在幽隱者必取况於久吏舊齒義所不遺以某課最已效時譽亦著而謝事退處便已而已不佐公宗之務吾甚惜之是用還之司土之籍寵以文昌之秩主計劇曹應星妙選思自勤勵副此恩渥軍器少監郭茂恂除工部郎中制百工之事萃于各鄉屬郎之選豈當輕授以某用心精祥見事敏速歷試內外皆有可紀淹留歲月未嘗曠事宜輟大匠之副進職起部之聨毋墜前勞益勉後效侍御史杜純升左司郎中制都司憲府屬僚悉朝廷之劇選也是以統正百官整齊六曹是皆耳目之寄易地而處豈有重輕之别乎以某往在先朝嘗付詔獄信已不撓見稱士論是用置委都司之任佽助綱轄之事勉力夙夜以副慎擇朝請郎陳維孫故母仁夀太君髙氏可贈廣陵郡太夫人制父繇子恩以崇贈品妻藉夫貴仍進爵封寵章不間於幽潛孝治用形於溥率具官某故母某氏母訓端淑家事整修懿德沒而不忘後嗣蒙其餘慶宛在置行之列慨如陟屺之懷屬宗祀之告成逮下泉而均澤宜賜小君之號亟疏大郡之榮壤戶有知象服加寵尚書右丞胡宗愈妻福昌縣君丁氏封同安郡夫人制朕選建材傑以為弼輔服章位著皆竣其寵所以優禮賢者體貌大臣而况其室家之閫輔佐內外夫榮於朝妻貴於室義所當豫有自來矣具官某妻某氏育秀名族作嬪君子躬璜珮自修之美有夙夜相成之道婉教端叔休風專靜可謂具鵲巢之德是以賜魚軒之榮亟擇名城粵育要區備湯沐之百邑稱翬翟之七命用疇懿實勉膺異數楚州防禦使楚國公世恩可贈奉國軍節度使依舊楚國公制朝廷親親之愛隆於九族生有惇敘之典殁兼哀榮之數高爵重位以稱情理具官某地居近屬材實宗英樂為善而自修過纎介而無有奄至淪謝良用震驚沛以隆恩錫之愍册啓軍牙以分鉞仍茅土而啓封尚維幽穸歆此成命皇伯故台州防禦使仲綰可贈武康軍節度使追封崇國公制生有惇敘之典殁存追賁之寵公族之恩於是乎愛至而禮備矣具官某地近屬尊材髙志美膏粱不能佚其性氷淵有以見其操雖躋膴仕未及修齡奄至淪亡特深傷悼併賜寵光以輝泉壤皇伯祖故保平軍節度觀察留後克思可贈開府儀同三司追封昌國公制生榮殁哀所以厚公族之愛宜賵與贈是以著有司之事然非令德曷膺異數具官某地近屬尊志修行備能集信厚之善靡聞纎介之失資其表儀豐於祿秩軍牙廉車之留務有以致之逝川朝露之莫返何嗟及矣宜崇愍册以稱悼懷開府視相印之重建國用公圭之禮告于隂泉歆此殊寵皇伯故真州防禦使叔封可贈崇信軍節度使追封遂國公制朝廷之於宗室愛至而恩厚故生則有兼官之寵沒則有加等之贈具官某資性端直治家堅正朝會賔贊之禮未嘗有闕脤膰助祭之事靡或不共以是付之連城示其禦侮奄至不淑兹用惻傷漢東大鎮建牙秉鉞左屬名邦分茅胙土並為顯命併光幽壤尚其有知歆此異數承議郎直集賢院知齊州王巖叟可起居舍人制載筆記言之任史官之别也必居心正直可以無私於淑慝惟文采藻贍可以專意於纂録朝廷以是愼其登選而異其進用矣具官某識逺而氣徑學博而言立前在御史得蹇諤之譽出為劇郡成豈弟之政是宜參右垣之列當螭頭之直服兹光寵思所報稱侍御史王巖叟可起居舍人制朝廷求信厚之士進讜直之言取其進忠竭誠救失補闕為益之重其可量哉報其成效示勸來者具官某天機粹美器宇渾厚好是正直輔以儒學自頃擢居中臺職司邦憲智慮所及知無不為準已所加挺而無撓是宜疇其美志峻於任遇右史納言之職法從選掄之最粵疏茂恩以示殊寵西京左藏庫副使髙遵固可閣門通事舍人制上閣之職親近旒扆朝會賓贊謹於為容然非有功閥不膺是選以某幹敏恪愼歷官有稱録其成效置兹顯列祗服光寵思所報稱朝奉郎王復故父任刑部侍郎充天章閣待制贈開府儀同三司沿可贈司宜制合宮毖祀溥率蒙慶惠澤所加無間幽顯然非韞德在前鍾福于後亦何能沾此優渥無愧泉壤也具官某故父某歷仕前朝稱為令德髙風不泯休譽藹然克有幹蠱顯登閨籍褒贈之典實慰孝思已崇開府之儀更陟上公之貴尚惟冥漠潛被光寵阿里骨大首領抹征兼錢並可特授銀青光祿大夫檢校國子祭酒兼監察御史武騎尉充本族副軍主制奉其國珍入修貢職歸義向化忠孝兼效宜有寵授以示懷逺擢武爵之美號因部族之主領體兹茂恩益思所報皇太妃乳母趙氏可封掌贊夫人制懷慈良之質躬燥濕之勤肇自文褓之初逮及椒風之盛恩之所被德無不讎寵以婦官實隆邦教贈故尉北海郡王宗勝妻平昌郡夫人李氏可進封小國夫人制麟趾之詩恩厚公族鵲巢之化善屬邦君列國名臣魚軒象服用疇淑德不吝寵光故具官某妻某氏育粹幽間秉心直信勤女工之事不怠組紃佐君子之為每嚴璜珮啓湯沐之賜邑以極夫榮緣閨閫之休風更形治命求疏建國以報宜家俾增褕翟之華申錫山河之富既以彰內助之美并用慰重泉之心惠澤有加祗服唯謹皇叔祖昭信軍節度使開府儀同三司漢東郡王宗瑗故新婦嘉興縣君彭氏可贈英國夫人皇叔祖保靜軍節度使開府儀同三司建安郡王宗綽故新婦平昌郡君鄭氏可贈榮國夫人制宗祀覃慶溥及幽顯地近屬尊莫如公族位崇祿重矧兼將相永惟敵體之義宜有漏泉之澤具官某故妻某氏作嬪君子著德閨門窈窕可稱奄忽莫待俾進魚軒之號仍疏大國之封尚惟隂泉歆此光寵朝散大夫致仕魏䌙弟朝請郎紳弟朝散郎絪弟承議郎綸弟承議郎紹弟奉議郎綽故母渤海縣太君刁氏可崇國太夫人故母新安郡君刁氏可榮國太夫人制夫榮於朝妻貴於室古之制也今使幽顯同之宗祀之慶其為恩惠可勝道哉具官某等母某氏婦道柔順母儀慈淑諸子之在仕版者朱紫紛然舉集門庭足為鍾慶乃父既以追賁進居公衮褕翟之贈宜及其配仍擇令名以啓國封泉壤有知歆此殊寵皇伯彰化軍節慶使開府儀同三司髙密郡王宗晟等故母康國太夫人孫氏可贈越國太夫人制朝廷廣愛以崇孝故追逺者常厚多士念母而思報則推恩而不遺矧其麟趾周宗鵲巢懿德不吝崇錫以示光寵具官某等母某氏婦道端淑母儀聖善訓誨詒世而可紀慶祉鍾後而兼茂將相之榮萃於子舍山河之祚大啓郡封而凱風寒泉之思未充孺慕象服翟車之賜宜有加等俾即會稽之奧以為湯沐之華壤戶有知歆此峻禮朝散郎監在京進奏院王伯虎復祕書省校書郎制為政之方未嘗不以振滯淹為事知夫良材難得而善人弗忍也爾前以小疵失職纍歲芥蒂疑似衆以為惜抆拭登敘以收來效還讎書之舊秩加中祕之新命益自敦勵毋負優渥祕書省校書郎李德芻可集賢校理依舊充校書郎制祕書外府麗正內殿圖籍之所聚集儒藝之所遊處有志之士不以留滯為恨宿宮之人必用課最而進由外至內實為峻遷爾夙聨校讎綿兹歲月惟才與久皆當甄録貼以職名未離舊守其以進用為榮而無留滯之念朝奉郎試禮部侍郎陸佃可朝散郎制以德詔爵以庸制祿朝廷所以登進材良次敘中外未嘗遺於疏賤而况於廷臣乎具官某文藻華絢器宇夷曠直哉惟清是以典朕三禮婉而成章是以付之史筆逮於考績綽著善最宜因寓祿之資敘進陟明之寵敬服休命以永終譽朝奉郎充龍圖閣待制王震可朝散郎制考績之法所以磨勵多士乃自唐堯行之矣具官某文博志修材優氣贍內參法從外領州寄民譽咸服吏課處最有司舉歲月之效易以藉口本朝崇明陟之典亟其詔祿俾從進秩用稱恪居朝散郎權發遣建昌軍張升卿可敘朝散郎制向者奉使嶺表鎮撫蠻服盜賊之發不能檢察奪官貶秩退守私壘歲期當敘宜從牽復爾前以湔洗夙負既遷升逾舊朝之豫奪纎介不欺今此新恩實謂加等既被優渥思所報效朝散郎王年可朝請郎朝奉郎宋湜祝康可並朝散郎奉議郎王叔憲可朝奉郎宣德郎李世南可通直郎承務郎大理評事錢蓋可承奉郎餘並如故制朕惟法令者所以為天下共也而繁文苛請日至月增不憚刊改以求其中爾等俱以美材而應慎選則筆則削用成新書疇其恪居推以懋賞進階一等是為渥恩承事郎王仲煜可宣教郎承務郎孫朴可承奉郎制恩令之下溥及在位如雷雨之於百榖草木無不甲坼者豈以其微小而遺之哉爾等預列纓裳齒于元士膺兹慶澤例進秩敘勉崇立志用對休命賜同進士出身右班殿直子湜可換承武郎左班殿直令馡可換承奉郎制國家開設科選詳求才諝能者取之無間疏逖矧爾麟趾公姓天潢餘潤不以膏粱自佚而用經藝修已因其程文賜之名第俾遷優秩爰齒多士方今惇厚邦族誘進初學故其課試之法異於寒素至其效官將責實用勉爾勤慎以集休譽承議郎充祕閣校理權判登聞鼓院張舜民可通判虢州制前以御史言事不合朝廷優容直臣未嘗備責故移位他局仍在轂下而舜民力自推謝又以其多病及家婚娶求得自便天道從欲而有曲成吾何吝焉虢略要郡率二維重祗服恩寵毋怠勤恪吏部侍郎胡宗愈可御史中丞制權衡之於輕重繩墨之於曲直由其無私而素具是故應物而不二朝廷風憲之任忠讜之士亦所以素具而待列位也命官之艱得人惟允具官胡宗愈秉心端直為學深厚粹然特逹之姿淵如有容之度粵自潤色綸省獻納瑣闈副二天官藻鑑多士綽有休譽舉為稱職是宜付中司之權寄執法之柄爾其修胸中之誠應方來之務有節於內則物無不察以義自處則動無不中稱此茂恩著為顯效彭城集卷二十
