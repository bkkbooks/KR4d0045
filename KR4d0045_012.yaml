body:
  text: 彭城集卷十二宋劉攽撰五言律詩平山堂吳山不過楚江水限中間此地一回首衆峯如可攀俯看孤鳥沒平視白雲還行子厭長路秋風聊解顔伯父挽詩二首遂有終焉志才成智者居戶庭連水竹几杖接舟輿愛客樽中酒傅家篋裏書疏公知足計不益舊田廬民思常在去令德久猶存慟哭新阡樹遲疑舊里門大招聲斷絶丹旐影翩翻後日談隨會人知歎九原挽刁景純二首承明通佚老仁智逺歸居門下無留客燈前不廢書舞筵交履舄倚杖及田廬以此為家事忘年八十餘延陵君子墓南極老人星自古稱遺愛斯文重典刑一生隆許與五福最康寧逝矣俱陳迹臨風祇涕零挽孔經父二首鄉里東南秀衣冠伯仲賢先鳴俱中雋競爽故無前朔雪凋華萼炎風急逝川斗間占紫氣應復在龍淵往昔方聞䇿中間五諫書直繩無廢墨利刃必投虛任重生何薄年長恨有餘悲君雖視草不及馬相如挽丁元珍顔駟縻三省君山困六安宦遊俱邂逅行路正艱難去水爭還壑凝霜苦敗蘭唯餘青簡在時為拂塵看挽蘇明允二首季子才無敵桓公義有餘空悲武儋石猶得茂陵書郢路營魂逺江源氣象虛康成宜有後正使大門閭漢儀綿蕝盛周諡竹書存益以春秋法因知皇帝尊百年當絶筆諸子謝微言詩禮終誰及賢良萃一門原注蘇增諡法又修纂禮書成而卒聞雷過臘山微雨開正兩震雷漸南風土異傷早嵗時催放逐漁翁問淹留漂母哀餘寒附煙火尚有復燃灰和孫宣德中秋不見月便有倚天劒決雲殊細微清光自無蔽絶境轉知稀雲重蟬時落風髙鴈已飛嫦娥苦幽獨會載客槎歸和中秋對月星稀如有避雲卷不辭勞露已深秋白天應為月髙幽懷向誰盡詩興更何逃勿負盈樽酒須營千兔毫十月四日離都歸陳州南浦三篙水歸人五日糧寒沙晨起鴈古樹夜經霜久客復去國有情知望鄉鬢毛渾欲變鳴笛不須長去陳二首近關蘧舍衛接淅孔違齊今日思狂簡儒生自滑稽歸歟那愠見去矣約輕齎潁水清如鏡風波定弗迷禮賢齊相國原注平仲愛客鄭尚書原注崇徐孺曾懸榻馮公預食魚甘棠勿剪伐客館遂邱墟長鋏還相語冥鴻幸起豫端午萬里荆州俗今晨採藥翁浴蘭從忌潔服艾已同風泛酒菖蒲細含沙蝘蜓紅沉湘猶可問角飰畏蛟龍嘉祐大行皇帝挽詩十首七月期先逺三泉異卜征悲憂同軌事遏密兆人情晚出蒼龍駕真遊白玉京稱天騰茂實厚德始能名北發聲名逺西城劒戟銷萬靈潛受記百獸樂聞韶昧谷迷升日璇霄失建杓仙遊那可問賦諷已飄飄盛德終無逸元功孰間然啓疆神禹績著記帝虞年桑變旋觀海弓遺杳望天霸陵無石槨不改故山川盡禮三神事齋居五日朝綈衣仍浣濯禁籞亦芻蕘汾水遊何往華胥夢轉遙美藜與環堵無日不思堯屬車全鹵簿寶玉煥渠眉萬國瞻龍翣三辰會素旗雪迷帝鄉望風動海隅悲今日西巡守仍非八月期清光非可望天道亦難聞䇿府開羣玉賡歌續慶雲一經皆賜復九譯尚同文會盡南山竹成書紀帝墳陵闕儼因山明中恍下天燃魚常照夜耕象自成田鴻洞深投玉莓苔密瘞錢涕流昭德舞無復柏梁篇帝車旋北斗馳道繞青松銀海浮雙闕虞淵頓六龍深思傾杞國遺恨泣華封述作無憂事靈臺與辟雍車書共文軌律度出聲身明白垂中典優容禮直臣熊羆渭川叟風雨越裳人更想攀髯士猶知不犯鱗哀挽千人唱崇岡萬嵗居呼關想傳警羡道法周廬晚日塗車靜深山灌柏初谷神知有術猶欲信前書次韻和麻直講題楊直講所種三樗樹誰能知散木封植亦無心嵗月如視蔭棲遲還息隂宦情移栁在詩興愛棠深定有歸飛翼懷音似泮林神宗皇帝挽詩四首制作夸三正規模壯百王自然推大略誰得望清光東樂來蟠木南琛過越裳白雲那可測應復向汾陽綿宇正歡心虞韶驟遏音戴天憂杞國就日悵崦岑貫朽三泉府方輸九牧金斯民已仁夀至理更難忱四塞聨初郡千官僅代工舟車逾漢迹臺省變唐風賢傑程能際戎夷率服中軒威百年在何必畫周公晚駕嚴仙御西巡即舊都天寒餘鶴語弓墮脫龍鬚白髮孤臣淚清湘萬里途無由宣室問回首叫蒼梧大行挽詩二首原注劉熙説大行云大行受大名受名從大行復土自因山秋草龍髯墮宫煙淚竹斑不知汲水逺猶與化人還寂寞崦嵫日空瞻咫尺顔謳歌前授啓桑穀遂興商恭已朝無事優賢禮亦莊那驚同軌至方奏萬年觴西望歸雲白悠悠指帝鄉又二首萬國依無外三登頌太平樵夫亦談道耆舊莫知兵雲去仙鄉逺龍來寶鼎成西風動閶闔哀涕不勝情供張連三輔梯航會九圍屬車疑晚駕清蹕望來歸草雲凄金闕松風揚玉衣舊傳當脫屣遙見五雲飛日晚清秋來早晚落日正蕭然稍見林外水獨聽風際蟬牛羊暝知道墟落逺生煙歲事看禾黍方知沮溺賢挽杜祁公太師二首孤童逮耆老仕郡至三公任重仍長道材全信永終時推子房智人識伯夷風存殁哀榮禮千秋誰與同赤舄三師貴諸公百里封舊勳兼注意餘事寄明農哀動襄陽市悲殘鄭國舂空餘靈夀賜無復見臨雍秋雨四首冷雨黃昏暮秋聲衆葉喧濯煩天宇闊流惡楚江渾蛙黽煩當道魚龍稍在門一樽聊自勸還欲笑臧孫漠漠清秋雨蕭蕭萬宇寒蛟龍移窟宅江漢急波瀾瘴霧深蠻洞旌旗濕漢官南征愁失道后土若為乾原注時方誅湖南蠻賊海風吹暮雨淮上始秋聲點滴潛滋潤隂沈未放晴林塘雲似密水鑑鏡來清無事看魚鳥飛沈體亦輕炎天常畏酒秋興憶開觴海面孤雲黑林端一葉黃島夷歌似楚村笛語如羌更覺非吾土登臨思舊鄉有懷北歸江漢不宜秋羇人北望愁帝鄉從此去楚水正東流竟日悲鶗鴂長歌倚蒯緱天邊兩黃鵠那肯為人留祕閣梅花始知丹禁密獨見早梅新天上應常雪人間未有春亂香交砌草疏影媚庭筠浪作瀛洲客催成白髮人雨中晚涼落日浮雲暝滄江雨氣來風燈殊未定洞户故頻開秋意梧桐急宵征蟋蟀哀客心聊灑濯天地久塵埃始涼秋風來幾時客病不相宜搖落令心苦虛涼益氣衰生涯貧更拙交態卧尤知安得千金贈鴟夷與爾期送張直溫主簿赴南陽張君年少豫冠歲聚公車留落成強什聲名就子虛穰橙千户富潭菊萬家居吏隱何為樂優遊不廢書黃知録園池劫火無遺者靈光獨巋然寒池清照日古木碧參天細雨來幽鷺涼風急亂蟬頗知魚樂意仍得離鈎筌遊李氏園池二首從人問喬木繫馬得名園栁帶晴先緑禽聲暖更喧臨池照清水拂石置芳樽不畏歸侵夜嚴城未掩門樹密渾成塢花深更有蹊來遊春尚淺重到客應迷已近無人境深憐快馬蹄風光不負約樽酒會長擕春隂峽雲春易雨水國暮多風原草萋萋緑林花淡淡紅清江晚寒外落景半晴空物色憐新燕歸懷目去鴻秋雨南國秋常暑涼風起自今泄雲無白日度夕亦層隂搖落梧楸意蕭條蟋蟀音窮愁抵衰病坐作老翁心樹隂二首清隂方丈得暑氣乍來無塵榻從箕踞前賢亦鍛爐晚蠱多黑羽秋草半青珠安得遺方客玄談似給孤避世長梧子居貧五栁生清秋葛衣薄晚日濁醪傾雨蝶輕原注去聲猶舞風蟬涼不鳴淮南搖落早倚樹不無情夜坐積雨凝涼氣疏林滴露華流星占使者斜漢挹浮槎喜近天流火回看斗轉車秋風下閶闔消散萬人家飲酒城南門贈髙子中蒼山際碧霄緑樹及山腰青靄照殘日白雲縈麗譙偶然成勝賞長嘯隔塵囂少駐飛鳧舄吾無獨酌謠酬朝單州二首九載一相逢侵尋頭已童喜君真傲吏老我未成翁簡易文書省悲歡酒盞空平生懷舊意盡見醉醒中彈琴君子邑賢守智逾多不作長沙賦仍傳白雪歌解酲應用酒成佛却須魔正買千金骨何憂驥跋跎送呂國博知常州計然餘半䇿賈子就新書屈意銀青綬之官鳥隼旟丹楓千里逺秋興二毛初最可羞晨膳蓴絲雜膾魚李公擇自滑州移知鄂州黃河魴與鯉不及武昌魚好去連城守翩然雙隼旟諫官仍重外天祿不成書可待三年最歸來侍赤除朝回朝回還閉户講徹復觀書重祿爭消得微軀且自如俗情矜不及生理付無餘寂默懷張摰淹留苦魏渠同宋次道飲王史館園珍館掃塵埃賓階餘緑苔涼風知廣厦清唱急行杯修竹端藏日交流靜殷雷歡窮有餘恨不及壯年來同韓持國飲城東俞氏園貧家常汲汲一飲自難營不笑烹雞黍因之同耦耕林花含秀色谷鳥變新聲歸馬無庸疾郊扉最近城泛舟城南二首清溪亦多曲窄地頗宜花出水遊魚樂驚人白鷺斜孤城舊郢樹三戶楚人家歸興仍風雨蕭然眷物華風逆湍聲急雲酣雨氣豪川霓垂飲近江鶴去飛髙洗藕還餘味操舟未覺勞蒹葭彌極望秋意晚騷騷早行山烏相呼曙檣烏自指南健看帆席滿坐數舳艫銜水闊蛟龍舞魚肥鸛鶴貪陳雲濃似墨送雨向湘潭晚行天闊西曛久風多客語聞九江秋落水三峽暮歸雲飲啄鷗相並歸飛鶴不羣湘潭早搖落稍稍悵平分次韻酬錢少卿簿書非力學何事不窺園乘興緣心賞忘懷到酒樽露蟬涼寂寞風葉靜翩翻少駐東方騎前盟豈可溫送楚南心寄江湖上樂聞遊子歸送君從此去脫葉正秋飛雲水聊破浪風塵今振衣山僧不善飲定負蟹螯肥送袁生巴蜀窮天險驚君便向西長年勞賈勇懸度約輕齎行止千金子艱危萬丈梯自憐傾蓋舊即事復睽㩦送劉四畋二首四海皆兄弟吾宗加老成好書如子政飲酒勝公榮今日鱸魚膾羡君乘興行秋風峽中度快意聽潮聲肥水不能逺秪今行子東髙秋千里月暮景一帆風時節迎黃菊汀洲下早鴻江天多勝事無術與君同山陽送王中甫弱扇避風瀾卑飛歲復單君行反閶闔人望接鵷鸞齋日容臺峻書籖䇿府寒誰言今昔異王貢本彈冠送某詞曹大府掾誰謂詔恩輕遺愛念諸父司存從汝兄男兒貴壯志子弟習家聲努力自勉勵吾衰觀爾成送王同年殿丞知鄞縣結愛愧同年君先豫著鞭稍遷鈎盾省厯試武城弦越嶺霞明日南溟水浸天微官等不遂欲治子猷船江亭後池清江長望極餘興曲池深俯視遊魚族仰嬉喬木隂通津厭離會勝地有登臨暮雨寒潮急歸飛聞水禽送胡因甫知湘鄉縣雲水長沙國銅章邑大夫俗傳鶚似鵩仙化舄為鳧卑濕加飱飰絃歌豈壯圖洞庭見歸客書信不宜無季夏雨過小有秋氣雨過猶長夏秋深從洞庭江涵郭門白山到戍樓青天意憐卑濕吾謀有醉醒柴門夜不掩髙枕看流星觀雲江上秋多雨山中晝出雲太虛終日曀疊嶂不時分半覺蛟龍氣皆成虎豹羣微風動閶闔暫喜見西曛山行危塗煩側足積水向吹襟雲樹參天直風湍殷地深翠香秋後草巧語霽來禽信美非人境無為久滯淫泛舟野境尋不盡幽歡良自如猶疑夢為鳥誰謂子非魚岸樹緑已合渚蒲長且疏逍遙此中意何減漆園書初夜海氣三隂早秋宵一刻長涼風吹樹動疏雨過雲忙寂寂庭槐落微微徑竹香蛩聲畏人寢故故近眠床夜三首積水浮南極流沙聚客亭暄聞漁父曲秋揖老人星初月霜華薄孤山石黛青天高多影響髣佛見湘靈涼風吹素月深夜欲眠時露自入秋白漏從前日遲河光如劍直螢影似星移多少流年感聞蛩輒易悲流雲卷殘雨初月淨中宵秋色河漢白涼風星斗搖暗螢猶奕奕髙樹獨蕭蕭客鬢非松柏何時得後凋寄題康州陳氏連理木詩陳家聚德星纍世若同生天事知常象林珍獨應誠相傳殖嘉樹不復羡名卿坐使炎荒化何如谷口耕哭吳道粹學士結束并州騎雍容使者車乃心長象闕稱旨得金魚熊鳥空遺術龍蛇有讖書平生一笑樂回首涕盈裾次韻酬盛祕丞黑桃二首度索方殊域崑崙起素封幾人曾白眼吾子幸先容晦迹煤炱暗含滋沆瀣濃上林求異木詔使會尋蹤春華各自媚秋實頓能殊悴貌從黎黑丹心固碩膚榴花隨使者荔子賜胸奴寄語玄都客相疑失味腴雨夜三首急雨吹喬木孤燈瞑小軒神傷徒隱几夢極不招魂老淚悲朝雉摧腸怯夜猿舊惟眸子亮一月遂全昏孟夏樹木長夜涼風雨時明燈掃塵榻散帙坐書帷曠野波濤合中宵虎豹悲形骸吾喪我隱几向為誰雲暗黃昏雨風凄九月秋老便安坐久用即置書休知命應無念虛心自不愁三年同此興中夜一燈留季夏雨夜烈暑殊未艾更籌初少添電光金作屋雨氣瀑吹簾巢燕密誶語暗蛩爭出潛何由掃氛翳試使祝蜚廉靈壁張氏園亭二首落帆楊栁渚步屧松竹園叢石千巖秀涼風萬葉翻主人昔傲吏燕翼此衡門略看題詩客空令悲九原密竹換啼鳥清池添放魚懸藤林下坐響石洞中居興趣自無盡傳聞那得虛如何仲長子刻意但成書重到謝氏園亭寄裴博士俊叔王主簿宗傑時裴往淮南王出京師徘徊逺林下幽草為誰芳前日同遊客今朝俱異鄉東風雖淡蕩陳迹似凄涼何用江千里春心故易傷八月十五日秋分是日又社秋分當月半望魄復宵中難得良辰並仍將吉戊同髙樓連卜夜濁酒任治聾注想乘槎客何如擊壤翁送裴太博萊子頭垂白斑衣歡過人官知為親屈祿足代家貧歸鴈江南逺芳蘭雪後新仙舟興不淺致意越鄉春夕陽驟雨無多潤殘陽不復遲隂涼庭樹老點綴石苔滋鬭雀輕投地懸蟲賸倚絲林櫻供口實美味及童兒馬氏中隱庵千歲知名士文淵與少遊平生欵段馬晚嵗伏波侯鄉里足稱善功名仍可收聞君事中隱歎息此孫謀望荆山宿雲收疊嶺初日上危岑黤黮千重黛光芒一線金秋髙怨搖落野曠快登臨誰怪欣然樂山林慰此心送李太博知梓州郪縣亦有飛鳧舄那知蜀道難峽山從劔盡江水向浯寬近邑輸鹽井連城接錦官清風足富俗唯寄七弦彈送邵中允知華亭縣一登丈石陛立拜紫泥書省户方通籍絃歌想下車飛鳧來不逺唳鶴聽何如莫作陶彭澤田園與世疏晦日自薦福泛舟泊女郎臺下又泛東湖雪解寒生水平湖照眼新扁舟徐送客絶境漸無人徑草芳菲淺沙禽羽翼馴佳辰數攜酒晦日已疑春晨興宿露寒猶重升曦旦尚昏髙秋凋衆木百里見平原水涸看魚族田收長稻孫冥山不可望那復更南轅將遊吳中寄原父久宦減仲産行歌非五噫歸來問長鋏習水看吳兒弱喪殊可恨儻來今自知江山不我厭有意卜居之彭城集卷十二
