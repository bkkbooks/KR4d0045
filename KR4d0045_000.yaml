body:
  text: 彭城集别集類二宋提要臣等謹案彭城集四十卷宋劉攽撰攽字貢父號公非與兄敞同登慶厯六年進士第官至中書舍人事迹具宋史本傳稱攽未冠通五經博覽羣書沈作哲寓簡亦曰國朝六經之學自賈文元倡之而原父兄弟為最髙司馬光修資治通鑑自辟所屬極天下之選而任史記前後漢書者攽也其知兖亳二州以不能奉行新法黜監衡州鹽倉哲宗初起知襄州入為祕書少監錢協草制極稱其詞藝其後以直龍圖閣出知蔡州孫覺胡宗愈蘇軾范百祿交薦之言攽博記能文章政事侔古循吏身兼數器守道不回乃召拜中書舍人蘇軾草制稱其能讀典墳邱索之書習知漢魏晉唐之故其歿也曽鞏祭文有曰強學博敏超絶一世肇自載籍孔墨百氏太史所録俚聞野記延及荒外陰陽鬼神細大萬殊一載以身下至律令老吏所疑故事舊章盈廷不知有問于子歸如得師直貫傍穿水決矢飛一時書林衆俊並馳滿堂賢豪視子麈揮云云蓋一時廷評士論莫不共推即朱子於元祐諸人自洛黨以外多所不滿而語録云貢父文字工於摹倣學公羊儀禮亦復稱之豈非攽學問博洽詞章奧雅有不可遏抑者乎史載所著諸書有文集五十卷五代春秋十五卷內傳國語二十卷經史新義七卷東漢刋誤四卷詩話二卷漢官儀三卷芍藥譜三卷今所存者自詩話以外惟東漢刋誤散附北監本後漢書中未見孤行之本芍藥譜亦僅而不亡文集則宋史藝文志文獻通考俱作六十卷明文淵閣書目有彭城集十五册不列卷數今所傳三劉文集僅有公非集一卷凡詩四首文二十三篇蓋掇拾於散佚之餘多所闕漏即宋文鑑所選者且不盡載其他可知至以劉顔之輔弼召對序誤屬之攽舛繆尤屬顯然珠不足據今檢永樂大典所載篇章尚富蓋即據彭城集收入謹掇拾排比釐為四十卷較之原書所少不過十之一二與新編其兄敞公是集巨製鴻裁舊觀幾復在北宋諸家中可謂超軼二孔而憑陵兩宋者矣乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:45c71dc6e03b8d8833707f667cb2b8b3ecbc89be289df2e406aafafda4a84719
