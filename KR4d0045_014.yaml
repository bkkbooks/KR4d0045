body:
  text: 彭城集巻十四宋劉攽撰七言律詩省宿開旦文書整日勞漏傳門掩謝諸曹小庭待月久不下喬木䧏風空自高舊學荒蕪多夢寐㣲官補益抵分毫秋來鬢髪㸔成雪不似潘生始二毛次韻和陳學士八月十六日省宿疎簾珍簟倚通中落燼飄香墮玉蟲信宿依然十分月黄昏正爾一番風流螢暗逐星過水驚鵲時翻葉墮空詩興不禁頭已白醉鄉祗有面㣲紅次韻和登州張使者層城表海勢嵯峩車騎雍容樂事多八月潮平占候火三更日上㸔濤波閒留方士談迂怪醉聽齊謳起艶歌莫以高材厭留滯功名從古喻裘蓑和陳五祠九宮致齋帝家三正付惟清岑寂容臺最古㕔長日齋居空旦旦幾年華髪欲星星霜風洒葉都成赤籬菊疏花雜閒青多少舊溪招隱興暫因釐事遶林坰題所種梧楸曲檻層簷與樹宜三年初見綠隂垂聲隨白雨凉生疾影奪朱炎暑到遲傍倚轆轤㸔汲井下留閒客坐圍棊㑹須百尺參天直白髪空嗟拱把詩還家草逕茅廬不逺城歸來松竹已秋聲鄙人倦客方招隱弱女非男亦慰情薄願自甘隨老圃短才無用至名卿閭里相見成幽熟他日禽魚尚不驚城上新亭野芳喬木共回環歩到西城五里間值有叢祠休足力就為幽境慰心顔鷗聲逺水連晴日刹影高臺似淺山勝事本來容易集可憐人自不能閒次韻王介甫金陵懷古四首虎踞羣山帯繞江為誰為國為誰降高臺麋鹿㸔無數廢沼鳬鷖去自雙萬里朝雲隨逝水百年西月過虛窓白門酒美東風快笑數英雄盡一缸樓船西下勢横江元帥旌旗就約降旋報前師覆張悌亟傳單騎馘王雙燕焚正自當煙突蟻潰何堪值水窓回首三軍歡奏凱萬牛行炙酒千缸楚貢來遲詭問江漢收羣䇿士心降一言已重黄金百再見仍蒙白璧雙漂客脱身甘馬革老儒投筆謝書窓豈知三閣酣詩酒浩唱庭花倒玉缸頽垣落水半平江喬木風呼不易降耕出珠璣時得一道逢麟鳯不成雙潮聲半夜來寒渚月色深秋照舊窓唯有魚鹽城下市檣烏想望集缾缸送馮當世移金陵滿城擕酒駐高軒楚老沾衣共一言何幸期年無吏事方從歉嵗識君恩潮迎綵鷁來瓜歩山映朱旗轉白門早晩使星還北極溥㸔霖雨濟乾坤李公擇自滑州移知鄂州黄鶴仙人去不留武昌官桞傍層樓前山欲近滄浪水芳草遙分鸚鵡洲漁父嘯歌聊自樂禰衡詞賦若為謀朱輪皂葢一身貴談笑豈知千古愁得江同州和詩後却寄左輔關河二十城使車全勝直承明白頭樽酒諳風味乘興篇章得性情苜蓿空肥天驥老風霜有意皁鵰横驚沙急雪迷秦樹不似山隂一日程次韻和裴潤州見寄江城山翠若連環城下波濤暗楚關去計祗應勞侍從歸心願復賜清閒百年舊法軒丘外千里傷懷嬴博間過亊惱君堪白首添歡惟有綵衣斑陸子履知潁州稻白魚肥潁水清重湖光彩動層城經為遊客歡閭里特羡朱軒擁旆旌整棹鳬鷖横筆勢倚樓風雨壯歌聲聚星賢士兼存殁配社名鄉見逺情原註郡人王回常秩近有詔拜官而深甫殁逝聞常君讓爵不至故詩及之寄韓慶州萬騎將軍西䕶羌邊塵無復近麾幢烽傳列障來遮敵雪擁層城接受降日暮悲笳還自疊天寒羈鴈少成雙檄書不得從軍樂䪍弩空令候小邦送謝師厚知唐州原註先是知唐州以興水田受賞師厚家在鄧州腰虎憑熊近越鄉方城南望色蒼蒼社人隨處祠桐柏傳馬來時認肅爽兩國風煙通置吏百年荆棘勸鋤荒王成勞徠先䝉賞史起猶應問濁漳送王廣淵郎中知潁州二月潁河春水生檣烏相望使君行東風不起驚濤勢遲日何妨短驛程坐有圖書歡傲吏静㸔魚鳥忘專城漢庭良守誰先賞㑹見膠東舉相成送光禄呂卿知懐州卿秩西來郡組新東京故事本憂民太行形勝連天黨積石波濤㑹孟津千里雄風隨坐嘯百城膏雨待行春期年定有周堪詔父老無勞借宼恂送龔鼎臣修撰知兗州楚國清名世豈知郡章新得泰山歸静思鵰鶚霜天勢却㸔蓬瀛客旆飛去國鬢毛休變色還家傳瑞已生輝翠華早晚東巡守馳道離宫接帝畿送呂郎中知解州南風吹雪暑飛霜瞬息高車起重裝胡馬邇來充牧苑漢兵無處不餘糧部丞亟上司農奏腰組仍夸太守章正賴研桑密心計晚從王謝識諸郎送宋次道知綘州案前後漢書志多後人所補次道必預修唐書故詩云然銅鞮宫觀久塵埃樊守園池亦壯哉屬縣老人書亥字臨汾神祀問臺駘土風頗記堯遺俗府吏猶疑楚有材漢史待君成十志傳車長望北風來送韓文饒知均州原註自南劔州嶺梅隂下駐旌旟五月歸更竹使符漢上川原連夢澤鄖人風俗語於菟奮髯曹吏知無事坐嘯雲山得自娛建禮㑹朝兼夜直羨君䪍弩盛前驅寄孫秦州十年幕府領旌麾事半前人此復稀元帥詩書真用武小戎車甲豈無衣敵兵候月麒麟鬭漢馬乘秋苜蓿肥自失隂山常慟哭更聞消息向金㣲次韻和王泰州粒食由來不願餘雲飛自愧羽翰孤已同白首滯三署却羡青郊授一夫出守故人猶虎竹相忘吾道亦江湖秋來卧閣知何事鈴索生塵獄有蕪送喬左藏自太常博士除知施州志士變衣非變性丈夫能勇亦能言東郊不顧田二頃愛子歡然弓兩鞬黔水犀牛羣解鴆峽山猱子躁欺猿蠻溪未足紆長䇿㑹使天驕祭北門送王汝州讀易絶編經獲麟廷臣推汝老成人宦遊獨怪烏衣晚吏隱何妨青綬新風穴不應長嘯虎湯泉寧復為煎薪高齋有勝宣城處三十六峰為近鄰九月十日趙令園餞送王汝州汝州留詩二篇次韻華髪悲秋復送行茂林修竹若為情菊花節去香猶在桑落寒來色更清趙魏優賢常不欲春秋知我亦空名别離何必皆千里分手如今越與荆五馬來時照路傍名園秋物自裳裳吹花酒面蟹螯壯下豉蓴絲魚膾長問事不休推景伯讀書未見屬黄香窮愁解摘唯須酒身外浮雲天際翔送韓七文饒郎中再知解州傳瑞生光廐馬閑使君冠葢隔年還莫嫌屈産齒加長少有甘棠身再攀白徑嶺前開驛路哀烏星裏望朝班鹽車過往繁如織驥耳能㤀一顧間送裴郎中知房州好去臺郎應列星異於遷客向房陵且㸔銀印懸青綬可在金輿與玉乘柏塢麝臍香不雜竹崖牛角價無朋清通便是循良術三最從君數吏能寄王濟州原註濟州書言修潔西湖泉石之美獄市并空俗已和使君高興足婆娑畫成林色重裝洗鑑作湖光更潔磨厯下軍聲從古盛濟南名士邇來多小寒漸有北歸鴈話與飛翰同一過酬王濟州原註濟州詩言予閒暇望鄒岱諸山郡印拘人祇㸔山簿書無盡且偷閒不羞暮景桑榆上聊寄高情宇宙間頗葺池臺増舊觀旋栽桃李待堪攀老公此意君知否未有莵裘未得還送滿龍圖知襄州鳯林闗下七連城獵獵霜風巻旆旌漢隂抱罋防機械峴首沈碑認智名季孟中間欲誰與英賢餘事亦難平習池倒載時一往却是古今真實情次韻晁單州詩六首五字酬君詩百篇知音免負伯牙絃淹留子賤弹琴地悵望蘭成射策年術到仙真皆羽化師無前敵在中權古今風雅人多少名下聲華不浪傳材傑知心似合符不違顔氏亦如愚文章偏我不得力懐抱與君非有殊龜手但知能澼絖緯蕭何意得驪珠自攜如意樽前舞曲盡歌長缺酒壺性僻材疎酷嗜詩頭童齒缺雪埀頤五十已過無聞爾三百雖多奚以為每向後生知所畏獨於名士喜同時李陵蘇武俱塵土豪傑由來自得師多愛不忍緣愛奇記人毫髪㤀瑕疵埀老此心免愧已起予它日亟言詩衣冠為子最青眼兄弟數君仍白眉瓠葉豈以菲廢禮鮮首燔炮為宛脾側逕蜂飛忙蔽日綠隂鸎語静移時自疑寂寞揚雄宅最愛清和謝監詩詞客篇章寫桐葉飲流籌筯折花枝相望十舍不相就兩地風光鎮所思貴公門地多隂德慶事今君大樂生愛子桂枝新上第弄孫蘭茁始書名撥弓試復穿楊葉負鼎何妨待鵠羔不似淮陽多病守十年卧閤見交情雜諷陽武舊恩惟丙吉中興同學有嚴遵封侯㑹自酬隂德物色終應訪故人可在介推懷怨望深疑咎犯亦逡巡剛腸獨有屠羊說稱義孤高無與鄰送虞太熙著作知番禺縣逺師猶覺丹青似大邑知無盤錯憂梅嶺山長因海盡夜郎江闊傍城流鯨魚浪作傖人鱠槎客常隨賈舶舟莫為風帆徑清淺秘書仍自有蓬丘送曹輔奉議福建轉運判官馳傳典州名字高溪山更不厭勤勞吏逢照膽新磨鏡事似屠牛已善刀頗説團茶如湩酪欲將丹荔比葡萄使君詩思過泉湧為賦佳篇悟此曹陳植文華斗石高景宗詩句復稱豪數奇不得封龍額禄仕無妨似馬曹蠧簡傳將蝌蚪字銛鋒瑩出鸊鵜膏南州山水能為助更㸔英詞勝廣騷送張遂州原註自開封府判官除九折無艱蜀道通使君車騎最雍容尚書不復拘三輔御史仍開給五封接境去思棠樹密退公歡燕綵衣重治民固有張京兆坐㸔巴人益劭農次韻和張宣德合江亭此水此山今昔遊蒼煙古木又窮秋起隨佳士初乘興忽話離人始欲愁南極早知無到鴈北天那可際歸舟老身學得灰心也不是灰心淚已流秋日寄楊十七簷日輝輝過午天榱風槭槭未霜前不甘翠葉無時落已分黄花特地鮮富貴應須三寸舌文章不及一囊錢詩翁白髪經秋甚為問窮愁有幾篇嶽雲亭山外浮雲横翠㣲海邊初日上朝暉我無小魯悠悠志那欲乘風去去飛上客高吟揮玉麈佳人半醉舞羅衣昏鵶獨鶴何勞問合暝投林各有依檻外連山如合圍尤憐昏旦變清暉雲行驟雨非無事鳥伴歸鴻即倦飛厭見市朝車馬迹喜㸔巖谷薜蘿衣尚平畢娶何蕭散千載高風自可依薄后廟駟家冠虎久騰聲龍躍中都漢道興人事能無輸織室母儀終見􅌾南陵蒼苔複閣連荒草喬木參雲掛老藤欲學靈均紀天問古堂丹碧正嚴凝送鄭秘丞知卭州蒲江縣明府之官固有程巴江繚繞趣君行孤帆去逺滄浪色百丈牽遲灩澦聲火井煮鹽收倍利山田種芋勸深耕舊來卭竹通西域邊吏還知健令名李尚書除少保致仕疏公黄髪欲遺名詔秩青宫二品榮自昔為家皆僻地更聞題劔得佳城賜金給館君恩重倚杖㸔山世累輕試問門風過萬石白頭賢子已名卿呉國博未五十致仕歸蘄州名宦於身甚纆徽白頭青紫莫言歸曼容自以㣲官去蘧瑗應知過事非笛竹滿山經夏冷江魚如玉向秋肥避喧不厭塵紛逺何况孤城人迹稀與諸公㑹趙氏園主人加送酒饌既而求詩書五十六字落木稀疎存葉丹别筵秋興雜悲歡主人愛客願少駐老子為君加一餐蕭相河山餘帯礪謝公子弟悉芝蘭㑹因休沐觀歌舞正賴㣲官謁禁寛案一本作㑹因休沐還乘興翠竹喬林雪後看苦寒早朝漏絶星沈十二門烈風吹耳萬車奔疾驅不敢行馳道辨色纔能認掖垣病眼無堪頻唾沫瘁肌時復强噓温尚衣仍在青𠖇外薄願何當獻負暄次韻和王舍人酬王工部早朝原註王時監仙源觀天門金碧照晨光躍馬鳴珂曉正當人到蓬萊知不夜地從閶闔夐無傍風移宫漏穿花遠雲覆爐烟繞禁香望斷雙鳬候飛舄空傳詩句首東皇雨後早朝雨闋凉生樓閣虚緑槐花落影蕭疎端門立杖交符後禁漏傳呼上水初伏閣預聞明詔語退朝潛誦直臣書愚忠空覺身無補放去江湖待詔除春雪早朝和沈編校曉寒初怪客衣重隱約鐘聲長樂宮出户萬家横雪裏止車雙闕秀雲中退朝禁栁迎人緑寓直庭花向日紅縱使著書嘲尚白會應華髪兆非熊原註漢宫有止車門和牟公野館宿早朝夢回仙府豁中扄未斷塵緣復戰兢交態出門逢楚越俗情開口判淄澠夜長鳷鵲偏留月嵗盡天河亦有冰閶闔晨開車馬集五雲深處望朝昇嘉祐中與王丞相呉樞密韓端明王學士㑹飲騏驥池上去今將二十年王有感事詩見示次韻水色林光照舉觴陂塘六月起秋凉壯年過事難重得末路貧交故未忘注眼階星元近極叱梟甿采不成王嚴徐未抵馮唐老猶詠君詩意自卭汾州鄭閎中學士寄蒲萄漢使于闐伐大宛蒲萄天馬徧長安絶塵無復千金骨結實常迎八月寒逺愧故人勤置驛每逢樽酒為加餐自身不得凉州牧何以報君雙玉盤與倪秀才酒學子青青佩與衿湘中攜手一傷心君為壯者我白首家在秦州書萬金失馬頗能如北叟似鴞那復怪南禽相憐羈旅方無友齎贈醇醪稍獻斟和賈舍人春祠太一壇二首使節春祠太一壇漢庭儒雅貴兒寛星河回轉開閶闔樓觀參差起廣寒月射金盤霜更白風來宫樹雪猶殘清詩不減高唐頌萬玉鏘鳴雜珮珊五城金碧盡樓居西望屯雲藹太虛瑞氣長存春不覺美光相屬夜如初歸承宣室雍容問密受神君䇿畫書力士傳車空杳邈真遊本自接儲胥次韻和顧直講故人相語笑家丘華髪盈簪此滯留無限風光輕過眼邇來春色試回頭名園秀木藂幽境紫府真仙熟舊遊自是山林懷勝賞非關適野濟吾謀晚歸古木號蟬鴉亂棲凉風稍稍襲人衣高樓鼓角悲秋意小市漁樵競夕暉雖有簿書容暇豫强從賓旅復來歸閉門躍馬俱人事吾道何能問是非燈夕都下原註十八嵗初至都下見燈到今四十五年元夕燈光嵗益新羈遊四十五年春埀髫已識東西事回首宛如前後身繡轂雕鞍驅不顧丹臺綘闕到無因清霜著屋風吹面素月滿庭吾故人詠旗玉關歸馬候全師虎落無塵指列旗壯士驩聲歌杕杜降人破膽望槍纍禹功逺近逾千嵗漢德并容過二儀青海逺通青塜地白羊斜界白狼夷送張器著作長裾欲敝二毛侵他日聞君東武吟騏驥老成方得路梧桐焦尾始知音蓬萊著作芸香馥楚澤絃歌笛竹深七十封侯殊未晚相㸔感激壯夫心又次韻酬著作見寄粗了文書過目前公餘賓宴即歡然臈醅趂熟先春味官燭供燒合夜煙惡土一番生好木涸池三面秀紅蓮不知尚有思人否吟咏來詩幾絶編次韻王平甫直舍未開梅花複閣深沈人到稀官梅孤秀及花期地寒竹柏應為伴春近冰霜信有時不恨未開煩久待正憐將落賴偏遲催人頭白何由奈可在江南寄一枝初夏喜凉季月南州雨過春雨餘炎氣即經旬北風一變如秋色小屋三間喜病身出户燕兒矜羽化堆盤梅子薦時新融峯盛夏含冰雪安得清凉頗借人上已風光亹亹逼人來過去清明更不回巳日家人還祓禊蜀江清水快流盃關關啼鳥如相和冉冉殘花欲盡開自笑野心安淡泊亦能隨衆上春臺南宫鏁宿戱題複閣深沈横九衢京塵斷絶閉門居士人應怪跳壺術漢使曾無繫鴈書暝數月華將復缺春和庭卉已非初東風雷雨知何在快意青𠖇㸔化魚題禪寺錦帆牙檣四百年曲池歌榭兩凄然又從刼火悲前佛猶有靈光閲逝川何處鳴禽新出口幾株喬木上參天春遊不負題詩興神助仍因夢阿連五月望日赴紫宸謁待旦假寐半夜北風凛凛寒倒衣驚問紫衣班雲容不辨隂晴際月色猶迷爽晦間偏喜鳴雞識鐘漏正憐殘夢失江山濯纓簪筆初無補空愧紛紛數往還凝翠堂簷前老竹生無數座上清風處處來俗客不知㸔好鳥紅塵無復汚蒼苔兒童戲掃黄金影茗飲時傾碧玉盃會待秋霜堅草木簡書羌管倩人裁緑竹參差平拂簷疎隂掩映似重簾留徑人誰識蔣詡開窗吾擬學陶潛古墻莓苔有石色長夏江山如火炎避地真宜近幽僻悠悠笑謝嵗華淹劉九經原註年十八及第白首儒先困一經此君年少獨聲名早知劉氏無蚩者深信宣尼畏後生賈誼尚為門下掾終軍仍許出關行限年選舉今留滯躍馬贏糧見子情送隱直齊楚分飛嵗月遷微官落拓竟依然青雲可願已三仕白首幾何頻十年自昔彈冠深有意到今同病秪相憐隂風朔雪河梁别乘興仍思訪戴船彭城集巻十四
