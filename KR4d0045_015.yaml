body:
  text: 彭城集巻十五宋劉攽撰七言律詩送李士寧山人帝城車馬日喧喧物外相從意爽然自有藥壺容到客獨摩金狄嘆流年高秋天幕收零雨清露風林嘒暮蟬曾愧丹砂為狡獪更談滄海變桑田原註子妻常病山人自其家取藥見遺山人妻能采藥也山人又嘗南海神事甚異寄彥猷移鎮錢塘紫垣清切擁鈎陳閣道分明絶漢津未怪靈槎滯呉㑹祗堪藏劔動星辰懷金紆組臨鄉社釃酒椎牛宴里人行樂從來多壯觀秋風莫使鬢華新平山堂危棟層軒不易攀萬峰猶在户庭間長空未省浮雲礙積翠如遮去鳥還寡和陽春隨白雪知音流水與高山呉中辯士嗤枚叟漫説觀濤可慰顏次韻和秘書省林舍人校書寓興五首客塵作業通三世儒墨分流至九家投閣何妨惟寂寞起予仍自悦紛華夢緣酒食逢芻狗兆應錢財屬火花安見高人捐外累獨超無有躡雲霞百緣不信皆前定千古相矜盡小才夢月豫占沙麓襲建章如待柏梁災朱英强欲希無妄萇叔空勞射不來聞道蓬萊更清淺便應滄海起塵埃勇夫常作三軍獲辯士多從五鼎烹到了是非皆妄想不緣僥倖亦無名小山叢桂容招隱負郭良田任耦耕倚伏會應齊北叟朱愚那復問南榮事緣難易始相成楹直寧當企棟横坐論巖廊從自貴退棲林壑未為輕俗情熠燿隂中火世路摴蒱馬外坑要使襟懷似雲月太虚無處不偕行縮手旁觀哂汗顏未知才與不才間勞生精衞填東海多事愚公移北山語道此身甘髪白息機他日賴心閒良金百煉纔成器躍冶無如鐡石頑黄朝議賜紫長年金紫最相宜晚達非干入手遲白髪閔勞官職事赤松元作帝王師魚銜印鈕丹鱗舞鶻勘袍花爛椹埀少似主恩崇舊德掛車無異立朝時回致仕董中允富貴致身良獨難寄書空復走長安誰能東郭雙穿履徑出都門一掛冠家事田廬隨几杖君恩班序接鵷鸞顏生尚少時無用長鋏因公慨屢彈次韻酬濮倅李郎中見寄相見無期得寄聲更憐詩語獨丁寧驅之老馬尚知道行矣泥龜甘不靈半百光隂頭總白二三朋舊眼偏青芳春樽酒何由共悵望東郊長短亭答仲馮宿興慶池作車馬還城君肯留通宵歡語破離愁水風楊桞猛消暑沙雨芰荷潛造秋驚月禽棲時落樹避燈魚鬛暗衝舟天明紅日驪山道陳迹依稀似夢遊遊凝祥池飲柳緑蒲新小曲江洞門岑寂閉僊幢波心殿影遙相況花底禽聲各自雙薄俸猶能償酒劵老年無事守書窻街頭月色緩歸去調笑相隨白玉缸同都官遊左山晚歸汎舟城濠呈座客憶過西湖上虎丘雪霜乗興偶來遊蒼崖古木見僧刹落日㣲波迎畫舟從道前塵都妄想亦逢清境為淹留座中同是東南客試説風煙似彼不初春後園雜樹無行小徑開新陽留客去頻囘梅花著蘂南枝暖桞帶牽絲春事催池面水光如照鏡城頭山色勝登臺長年慵懶遺詩句無奈風煙引興來寄人子雲投閣為竒字君山殺身非䜟書埋獄誰能知匣劔焚城何意禍池魚賜玦應知謝冠佩杖藜自爾就田廬丈夫蓋棺事乃已白髮勿羞樵與漁重次新字韻寄子瞻公擇古來蘇李有三人今復齊名事亦新秀出文華喧右蜀指揮能政接東秦定交笑我將迎拙埀老於君意氣親似向荆山逢珏玉如從渥水就駢驎晁美叔前寄知字韻詩别求予詩既已和前篇因復用前韻作一篇寄晁促軫危絃音最悲傷心那得世人知由來入室升堂者意在高山流水時與子徑為竹林宴到今長記角弓詩文昌近極官清貴不負羔羊及素絲寄熊伯通竄逐衡湘一病翁望鄉愁對祝融峯不同桂管為元帥聞道蒼髯益壯容嶺水分流清注北雪花成片更宜冬丈夫生死論交地書札寧當向我慵原父兄近别入都寄此詩水鄉春盡事何如緑樹隂成榖雨初杯裏尚餘寒食酒城中已賣鱠殘魚近來慵懶非常甚别後嬉游益便疎省事只圖千日醉勞心不讀五車書寄王宗傑謀拙材疎嬾是真豈堪為吏走風塵已知富貴非吾望欲以詩書老此身為問折腰從斗米何如白眼㸔時人聞君高卧辭冠冕多幸佯狂亦有鄰寄張四天下風塵日可歎豈惟西域與南蠻舉世相爭蝸角裏此身無事馬蹄間力耕可以得飽食從仕于今真厚顔相勸休官勿待漏卜居終近虎丘山嘉祐末予始為學官同舍六人後二年間錢醇老為秘閣校理楊之美出判潁州劉隱之姜至之麻仙夫李景真相次為王宮教授曩游無復留者初秋夜直偶書寄楊之美夷路驅車勢易奔青𠖇縱翼自孤騫求為散木甘無用正似靈光幸獨存汗簡老生躋璧府曵裾賢傅遍王門子雲寂寞經同病會待庭枝㸔有孫寄仲馮終南秋雨色如新舊國登臨易思人廢塞池臺餘氣象埋藏金玉見精神三公七相空丘壠萬戸千門盡棘薪安得身隨飛鳥翼相從談笑折西賓寄館中僚舊落帆江浦念睽攜逺迹勾呉不自知䑕穴祇緣銜窶藪屬車空羡載鴟夷黄雲海色迷仙境丹葉秋風感鬢絲為誦延年五君詠敢論平子四愁詩寄刁景純使君歸老意逍遙黒髮蒼眉見後凋自力登山不扶杖等閒留客亦通宵萬松喬木參雲日百頃春苗浸海潮徑欲從公十日飲艶歌清絶舞妖嬈寄胡完夫去國那無鬢髮華白沙猶覺勝長沙晴雲亂眼江楓色宿雨銷魂野菊花過客誰能問名姓加餐自不厭魚蝦海陵倉粟年豐熟吾亦慙為飽煖家寄韓持國承明不許曳朝衫流落江湖黙避讒海氣無時成霧雨魚租終嵗雜腥鹹喜逢晴日聽鳴鶴却倚津亭數去帆可是綘侯輕賈誼自無張禹託蕭咸次韻錢虞部九日樂郊有感前日吟君九日詩名園興盡復傷離浮雲色變曾千古黄菊花開又一時鍾子絶絃誰與聽羊公墮淚不堪悲孤生長抱吹塤感何況池塘昔夢思寄王安國時復官大理寺丞監江寜糧料招隱長吟叢桂詩賜環歡奉璽書歸東郊瘦馬驊騮在南海明珠薏苡非賓客重尋廷尉寺官曹不遠故山薇湏還長孺銀青綬原註韓安國起徒中為梁二千石二千石銀印青綬聊㸔翁思愽士衣原註昌邑太守王生字翁思酬王定國卧讀羣言起欲行壯夫為不負平生上書略數三千牘掉鞅何煩七十城築室曾同老農計寄詩猶見故人情病軀嬾厭金門歩長愧彤廷午漏聲酬晁美叔此身敢與世崢嶸秃髪衰顏太醜生長愧使君心匪石每因佳句贈連城病來筋力惟求卧老去文章不近名酒量消除百無一未嘗酣暢若為酲酬章質夫晚悟頭陀塵不侵何妨居士著朝簪故人自是相忘者秀句依然莫逆心翠柏高松存茂悦潛鱗羈羽任飛沈萬緣起滅空花喻可向空花擬重尋次韻酬韓三相公見寄自昔羊公峴首遊譙渦開府祗千秋案渦水在譙縣西四十八里韋平繼相聞詩禮魯衛提衡絶輩流功與榮名逾響㨗福隨陽報似言酬孤生承乏曾何數玉鉉龍文顧瓦甌原註丞相初登弟先太師方鎮毫州公與弟兄歸覲題名在壁今丞相既登鈞軸而介弟玉汝大中復在樞府酬王平甫黯澹流雲索莫風曉瞻雙闕望蒼龍秋還鷹隼非無意凉入楓槐不變容寓直鬢毛悲騎省讎書編簡待陳農黄花黄葉催時節倩問誰家酒最醲次韻酬孫少述見寄退尺無緣復枉尋信書那免不通今爭評玉價應輸厚能為魚謀豈厭深待得散人如散木敢論機械有機心子荆詩筆與公賦萬事慙君早息隂次韻酬顧子敦見寄丹砂未化不成仙白髪衰容五十年巳自灰心當世事更能回首大夫賢對棊可待矜無敵讀易聊湏記絶編寄語山隂顧元歎人今同病始相憐次韻酬曹極司法越紙題詩寄我來君家八斗定多才冰清玉潤高風舊白雪陽春病眼開長見䕫龍參濬哲不聞徐樂避雄猜自緣衰老無能解戰勝方當去剪萊次韻酬孫少述使節皆窮濁水源降羌係踵慕稱藩强顔假守真無補取笑高人不憚煩豈有天池容斥鷃莫將溝斷比犧樽南山若許堪歸老二頃平田十畝園酬韓相公病卧湘山念所親惟公長記可憐人寄書不啻從容語問舍仍慙消息真半死孤松函徴羽戀軒瘦馬强精神祁奚鮑叔寧欺我三入今㸔總四鄰酬劉宜甫萬價睢盱倚市平百工紛糺待宫成神仙亦有丹臺籍壯士當為猛虎行畢娶幸能同尚子敝衣終不效唐生洞天欲到先能説十二樓前列五城酬王定國五首放逐朝恩本自優衡山猶是古荆州百年生計羞蝸角九品人情㸔馬頭炎瘴還歸君不恙風波别去我離憂柔姬一唱陽關曲獨任剛腸亦淚流豈有多方書五車爾來留意就丹砂誰將飽食倉中鼠换取紅蓮火裏花三顧祇能矜彼善萬鍾多不悟堪嗟蟠桃結實何難俟况值安期棗似瓜貴公孫子族關西失路青𠖇翅羽垂當世朋游皆父行古人方略足肩隨薄材老去歡傾蓋直氣交新喜盡規滿目江山屢回首白雲流水付心期江岸青楓連白蘋片帆如箭射千鈞風煙何處喧墟市簫鼓誰家賽水神鴈鶩陂湖爭就暖杉松廬舍不知貧滯滛何必多離恨譬似生為澤國人願賜支離不肖身幅巾田野任天真我行三逕一㕓地君即東阡南陌人晏卧自輕車結駟食薇從使甑生塵漳濱卓犖桓公健盛德由來必有鄰承天寺翠景亭一山篁竹間松杉伏虎猶存居士庵鐘磬有時聞絶壁漁樵將晩㑹平潭薄雲未觧成春雨返照偏能破夕嵐我所思人桂林外憑高惆悵贈雙南松有喬林桂有叢石梯苔壁興無窮快心疊嶂雲如掃會意澄波日正中修竹緣崖高竦竦早梅飄雪細瓏瓏狂吟大呌青𠖇外驚㸔漁郎下釣筒遣懷六年長病每愁予末疾風滛豈易除彳亍何曾暫忘屨拮据空恨不能書苦遭白髪無他術常得中醫亦自如欲向明廷乞骸骨角巾藜仗整柴車種竹重寄子瞻官曹何獨異吾廬修竹成林手種初未必七賢皆縱逸因從三昧得無餘風聲似水還成韻日影填金尚覺疎舊事喜君能記憶興來當復埽牆書周橦兄弟得解寄王敎援察推今秋鄉里薦賢書年少周郎智有餘全得鳯毛增意氣正聨鴻翼上空虚汝南月旦評無愧諸老先生謝不如衰白慙居丈人行長風猶欲助吹嘘濟隂縣新成官廨贈知縣著作䑕牙雀角穿垣屋墨綬銅章愧吏民製錦可無容膝地戴星親作執柯人奮飛翬雉簷雙翼積疊魚龍瓦萬鱗若比治蒲増四善種花仍欲笑安仁送學正李秀才歸蜀金馬書來信不違相如獨授七經歸郡迎徐孺知懸榻家望蘇秦想下機峽底奔雷江亂湧嶺頭如雨石交飛丙魚郫酒歡閭里悔殺京塵化素衣清門清門早日素風傳正在圖書翰墨間惠子應輸五車富相如才授七經還朱欄碧瓦森華屋喬木浮雲滿舊山渥水丹丘逺千里鳯雛神驥落人寰蜀山漠漠水溶溶高閣經營得我公萬軸鈆黄無脱簡千尋清白有遺風地留神苑逍遙外天占仙壺縹緲中公是蓬萊真學士故應乗此問鴻䝉西省種竹偶書呈同省諸公并寄鄧蘇二翰林五月十三竹迷日今年仍自晏隂初分將池籞千竿翠就得楓槐一雨餘紅葉蒼苔相映帶南榮北戸頓蕭疎欲為林下諸君詠便是濤戎亦盡書長安城南三百離宫何處尋秦山相向晝隂隂城南地去天尺五杜曲田皆畝一金源發清泉隨種稻穭生脩竹自成林老年欲為五陵客射獵往來長縱心送陳成伯出牧陜府陳公六十丐朱輪豪氣誰憐亦為貧原上鶺鴿深涕淚櫪間騏驥發精神山違折坂皆夷路河透釃渠即要津千嵗海棠死鐡色因君光彩㑹如新次韻蘇子瞻觀范景仁新樂大儒高論本升堂物外光隂更不忙樂預請觀同季子書雖未見屬黄香正聲仍許三人和古尺應無一黍長鶴舞鳯儀時莫識勾陳武帳省中央觀范公樂有感蜀公精思古人為論樂成書八十時那有伯牙為聽者空令一足尚傳疑羊山鉅黍知無用牛鐸遺音自不欺便欲祠君從樂祖出門陳迹奈深悲贈黄知錄此身覊宦閉門居里巷蕭條到客疎道舊瀟湘與誰可無雙江夏即君歟塢中吹笛無畱事悵望何人得異書翠羽明珠生海潏更知名下不應虛題朱陵閣蒼煙漠漠石粼粼坐倚山顛瞰水濱開闔波濤専閲世春秋風月不愁人未知孤鳥歸飛意聊問長松老大身信有朱陵仙府在玉樓珠殿闕為銀歩瀛閣方塘十畝水幽幽魚自潛深鳥自浮為有風光陶永日故題亭榭擬滄洲旋移修竹㸔停雪未落垂楊正奈秋客到便留同一醉山公不問習池遊水閣雨中雨濯苔衣水鏡明風搖荷扇露珠傾空堂送暑蕭蕭意高樹吟秋惻惻聲笑以稻梁邀鶴舞莫將鐘鼓使魚驚烟雲岑寂埃塵絶頗愛孤舟盡日横中秋望月中秋自昔賞金波爽氣初凝暑頓過風雨定時㸔有數樓臺高處得偏多正憐白髪宜相照不為衰顏惜暫酡願假長繩留玉望舒能與倩夸娥同諸公登秘閣複閣横雲不易豋宮烟漠漠栁層層始知竒獸名天禄徧見羣書蠧羽陵此去杳𠖇無幾許向來游集類多能秋風撩亂吹蓬鬢老愧諸公話得朋東園新種雜樹青苔翠竹吾人好穿徑誅茅野老家豈為素封増橘樹還知避世種桃花會因叢桂留騷客却憶安榴逐漢槎巳有風光催物色定甘羈旅待年華題深甫新種樹壽張樹梓待成器方朔種桃因著花古人既信十年計野老今知五桞家幽鳥鳴春能信宿翠隂向暑會交加甘棠不忘角弓賦與子相好情無涯長城逢周鼎田家秋收朝不歸客子到門休馬蹄偶倩樵兒逺相問倐乗黄犢仍有携白頭蕭颯映紗帽薄酒清泠將臛雞幽興每於山野盡為君一醉判如泥臘月十九日雨後當年過臘雪猶繁澤國春光已可憐初怪醉魂迷甲子稍知客路斷山川栁條着雨㸔成緑花蘂融氷乍欲燃避地早辭車馬迹杖藜猶有里中賢冬至偶作郡南百里即羣舒留滯頻驚嵗月除閒過著慵思運甓老來多忘却抄書水鄉鳴鴈寒無數山路幽芳冷自如書坐偏知日南極十分紅影在吾廬國子監御書閣觀雨同張主簿閣外凉風得凭欄隂晴相望一城間過雲快雨噴濃墨收水長虹墮缺環斜直樓臺經灑濯空無燕雀自飛還聖朝百吏都勤事原註漢詔有勤事吏優借儒官到老閒重題間字韻棟宇雲生覆畫欄御風身在杳𠖇間露頭不覺吹烏㡌熱手猶須握冷環欲斷嘶蟬仍自續倦飛孤鳥亦知還君㸔老驥驚秋意日暮凉生十二閑雲水雲水東南萬里來宦情羇思兩悠哉舊交備禮矜垂老晚輩多端謗不材匠石頗知幾死木火爐容有復然灰過梅收潦秋風起待得鴻飛燕子囘和王仲至錢塘胥山樓閣半空虛春雨秋風興有餘溪女載花浮水艦潮兒戴火棹雷車君尋故事應如夢我得新詩欲信書正是霜天向搖落拂衣猶自及鱸魚賀王丞相賜玉帯㨗書吉語報安西辨色彤廷喜氣齊蕭相論功非汗馬晉公成事有通犀尚方製作皆金玉委佩光華想虹蜺欲問九環加賜衮何如判白授封圭鳯凰臺江水中分白鷺飛鍾山秀出衆山微鳯凰去後高臺在麋鹿遊來舊國非萬里孤帆長在目夕陽游子憺忘歸六朝人物都荒草但有寒潮信不違郡齋即事鶴髪霜髯新復新為郎補吏兩因循爭先不及三千客顧後猶容五十人絶學捐書從佚老曲肱飲水會忘貧江湖極目連天白照影知無纓上塵與宋次道舍人同在殿中覆考進士次道子姪同就御試贈次道二首池上君今得鳯毛階庭蘭玉見兒曹横參氣象開衡石丹桂芬香近赭袍冀北羣空經相馬海濵人去復連鼇西毫里第烏衣巷賀客無辭應接勞不恨郎潛有二毛喜從仙禁接官曹重吟紫殿森珠網縱觀諸郎奪錦袍汗血來時皆驥子神仙不動倚靈鼇明堂梁棟掄材盡世上那知伐斵勞燕子來馬上作馬上春寒透客衣半晴天氣燕飛飛不知社日明朝是轉憶吾廬共爾歸風外輕輕雙翼疾沙邊款款數聲㣲畏人自習人間世何事江鷗浪見機酬章朝散本無材畫備驅馳豈有文章結主知廟鼎陳前羞瓠落井泉方潔懼缾羸晚交賢傑真難得辱在泥塗祗自嗤澧有芳蘭沅有茝夢魂無日不相思原註楚辭云沅有茝兮澧有蘭思公子兮未敢言事無機變即無疑此意唯當靜者知末路風波成失所嵗寒霜雪正同時勞生毫髮差千里醉眼須臾已萬期江上鯉魚天上鴈寄書嫌少不嫌遲出汜水關洛河嚴鼓夜方中上馬西郊滿面風照野月華鋪水白轉山銀燭列星紅視祠太一觀爟火從獵長楊賦射熊壯觀已隨陵谷變龍旌搖颺倚秋空齊州史君學士有游山詩學官諸生咸和史君又有詩二章贈之以刻石摹本示予因次韻辨如流輠解連環稷下諸生大小山幕府名聲收藉甚雲泉氣味屬偷閒茂林深壑逢迎際細草穠花次序間值有羽人招隱士想君乗興不知還終日塵勞駷轡還乍臨清濟㸔羣山飛來獨鶴應知倦過去長雲本自閒開國東西誇十二待賢季孟哂中間吟君詩句心蕭散舊觀神明覺頓還還王平甫秀才詩稿王子能詩古不如壯心豪氣未應除百年總付人間世一腹都容天下書白雪關山來騕褭緑萍池沼秀芙渠窮愁已作無聞老相愧臨濠一問漁見蘇子瞻所作小詩因寄千里相思無見期喜聞樂府短長詩靈均此秘未曾覩郢客探高空自欺不怪少年為狡獪定應師法授㣲辭呉娃齊女聲如玉遙想明眸嚬黛時得奉世寄詩江城花柳復殘春每上高樓望所親身滯蠻舒誰與語書來子弟爾成人老侵鬚鬢莖莖白情在篇章字字新幸有竹林堪縱傲罷官真作自由身偶題人間變化亦何常不在他生與彼方病後公羊哀作虎顧時司馬懿為狼龍眠頓長參天木龜老猶搘病叟床又有此曹惟奈久非干天地日偏長次韻和通判庫部會棊三百縱横事不平古今仙俗判昏明已居勝勢誰前敵獨暗機先誤必爭寥落寒星天欲曉稀疎過雁雨初晴南陽畫諾庭無訟正賴君詩得此聲叔父寄李氏庶子泉銘翠壁清泉庶子銘文工境絶兩知名埋藏雲外山神䕶流落人間俗眼驚恨不陪遊如阮籍逺憐模寫到蠻荆古書豈獨記名姓自恐疎慵學不成彭城集巻十五
