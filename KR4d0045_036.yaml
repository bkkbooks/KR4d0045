body:
  text: 彭城集卷三十六宋劉攽撰神道碑宋故中大夫守光祿卿分司西京上柱國河東郡開國侯食邑一千三百户賜紫金魚袋薛公神道碑公諱顔字彥回姓薛氏河東萬泉人曾祖憲唐昭應縣令祖筠裕州别駕别駕初以明經舉于時劉繼元盜有河東太宗親征圍太原别駕君踰城歸國天子嘉之置之丹州後以公貴贈吏部侍郎案文詮次不及其父疑有闕公初學禮以明二禮從鄉貢一舉中第為試祕書省校書郎嘉州司户參軍官滿入見太宗有所詔問應對稱㫖擢拜將作監丞監華州酒稅籍田覃恩遷著作佐郎知河南府伊闕縣府薦以為知銘參軍事受詔案視䕫峽二十五州刑獄疏滌沈繫讞理撓屈逺人悅之還朝遷太子左贊善大夫出知雲安軍章聖皇帝即位遷殿中丞徙渝州閬州轉國子博士政事寬簡吏民便安詔書褒美之王均盜亂益州其黨奄至閬中州久不為攻戰備士卒皆不知兵公乃遣吏以禍福諭賊賊為引去天子以璽書奬勞會丁內憂既除服授三司鹽鐵判官河北屯軍日久軍食馬芻費用益廣三司求自用所知材幹人經畫督趣有詔許之公行頃之邉備贍足遷為尚書虞部員外郎䕫峽路轉運使開倉賑廪饑人間出已錢為粥飯以繼之人得以接新無餓者復䕫州于舊城民皆去險厄就平地居連受詔書嘉奬陳進寇暴廣南命公同勾當東西兩路轉運司事賊平遷金部員外郎充河東路轉運使賜紫衣金魚官市糴糧草取鹽礬髙其估以強民民益厭苦之公始奏平其直人至于今賴焉天子祀后土汾隂徙公為陜西轉運使遷司封員外郎大駕所次六師百官浩穰成都公供給如法而辦祀事畢超遷度支郎中河中府駕河為浮橋每嵗大水輒為橋患沒中灘則連舟為絶公受詔計議缺西北岸為支渠以泄怒水因以溉旁舄鹵地皆為良田橋用無患者久之其後議者謂河決溢自此渠始遂窒塞渠前此二年水盛至中灘橋無遺餘人皆思公不已公興利除害所以施當時而濟後世平居或莫見其迹及有所改移隳廢失舊然後知公初議為是類如此橋云公自陜西徙河北遷司封郎中徙知河陽更揚州杭州將築捍江堤以禦濤水遷公太僕少卿知杭州商工屬役詔與轉運副使王贄同之堤既完立而州治亦無事民訟益稀少數以獄空聞上遷光祿少卿知徐州改少府監知江寧府拜右諫議大夫知河南府兼西京留守司事仁宗即位遷給事中徙南京未幾自請治偏郡遂徙耀州縣人李氏豪富無賴為盜賊囊槖聚集惡少年數十百人相與為社號曰沒命民有吉凶聚㑹即羣往責其飲食倨坐席端意氣自若醉飽乃去得㑹人語言與巳忤則乘氣呼歡忿爭推次一人裝如死囚就刑狀極力死鬭殺傷人捕得獨以一身兼牣衆人罪邑里患而畏之無如之何則相與迎客善視之前後且十年人無敢言者公知之遣吏捕李氏窮治㑹大赦公不肯釋以事上聞詔減死一等流海島其支黨皆黥為兵郡人以寧二年公以老自請授光祿卿分司西京天聖三年七月十五日終於家年七十三夫人張氏安氏皆早死再娶安氏封武威郡君生男一人曰寅終衛尉寺丞女子四人長嫁殿中丞許怡次嫁大理寺丞陳藴古最幼嫁司勳郎中陳榮古其一早死孫三人同為華州渭南縣主簿其次曰周曰向公以天聖七年十月二十四日葬京兆府萬年縣龍首鄉靖恭里子孫因家於京兆後三十七嵗周為駕部員外郎致仕向為主客郎中陜西轉運副使兄弟皆材敏有聲當世駕部君夷曠恬謐遂以中嵗謝事不仕而主客君尤達於吏道精心慎事繼以不懈其在陜西創法興利通鹽之饒益市蕃馬馬之來者充足國用皆豫善價而省費以千萬數朝廷倚用士大夫皆稱之曰光祿卿之風節信可謂有後矣他日兩君以書告曰王父事迹著於三朝天子未嘗不褒顯而稱道之嵗久墓碑不立惟不肖不能明白有善而不知懼為祖考羞謹使郡人河東路提㸃刑獄都官郎中母沆狀其官閥事業願有録也以期不朽豫既次叙其語乃為銘曰薛受始封奚仲車正湯歸大坰左相作命厯夏逮商爰洎有周長滕齒任見於春秋我稱其人亦曰有以惟世有賢樂道其始光祿之初禮樂實明資以為政赫其有聲天子汝嘉賜之璽書匪徒有言亟拜亟除其進靡退其施靡悔惟其全能適與世㑹乃躋諫臣遂給事中歸老以卿分司洛宫公子不遂其久而振慶善攸鍾乃付厥孫公葬萬年三十七嵗宰木森然肇新隆碣祖善弗忘惟孫子賢作銘維何以著紹先墓表尚書駕部員外郎曹君墓表君姓曹氏名憲字正叔其先趙人君少通三禮未冠學者從之常數十性溫厚疏財尚氣節材武善射嘗行道遇盜却張弓誓之植梃路旁叱盜視我一發仆梃羣盜驚走契丹犯邉至趙郡君自田間載榖粟入保郡城虜衆攻之君轉戰行間丁壯多傷君棄穀粟載傷者遂皆免咸平三年以三禮舉中第調大名府宗安縣主簿父憂去終喪調正定府司法更德州安德主簿開州開江令蜀人疾病不知醫藥療治祠鬼神求佑助而已君為出私錢市藥劑有病者輒遣吏烹煎臨飲之民初強從既稍有瘳全活者十七八於是開人始知信醫藥云真宗皇帝擇選人可為職事官者君應選擇為澶州觀察推官其治以廉幹聞監司交薦之拜大理寺丞監冀州清酒課最遷太子中舍知祁州鼓城縣事改殿中丞母憂去廬於墓側負土為墳手植松梓服闋知正定府真定縣事君從弟利用為樞密使兼侍中侍權當朝將行君為侍中言思止足計不能用君至真定二年侍中竟以罪貶君亦坐左遷監黃州團風鎮稅侍中思君言未嘗不泣下先侍中貴盛時親故多藉其勢以得寵榮及其竄逐衆知其寃莫有言者君獨數上書為之辨雪人以是稱之明道初君復官知筠州新昌縣事遷國子博士泛恩改尚書虞部員外郎通判陳州事轉比部徙鄂州遂以駕部員外郎致仕居於宛丘凡九年以夀終享年八十六先一嵗自卜墓地於宛丘縣友於鄉潘仁里葬焉君兩娶皆孫氏後夫人封夀光縣君進封樂安四男子長曰冲舉進士早卒次曰振今為比部員外郎通判亳州次曰抗亦舉進士次曰握以子貴纍贈刑部侍郎夫人封萬年縣太君祖諱貴左侍禁父諱珣太子中允贈職方郎中始君之二陳州政事見紀于民至今稱之而子孫遂為陳人比部君欲振揭遺美表而銘之使鄉人過而知加禮至於後世不忘也亟使來請乃為銘曰曹君官陳民頌其美君亦愛之去其鄉里告老來歸遂為陳人實有田廬處其子孫眉夀永年致政逮久爰歸其藏曰君所有惟君可紀民所能識勒銘表功載之來裔林氏母黃氏夫人墓表林氏有賢母曰黃夫人涇縣主簿編校集賢院書籍希之祖母也太常博士集賢校理槩之母也屯田郎諱某之妻也夫人家世福清人與林氏同縣夫人之歸舅姑皆亡恙又逮事祖姑夫人致養三人者勤身從事柔順聽服生竭其力沒盡其哀訓諸娣朝夕無怠宗族稱之曰孝婦夫人從夫仕宦登朝纍封嘉興天長二縣君其子以文學成名復顯於朝既子夭死夫人無他男未幾夫復病終諸孫藐然林氏殆將絶夫人悲哀戚憂以禮自衛綱紀其門戶屹然不替州閭號之曰烈妻夫人葬兩世於吳郡㩦諸孫客居於吳旁無支親授助粗衣惡食豪捃氂蓄以至於有田畝屋廬耕穫休息以供祭祀而待寒暑備饑乏者胥如志也訓誨諸孫以嚴濟慈不十年間為進士而成名以祿為養者四人士大夫於是傳為賢母云自夫人以十八嫁歸若干年林氏盛衰三變繄夫人是賴其所成就詩史所稱不能過也治平四年夫人年七十七正月癸丑沒於京師涇縣持其喪還吳祔葬祖墓立石以為表請銘於彭城劉某於是敘所聞而記之涇縣執書泣曰昔希髙祖妣夫人所逮事祖姑也年九十三將終以鬄與夫人曰此吾髮所為也憐爾勤孝以是畀汝且無忘我夫人服之五十餘年及曾祖祖妣年皆八十餘樂其鄉里不願離也故祖父三為南州從事且二十年夫人助其孝養一飱未嘗不躬饎㸑先人始能學夜誦書不休夫人自起滅燈既而曰吾憐之乃當成其志自是夜輒治絲枲其旁其始居吳門庭謹甚里巷外事邈然若無聞嵗久吳人服而化之希始為福州懷安縣主簿迎太夫人南歸夫人召內外宗族盡散其裝齎周賜豫之曰吾老矣以是為決為衣兩襲曰吾死以是殮過是不復侈長一物夫人始終林氏上下六世見曾孫焉其所以維持左右莫不有常法度夫子之言之也希心戚戚焉意之至者語必重復故希願有所益也豫曰諾著以為後說則前語因明白矣夫人考諱某王氏據閩時以為著作佐郎不從及吳越以福州歸天子詔遣使者發閩士人歸京緬皇考與林氏曾祖俱逃山谷聞天下既平兩家始還歸而通㛰姻夫人之孫某為某官某為某官某為某官某舉進士并涇縣為六人某曽孫若干人其葬實某月日甲子銘曰夫人稱孝子于姑氏後其所慈維曽孫子有棘有否復振復起六世一身身終有喜喜也無憾黃髮兒齒孝孫孔多宜爾世祀林氏葬吳從龜從筮夫人命之合祔于此彭城集卷三十六
