body:
  text: 彭城集卷二十六宋劉攽撰表知襄州謝上表案攽以吳居厚之譖監衡州鹽倉哲宗初起知襄州故篇首云脫身謫籍也脫身謫籍緤組近藩仰荷恩華不任感懼臣早者濫承人乏出假使車材非所長力不自料黽勉嵗月孤負選掄是所謂斗筲之才何暇論繩墨之外然惟利術至廣巧者有餘果聞係踵之後人略取析豪之上策涇以渭濁故常畏于後生李代桃僵竊自悲于薄命遽辱黜幽之典賓由既往之愆浮舟江湖託身瘴癘無復自新之望長懷永棄之憂不謂明詔發中湛恩逮下俾復乘軒之寵仍加分虎之榮情同更生感惟出涕此蓋伏遇皇帝陛下離明廣照乾度并容紹定之初方勤心于陟降思量之際亦代匱于細微以是孱愚行從甄敘謹當勉求民瘼恪佩官針犬馬之心以勞力故能有養桑榆之景雖巳老尚冀無渝知亳州謝上表齒髮衰暮藩鎮會繁據非所安榮以為懼昔者聖門髙弟方六七十則所願為漢室諸儒至二千石謂之達宦蓋量力審已雖小那實曰才難逢辰慕君在有道不容徼幸此所以前哲言志區區其若彼後賢受祿振振焉在兹況如愚臣本緣末學粵塵仕路不棄昌時暨忝左符遂更三郡曹為近輔非復自檜之譏魯并泰山仍有變齊之舊至于渦譙名壤淮楚近郊猶龍之所誕生真聖是焉臨幸大朝景亳兼湯武之上儀迎年執期格帝鴻之純貺民俗既富官守維嚴豈伊戇愚猥叨寄任邈逾涯分高視曩先密焉自思仍有餘寵獸鞶換舊僅踰期月之淹凖旆越疆才陪宿舂之費此蓋伏遇皇帝陛下聖神妙萬睿智極深廓久照于容光溥太和于播物流行彚品默化陶鈞致是小材預膺榮遇謹當布宣詔旨盡瘁官針為身愚謀雖冀不殆于知止報國本願尚當謝生于自然誓殞百身勿渝一志知克州謝上表臣比自權京東路轉運使奉敕就差知克州上還節傳退就藩垣地惟督府之崇任亦連城之寄蒙被恩寵增集戰兢臣孤生蕞軀朴學無術際逢昌旦聨置周行繆充詞館之華濫竊使車之選力小量重功最無聞福過災生道家先誡夙夜恐懼心口思惟豈曰偏州實妨賢路亦既逾嵗深曠天工聖朝明于知人義無棄物及疵瑕之未露加埏埴于至和錫以左符畀之便郡極臣所願望不及兹使臣自謀誠不出此靦顔拜賜撫巳增榮此蓋伏遇皇帝陛下鴻造無私上仁兼愛運陶鈞于獨化正性命于有生致是孱虛得偕儕類謹當宣布詔旨詢察輿情究心農畝之艱盡力期會之事畢犬馬之賤志逮桑榆之末光為韓七南雄州謝上表長人之選明詔所先雖曰小邦實惟重寄伏以聖朝聲教攸暨書軌大同爰自三代荒服之區九譯象胥之域琛賮充牣不減諸華冠蓋相望譬若內郡蓋太和所濟天無風雨之憂而鴻化誕敷人習詩書之教且郡縣之治法令俱存勤于奉宣則當恥格伏念臣早緣世祿得預朝紳顛暝從政之方窺竊巳成之事寢以纍日偶逃曠官遽叨分定之榮驟玷專城之任雖復五嶺遐徼百越雜居如前所云在臣率甚此蓋伏遇皇帝陛下上仁兼覆鴻造曲成試可臣工不間毫毛之善埀意民俗用無內外之辭夫何謭材乃臣煩使敢不夙夜無曠悃愊自持并容獄市之間期于弗擾儻使吏民之論謂為不煩以是涓塵上酬生育為王駕部汝州謝上表文昌承乏久分于郎潛右輔長人濫叨于符竹材謭任重貪浮寵優抃懼交懷怔營無措臣聞刺史之任稱曰二天漢帝有言與吾共理誠以提封千里之廣生齒萬族之繁自非精敏足以察輿情慎密足以奉明詔莊以蒞衆惠而愛人則將大虞負乘之羞小有敗材之謗伏念臣氣惟呰窳智實迂疏學不優于治身資弗冝于逢世襲箕裘之素業承帶礪之餘勳賴何參之功慶流苖裔愧成宣之後老為大夫因纍日之微勞預立朝之下列自揣涯分常憂疾顛何況畀之千騎之居假以連城之寵鵜翼貽刺鉛刀弗任臣猶自知衆亦難掩此蓋伏遇皇帝陛下至德天覆神化時行極帝堯知人之難柄周氏馭臣之術轅直輪曲皆盡其所能大法小亷訖無逾于量致兹孱弱亦荷甄庸敢不飲氷自修佩韋申戒勞徠不怠將冝民之庶幾悃愊無華固誓心之有素冀兹塵露少答乾坤為韓龍圖汝州謝上表犬馬力微非敢勞侍從之事民社寄重尚復預陶冶之私秪服恩榮不任畏懼伏念臣才非出羣學不盡性本無心于通物誤見器于晚成越從書林承乏宫邸荷先聖之殊遇如望府之具膽凡有選掄輒逾等比暨屬明兩正統乘飛御天仍以舊恩荐加豐秩臣聞匹士感發尚報德于一飱市道夸謾或相期于刎頸况臣夙昔蒙被駢蕃寵光惟極愚忠庶裨萬一勤未補拙何心術之易殫病不期衰而耄及之已甚退自循度勢難激昂與其非據而妨賢豈若量力而就職猶庶幾忠臣之分誓不踐素飱之譏需章聞天睿眷從欲委以連城之任遂其易地之求挾銀黃而過家分虎竹而按俗顧惟涼薄何以克堪此蓋伏遇皇帝陛下乾綱粹精天地溥博極輪轅之用皆究所冝收簪履之微更隆求舊惟是蕞邑號稱陪京民朴訟稀地薄賦簡盡心從事則詔條具存竭力劭農而天時可望既庶而富謂粗可以足民蓋均無貧儻不使之困役于以報國幸逃曠官為大卿某廬州謝表疲瘵無似居懷犬馬之心恩榮驟加如叨民社之寄伏念臣早繇世祿獲置周行文無濟美之稱才乏克家之譽尚賴貽訓粗知立身驅馳歷年髮有二色因緣薄效位至九卿寵實逾涯器成有極乃者桂林闕守明詔推恩夫何懦姿猥當遴選進預七臣之列出分千騎之居負乘為憂但自虞于致冦內熱生釁殆弗堪乎飲氷然惟義重于身盡瘁無二命之所處雖殞猶生故乃瞻瘴癘而如歸敢以蒙霧露而為解豈意天慈周物皇明燭幽矜支離之弗堪全濩落于無用遷秩外監還上左符事不辭難既未獲于愚志爵或虛受亦深畏于多言輒復需章期于從欲睿旨俞可舊物米還幸歸卧于里閭長無望于軒陛然而太和所濟勿藥有瘳復勝帶裳獲齒班列秩祿甚厚敢晏安以尸榮筋力雖衰猶庶幾乎執御竊希小邑寡民之地得施劭農聽訟之方敢期求舊之恩遂委連城之寵矧復荆舒奧壤江湖上遊比屋會繁五民雜有連嵗豐稔兩造用希循詔條以布宣司旦暮而無事徼幸巳甚慙靦若何此蓋伏遇皇帝陛下天德出寧陶鈞獨化隆翕受敷施之美故俊乂盈廷崇淵泉溥博之功而跂喙咸若顧茲蕞品仰荷曲成敢不愚忠是修勤拙相補豈弟宣民之效雖曰未能中和樂職之風庶云有及為馮當世辭并州表詩禮謀帥曽不問于瑣材文墨為功顧何堪于閫寄尚懷淺志仰訴所天伏念臣智不出羣材非經逺乏文武兼資之術無縱橫應敵之方使其侍槖禁林效職都輦應對顧問補拾闕遺尚慮空官以速刑典豈期假以中權之任付之全晉之區驟升書殿之榮仍綴金華之業連城十數冒寵一時據非所安愧不可處況臣以支離之質出于凶閔之餘悲憂甫除心目多懼思慮以之而眊亂謀畫不及于深長何以外振國威內嚴師律臣非所惜人實謂何伏望皇帝陛下俯鑒愚衷曲回睿眷察其知分無濫以天秩之榮許以量材則免其邊圉之任詢之輿議誰曰不然慺慺血誠叩叩于是第二表臣近以過竊光寵亟上封章乞還繆恩用息衆論蟭螟之響誠不足以聞天雨露之私儻遂艱于反汙復罄由衷之懇以干留令之誅臣聞力既極者加重則貽顛覆之憂心之危者深慮則有眩眊之患今臣無超特之智叨侍從之榮以其所材適可近用乃復分兵閫之重寄疆戎索之大權是使臣綿力無餘重任不已也今臣更創巨之戚懷過用之悲疲病僅除神觀未復而使深謀三更之事折衝千里之都是使臣孤心愈危積慮愈困也如此則安得無顛覆之咎安得脫眩眊之虞職臣無堪為國生患敢不自竭悃愊冀蒙憫憐伏望皇帝陛下埀大明以燭幽恢鴻造而成物不逺期以誅不至不求備以強不能特寢需章俯安悸魄犬馬之報猶足用于代勞蒲柳之姿終弗忘于盡瘁為韓侍郎辭參知政事表伏奉制命授臣依前尚書吏部侍郎參知政事者試職無效已曠責于幄謀圖任方隆復與聞于國論非惟震光華之寵大懼弗勝抑且懷悃愊之誠即嘗自列敢罄狷志冀回謬恩伏念臣幼無逺韻幸習素風昔當能仕之年親沭過庭之訓教之忠者其誨篤矣守以約者抑有説焉嘗謂委質策名雖以竭盡為效至其量力度德亦將過溢是憂豈其馳驅永塗徘徊暮節當以耳順之嵗決從父老之遊臣奉以周旋不敢失墜頃者屢遘清間之宴每陳耿介之心以臣位列樞機事存體貌為國全退人之禮為已成裕父之私竊用深謀仍效短見雖其犬馬暮齒桑榆末光前至耆指之年尚有期月之頃誠願賜罷機近備員冗官稍就息肩之方亦為去事之漸而後拜上章綬歸守松楸于時幸沐天慈俯鑒丹懇方且備形需奏求獲初心何圖明詔發中豐恩逾望驟陟二公之列猥參和鼎之司聞命載驚歷躬無所且臣始以承先臣之教睎長者之風不敢倍死而忘先不慕安祿而耽罷何乃曩言未效班寵復加質之常情實所甚愧聽于輿論其將謂何伏望皇帝陛下昭監自天從欲成物矜其朴直皆肝膈之盡言閔以衰羸極乾坤之厚賜許還新命俾踐曩懷謝參知政事表天光下濟不求備于微軀師尹具瞻輒拜嘉于成命遜避無所戰兢叵量伏以大功之朝雖曲士得以自效至治之世在小官有與成功蓋上之用人必因其材則下之陳力不失其守矧惟謀議巖廊之上燮調鼎實之和其可付之非賢以纍盛化臣聞望輕鮮智術闊疏幸依日月之光已玷機衡之任贊襄無補耄及自驚居懷曠職之羞敢冀陟明之典豈圖渙汗猥及仍賜甄升班寵雖同更深委遇實周官二公之比有漢卿副相之崇深推負乘若臨冰谷此蓋伏遇皇帝陛下凝神妙萬體道觀元司左契以為先運陶甄而獨化顧諟在服皆不足以仰望清光俯徇輿情凡漸進者其有所試兹以衰恭過忝徽章敢不灑濯寸心激昻壯節思梁棟之任重期置器之必安庶極毫分仰禆萬一謝許令羅適知濟陰縣表準吏部流內銓牒緣臣舉留前知濟陰縣事羅適奉聖旨依奏除天平軍節度推官依舊知濟陰縣事報州知委者需章請命豈無冀于萬分宸監矜愚遂不遺其一得仰承嘉惠俯激懦衷臣叨居長人粗學為政至于先務竊所究心知親民之官不冝于數易求勤事之吏所見亦無多蓋嘗物色廉良假借祿位伏以羅適自臨百里將及一期敷詔條在于恪恭聽獄訟號為簡諒有識詠頌咸謂得古人之風願民服從可以當屬城之最惜其未盡施設遽爾罷歸輒循輿情亟陳囊奏欲緒成其覆簣俾仍歸于故職言非所難巳自蒙于必聽靜或能動將無隔于蓋髙伏蒙皇帝陛下大明燭幽陶鈞獨化求善不捐于纎芥從欲遂至于曲成縻之賓筵還畀銅墨事非前例恩出不訾在微臣之言乃芻蕘不以人廢惟下邑之幸彼桑榆將復晚榮為韓丞相謝生日禮物表恩光下濟無一物之見遺體貌所隆在孤生而逾幸伏念臣智非經國材謝出倫厠近鼎司率由帝力重忠信之祿常自愧于素飱暨劬瘁之辰乃復紆于聖眷綸言喻旨禮賜加優此蓋伏遇皇帝陛下儲思明良均仁覆燾矜犬馬之效是用記其乃生覃雨露之私所以將其厚意捫心思報捐骨是期又眷顧天至記微生之厥初餼賜朋來增素飱之深愧伏念臣備員近輔無補聖時緣位著之既崇惟體貌之加重及此劬勞之感益懷遭遇之榮伏蒙皇帝陛下義廣欽鄰慈均覆下錫底書于出紱列多品而在庭味惟屬饜心實飽德誓捐軀于縻殞期報國于毫分為趙參政謝生日禮物表劬勞之辰不忘于聖眷便蕃之寵濫及于蕞軀拜命若驚泚顔增愧伏念臣預聞國論曠責臺司冒竊位素飱之議有彼已不稱之纍祿賜逾量涓埃莫酬過蒙睿慈每加隆遇念昔門弧之慶生適逢辰畀兹鼎饌之珍禮逾推食餼牽有秩樽豆兼豐仰喻鴻私曷勝厚幸此蓋伏遇皇帝陛下至仁漙博廣愛敷施崇體貌于具僚示率循于舊典顧惟涼薄奚所克堪庶盡瘁于方將期小酬于萬一為韓端明河陽謝上表違禁林之法從預侯屏之守臣戀結宸闈榮兼章報汗顔加泚循已若驚伏念臣早以微材驟躋清貫語仁義者貴際而尺寸見收維故舊之不遺而簮履蒙幸在時等比莫臣擬倫向者幸假偏州常得善他率緣聖將俯遂私懷閔濩落之無庸則深護其所短矜支離之多病而并容于養疴今復付委名藩密邇近輔接二周之餘俗據大河之要津曾無臥治之資曷副分憂之寄內惟尸素實愧遭逢此蓋伏遇皇帝陛下大明燭幽至德兼覆付當羣有則士無滯能録善一毫而世鮮棄物以兹薄陋深玷寵光謹當推行上仁求察民瘼惟詔旨布宣而無壅則德澤漸漬而太和庶以涓微少禆鎔造為趙尚書謝官表伏奉制命授臣吏部尚書觀文殿學士知徐州者避賢鼎輔收餘責于瘝官假節方州蒙上仁于佚老復加寵數敻出等倫承命若驚措躬無所伏念臣智非經國材乏壯猷幸膺圖任之求久濫弼諧之寄曾無涓埃之益以申犬馬之誠遽迫頺齡實漸厚祿亟上引年之請庶遵知止之風敢覬鴻私密加陶冶謂筋力弗逮閔勞以幾務之繁惟體貌所存優假其藩宣之任崇書殿之峻秩長天官之近聯計所冒蒙轉逾涯分此蓋伏遇皇帝陛下仁深求舊道務曲成推行葦之風出于忠厚矜黃髮之士不廢咨詢以是庸虛過叨眷與顧雖朽憊尚知激昻昔馬援有言丈夫貴于益壯而夷吾所戒老者使之無偷竊企二賢之規庶報九天之賜謝官表恩華驟委班寵浸加悃愊惟誠難遂聞天之素戰兢無所獨深致冦之羞竊以天官介卿小宰四命席文昌之右地當巖石之具瞻歷選熙朝皆倚端士豈容昭世而置匪材伏念臣天賦朴忠智慚涼薄早以具臣之職過膺上聖之知回翔斗樞參二鼎實汲深懷大人皆謂其弗堪履薄臨淵日徒增于若厲粵自大明出震孚號格天方四門之廣聰預三卿之授策內訟無補自甘黜幽敢圖睿眷彌深濫恩薦及昔子文逃祿臣以為非適禮之中范宣讓能臣以為識從政之要由是輒攄鄙素仰瀆淵聰鴻造曲成牢讓弗獲拜嘉襲寵泚汗愧顔此蓋伏遇皇帝陛下陟降紹庭遹駿下武圖任其政深惟先帝之知人有言必酬抑使忠臣之盡節用是朽鈍亦叨顯庸敢不夙夜永圖彌綸衮職庶盡致君之願以無假器之憂為韓端明謝除河陽表伏奉制命授臣端明殿學士兼翰林侍讀學士龍圖閣學士知河陽軍州事者詞林慎選驟蒙三錫之榮侯服近封仍預一麾之寄仰銜恩紀俯激懦衷臣早以顓蒙最為遭遇昔蕭生疏外猶曰雅意本朝汲黯戇愚亦冀拾遺禁闥忠臣之義私願悉然豈當身逺宸廷心馳魏闕緣臣犬馬多病蒲柳早衰內苦疕痬居無聊賴重以公鼎之任近屬乃兄私門之榮敻絶當世戒滿盈則有道家之前禁避嫌疑則訪故事而具存是以懇貢愚誠乞從外補皇慈開可微志獲伸尚沐深仁曲加異數兼殿閣之崇秩假虎竹之分符雖辭玉堂之遊仍緒金華之業材非所稱恩實不訾愧淟溢中啓居無措謹當砥礪素守夙夜自公愛君之心無終食而少懈治民之效庶期月而有成以是毫分上酬覆露為韓持國謝知制誥表潤色帝謨巳濫代言之選備員誎列重非補衮之資驟玷豐恩曷勝厚幸臣聞論德定位故􅑆言不敢妄升為官擇人則允釐可使無曠是則名器之慎小大悉同矧惟樞機逺猷鼓舞庶俗渙汗大號沛然流水之源獨化陶鈞速于風霆之運贊畫之重代工實難內則謹四禁之嚴上則詔八枋之二向非智略頴出學殖耆明言之無文行而不逺伏念臣早緣世祿有志儒書資既陋于逢時器弗周于大顧無求而已矣嘗自效者久之聖朝義不棄人裁賜冗職踵英遊于中祕假别乘于小邦旋復曳裾王門執簡史氏智不逮事寵獨逾涯拔擢汙泥超躐倫輩螭坳置墨未終嵗月之勤鳳池演綸俄契雲霄之望內省無似殆將疾顛此蓋伏遇皇帝陛下埀意紹庭永圖能哲兼九德而咸事務衆善而弗遺顧左右前後之臣必皆莊士泊文墨議論之際不遺片長夫何蕞軀適遘昌運謹當浚明自勵正學以言思慮所存不敢越繩墨之外毫髮無隱庶以增日月之光彭城集卷二十六
