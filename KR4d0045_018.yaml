body:
  text: 彭城集卷十八宋劉攽撰七言絶句勤道堂西秦公子樗名里南楚真仙漆種園誰顧世人多大笑偶題勤道志忘言初暑馬上負弩前呼地起塵炎風烈日正隨人暫投茅舍支拳坐却是從前倦客身荆扉茅屋水平流竹簟棊盤局未收無用詢他名與姓忙閒有分不相投臧孫御叔悉名卿飲酒何妨傲雨行未似驅車日當午敢嫌高士笑勞生貝州亂二首軍書羽騎曉紛紛兵起清河一日聞多少衣冠盡塗地憑高依約見妖氛金印他時恩澤侯專城意氣凜生秋軍中成敗如翻水空使明堂旰食憂遊章運判園亭自有林亭不種花總將春色寄鄰家桃紅梅白須尋得暮去朝來不算賖客舍栽花欲為主出門騎馬即天涯何時置得尋常地管領春風屬自家旅館滿月還成破鏡飛流螢清露夜依依弄兒看織無窮樂咫尺嵩雲不得歸原注鮑昭詩云弄兒戲床頭看婦機中織九蘂芙蓉托根不近芙蓉苑移植猶依瘴癘鄉並蘂連心九相似看來還使九回腸九月吉日澗上望芙蓉因尋菊今嵗特晚青蘂未作憮然有懷百芳不奈秋風急唯有芙蓉特拒霜本以南州積炎德一為名誤客殊方寄關西兄弟曉風吹盡淮南雪昨夜汀洲白芷生遙想春光西北去倩傳相憶向秦城閶闔臺原注豫所居在宋門城下城脅有平地可方丈餘去地一丈以上每登之以眺逺近兒童因戲曰閶闔臺看雪望春何處好城腰山腹暫來登人知容足無餘願便是章華與九層紅日駸駸還暗夜輕車去去只微塵老夫獨立聊觀化驚怪往來無限人納凉明教臺臺上井泉氷冷滑城隅川色劔光芒多慙簿領相寬假全得南風一日凉梅雨梅實初黃暮雨深寶刀生鏽鏡昏沈年年卑濕身無病自覺能勝百鍊金隱語三首呈通判庫部梧上生枝復隔年白頭傾蓋兩歡然滿城童子埀髫髮竹馬羊車戲路邊邯鄲度曲盡新聲稚萼韶華稍向榮珠箔曲鈎遮密坐瑤臺靜室伴深行宫栁飛花暗度春斛愁容貯奈傷神曼聲試作雞鳴曲何必陽關無故人新開湖上待潛珠不出偶書戲孫莘老二首貝闕藏珠安在哉九淵深絶若為媒風波可畏且歸去漫道扁舟湖上來合浦因人去不還隋侯未值報恩年欲憑泉客傳微信夜久凉風月滿川入汜水寄仲馮沙起河津迷積霧雲遮晚日怯層山客行正似摴蒱局疊馬來過第二關新燕主人恩厚與相依畫棟危簷晝啓扉豈是有心希鵠鴈衆雛成就即歸飛出都王孫蓮勺鹵中困文叔蕪蔞亭下寒塵俗豈知湖海士敝裘嬴馬出長安致齊太常寺以杖畫地成二首少有閒人訪寂寥薄雲淡日早春朝庭花弄蘂萱生笋時見東風趁柳條杖藤為筆沙為紙閒立庭前試草書無奈春風猶掣肘等閒撩亂入衣裾寧陵陂十里菰蒲百頃陂秋風嫋嫋蕩漣漪旅遊己信江湖逺水國猶將晝夢疑屈鈎結網老農妻鼓楫鳴榔舊牧兒世事誰令山海變可憐機械亦相隨長春花雪霜雨露平分盡舊紫新紅次第開自是餘花芳意薄那知春去不重來次子由韻三首流霞飲過巳忘寒和筆螭坳墨色乾溫室前頭問名木此身知不誤儒冠四朝傳說直臣言萬事多君與輊軒重到彤墀揮翰處想知雲夢一時吞華光勸講想天臨白髮儒先遇主心仍寄史臣揮直筆聖謨文思與幾深泊淮上風波繚繞半天下鬢髮蒼筤一丈夫惆悵江湖向時月又來淮浦照檣烏久旱作問詩問雲何意復歸山應恃無心欲占閒我為閒多忙折我勸雲為雨莫空還問風何意掃雲開本為虞琴喚汝來桑麥青乾天不雨更將何物阜民財問山何意及郊農天欲為霖不見容少閉土囊誅嘯虎也教雲氣得從龍遣悶二首好飲本來身少事徒歌非是曲彌高若能全療詩書癖用底聊均筆硯勞草荒三徑尋常緑樹掩雙扉丈尺高燕語不如鶯語靜蜂飛猶勝蝶飛勞感懷澤雉呼雌日出飛林鴉失子夜深啼勞生未盡無生理外境移心不得齊題館壁壁門金闕倚天開五見宫花落古槐明日扁舟江海去却從雲氣望蓬萊末伏火流漸近桑榆上秋氣新從閶闔來每嵗長安猶暑熱內官相屬賜氷回題湛上人院畫松水墨乍成巖下樹摧殘半隱洞中雲猷公曾住天台寺隂雨猿聲何處聞儒生為儒自分多迂闊已老那能更改張青史異時傳信事不為民賊坐投荒題荆林館深山雨過氣清潤四月居人猶夾衣獨坐空庭看喬木黃鶯語歇繞枝飛西湖獨行畫橋朱閣水東西桞帶花梢聳復低欲上扁舟還借問此中時有晉人迷種梧桐鳯鳥非梧不息隂梧桐非鳯亦無禽種桐階戺有深意欲伴幽人介獨心種花種花栽藥一番新閒繞芳叢到日曛莫笑人情不開豁事曾經手自殷勤湖口阻風風波迂直路何限雲水凄凉秋向高百里淹留還信宿可堪殘日看驚濤長蘆阻風萬頃寒濤浸日車迅風重疊浪成花雲深不辨江靈事時見奔駒走岸沙阻風愁思橫江不易堪惡風終日自西南逐臣那有回天力請謝蜚廉亦未甘寒江常嵗起條風今日檣烏悉向東定有江神欺放逐更添留滯作途窮寄張十二先進多於貧賤隔故交時有死生分數疑吾子更名字將謂平生又失君寄閣下諸同舍春風過盡欲無餘天祿花英玉不如閉戶清臺誰纍汝正應歸舍悉焚書寄丁元珍南海飛鴻北海鳬青冥相望羽翰孤虛弓祗是弦聲急不向雲霄墮九烏蔡州路中作五首寄都下案攽以疾求知蔡州故詩中有病餘清骨鬢成霜之句病餘清骨鬢成霜慚負腰間郡組長等是君恩容卧治淮西何必減淮陽雨濕城南輦路沙歸鞍蹀躞喜還家病軀復作南州守空使離憂兩鬢華南城十里短長亭三月煩君復送行道上埀楊猶可折秋風蕭索不須驚病指拘攣不自如平居畫諾亦躊躇雙魚欲寄諸親故安得陳遵憑几書朱輸駟馬錦障泥郡守官儀足品題自是老身無宿分卧乘籃舁一雞棲寄孫巨源裊裊柔芳淺淺春早梅花白栁條新歸艎去後無來客占得風光不共人居鄰渤澥接江湖閒數春風鴈與鳬乘鴈來歸隻鳬起未應言有復言無東門城壁踐朐山此去蓬萊一望間潛有真仙自來往秦人何用不開關九宫祭畢寄陳五三百六旬齊復齊東城騎馬獨歸來秋風黃葉驚人面徑向君家就酒杯寄金山朝陽巖僧松篁倚石夜露滴樓閣緣巖風鐸高山僧入定晝不起頂上潮音翻海濤寄胡完夫時罷河東提刑知蔡州豫亦罷京東轉運使知兖州懸車束馬太行道取魯并齊七十城今日朝恩俱卧閣故人應得老人情次韻和望嶽亭詩連逢七十二重山芝术潛通小有天自笑何須􅋖者笑未忘軒冕顧金錢望嶽亭前一憑欄秋雲蕭索水光寒北人解道衡山逺此地衡山已背看雪後行小園一尺春泥頻側足半池天水欲清神栁黃梅白貪回首驚起啼鴉雪灑人水仙花早於桃李晚於梅氷雪肌膚姑射來明月寒霜中夜靜素娥青女共徘徊題餞送亭還有栁枝能送客而無桂樹解留人離腸苒苒隨征斾愁絶江南日暮春竹雞慣聽巴山杜鵑哭飽聞湘岸鷓鴣啼濃雲細雨黃昏暮竹外傳呼滑滑泥致齊雨中寄王彥祖倚城喬木半參天雨過交流百道泉始覺太常齊不惡秋風靜裏雨蕭然細草幽花七月天曲溝藂石亂鳴泉齊居三日遺塵事夢寂神凝亦自然曉晴入薦福院日照庭除上下光雪殘喬木碧蒼蒼空無鳥雀隨人語散漫風煙駐佛香雪中羣僚聚飲衰老歡娛總强為興闌蕭索不無悲任教年少相縱樂聽說勝於主席時次韻酬傳欽之風力清和日景遲看花未醉莫言歸殊方長恨故人少白髮那論春事非新雁水生巴峽春始秀葉下洞庭秋已高去鴈來鴻多少日羇人搔首看江濤出長蘆口濤翻鷺羽連天白山疊屏風到海青客路浮生兩如寄萬重波裏一浮萍秋雪過相國寺六花飛舞滿長安古寺樓臺白玉攢長眉老僧見客語兩年秋雪就中寒女貞花巴婦能専利丹穴始皇稱作女懷清此花即是秦臺種赤玉燒枝擅美名小雨烈風呼洶震山林小雨霏微駐薄隂南畝旱苗焦欲死擬將如許號為霖野次麥苗出隴漸漸緑花樹迎風淺淺紅欲就白楊傾一酌竟無人可暫相同聞王深甫下第驊騮厯塊誤顛蹶卞子抱璞空歸來天下何曾識琬琰市人空復尚駑駘送刁節推歸江南此君辟孫並州幕府府罷遂棄官長平幕府可張羅誰見當時賔客多還有任安如砥柱故山歸卧恣頺波中軍高韻拂雲霓世路能將寵辱齊君去可無離合恨不應流涕悵暌攜馮當世湖西口占還舟中却寄落日回船煙水明殘霞黯黯共離情南飛多少江鳬翼好倩檣鳥遍寄聲次韻錢四衰老常嫌帶減圍那堪髀肉厭征騑東山仍有周公夢也恐三年始得歸嶽雲亭四更捧日輪囷勢千里為霖靉靆功但道無心是真意任辭幽石起封中許州西湖觀音像孤絶他山碧海濵天花水月靜無塵客槎不載支機石為見閒遊得度身遊俞氏園亭花外鞦韆栁下門東城近處辟疆園樓頭明月終歸去更為殘陽盡酒尊晝眠薰風四月樹隂合無事高眠晝漏長覺後已疑人世改起看林影上東墻嘲晝眠利名苦厭兹多口朝市那能盡信書一枕凉風雲滿目民謠民訟不關渠芙蓉池風搖羽扇露盈盤卷卷翻翻欲定難醉眼波心歡有遇水仙傾蓋正相看湖口三日湖雲不肯晴四山冥晦與川平繫船汀樹無人語卧聽波濤澒洞聲清溪物色亦消憂風雨何辭有滯留定似湖邊釣魚客一生家事託孤舟本自悠悠物外人每逢山水為情親慙愧湖波淹客棹到官不畏上官嗔送傅推官武仲高材筆不休相逢傾蓋復離憂黃河赤鯉强三尺他日無煩數置郵和丘直講除字韻橫經童子一趨隅擁篲門人為掃除遲暮不知稽古力正憐桑戶欲捐書斫氷詞楚客斫氷行苦難清音愁絶逼人寒憑君與製水仙操傳入湘靈寶瑟彈雨後池上一雨池塘水面平淡磨明鏡照簷楹東風忽起埀楊舞更作荷心萬㸃聲過周修撰池絶景淹留欲斷年曉來氷雪漲池泉盡拈書籍無多子來問東家亦漫然貂裘季子高談萬乘前黃金白璧等虛捐貂裘敝盡風霜苦却憶周南二頃田夜坐獨坐吟詩到四更墻根蟋蟀近床鳴凉風閃閃吹燈滅默坐無言直到明新晴青苔滿地初晴後緑樹無人晝夢餘唯有南風舊相熟徑開門户又翻書朝陽升空天氣新荒郊落葉寒紛紛溪源流潦不可渡知是蜀山前日雲次韻和陳五詠張侍郎小車富貴於人疑疾顛名儒華髮獨蕭然小車何必邱園事不記千秋始姓田履及階除杖及園犢車閒暇過前村老農未喻疏公意應怪虛高駟馬門桂花月中丹桂昔誰栽經嵗光華十二回正似此花多意思一番紅過一番開遊環溪赤日紅塵幾悔來埀楊淥水眼先開踏花酌酒到佳處把釣臨流始此回漾漾溪流碧照天荇絲荷葉小如錢容易白魚時掛網插生幽鷺肯回船向景亭四野川原多秀色非因向著不能知置亭高爽時來望自此風光更屬誰雨後東園雨後重來春更深梅花似雪柳如金青天白日燕雀語杳杳歸鴻風外音蠻請降三首漢軍誅蠻蠻遁走漢使約降蠻稽首天威若日照四海殺人得賊亦何有官軍萬人宿山下百姓避兵多曠野秋來雨足荆棘生鄰里無復歸耕者縣官斬敵豫金帛健兒見賞不見賊聞道殺人多老農至今過客猶悽惻自古自古邊功緣底事多因嬖幸欲封侯不如直與黃金印惜取沙場萬髑髏漢約無功不得侯姦雄惡少善為謀却令驕主輕人命奴僕行師海北頭龍山西城門外龍山路乘興來遊不厭頻後日重陽須一醉青松繫馬菊留人果園巷訪楊寺丞原注果園本高氏遊宴所馬出城門小徑斜廢園故國總堪嗟曲池平盡喬木老舊地分張百姓家考試畢登銓樓春雲濃淡日微光雙闕重門聳建章不上樓來知幾日滿城無算栁梢黃登樓城外園林非一主春風總總為開花遊蜂語燕隨人眼過盡南家與北家陳州雜詠厯說諸侯七十餘絶糧桑落尚歡娛不容而後知君子方笑南冠駕乘駒鄭莊推士古無倫置驛諸郊日日新去病魏公俱改節一生惆悵杜陵人固安功次異蕭陳深怪材官亦致身高卧閉箝天下口不憂聖主責愚臣黃橙寄黃翁江南碧樹映霜秋丹實清香破客愁常恨忌辛消俗口為評蠲憤詫齊州將過孔處士莊聞處士往許昌不果往鹿門隱士肯浪出荷蓧丈人行不逢朝陽晝雨霽復暝香山無路雲重重和原甫謁武信殿紫氣東迎太一峯翠華飛御獵回中𤣥女授符開上䇿河宗獻寶告成功願借前籌敢決疑斡回天地聳當時舊傳太尉條侯䇿今見宣王六月詩望廬山蒼山去郭三十里日暮雲收獨立時應是塵埃能眯眼幾人曾有望山詩次韻和王待制絶句病軀何處識君恩卧治無令四體勤客誦舍人詩句好幾將筆硯一時焚無年何日蘇凋瘵死市空嗟費杖笞舊尹告新應有意若為閒暇得遊嬉蔡雍倒屣貴公子阮籍清談林下游人事差池不如古祗將朱墨繼為州寄韓玉汝待制南雲不到飛狐口朔雪來從纍鴈門仗節仍煩鑿空使乘槎徑取濁河源嫖姚不復顧家為誰謂東山久未歸卷耳幸容携婉孌皇華何啻有光輝秋盡野次丹椒結子菊花黃山路秋高草木香日出雞鳴下喬樹人來犬吠透疏篁湖水彌天未覺秋暫辭鞍馬寄扁舟菰蒲無禁魚無稅誰似溪翁得自由彭城集卷十八
