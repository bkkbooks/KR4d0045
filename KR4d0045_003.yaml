body:
  text: 彭城集卷三宋劉攽撰五言古詩擬古六首南轅適郢都日與冥山背重生與徇名夙昔不相待藜羮采薇蕨芰製蘭為佩遊樂天地間安知一身外麒麟鬭大荒日食星見沫夷齊餓西山咨嗟爾胡罪澤陂生芙蕖映此蒲與荷彼美不可逄憂心涕滂沱行樂在及時株林起酣歌歡宴未渠央國門擁干戈巫臣視不悟室家嬰禍羅謀已既不忠孰能為君多趙王飛龍駕翺翔羾天關塵土暫反顧金玉髙如山自喻固適志超遙亡愧顔安知馬服子軍破不得還前亡四十萬後復圍邯鄲虛盈固天理循環乃無端覺寐已不殊何況百歲間嗟嗟道傍子萬金非所安秦昭登西山慕與火帝游頽林刋喬木詔世為博籌富貴良未厭夸謾豈知尤投龜詬蒼蒼楚靈輕九州塗窮乾溪旁衆散不可留徘徊餓山澤覺失涓人疇新王固有命玉衣被纍囚嵯峨三神山浩蕩仙聖游金臺冠絶景玉果垂千秋龍伯日已侵巨鼇幸無憂波濤各一隅但見雲氣浮跂豫望可及隱約清淺流大帆交問津長風輒回舟不怨道路邅所悲到無由世主自甘心仙者非有求老萊隱窮楚因與時世隔暮歸怪車轍夜起避山澤若人不可見況肯低顔色安知叢臺下一旦三千客西邉竟不還嗟哉少良畫讀黃寺丞十月十三日寄原甫詩因同作寒日流短明凉風起秋色嗷嗷鴈晨翔悄悄蛩夜織節物悲旅人天地亦行客心事已如翁但知頭未白黃公青雲氣疇昔振六翮成紀獨不侯長沙嘗逺謫賣瓜青門外種豆南山側浩歌寫窮愁我預聞損益外事來無涯開口笑不得惟當林下遊相存度阡陌續董子溫詠陶潛詩八首佳魚樂潛深智鳥不逺飛逹人避形役逝與風波辭逍遙彭澤下聊然三徑資好酒豈吝情讀書不求解天真任自我淳白忘機械鼎鼎世上名百年竟何賴嘉樹每交䕃時鳥初變聲欣然環堵居自覺軒冕輕豫亦葛天民千歲同此情馬隊待賢士久知喧且卑周生自晚悟徂謝仍響隨豈若田畝間尊酒時賦詩時命昔大繆賢傑同隱淪陶公晉卿族晚節恥屈身躬耕抱羸疾嗟哉畎畝勤道術既分裂人人得其偏丹青照千載始覺真檢全爾時揚仁風到今猶栗然貴生未必全徇名良自賊區中共兹患形影相與惑神釋乃超然道真於此得籃輿適山野葛巾傲賓客既無軒冕拘詎可形骸索富貴能畏人千秋但慙色偶作時命有通塞百齡皆謂然流行自非我底滯亦在天人知信百齡隂定不可遷苟云有所繫朝旦猶億年天地無窮期百齡未為綿朝旦不可期人事皆具前所以賢達人放心無所縣萬塗以一究㑹理寧復偏六月淮水深南風阻歸船客行厭滯淫親朋限長川至言莫與聞達理誰為詮無以謝羈愁聊作言命篇效白公詩不得起厭心厭便住不得不得作戀想戀即去不適厭生憎疾業對面為怨賊戀結貪著因轉腳落沈惑上士體自然知慧金剛力中人勤掃除補闕塞瑕隙行莫到門返饑莫看人食欲驗齊死生且覷居官職默坐念逰者身存至頭白起行觀病者身健有餘力出門視勞者身閒免事役入鄉閲貧者身足飽衣食寓形天地間幸已不失職奈何不自休汲汲復戚戚大鵬彌九區轉動恐逼窄鷦鷯巢一枝隨意翻羽翼馳光無停留駟馬方過隙君看北邙山貴賤一真宅效韋蘇州古調詩於人無舊新相見常為歡本不作崖岸中亦非斷刓賓僚自了事縣邑無曠官豈惟競勉力退亦絶間言觀者以為稀不自知其然吾聞西方說夙世常有緣將此㑹中人厚德無讐怨文人諱異術且以儒事論孔聖不可及孟氏固所尊軻云創業易成功則在天乃知古今士無有能與賢達人同衆人不肯妄自專古意牛刀割雛雞未足為深恥奈何狐父戈資以斸牛矢魯人稱家丘㑹計當而已郢匠不揮斤其質久已死秉心若松柏潔志如雪霜松柏摧為薪雪霜晞春陽乃知丈夫勇萬物無以方賜兮不受命棖也安得剛雜詩重生世所同徇利良獨愚嗟彼緯蕭子安事千金珠沈身九重淵脫死驪龍胡得失覺寐間危哉悲矣夫九方焉知祥梱也終奚如雖同國君倉乃在渠公衢餒也命使然顔原亦多娛荆山有奇璞貴乃和氏儔連城詎云多一視以為優擕挈向都市光彩傾天球雖無指瑕纍顧得千金售驚詫遽自反閉匿成千秋豈忘待時意欲往仍遲留凡目陋至寶後生異前修蒼蠅矧多變珉石仍先收萬一人我欺永為神物羞樊遲請學稼尼父已深愠安知連城守𣙜酤殿最問周公無彝酒用是垂大訓願得烹𢎞羊耕織始安分龍伯釣鼇時連六方自快事緣貪餌起上帝獨何罪土疆日侵削形軀仍眚殺才餘數十丈尚足令人駭寄言諍畢人努力事機械何當大荒野與爾競行邁齊有梁丘據晉有樂王鮒據能愛晏嬰鮒欲殘叔譽二臣嬖兩朝事君為悅豫景有尚賢志據逆以為助平失宥善心鮒乃速其去母以據為賢易地則同趣丈夫處世間必有遇不遇豈無覺者乎正色君亦悟區區嬖幸徒何忍就朋附伯夷餓首陽太公封營丘同時海濱人將老歸西周世故莽難量後王異前修徒讓千乘邦不如畜隂謀良知命分然何怨復何尤塵埃采薇詩益使夸者羞自茲姦雄人日日希公侯虛舟適誰忤飄瓦殊暫然忮心自無怨豈必絶世賢握火欲提人唾空不至天一心抱區區萬事長可憐佚女處瑤臺豐肌艷皎皎端令鴆為媒告我以不好猶豫令人悲自悔辨不早如何問雄鳩佻巧豈可道野人構茅茨櫟柱樗作棟不意豫章材一時同見送拓手百尺長連軫萬鈞重斤斧欲安施棄置因無用本是絶世姿胡為與衆共臧孫被惡名魯侯失其位軒冕非不尊家富馬千駟不用子家羈而棄栁下惠末儀諒何為矧論仁與智竊位良足羞乃復為君諡雜興阿嫫年八十睢盱事粧飾仍夸少年日自謂美無敵與子不同時寥落復異域人事雖萬殊近者猶可測頽顔與白頭何日好顔色讀李某詩案題為讀李某詩而詩止叙李某之事疑有脫誤李某崆峒人生長西北蕃赤鬢如蝟毛僅能為漢言筋力勇自負馬上帶兩鞬作賊十數年身有百刃痕泳河不用舟羊革隨輕軒危厄輒自脫天幸尚得存過壯忽自悔翻然歸漢恩徙家汾水陽百口蒙輕溫拜官隨立功俄列上閣門封侯未可量專城誰復論已見狄將軍堂堂樞府尊由來功名際鵰鶚勝皇鵷富貴百惡除詎問鉗黥髠豈與詩書士履繩不敢奔終身蹈薄氷衆口猶喧喧王四十處見舅氏所録外祖與日本國僧詩并此僧詩書作五言滄波浩無涯泱漭際朝日安知鮫魚淵而有邑居室便風送來帆夙昔多人物始信天地間見聞豈云悉惆悵蓬萊說胡為浪自黜夷倭與侏離九譯迷倣佛書問顧已同紙墨存落筆俯仰六十年舉指不任屈好事見君家聞詩初未失杜鄴富小學平通知祖述鄙老獨何能執書幾涕出偶題旦出輒暮歸終年長役役自顧若有營誰言了無益少小不如人老大轉衰僻昏忘復相仍十事不一憶勞心非所長但覺安坐食使我忍愧羞不如學勞力勞力當自耕自耕還自織百畝為已憂雖憂乃易釋喜雨和任判官奉呈太守原注先是司天臺上四月朔日食及是大兩不見愆陽厯冬序入春日光赤原野為之焦無復青青麥明廷恤農功詔㫖懷愍惻誰能共此憂惟良二千石禱祠遍羣望百神潛率職迅雷出深淵密雲㑹將夕應龍不無神女妭罪所極滂沱浹宇宙變化才瞬息矧茲皓窮意豈獨垂沛澤嘗聽君平言以茲消薄蝕周宣成陽事往往在簡籍不聞二美具介福逾萬億三農耒耜出自此豐黍稷使君憑熊軒勸耕駐阡陌上客歌吉祥清文綴環璧我豈擊壤翁不能知帝力斐然遂成章聊用同悅懌贈周員外鼎束髮去鄉里白首還舊丘曾無髙蓋車顧為夸者羞歲晏東臯田躬耕方薄收知君近有道足以無外求次韻和王平甫贈張舍人原注王時在城東佛舍讀書將應舉張與吕推官過之通物樂自任濟時常後安戢翼思迅風騰鱗慕驚瀾天書進廉良大罟綱目寬頃來中林士繼踵青雲端王侯經緯氣錦繡羅肺肝念當五鼎食肯甘一瓢簞著書成揣摩脫劒橫鏌干孟明已焚舟廉頗方據鞍閉門謝塵軌釜魚朝未飱竟完稽古力己使同學歎鳯池響鳴珮藝閣峩髙冠忘年義已深踵門情更歡縱談劇流輠處畫逾轉丸廣廷來風清落日微雨殘涼泉為濯溉佳樹聊盤桓長歌斕篇軸大盟粲珠盤寧為端木子矜此道旁觀閔兩山上田萬頃江中水千里東流自瀰漫旱苖日焦死惜哉不能救地勢正如此雲雷未興潛蛟龍困泥滓昭回雖在天歎息真已矣君子行君子貴自然不為時俗觀升車不廣咳即席不變顔疾驅不駷轡髙張不急彈塵埃視流俗中立何可干顔生處陋巷求仁得所安簞食一瓢飲孔聖推其賢雨中丹桂更束薪白璧償斗粟況茲風雨朝泥潦壞牆屋敗竈方生魚并日能薄粥始知簞瓢人陋巷夲自足寧見子桑詩若歌復若哭游景靈宫漢家祈年宫玉宇黃金階回廊起層城髙閣橫蒼崖觚稜拂星斗廣除霽塵霾清渠寒泉交盛夏涼風湝大雲赤宇宙道途若燔柴幸茲清涼遊復此朋友偕前殿朝衆靈瑄玉茲禋柴顧豫塵土姿進拜增栗齊掃庭有餘潔酌水欣素懷並坐俯堅珉長吟翳髙槐丹青四壁盡權輿自軒媧千年羽化人志怪非齊諧始知慕神仙自顧輕形骸聖賢幾吹吷寒暑一病痎學道賴逺復養生知有涯悟真覺理勝適志忘事乖伯陽推谷神莊叟稱安排英風摩蓋壤遺躅欣吾儕飛雲肆冥鴻拘井嗤沈蛙虛心自茲得歸去顔色佳惠州豐湖昔在葛稚川求為勾漏令丹砂頗易得羅浮聚仙聖窮荒非人情適已自無競千歲若須叟斯人已遼敻忽聞惠州守修舊有佳政漲泉作豐湖百頃湛明鏡芰荷爭秀發魚鳥恣潛泳新疇日已多耕者樂其盛髙齊面空闊寫影窮緑淨長嘯來清風炎蒸亦無病勤憂本劭農爽豁賴怡性寧須學神仙豈必謝朝請明珠還合浦夙昔人相慶君有近郭田足繼甘棠詠柘湖南海浮柘山嘗試問水濵桑海變未久婉孌茲為神昔聞仇池穴上有牛女津物理寧可窮空驚舟楫人東關山水青靄望不極連峰如置關不知清溪水漾漾出其間孟夏江水深溪流正西還崕根亂石多散激聲潺潺雜樹色相映密竹不可刪造幽覽衆妙撫事清心顔洄洑自多魚網罟羅前灣幽人閉上方繚徑才可攀疇昔新安江寤寐龍門山目擊暫有遇絶勝猶班班客程非趨時淹泊寧所艱少留盡餘興更伴浮雲閒坐嘯亭納涼長嘯振林木半空鸞鶴聲清風蘋末來孤月海上生坐久物色改如有神仙迎束芻束芻食騏驥斗水活蛟龍轅下雖可哀泥蟠未必窮解驥就衢路借龍起雷風寥寥四海廣去矣君安從題常寧黃令灑然堂叔度萬頃陂清濁誰能料割雞用牛刀吾亦寄一笑示我林下詩筆力勇奔峭故知才者心玩好必同調岑岑青玉竿千百壯非少清風掃埃塵日影金色照環墀發寒泉霜劒初脫鞘枕流不枕石俯仰窮聽眺上堂梵唄聲空寂總衆妙茲亦忘言徒領理㑹其要翔禽竟來集狐猿逺相嘯不作問鵬翁刻意湘纍弔十月一日十月西北風肅肅天雨霜節物感人多客子心內傷心傷鬒髮變引領望故鄉故鄉多喬木丘壟生白楊柏葉自宜翠草根今已黃旦思歸陽陂暮憶栖後岡況此佳辰朝都邑事有常平明重城開車馬如飛翔貴賤同一丘蒿艾連石羊慟哭朔風悲一豁沉痛腸奈何守微祿局促限一方隳官固非孝捧檄固已狂黽俯聊自抑涕流浩沾裳吹臺梁王遊賞地喬木空白雲無復歌吹響況乃麋鹿羣梵剎擬化出山河如綺分北望十二衢佳氣正絪緼賢者而後樂固如孟軻云感此多逺懷因之濯塵紛聞君已先我攜手皆能文置酒臨滄流披窗遡南薰由來登此臺寂寞誰獨聞慷慨作歌詩悵然哀古人千載豈不遼忽如波沄沄適意正在飲無為惜酣醺送歐陽永叔留守南都白水帝舊里大火天明堂王都異豐鎬原廟崇髙光畢命繼三后商邑正四方保釐自古貴僉曰朝論昌前旌鳥隼旟左佩麒麟章厄途亂鐃吹先路交壺漿風物盛山東令人憶游梁緬然嚴鄒徒賦筆嘗慨慷廢池掃清冷舊苑開荒凉終留相如坐一伴鳬鴈翔竹牀炎光裂厚地江漢如燖湯閉戶樂甘寢婉孌在一牀問我何獨爾愛此編竹光側身照琬琰熱手循雪霜有時萬里夢倐往浮湖湘遂令傲軒冕彌日慵下堂昔聞負暄老意欲夸天王我亦悲世人觸熱趨道傍南窗詩習靜覺自逸養恬遂忘儉始知一席安不比千乘忝微風觸喬木清氣襲珍簟心空物莫喧神超夢無檢簞瓢敢望回絃歌欣與㸃彼哉晉楚富吾道安用慊抱書南窗下日午天光亮隂隂夏木長翽翽巢禽鬯因之省疏慢亦喜就閒曠散帙寄忘懷曲肱從所尚臨文眩今古撫事雜歡悵勞形竟何為有心得非妄釋卷忽自娛收視己神放逺從華胥遊却立鈞天上萬緣倐皆空至樂了無狀悲哉俗學徒頭白迷歸向登慈佛寺原注宋大師造號宋芒兒者清溪淺褰裳嘉樹大盈抱古寺向百年地幽景罙好連峰拱蒼翠秋雨洗窮昊客至登髙樓西風動衰草雄豪昔未遇飰粥殆將老豈知風雲期草昧及天造杖箠城下邑傾囷載金寶良知積困約固不慰枯槁銘勳久猶存餘烈漫浩浩空餘祗樹園常此伊蒲禱階除稍蕪沒梁棟乍傾倒顧覽為徘徊物化那能道築室種樹築室非我鄉種樹非我廬未嘗三年淹勞力豈不虛逺嘉叔孫子去故情若初此意人不知嗟哉賢大夫和王絢道贈髙七植竹人言植物中唯竹類有德虛心道所存外徑禮自飾風霜不改隂一何金玉色丘澤無變根還如古人直繁花豈無實所待鵷鸞食卑枝亦可栖不許鴟鳶息為君裁管籥於此諧金石為君度短長於此齊尋尺原注律厯志十丈為引用竹為之濟川倚巨楫扶老杖輕䇿大厦莞簟安射侯弓矢力乃知天材美固待君子識飽聞崑崙秀盛說瀟湘碧豈曰生不遷念當厚封植惟君傲聲利心逺地更僻擇交獨此君開徑如三益清風共忘言明月為莫逆還當掃塵榻㑹待遺名客涉伊水宿寶應寺日夕車馬煩路絶臨清伊雲光與水色極望相逶迤飲馬清泠泉涼風吹人衣白石可厯數遊魚仍俯窺淺瀨乍褰裳榜舟亦遲遲古木號亂蟬白鳥時獨飛上方兩髙閣向水雙朱扉迢迢際煙霞安得青雲梯暝投中峰宿四山凝夕霏鐘鳴衆禽寂孤燈明翠微彈烏夷羿射赤日霍然落天衢獨成萬世名皆曰摧九烏逼仄慨時俗臂射妨四禺誰能雛􅀢間計校死與枯孰謂黨頻頻莫黑相為徒何用知雌雄攫肉爭歡呼控弦非百鈞投丸匪明珠棄捐不俟時詎比墉隼誅矯翼似知機回空如改圖但使庭戶清何必殘爾軀念無網羅禍寧當怨除驅吾廬正深沈嘉木多桐梧萋萋映朝陽㑹待鸞鵷雛雪中退朝與諸同舍登祕閣密雪晦空曲天作白玉京都城百萬家漠漠浮雲生束帶聽鳴雞謁帝開承明脫身塵埃外自覺肌骨輕歸從諸仙子笑語來蓬瀛仰望䇿府髙天祿鬱崢嶸步登雲霓表俯視朝日晴寒門杳無涯珠宫聨五城珍木皆後凋冥鴻亦同聲還因閶闔風共此夷曠情清漣閣平湖侵危臺天水相竸入縈回古嶼間空闊衆境集大邦屏東南開府記百十勝遊雖日來面勢忍遺葺能聲紹豈弟敏政常暇給喜聞棟梁新甫見規模立橫空眩藻麗構迥愁嶫岌居然心意㑹似匪人謀及草樹亦增華神明非舊習青凝夕霏翠冷激回風濕去鳥指暝飛潛鱗視幽蟄達生貴夷曠外物辭妄執臯壤正欣然蒼波仍可挹雖云吏隱最世復登賢急徒使棠樹詩千秋意相襲歲寒谷髙松含悲風緑竹帶凝雪碧落翻怒濤深崖墮寒月蕭條非人境合沓隱城闕爽氣露草木精神立毛髮初無隱居迹似為吾人發世事誰得捐相從理營窟長松過千尺好餘萬丈材上有積雪翻下有清風來四時景常好六月凍不開何事吹燕律獨令陽氣回過開元寺晨霜聳喬木初日明廣庭俯巢鳥鵲馴步徑莓苔青即心百慮擾造境衆獨醒安禪到無悶看畫匝已經梵音騰潮波幡影垂流星天花雨貝葉帝樂飄鳴鈴勝緣此邂逅法界俱清泠世喧暫回首但覺塵冥冥久旱山城帶嵩髙常候嵩髙雲雲興似焚柴兩注如翻盆田萊數百里下澤猶平原雖有耕鑿勤不如霡霂恩哀此民生微所賴芻狗仁乃知丘陵外獨有五嶽尊今春苦淫霖宿麥才厪存過夏乃不雨窮秋氣如燔象龍杳無藝巫鼓空屢奔豆苗落為萁藜莠乘冬溫黔首困粒食或有茹草根賣牛供租賦不忍聞此言此事亦神羞誰能叫其閽登髙望連峰正見朝煙昏彭城集卷三
