body:
  text: 彭城集巻二十七宋劉攽撰書與王深甫論史書古者為史皆據所聞見實錄事迹不少損益有所避就也謂之傳信惟仲尼作春秋乃諱國惡耳夫春秋聖人所特作以見一王之法不當引為史例然其諱國惡猶但使顯者隠之大者微之率皆有文以起焉不昧昧都為藏匿使不可知也後之史官不逹此意猥自託于聖人以是為史未嘗直書上則顧時君忌諱退又惡斥言當世權勢大人罪過改之易之以就美好悦生者而背死人不顧是非故賢士大夫之事業有不記者焉僕不自料常欲矯正此弊是以竊作丞相萊公傳網羅舊聞整緝異端亦可以少見凡例矣傳曰所見異詞所聞異詞僕今去萊公數十年非見而聞也于其行事官爵進退不得如目覩一二道之也左丘明世為魯史又親見時事其著賢大夫成敗率不過以再書太史公作張良傳稱非天下之所以存亡則不著知古人為史不必瑣𤨏毫舉釐録也萊公事蹟在人者多僕特取其大節數事左丘司馬之志也今枉一通足下以僕前意觀之當還示其可否焉太史公作帝紀世或傳武帝怨其刺已而言景帝之短遷以此坐死班固私作漢書幾不免誅習鑿齒書枋頭之敗垂為桓温所殺為史之祸乃至此所謂盡言以招人之過者歟然僕非敢如此以自取直名欲正史法明春秋之指以趣聖人耳然此意未易為俗人道也足下為吾蔽匿使知之者知之不知者不知則吾幸矣與韓持國論侍講不合稱師前者所議侍講坐位恐未適暢今再具説如左一所以言侍講未為傳先王之道者凡九經非皆出于孔子師儒相傳舛錯搶攘齟齬不安者不可勝數雖前世通儒未有能通一者也然則九經可謂中有先王之道矣謂九經皆先王之道者非也又況誦讀章句不敢蹉跌而可謂之傳乎孔子曰苟非其人道不虚行然則必待其人聰明淵博心通聖人不滯于末學不流于章句而後可言傳矣今之侍講説釋九經彼善于此則有之矣言傳先王之道則可謂誣衆人也況可夸于天子之前乎傳道非爵位可及豈可一預此職而便據此名哉二所以言侍講不得為師者所謂師者師其道徳者也然道徳非言不傳故學于師者有問道有請益未嘗聞不問不請而强聒者也今侍講之于人主執經在前不待問而道之不待請而益之此則侍従之臣進説耳尚何師禮之有不惟若是人便有説古今師資不同然必待其人心服然後師之今天子聖明于侍講未以為可心服也豈可强屈人主以伸羣臣之志乎易曰朋友講習所謂講習者非以先王之道相磨切乎在人臣則講習通于朋友于人主一經講耳便望為師是豈為下之禮乎三所以言非有司之失者凡朝廷法度著在典籍有司不守則為有司過假令朝廷向有令曰侍講師臣必坐而後語而今有司失之則可正之矣今則不然天禧之時侍臣皆坐侍講亦坐乾興之時侍臣皆立侍講亦立其後有事者立無事者坐侍講亦立亦坐皆出人主之旨豈嘗為侍講特定禮而謂有司之失自數十年來講官豈皆不辨禮義而叨居其任乎特恐今之講官思慮不能無失過而建言希冀殊禮望于太上必欲得之故推過有司耳四今之議者將曰人臣何嘗不坐于上前今講論逾時予坐以示尊徳樂道何苦議論愚特以為不然凡禮之所貴貴在止邪于未行朝廷之上几席之間逼近至尊一坐一立便是大事人主有命許之與人主不命請之便分逆順豈可苟相容悦而忘義以處之也是故逆莫大于逾分亂莫大于要君惡莫甚于阿私罪莫重于罔上今非師而求以師禮見待是逾分也以尊徳樂道之名脅持主上求必異已是要君也此二者講官之失若有司知其非義而以出于賢者不敢違之是阿私也強為之説而曲使相合是罔上也此二者有司之失董仲舒所謂其實皆以善為之而不知義被之虚言而不敢辭此之謂矣不可不察也與王介甫書見所與曾公亮書論青苗錢大意不覺悵惋仲尼云聴訟吾猶人也必也使無訟乎聴訟而能判曲直豈不為美然而聖人之意以無訟為先者貴息爭于未形也今百姓所以取青苗錢于官者豈其人富贍飽足樂輸有餘于公以為名哉公私債負逼迫取于已無所有故稱貸出息以濟其用介父為政不能使民家給人足無稱貸之患而特開設稱貸之法以為有益于民不亦可羞哉甚非聖人之意也自三代以來更厯秦漢治道駮雜代益澆薄其取于民者萬頭千緒周公之書有之而今無者非實無之也推類言之名號不同而己矣若又取周公所言以為未行而行之吾恐不但重複將有四五倍蓰者矣一部周禮治財者過半其非治財者未聞建行一語獨此一端守之堅如金石將非識其小者近者歟今郡縣之吏率以青苗錢為殿最又青苗錢未足未得催二税郡縣吏懼其黜免思自救解其材者猶能小為方略以強民其下者直以威力刑罰督迫之如此民安得不請安得不納而謂其願而不可止者吾誰欺欺天乎凡人臣之納説于時君勸其恭儉小心所謂道也豈不逆耳難從及至勸其為利取財于民廣肆志意不待辭之畢而喜矣故姦臣爭以言財利求用不復取往古事言之在唐之時皇甫鏄裴延齡用此術致位公相雖然二人者猶不敢避其聚斂之名不如介甫直以周公聖人為證上則使人主無疑下則使廷臣莫敢非若是乎周公之為桀跖嗃矢桁楊接槢也商鞅為秦變法其後夷滅張湯為漢變法後亦自殺為法逆于人心未有保終吉者也且朝廷青苗之息專為備百姓不足至其盈溢能以代貧下賦役乎府庫既滿我且見其不復為民矣外之則尚武功開斥境土内之則廣游觀崇益宫室鄙語曰富不學奢而奢自至自然之勢也介甫一舉事其弊至此可無念哉可無念哉與青州歐陽尚書别紙某頓首近專人囘上狀計即通逹遞中䝉賜手誨㐲讀感慰亡兄安葬十月末已得襄事家嫂諸孤尋還南都目今定居伏恐要知某愚戇孤蹇前在試院不幸與小人共事論議之間為所詬辱既素知其心病狂易都與包含隱忍未嘗酬對遭横逆而自反犯而不校此實古人所貴況在鄙淺實亦不易堪任以為如此可以免咎不意臺憲風聞不辨曲直大相排詆朝廷知其無他置而不問然而章疏相繼詞語百車掎摭咎惡甚于驩兠共鯀處正罪罰急于貪贓背叛上恩寛博裁令贖金中憲呂公以為朝廷綱紀在此一奏風俗惇厚在此一舉不放逐邪佞不足以正邦毅然奮筆有仲山甫不吐之風知雜陳御史身在試院目見始末上牽下掣不得自由傳致文字使之相稱朝廷憐其無辜又不欲小挫臺憲之氣遂但奪差遣使歸館供職餘論洶洶又復數章然後得已聖朝治道清明是君子道長之時誠不自甘棄為小人猥䝉羣賢見誚然觀自古志士君子與時乖迕捩曲為直不能自白歸之有命無世無之某固無似敢不安之若命乎栁下惠仕魯三黜令尹子文仕楚三己某到京七年三䝉臺論小人何幸乃與下惠子文等但其無愠色未能若古人然亦敢不庶幾也小人胸中感慨無處告愬受恩門下積有嵗年故敢容易布聞語言忉怛使側目者見之又當重得罪得伸于知已萬無悔惜伏惟亮悉為伯父上集賢文相公書伏惟相公以將明之徳當弼諧之任平殄冦亂惟清緝熙勲無與雙畧不世出所謂有非常之人必有非常之功也致為上袞海内大服咸曰昔有周邵今惟相公天下幸甚受策之日遜美讓善以南陽范公為材舉而自代故天下咸知相公不伐而無私知賢而尚徳論思之重小大必稱故天下咸知相公任人必當其材有功必報其勞夫宰相之任論思之重相公舉賢而讓既得其人則百執事之微亦將選擇而無曠工矣有勞者既旌有功者既賞則天下懐材而未試者亦將繼嗣而進之矣此㤗山之符千一之遇也當是之時束帶而搢紳者皆不狂不愚無罪戾于身孰不願受賜于相府乎某也不愚不狂幸免罪戾是以敢進其説于左右雖然百執事之進其説于相公者多矣語不切則情不逹是以衒鬻之詞必過其實某也小人不敢以厚誣君子仲尼曰如有所譽其有所試然則相公取人之方不出于此矣相公之治益州某時承乏興元愚戇不肖無所建立謹守詔條平治獄訟竊幸無敗闕相公以其屬吏之故廣聴兼採謂其有勞曲賜奬借銜被恩遇刻肌刻骨然則某之獲幸于相公相公之垂譽于不肖皆在于已試矣則某之進説于相公不待詞之畢而喻也豈相公能譽之而遺其身乎某今年逾六十齒已衰邁然其愚戇不肖之心猶知感激竊樂聖賢之相遇太平之有期使得磨厲鉛鈍少立薄效然後退老園畝無所恨矣力短謀拙上無朝廷之援旁寡朋友之助是以蹉跎郎署棲遅外補某竊悲之伏惟相公均進賢任能之道少迨不肖推賞功旌勞之典俯憐未試不替疇昔特賜振抜使得效其尺寸必無隳敗以玷厚知某聞見于君子言及而不言謂之隠某其敢自囊括以取大責于大君子乎是以冒進其説伏惟裁擇為人上宰相書某聞古今之論者曰善為國者無他使賢者能者帥職就列而不敢伏斯至治已善為仕者無他使國家求與之共事而後出焉斯善士已書曰克明俊徳道賢傑之在位也易泰之象曰上下交而其志同也道上之所以接下也然是二者有説焉世固不疑賢能之可以興治而謂士者待上求與之共事而後出焉不亦越乎夫古今異宜亦豈嘗謂若成湯之于伊尹魯侯之于周豐而後謂之求之哉彼疎逺窮賤之士介特自守無望于朝廷而爵命有以及之斯豈非求之之效歟夫識度有髙卑智略有廣狹誠使以徳舉者不奪其職以材用者不逾其分則山林枯槁之士舉欣欣然係踵而至矣又況其近者乎㐲惟某公閣下以全徳倬度寅亮王室謨明輔和惟清緝熙功業日新而無疵仁化風動而彌逺賢者在位能者在職可謂至治之極矣某也疎逺窮賤之士也無左右之介未嘗得至于門下仲尼曰邦有道貧且賤焉恥也竊自念勤身苦志從事于學幸不後于衆人不見棄于朋友儻可與童昏庸昧之倫長甘貧賤之恥乎古人有言曰百發一不中不可謂之善射射末藝也固以全之為美今雖賢傑羣萃而疎逺窮賤有遺而不省者將非百中之美乎㐲惟閣下念之傳曰言以足志不言誰知其志虞書曰敷納以言仲尼曰不知言無以知人也誠謂閣下必一言而知人故敢冒進其説焉伏惟閣下亮之莊周之書曰逺使之而觀其忠近使之而觀其恭煩使之而觀其能卒然問焉而觀其志急與之期而觀其信委之以材而觀其仁古之君子其察人如此之詳也某也不肖惟閣下所以命之為王郎中論事上宰相書昔汲黯有言願為中郎出入禁闥補過拾遺然則郎吏雖賤亦預論議時薦狂瞽仰裨萬一古之道也况其忝千里之寄膺牧民之任有所懐藴黙不敢言非忠藎之義也某惶恐死罪伏見赦書升曹許為輔郡恭以聖朝治具張設制作明備地平天成百度修正自前世之闕典百王之逸禮刋而正之振而行之又況王圻千里大衆所在輔翊之郡未合于古宜乎明詔之發徳音而著甲令也昔炎漢隆盛累葉至孝武之時始廣三輔葢由此矣然東西兩京皆曰寰内鑾輅臨幸則為行在宫籥暫扄爰號居留制度事體自昔一同皆有輔郡扶贊風化今鄭滑曹許悉為節鎮唯汝州號稱防禦似猶不稱愚以為汝為輔郡在曹許之先亦宜建節以威重都邑巍巍赫赫盡善盡美矣且鄭州本亦防禦景祐之初始賜奉寧之號然則防禦小郡不足以陪輔帝京近事之明比已國家節鎮數十川峽廣越之郡往往以僻陋賜額汝州地盈六縣生齒數萬西瞻洛宅陵寢兼在北顧浚都佳氣相接楚鄧南土正居藩蔽于以啓元戎之乗假中軍之節不亦宜乎某愚戇不足以知治體近者輒以芻蕘之言上奏天聴懼其拙訥未能明白敢復干聞執事伏惟某官寅亮天工董正國體聚精㑹神講畫如一逹聰明目幽逺必届幸論道之朝訏謨之下垂聴愚言少賜詳擇千慮一得實所願焉為趙賓客上執政書某結髪仕宦至今五十餘年方其少壯之時不能出奇勵節外之則竭股肱之力以治戎服敵于邊圉内之則極文墨之用以正議直言于朝廷今年逾耳順筋力益衰思慮益昏而朝廷方興太平之基廣教化之源才臣志士黒髪壯齒駕肩接踵奔走圖議官無曠工野無遺賢顧某其人長物也然而不自揆度猶敢有言于相府罪人也願相公矜而察之幸甚幸甚某聞大雅之詩曰敦彼行葦牛羊勿踐履夫行葦之微牛羊避之而後王道備焉故周家忠厚必至于養耆老以成其福祿非獨王化然也田子方見公家之粥老馬者贖而取之為其少盡其力而老棄之為不忍也故恩足以存舊老義足以感新壯可謂賢士矣某其亦可自比于此而冀見憐于執事乎某之族内外待某而食者僅百口男女之成立待某而婚嫁者且十數家無累世蓄積之富身無四海田園之歸饑寒凍餒是憂是虞某雖欲勿仕不可得也某豈願以桑榆之景進而不知止乎先王之制七十而致仕幸某今猶未及數年雖黽勉班列未為大咎也相公誠能加惠哀憐使某復得補郡以濟其饑寒之患使宗族百口靳靳然有所仰給此其為行葦勿踐而備王化也老馬見贖而稱賢士也其亦不逺矣州郡之役某雖朽鈍固常熟之耳目足以究簿書之繁志慮足以察獄訟之情日夜不怠自謂無曠豈敢使事有不職民有失所以孤相公任人之意乎伏惟哀憐幸甚幸甚為人以文章與知已書小人受顧盼于門下寢逺以閣下藻鑑明徹照灼忽眇不疑于小人獨有所未盡也小人猶願有陳于左右何者譬猶彈絲吹竹擊劔射御雖既知其工矣未若時得試之于左右見長競能曲終技窮憮然稱善其為快心滿意稱曰知已者不愧矣是所謂囿于物而相于技者也雖然是小人之所以事君子盡心之道也某七嵗好詩至今垂三十年日夜之所積習精力之所追及旁貫經史下協聲律紙墨所存不下千首雖當世多賢不敢仰希一二而上追古人之作竊以謂無甚大愧夫擊轅叩角之歌詞甚俚質而賢君採之故下情逹而幽滯得出也又況感激時事吟咏國政奬善而刺惡有敦厚之風耶世無詩官畏陷誹謗之罪故不敢露已時就閒僻竊寄拊抃而已伏以閣下之于小人有照之之明而加以久要之契某其敢有隠而不盡心乎謹録古律雜詩若干首拜獻左右伏惟少加材擇答西京解元李秀才書某頓首秀才足下辱書稱道累幅甚荷甚荷夫洛陽天地之中而帝王之所更都也其居士鄉秀稟受中氣涵泳徳化宜乎其有以異于四方哉某也異邑之人未嘗從士大夫遊過當賓興之任葢造形而度長短者易以自必循聲而察律吕者鮮于不誣況于䝉鄙而可以小知君子哉此其所以臨事而懼也誠不自意魁偉俊傑之賢幸皆不失内自矜喜榖梁子曰名譽已聞而有司不舉者有司之過也今某既免有司之過矣古者貢士數與于祭者有賞得賢如此其無慶賞之望乎又以自賀也因書還答不悉衆學官移兩判監書某等謹再拜上書判監舎人王公判監傅公閣下前日閣下以劉䝉為學正某等以為不宜屬草具書將以薦聞于左右當是時有習于事者見教曰今近臣貴人位崇志得悦順之言日聞于前夫位崇則下之奔走者衆志得則禮樂法度可以闊略悦順之言日聞則忠諫必不入矣如是而又重之以學問之博詞説之辨必且乗入而鬭其㨗吾見若之黙而自屈也某等以為不知言凡太平之世强者所以不敢暴弱衆者所以不敢陵寡材者所以不敢詐愚由禮義法度存也禮義者先聖人之遺教是也法度者時君之詔令是也禮義者先聖治人興化必且安守禮義以待士固持法度以馭衆今一舉事遂兼犯此猶足自立乎葢以為有所不知而過舉也誠使有所不知則樂聞其告者矣知其為過舉則母憚于改更矣又何謂不可以忠告法語哉是以有望日之牒辭逹而已不敢衆請也跼蹐俟命漠然累日閣下既不見報而劉䝉遂自入學矣于是前見教者雜然而笑自以為知言而某等愚陋也某等又以為不然凡賢人君子所為始末後先固不必同要其歸于是而已矣今所舉不義而固為之者非以恥過作非也殆將以極衆人之論議而視其強毅詭隨則賢不肖自判矣此古者觀人知人之術意閣下亦必出于此是以又屬草具書以薦聞于左右又有見教者曰凡下之役上職也賤之聴貴決也愚之從賢義也今祭酒司業貴矣賢矣為人上矣博士愚者賤者為人下者聴之役之從之而已尚何多言乎某等又以為不知言何者三公皆嘗為天子御史諌官矣方其禁切人主雖置三公九卿焉有不合己者必力排而極陳之常恨其不見用夫人臣之于人主有天地之隔其敢抗言知義者非以其所守者法度所循者禮義然耶故犯上而不憚危焉直已而不使屈焉今祭酒司業之于博士比肩學官耳非有君臣天地之隔吾以禮義法度而告之庸何慊乎在人主則必欲聴用已而盡從其言于已事則恥聴于人遂非而不移豈賢臣之用心乎是非所望于祭酒司業也某等遂又有前日之狀今又累日矣不審閣下為如何見敎者又且將大笑矣某等無復以他義仰期閣下矣古者有官守者不得其守則去今閣下廢詔文而侵博士之官用非其人某等真不得其守可以去矣閣下以昏姻之家私情曲禱用一庸士而以大義正道使五六學官引去閣下上非所以為國下非所以為身想閣下通人必不爾也不然則閣下叛戻詔書蔑棄寮屬貪用童騃教率國子亦將有宏議逺略非某等所及倘一告喻之某等亦箝口受教矣彭城集巻二十七
