body:
  text: 彭城集巻四十宋劉攽撰雜著設常侍郎對漢景帝用晁錯為御史大夫帝過郎署見常侍郎問曰吾以錯為三公人以謂何如常侍郎曰幸甚陛下之知錯也以錯為大忠焉爾陛下之用錯也以為錯大材焉爾帝曰固然常侍郎曰錯不變更髙皇帝約束陛下不以為材錯不别疏人骨肉侵刻宗室陛下不以為忠然則髙皇帝約束雖仍舊不可得矣諸侯雖欲無罪不可得矣帝曰何哉常侍郎曰錯潁川男子也文學不能以出衆容貌不足以動人使居鄉里勢不過得為掾功曹錯不願也錯峭刻為忠而陛下信之錯菲苦為材而陛下用之錯今為三公富貴榮顯然則極錯所欲盈錯所願漢安得無事諸侯安得無罪乎帝曰呉王詐疾不朝久矣其罪大今削之亦反不削亦反常侍郎曰先賜呉王几杖不朝數十年矣呉王漸漬恩徳雖圖不善不忍為也陛下今使錯發之呉由錯反而謂不削無錯呉何為有謀乎帝黙然常侍郎曰語有之曰變古亂常不死則亡是天道也階下雖固愛錯不能違天錯將有大怨侍郎謝死罪居三月七國起兵帝憂懼要斬錯以謝七國然後知常侍郎為賢者也書李廣傳後李將軍英毅果鷙謙讓不入可謂名將矣然而功不至封侯者非其人之智失也又非時人之勝已也幸不幸有命也已矣世之君子全道極美而功名不顯者亦何可勝紀哉然君子之道得於人必反諸其身違于天必復諸其心故禍福之至曰已有以致之是以上無怨而下無尤也李將軍追咎殺降者以使己不封能自訟矣嗚呼可謂非篤厚君子哉連珠一首蓋聞詭道取勝得以暫用懐惡致討未有能克是故以桀詐桀可容于徼幸用燕伐燕不足以相服進士䇿問問古者藏冰以禦雹災禁原蠶以蕃馬四時改火以救民疾出土牛以送寒氣夫天人相感皆以其類凡此數者其説謂何且其説皆春秋周禮月令聖賢之記非鄙近淺陋所傳述者諸生母以不通而輕沮毁之也問古有宗子者以管領族人今不知其説如何為之者何人分大小者何故領族人之狀何若累世之後有所斷絶否今世亦可行之乎當為明説焉問古者議事以制不為刑辟今國家憲章完具毫髪以上皆存約束而言治者嘗曰不盡人情其為吏者皆便文自營無惻隠之實以故政事多不及古或以為宜簡節而疎目求忠信之士敦龎之人以付之夫人不易知恐未獲議事以制之美而矯䖍吏舞文以害民矣二者宜何從願與諸生議之旱禱文伏以賞功罰否率由陰隲之權旋時過期實繫至誠之感臣自惟淺器濫預長人政術弗修徳馨蓋闕間者旱氣為沴穡夫鮮功閔焉雲漢之憂遂及肅霜之序農畝弗墾宿麥過期懼粢盛之不供而鰥寡之重困是用反身思咎潔誠謝愆闢靈場之謹嚴誦仙章之秘奥庶兹悃愊仰逹髙眀伏冀降鑒自民上徳生物拯此焦勞之患畀其膏潤之恩霖雨以時豈特雲霓之望黎庶無憾更知芻狗之仁太清宫旱禱文伏以洗心首過情衷可以必聞旋時過期昭鑒未嘗無報臣濫膺朝寄黍職郡符刑政弗修疵癘為閔粤從春序時雨愆期顧彼農民衆心失望密雲屢布而復褫疾風亟發而若驚宿麥就實而弗登嘉榖當種而弗入民罹饑饉之苦于此累年家乏儋石之儲鮮不萊色大懼流移道路荒棄田萊是用躬造殊庭歸依鴻造守土無狀或許其悔過而自新比屋可哀必冀于加惠而孚佑霖霪滂浹萌實茂堅幸昊天之弗渝亦神祀之無乏中嶽禱雪文今兹冬多愆陽雨雪不時雲氣數布風飈暴起宿麥枯瘁人且疵疫守土無似刑政失中不能自媚于神實致此咎洗心自新是用乞靈于百祀神祇惟天子之所命敝邑之表望莫如在廟之神矜其淺智不逮之罪軫百姓將絶之憂恵澤以時嘉榖無隕蒙賴靈貺其何有極敢告謝雪文蒙神之賜致此甘澤疵癘不興濡土潤麥匪我精誠所能昭格在神聰明庇民大徳潔粢豐盛陳列邉豆左右僚屬載拜稽首是用為報率我常職神其格之以饋黍稷尚饗呉山禱晴文呉嶽在隴州去鳳翔僅百里其山秀特磅礴與五嶽相類不輿凡山等其神甚靈其禍福於民如答于是秋苦雨故予為文禱之判渾茫以融結兮肇川嶽于坤輿五山峙而相望分兹綱紀乎中區慶西荒之遼夐分邈萬里而有餘伊帝命以主民兮曰喬嶽而惟呉峻千尋而直上分亘西方而不極叢巖嵬嵬而干霄兮白日過而如匿睨𤣥雲之漫漫兮夫豈知乎懸崖之孤石氣清淑而淳粹兮嫗陽春之膏澤忽變色而震恕兮何風霜之慘戚諒好善而懲惡兮兹天威之咫尺彼下民之喜仁而畏欺兮夫孰非神之幽隲嵗困敦而隂霖兮秋既成而弗穫氣昏昧而弗離兮雨滛泆而互作川谷浩乎為淵兮髙原墟而為壑彼下民之無辜兮曽弗究而弗度雲闐闐而不收兮鬼嘻嘻而為虐疑聰明之惑蔽兮何帝令之沮格不然跼炳靈于百里兮又明神之所怍扣帝閽而且逺兮不若吾神之可以獻忠縛笞屏翳兮放誅豐隆揚百川使清露兮詔蜚廉使來風掃除昬翳兮天地清通白日揚光兮悠悠太空田有嘉榖兮穡人成功我民欣欣兮報祀其豐神之徳兮長無終窮禱晴文霖雨為沴越月厯日麥既秀矣隂不得育前嵗饑阻民或菜色奈何復之鰥寡愈蹙百姓非神主邪水旱非神職邪神將弗聞我是用告翕息雲隂日光照赫尚庇黎甿以敷大徳敢告王深甫哀辭嗚呼深甫嘗自以為不壽亦亟為予道之揆六物與五辰迺言命而稱詩神峻清而骨單吾固亦以君焉為疑何兹言之竟果其夭閼而止斯吾固知夫天命之黙定非賢哲之可移強學問而力仁義彼蒼蒼焉𠖇黙而莫知夫神之不可滅精之不可虧莽太空之浩蕩君孰往而疇依審與夫顒顒兮異矣復何怨而何悲夫死生其猶夜旦之常邪顧有合而必離彼修短胡足言乎計彭祖之與嬰兒念至理之昧晦知之者不如信之以誠之為愈也然固望之而未至聞之而弗窺此顔生之不幸猶壹慟于宣尼矧吾徒之缺然宜為君而涕洟祭陳相公母某夫人文嗚呼五福之先莫重于夀夀者雖多鮮克貴富或身顯榮親不待留夫人之福四世之祐以賢為子名譽長懋國相之養萬石其厚黄髪兒齒踰八贏九詩頌魯侯慶云壽母馮勤胡廣在漢稱首夫人況之彼焉何有命乎考終靡憾靡疚某等備位小邦皆有官守喪車來東不敢奔走恭陳薄奠藉詞為侑祭亡弟縣丞文前年四月汝來見我念汝當官才髙志果于以求名往無不可故我别汝思而不傷汝行無幾報汝婦喪十旬未半汝繼以亡何辜如此不淑不臧豈我不徳底此咎殃我心猶疑謂汝在官後來不歸一别終天我年向衰六十有幾前喪汝嫂兒女失恃我矜汝孤誰與撫視我重傷悼髪白目翳日月流速爰及祥祭几筵將徹在禮有制招延淨寺廣作佛事益乎無益自盡人意奠汝以詞靈其髣髴祭亡妻潁陽縣君韓氏文嗚呼日月不居節序代逝傷悼如昨忽焉周嵗追惟話言衎衎令徳帷袵未更宛然餘澤情懐摧割有涕漣洏泉壤冥漠詎復我知素心依佛覺悟至理超生淨土想必去此禮制有經明當變服奠觴陳詞祔筵以哭祭王景彛文惟公忠以衛上簡以正已節惠之光兼此二美生榮沒哀前聖攸臧僉論所同公也不亡嵗月之吉歸葬舊封宰木有嚴天子之公某朋舊之好執紼是宜守官鄰邦逺莫致之恭陳薄奠告公以心靈實有知庶亦來臨為人祭唐給事文惟公之生志氣潔修清不可渝如川之流博學贍辭既以周用尺牘之珍又衆所共金華深嚴多聞是資出入兩朝天子器之胡天降年福不售徳修途方騁脱軸煩軛嗚呼哀哉某夙以姻婭得從儁游哲人之委使我心憂觴豆雖陳公豈來臨文以叙悲公知此心祭張龍圖文惟公亮直自躬儒術映時縁飾彬彬動為吏師大邦維屏天子是毗所居赫赫去而見思金陵都㑹朱邸始封大新城宇百堵穹窿洛師汶陽周魯遺風二邦美化于古比崇龍馬近臣柄輔儲偫將哉相哉故事多矣天不憗遺公胡不俟殱我良碩奪兹重器嗚呼哀哉某昔以庸虛預居下僚從事别都匪夕匪朝親際軌範躬服教條薫而炙之徳音孔昭奄承訃聞震悼曷已守官小邦去公千里欲奔不能疚心如燬酒肴匪馨恭致常禮為衆人祭王十八學士文嗚呼君以文章奮志發身施于為政寛而利人凡出從事傅古則迂便文自勞又非逺圖君實精心處躬不疑所居可紀去而見思南亳之都全呉之疆饑饉薦臻民卒流亡田萊既闢百堵還定問誰之勞復此完盛上嘉成功亟降命書東暨海邦北維參墟膂力方剛經營是宜金印紫服爛其有暉傳車在門揭節諏日旦不能朝君忽卧疾賓來問君笑言自怡揆此吉人何慮何疑沴疹發中變若翻水晨夕俛仰君遂已矣福善之説古或不信導引而壽君復自慎莽然臻此不可推測豈天有命雖聖不釋君齎所懐不得盡施以生者懐重君之悲某等辱從君游交契攸久豈伊異人兄弟甥舅哭君之傷情鈞意同丹旐有翩君䘮遂東怳然語言晳然眉宇不見不聞邈然夐古潔饌豐盛清酒在罇一别長絶寫心此文祭邵龍圖文嗚呼昔公之西擁節部符千騎上頭籣弩前驅邛郲之險其足言歟賢賓去門弔者在廬禍福倚㐲一盈一虚今公來還丹旐首途素幕蕭然斂衣塗車天理何常不亦悲乎鳴乎哀哉惟公志節清修早自挺立儒官詞林栗階躋級司言右垣袞職補緝遂主邦計畡賦經入蜀城㑹繁民俗輕急清徳鎮浮有命既集百里之塗半于九十公實中絶車摧馬縶凡我僚舊皆昔朋執朅來存公易笑以泣陳觴叙誠惻愴於邑公實臨之誰謂弗及祭賈中丞文嗚呼詩書所稱君子正直亷端隅方以近有徳古今材良勉懋自力孰與天資不為外飾維昔宣尼隕涕叔向史魚兩如潔修莫尚矧惟公賢時所仰望殄瘁之悲為國悽愴嗚呼哀哉公在中司懍其毅氣如玉之瑩亷而不劌表正衆物彼曲吾避陳善責難致君無貳神之聴之景福謂何曰仁者夀公在則那淮陽卧治汲直病多公復不能獨寐無吪鳴呼哀哉昔公之門居無雜賔貧賤之交在我數人情以義鍾哀以志申有涕沱若沾袍隕紳喪車于南邈焉千里有泗有淮壽母稚子奠公國門公歸已矣公不我忘顧此肴醴祭呉中散辯叔同年兄文慶厯之六同荷名第四十年間怳如暫寐逝者所餘一才三四見公荆州以是為嘻為百老圖如公存意别公無幾公復不諱天命有定固不可避惟公夀算官爵名位雖不大逹方古無愧克有令子門戸不墜交朋之情既老必異追公昔遊忼慷隕涕喪車北還丹旐曵曵撫棺一呼引紳􅋞淚奠酒伸詞公乎來既為三省密院祭中書相公長男新婦文帷靈作嬪清門慎徳習訓積善在躬罔不信順日及隕芳弱草棲塵如何不淑失此令人殽饌佳好清酒嘉旨靈乎不遐歆此涼菲汝州判司等攷詞襄城縣主簿張堯卿第一攷前件官久更事任頗積吏材迨此朞年亦無官謗其攷可書中中襄城縣尉寇仲閔第二攷前件官勤于追捕濟以公廉卒徒服從器甲犀利其攷可書中中葉縣尉常琮第三攷前件官追胥竭力教習有方帷其鮮萑苻之姦是以寡鷹隼之效其攷可書中中司法參軍王辟疆第二攷前件官明辯足以亭法詳慎不以便文既久于官益勝其任其攷可書中中司理參軍王整第三攷前件官操心近厚鞫獄正清其攷可書中中梁縣尉兼主簿髙韙第二攷前件官莅事再稔取盜四人窮淵藪之姦可謂能矣貳子男之課不亦多乎其攷可書中中國子監補監生牒詞國家以詩書禮樂教育諸生以徳行道藝應選上下相待如此其重雖未列于爵禄而士子已貴矣然國家與人不求備故占小善者皆不遺之焉而諸生有志于古人則共自任者宜勉之耳曉示州學榜據州學教授狀諸生不遵規矩及侮玩師長毁壊曉示者蓋聞入孝出弟鄉黨之常節恭業樂羣庠序之要道諸生秀才結髪從學屈首受書大則希揚名而顯親次亦將干祿而筮仕何乃甘心佻逹極意慢游以侮玩老成為髙以抹摋箴規為逹負固不服過渉至凶不足成名秪其敗徳古者大學之教嚴師為先或收檟楚之威或重寄􅈎之謫非不能道徳而齊禮葢將糾繆而而䋲愆興言及兹良弗獲已為學至此不亦恧哉然而朝過夕改君子所予先迷後得大易攸尚畏罪可以強仁克已而後復禮特願勉親弦誦恪居朝夕勿重前咎以貽後悔告示各令知悉者濟寧總管府敦請武子先生主善本路學校疏竊以化民成俗舍學校以奚先以善及人惟賢哲之自任某等叨寄兹土俯愧菲才顧惟郡邑之氓素乏絃歌之教雖泮宫之攸宇虛絳帳而無人幸遇良師克堪主善武子先生徳望足以服鄉里文藝足以為模範雅重足以鎮輕浮安恬足以化僥倖有叩即應無問不知超然天爵之尊允矣國人之式某等敢攄悃愊仰瀆髙明珠在淵而淵光玉處石而石潤物且乃爾人益能然與其獨樂乎一身曷若兼善于萬衆謹同願學之諸子不勝延竚乎清光願薫陶禮義之鄉謹佩服文明之訓異日而為天下之名士不言而知先生之門人為國儲材有教無類贊襄唐虞得賢之盛再清洙泗絶學之源千載流芳一時稱慶在後學多感多幸于先生不為不光罔敢多言敬備奔迓謹疏修暨陽學宫疏本學正殿雖新㦸門未備樓危欲壓堂圯弗崇欲議増修何從取費非助我者孰能為之伏以天地之覆載皆知有帝王之師風雨所漂搖遂不見宗廟之美睠我暨陽之學創于慶厯之朝來者皆視如傳舎之人去者無必葺墻屋之計車不容而門壊廉太近則堂卑盡㦸弗修丹楹未備舎路寢孔碩之外皆朽木不彫之餘固知子騫之言舊貫何必改作恐如安石所論後人將謂無能本欲經之營之成之庶幾合矣完矣美矣然則欲毁鄉校豈不為鄭國之羞僖公能修泮宫未必非魯人之助用勸爾士各肩乃心原註謝安石欲修宫室王彪之曰豈可大興工役勞攪百姓耶安石曰宫室敝陋後人將謂無能彭城集巻四十
