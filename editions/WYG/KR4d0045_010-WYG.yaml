body:
  text: 彭城集巻十宋劉攽撰五言律詩占晴南國無全臈江天可喜晴山林開雪色鳧鴈與風聲春物催羣動年華強旅情無人同此酒歎息滯蠻荆蒸濕何由解喧和自不禁片雲常蔽日小雨不成霖蚊蟆晴明地蛟龍老病心雄風不易得無處可披襟雪晴山雪喜初霽意行因肆觀巖光花半散峯勢玉新攢鳥去樹冰落水來溪舍寒還愁向融㪚立到夕陽看還郡寄洛中諸賢雖勤車馬役而與故人同濯熱宜清洛忘饑為碧松御風思禦寇縮地憶壺公待我成仙術相過豈有窮送江淑寺丞棄官歸江州時事不可願還家方自由看山一長嘯飲水亦消憂林竹通鄰里陔蘭潔膳羞還將計然策江上倚扁舟霍邱謝令寺丞明府雙飛鳧南歸鴻鵠俱東風解冰雪春水渡江湖光祿詩為樂淵明酒自娯公田皆種秫三徑更何須送王肅侍禁新安監酒丹穴鳯皆好藍田玉自温流傳洛生詠歎賞貴公孫好事欲成癖著書經閉門看君桂枝擢䘵仕復誰論山寺疊嶂横秋水招提隱半峯白雲迷到路曉日自鳴鐘法㑹樵漁熟齋時鳥雀慵試尋方外士繫馬就長松畫雪扇子灑落瑤花薄蒼茫殺氣深因風驚拂面濯熱幸開襟夜色非關月朝雲不待隂秋風來應起好在郢中吟曉起東園禽鳴知欲曙野客自晨興春草生三徑朝光下九層園林問圃老笋蕨待巖僧即此甘幽屏趨時要未能古檜亭散櫟厭為社枯梧非有神一身具松栢千歲作秋春風影日亭午露香宵向晨唯應仙鹿跡不悔白頭新昔聞上昇檜傳作亳宫神念此亦千載玩之經一春凉蟬號永晝獨鶴起清晨誰與畫屏幛長令水墨新上櫰亭人世南柯夢看君葺舊居小庭長汎掃暇日省文書黑葉生烟外黄花過雨餘那知山谷興不向市朝疎登樓溪谷含冰雪川原見草芽春生三峽水日照萬人家時節長如此風光㑹有涯唯應多美酒厭看海棠花雨中過汜水關入鞏縣泥塗出關惡風雨過雲寒懸水餘百仞層峯知幾盤攀躋頭目眩揭厲衣裳單稍出萬山外始知人世寛次韻謝三利涉寺見寄衆水㑹蒼山僧房積翠間夕隂留到客清暑獨開關月出亂峯白天明遊子還他時望君意餘恨不同攀題利涉寺原註寺有唐利涉禪師葬塔故吕宫師相公讀書龕雲水上方居迢迢百尺餘水光搖几席嵐翠徹牕疏鶴樹追前佛隆中問結廬已知禪寂意仍得揣摩書哭王子直積水忽變濁聚星無復光風流都滅盡天理竟㝠茫過事皆陳迹餘哀祇淚行遙憐轉麈柄顧影夜燈旁衰老惜年歲羈孤慕友生一哀誰為慟百志爾無成弓劒輕前敵詩書足自名人皆期不朽持此傲公􅀸荷花白水滿方塘荷花五月芳弄珠圓不定濯錦冷逾光香憶風醒酒聲宜雨送涼扁舟學騷客葺室近滄浪黄州臨臯亭遠國江千里荒城水一涯居人愁避虎過客競乘槎秋雨吹天暮寒濤浸日車從來遷謫地卑濕是長沙野竹亭勁節四時好此君常眼青影搖金破碎聲動玉瓏玲方丈塵埃絶高齋醉夢醒由來謀野意不異在林坰聞西戎乞降玉關依斥堠荒服祀春秋干羽由來事桑榆尚可收發書迎寶馬錫貢入貂裘高枕興王世吾生免外憂冬夜賞月暈逐隂風起光隨凜氣多霜應摧桂樹冰恐徹天河池鏡初容鑑窻櫺亦戲磨關山千里雪此夕共金波雪夜月中雪霽流雲盡天虚片月升氣清羣玉府光徹滿壺氷過鴈明可數啼烏寒不勝山隂自此去野興豈難乘玩芳亭誰與玩芳草慨然思古人東風千里目紅蘂一城春賀燕自高下浮雲無舊新南山際滄海更覺爾為鄰留別諸兄弟羇遊路萬里物色共悽然霖雨傷秋意西南接漏天壺公縮地遠列子御風旋信有神仙術諸公一見憐暫之霅上留別一二兄弟回首嗟行役吟詩愴物華西風凋木葉客子去天涯日暮看邊鴈江秋見海槎重陽誰對酒野菊自開花春日登樓水國春歸晩晴樓旅望賖青絲垂地柳白朶出墻花聽鳥參人語看雲任帽斜滄浪殊不極春色故無涯野性耽章句春容看旅愁眼前都俗物天外倚高樓芳草茫茫綠清淮􅀈􅀈流片雲還欲雨悵望恐花休綠野亭偶題記得春晩句縁情因謝公名賢共標凖清境定無窮樂矣登臨際悠然坐嘯中壺觴聊發興隨儉亦隨豐倚郭徧禾黍安知私與公為農亦可樂遇歲不終窮累榭白雲外壤歌明月中誰言魯酒薄自覺勝新豐日晩步過孫監丞夕陽喧鳥雀幽逕入蓬蒿於此興不淺行吟殊未勞市朝移俗態麋鹿共吾曹稍稍鐘聲暝林梢白月高望華山原註荆華相連也荆山連太華青翠望難分嶺首明新旭山腰暝白雲玉攢光自照波蕩勢成文應接寧知倦清輝遠送君鳯翔官宅園亭退食自閒暇空堂仍集虛秋林長費掃寒草不敎鋤移石改迂逕拂墻看舊書枝棲亦云穩何用憶吾廬馬當山雲壑斷無土江流横倒山蛟涎晴出沒鳥羽倦飛還神禹遺疏鑿天機藉險艱長風且破浪帆席慰愁顔送畢長官銅墨非君志仙鳧為我來三年話傾蓋十日算銜盃許與羞垂白飛騰指上台倚門方有待未覺厭京埃送鄭推官此邦人事少離恨不關心頓與吾子別如何旅思深暖風隨躍馬永路變鳴禽蓬鬢添衰白知予厭滯淫詠雪北風吹朔雪楚塞亦凝寒天地浮雲滿江湖行路難醉宜乘馬出高愛倚樓看㑹是豐年候居人意似寛書堂對雪天寒不成寐看雪坐清晨黙怪人聲絶都迷物態真璇宫寒爍目琪樹靜無塵信有崑崙圃神游屬此身和裴庫部諸家雪侯家裘馬寒逾壯歌鐘瞑未閒排雲朝象闕踏凍獵黄山上客珠裝履妖姬玉綴鬟園林通夜賞洞戸不須關山家雲暗峯疑斷林長路稍迷庭隅時臥鹿旁舍遠聽鷄隱几添樵火應門倚杖藜兒童别村至薄酒自提擕酒家繚徑集缾罌江樓倚上層青帘吹淡墨翠幕映飄燈勸客寒威壯歌時歲事登十千賖可得不恨價仍増獵家寒事輕盃酒晨裝急製衣狐麋尋去迹鷹隼競横飛沙路濃隨馬風毛盛合圍興酣生鼻火狂發㑹忘歸樵家山木瓊瑤合溪風虎豹哀舊林迷處所破斧獨歸來世路深泥滓生涯半死灰誰憐廊廟語正復此遺材船家雲白連沙渚風髙雜浪花解㠶依下鴈沽酒看棲鴉篷響投珠亂門欹墮劒斜山隂路不遠去問戴逵家雪後髙城催戍皷病枕聽哀鴻灑竹蕭蕭雪開門峭峭風消憂罇酒綠久雨燭花紅旅夢還知路孤舟向剡中朔雪凍乾坤黄雲晝景昏宿酲猶戀酒靜卧亦開門烏鵲時時語松篁處處翻問知淮水凍不復渡頭喧陸子履有詩贈行次韻留別尚白不自悟愧君稱絶倫髙秋獨去國下水不留人菊秀鴻初過魚肥稻已新淮山見明月千里最情親留別傅欽之驅車長值險投足正臨深白首抱壹意故人知此心巢禽驩避弋轍鮒偶為霖去矣江湖興凄然東武吟苦熱炎暉不可避鬱鬱度朝晡飛鳥有時墮高林無事枯形骸等外物橐籥任洪爐正有捐塵濁東浮萬里桴炎暉共茲世南紀獨何偏天地大爐耳江湖沸鼎然魚龍危失所黍稷恐無年浩蕩思雷雨長吟雲漢篇畫鶴置此憐神駿三年故不飛軒車寧假寵野客㑹忘機燕雀那相笑鳧鷖直自肥蓬萊千萬里正想玉為衣得楊十七書見報所居近種花木詩堪憂雖陋巷寓興即名園似得壺公樂如吹黍谷暄艶花爭獻笑芳草共忘言近種南軒竹春來亦有孫眼昏因循衰便至邂逅眼成昏稍與詩書隔初慙長老言原註陶淵明詩云昔聞長老言掩耳每不喜談空迷起滅蠅翼競飛翻懶卧稱長策深居欲杜門登浴室院閣秋霽登臨好危欄百尺梯層城斜照裏雙闕五雲西雜樹黄映綠生煙髙復低章臺少年子走馬錦障泥稍出紅塵外方知萬象虚林端辨遠水樓角怪行車燈續黄金像香餘貝葉書誰能損世事即地亦山居中夜見月月午四鄰靜髙齋人寂然虚空時有警影響善驚眠宿羽移深樹商胡慣夜船無雲更可恨珍重此嬋娟新月稍見桑榆上還沈河漢西氣凉知露白天闊見星低靜色餘簾額回光射鳥棲城烏偏可恨到曉不休啼次韻和黄朝議下武新周烈謳歌屬禹謨恭聞始元詔遠紹帝軒圖山海無加賦戎胡遂息徒英風逾草偃俯仰逮樵蘇已作華顚老欣聞紫詔新經綸兼亊事哀痛及人人願輟須臾死求觀富壽民短歌隨擊壤感動不無神傷丁元珍學士休沐非連騎投沙迫去身似鴞憂鵩鳥化鶴望鄉人夢與江湖隔情存翰墨新定交相得晩撫事亦酸辛喜雨山雨來何暮高天始震雷江聲翻灔澦水氣逼昭回灑落芳年晩空涼醉眼開蛟龍定神宅蝸角更誰猜漫成經旬柳已綠過雨草齊生無事觀兒戲閒遊識鳥情看花低帽立弄水棹舟行宦學都如夢浮生底自名次韻和司法掾陳郛晩得詩人賦長謠長者言坐曹涼雨過歸舍暮禽喧交態傷貧富時情任輊軒懐歸空有夢郢路屬營魂送慧思歸呉塵埃十年夢江海一身歸境與夙心㑹事容前日非連山横遠勢定水湛明輝別後相望處雲孤鴈自飛奠昭禪師昭公不住世岑寂白蓮宫煑水終還冷浮雲本自空諸天方丈室萬事百年翁俯仰成今昔蕭蕭鶴樹風送僧子南脫身游萬里空手出長安猶以抱琴樂不知行路難春歸呉國遠水滿紫溪寒越俗今章甫疑師不著冠宋門城下新居頗習田野事偶居朝市間前塵應妄想舊觀輒來還甘井如汲澗髙城疑望山更憐車馬絶日在掩柴關新居舉世同逆旅此身那拙謀趣營容膝地適似種𤓰侯藥餌扶多病躬耕強隱憂彈冠仍應客車馬肯淹留雪後行小園晚照開霽色閉園幽事増樹搖風落雪池漲水浮冰鵲亂聲已變鳶飛誰為矜風光看滿眼取醉此吾能過丁晉公舊園寧知陵谷變遂見曲池平喬木秪益老儲胥空復情廢墀盈疊蘚頽榭迹微行桑霍為厚戒千秋餘歎聲雪夜酌酒雨雪寒休市春泥早閉門嚴城深窈窕孤月靜黄昏棲翼此中樹髙舂何處村物容煩應接乘興即開樽送雍元直使浙右詔給四封傳自乘千里船雲山深發興秋物正蕭然零雨隨持節驚濤避執鞭鱸肥稻米白勝事奈君偏引泉春池凍己消泉落白魚跳石淺喧鳴玉沙虚没暗潮晩寒妨濯足竟日欲平橋最愛臨波柳東風萬萬條金鳯花妖嬈如自媚紅白競為娯共笑翔千仞猶疑將九雛軒墀䝉􅀈睞風雨易泥塗靜掃蒼苔地還令近酒壺景潮亭澤國水遙遠歸舟亭短長他方向夕景此地正朝陽物色桑榆上風波鳧鴈行臨流問漁父好在濯滄浪退朝觀御溝上雜花贈陸四溝水去無窮宫花映日紅惜隂猶宿露照影獨衰翁燕語晴明外風香錦繡中為非温室問心賞幸君同上三山磯江湍趨絶壁山木映雲濤野路青冥近孤舟應接勞魚龍防碎首鳥獸幾亡曹生事埀堂戒愁心欲二毛過龍眼磯洪波浮一葉弱髮引千鈞虎豹公横道蛟龍喜得人强顔猶失色乘險屢傷神回首雙鳧翼隨波愧此身送鄭五下第西歸萬里河西路憐君徒步歸遊人並塞少落葉待霜飛相得不恨晩知音深謂稀壯心須慷慨勿學淚沾衣送人之官嶺南過嶺幾千里孤城近海涯地温饒瘴毒民惡半蠻家并日初開市非春亦有花知君望星斗西北認京華和孫少述中秋月出東山表遙思澤國秋縁雲孤鏡上透水大珠浮重露梧桐落微寒蟋蟀愁我時携客飲浮白最高樓竟夕雲四歛始知天意偏西風不勝冷亭午更添圓老髮縁詩苦秋懐得酒便君居江浦上望我想依然春日野次溪雲晴漠漠野日晝隂隂燕翼飛高下花房亂淺深和風快吹面凈水喜清心極目傷千里曽無楓樹林南原南原殊可望桑柘百家村縈赤春晴氣青葱舊燒痕遠川飛鴈鶩平壤牧鷄豚更待花如織臨髙置一樽彭城集巻十
