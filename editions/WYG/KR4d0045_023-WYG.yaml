body:
  text: 彭城集巻二十三宋劉攽撰制誥朝散郎大理卿杜紘可朝請郎奉議郎試侍御史王覿可承議郎餘並如故制刑罰所以輔治法令在于便民惟將明之材知所筆削而哀矜之澤由是布宣嘉其成畫用推懋賞具官杜紘通知法意詳練時務具官王覿天質精敏儒業該茂而皆持心居厚觀物能察討論五刑之中究極三典之要輕重適冝簡易難犯新令肇布大綱粲明疇其恪居錫之異數加秩進等是為寵光益圖報稱奉議郎陳向能可承議郎置郡邑被邊中外雜處加之逺人新附應接多務為吏者比及三年事整而無曠可謂能矣是以賞典及之爾參釐幕畫其效中率進秩一等以疇勤勩宣徳郎曹旼可通直郎制朝有大慶賚于四海百官進秩雨露之澤也爾預于甄叙通籍朝閨榮親顯家其賜盛矣服此休渥毋怠祗肅允劉安世可右正言制侍從之臣朝之精選諫爭之職士所深願為其班著在日月之際論議有耳目之助上之用人既其甚難下之自逹固亦匪易惟忠信篤厚乃能當其任矣隲庀職右垣綽形善譽安世讎書中秘素著髙節足以膺此慎柬並處言路爾其迪上以誠明之徳修已以純白之操進不為名退不畏勢使人曰邦之司直不亦善乎承議郎盧訥可通判徳順軍制州郡被邊皆于襟喉之地故雖褊狹而澤人甚艱倅貳者佐守之職政無不關其在邊之選又加重矣爾以才畫可稱宜膺繁使付爾軍壘勉思勤藎承議郎通判鎮戎軍韓宗哲可通判大名府制朕以北都圻甸居宇之重而河防之役方復繁夥故以旄鉞付樞機舊臣使司管鑰又惟其佐貳宜所慎選某幹畧堅挺見于職任是其遭事當不避難奉長當不苟合善治之效可跂俟也以是命汝敬慎毋怠奉議郎楊紹可通判蘭州制邊塞之斥西路逾廣金城之地襟喉夷漢選將遣戍常膺重寄具官某器大有容材茂兼濟資忠厚以為質兼惇闔而輔志仁為巳任毅而不回惟幾成務其施逾博粤自先帝擢躋右府智名勇功足究子房之事忠言嘉謨加著君陳之美冝正斗樞之拜以副薦紳之望書社真食併増異數將使蠻夷率服金革不試在夫謀之臧而下丕應氣之和而衆知悦此吾制治之本任賢之心勉而行之以副虚佇通直郎太僕寺丞髙士英可工部員外郎制百工之事萃于冬官屬郎之選是冝遴簡以某効職輦轂克修馬政風績壯敏冝所進升俾陟文昌之府以觀驥力之效朝散郎陳知新可知華州承議郎張景温可通判荆南府制守倅之任有地干里承流宣化推廣上恩興利除害究度民事有志之士所願為也馮翊右輔江陵故楚生齒之盛厥為名藩擇材而處以命爾等或守或貳思所為報開封府推官羅適可府界提刑前河東提刑范子諒可開封府推官制邦畿千里王化所先内有幕府參預謨畫外則節傳督視縣邑皆為劇任冝付能者以適強力民事知其要務方疏治畝澮僅其就緒以子諒前奉使指按刑無頗是用並從推擇付兹浩穰詳獄岸之巨細察民情之真偽其亦無怠初心是則動罔不獲宣義郎徐夀可宣徳郎添差福建路轉運使勾當公事制縣令之職愛民者也賦取有不便能以固争于上使者非其人能以拒而不顧守正不奪見黜無悔如此乃為稱其職夫汝允蹈之去思在民歴久不忘淹滯嵗時百爾稱頌重因薦書之上將勵素飱之輩増秩一等𨽻屬外臺興利除害隠䘏民病悉爾初心其必有補矣故捧日左廂都指揮使張元孫彦訪可二班奉職制䘏孤延賞朝有著令乃祖為國爪士殁身旅帥資其餘寵及爾童孫敬服休命思所自立借職秦威弟戌可三班借職制哀死卹孤朝有常令兄亡弟及抑為殊寵今以俾汝敬服休命趙子諒等三人可右班殿直王楹等十四人可三班奉職制朝廷設科以求材武弓馬程其藝能策畧觀其趣向二者俱茂可以當勇爵而承器使矣爾等咸繇舉薦得備廷試實副其名朕甚嘉之品差授官用示旌勸祗服光寵益思奮勵皇叔故皇城使榮州團練使仲鞸可贈密州觀察使追封高密侯制公族之愛戚疎有倫存埀惇叙之休没著哀榮之典情禮所極爵秩何遴具官某地居近屬仕齒外朝修身有聞從政無曠奄至不淑為之傷懐冝推加贈之章亦示為善之報廉車侯爵并疏茂恩魂而有知歆此殊奬皇叔故右武衛大將軍惠州團練使叔鮑可贈鄆州觀察使追封東平侯制繇葛藟之庇襲麟趾之慶進總環衛分領使符修身有聞得譽甚美降年不融大命遽及傷悼之懐冝有以稱廉車為専城之重侯耶亦分茅之貴大邦須句并兹卹典尚其有知歆此殊寵皇伯濮州防禦使叔果所生母仙源縣太君張氏可贈永嘉郡太君皇城副使孫懐用母仙居縣太君王氏可贈崇國太夫人制合宫毖祀率土䝉慶幽及泉壤崇其爵號所以慰天下為人子者之心而昭國家孝治之至也具官叔果所生母張氏實生令子齒于公族由其鍾福埀裕克家顯服既疏湯沐之封以厚蓼莪之報俾更大郡仍協令名魂冝有知承此休命具官孫懐用母王氏實生令子陟于朝著由其鍾福埀裕克家顯服既疏邑封以為湯沐而夫貴已隆贈典冝進特從賜國增視魚軒魂冝有知承此休命承奉郎趙令馡可南京簽判制詞學登第既躋膴仕又將試之民務究其心術别都居留幕府甚重以爾從事兹謂美遷冝當悉心簿頷之最豈特曳裾樽俎之間而已通直郎新差通判興國軍沈季長可差充揚州簽判制朕矜爾棄咎既示甄敗更擇名都改佐幕府稍遷安便其益懋哉神宗皇帝御侍五人等守永裕陵迴内王氏與掌闈夫人劉氏與掌賓夫人李氏與掌飾夫人制朕惟先帝衣冠既藏弓劒逾逺凡此女御經侍寝園送往若存慎終加敬逮隙駒之遄邁瞻望田而若疑俾疏渥恩悉進品秩祗服光寵冝謹欽承故尚宫呉氏可贈安定郡夫人制早服貫魚之序端習彤管之訓生著柔範没存懿稱特推愍策以示恩典擇名城于大郡加寵服于褕翟尚惟有知膺此休命入内東頭供奉官梁和米遘可並供備庫副使轉出制効職中侍功次當遷雖寓官資固為明陟今而補外并疏恩渥使聨之重介貳惟寵祗服休命益思勤恪通直郎孫進可國子監主簿制國家開廣庠序學者其至雲委故學省備官而主簿之職清且要矣爾家世儒學既習為吏使膺是選良謂稱焉益務勤修以副銓擇皇城使漢州刺史廣南西路兵馬鈐轄同提舉本路巡檢溪洞公事張整降三官添差充江州監税内殿承制閤門祗應知融州温暠降三官添差充歙州監茶鹽酒税左侍禁管勾融州臨溪堡亊兼地方同巡檢杜震右侍禁權邵州臨口寨鍾仲仁各降兩官制中國之所以臨撫戎蠻常以威信結服其心豈其夸于殺人見小利而起後害乎爾等咸以選擢見任邊徼貪于首功輕肆剪戮無辜横死近二十人文書自營謾不以實覆案究極惻然傷嗟冝正典刑以慰遐僻差奪官秩用懲無狀尚體寛恩思自悔咎太府寺主簿韓宗本可大理寺主簿馬傳慶可太府寺主簿制太府謹出納之總廷尉主決讞之事為職不同程材亦異然精心恪居者亦何處而不冝惟宗本以親嫌引避與傳慶易地而處其各勤慎職業以就功緒殿中侍御史韓琦可左司諫制獻可替否陳善閉邪二者所當納君于道致國于治能至是者其惟良謀者乎具官某資質端茂諭議開爽簪筆殿中執憲法司久有諒直之譽是用擢躋左省參聯七列尊其所聞則義無不貫恕以及物則厚不可勝正色立朝勉之慎之母替朕命殿中侍御史豐稷可右司諌制在廷之臣位下而望重者唯諫官而已為其得劘切人主紀綱國體也然非其學足以達道其智足以周務見微而知著擇善而有容亦安能稱其事而冝其官哉以某自居憲府綽有士譽名不虚得材實允副移珥筆之權當伏蒲之選讜言正色廼其素守吐剛茹柔母愧前哲則我為知人爾號稱職矣殿中侍御史吕陶可左司諌兵部員外郎賈易可右司諌制官以諫為職者所謂以義致身以道事上者也將順其美補助其闕耳目之寄孰重于此乎以陶風力幹濟守正不回率職中臺屢形讜議以易學術精敏好古自喜效官南宫綽有令譽是用躋之二省之聯付以五諫之任爾其慎慮竭已正學劘上副吾簡求無奪素守宣徳郎濠州簽判包綬可少府監丞制昔臧僖伯諫君君子謂其有後忠讜之士所崇尚善善及子孫理亦冝之爾父陳力前朝扶義倜儻搢紳之論于今弗忘而某亦能修身自立素風不墜元宰大臣為之建言吾所樂聞亟使進秩丞佽列卿効智都輦用觀爾能期自恪慎朝奉郎行都水監主簿陳安民可都水監丞制吏習于事者可以勸功爾効職都水其巳久矣因而遷之乃宿其業與夫初試未習者固有間焉勉崇著効母孤寵在刑部侍郎龍圖閣直學士吕公孺可權知開封府制五民雜有是為浩穰之區四方維則實曰風化之本尹正之任推擇攸艱具官某志剛而氣果材博而智敏効力周行莫非重寄剖符大邦分閫邊圉率有治最稱為吏師是冝付之衆大之居究其豈弟之化昔廣漢鉤距察人情延夀恩信周屬縣能者之事何逺之有寳文閤直學士知蔡州謝景温可知潁昌府制部京之南許昌為重昆吾舊宅之地是曰大邦先朝啟封之始因建赤府連七城之㑹繁當一道之綏輯其所擇守未嘗輕付具官某老成之徳中外洊更治民之材所至可紀冝換符竹之寄俾分璧田之奥忠臣之義乃心固在于王室良守之事可以䝉福于京師陜西轉運副使葉康直可直龍圖閣知河中府制朝廷之用人勤者有以報之勞者有以休之要區劇任常使迭處爾將漕陜服歴年于兹金榖之用無乏羌戎之警鮮上結課之最朕用嘉之惟蒲中之要藩居三河之勝地擇守之慎得人攸艱付虎符之優寄増龍馬之峻秩寵勤休逸并以賚汝勉服休命益圖來效新知秦州孫覽可知河中府制龍門河山之固見于前載今為大府實一都㑹賦入之繁夥軍旅之走集其地已重擇守奚易爾資性平曠遇事通敏外宣使指内佐省轄洊著能名允膺繁使易地隴上徙治蒲中漢之三河此為大郡循良之稱屈數為多勉務風績以追前烈資政殿學士知鄆州蒲宗孟可知河中府制嶽牧之任是謂維藩股肱之郡尤所精選具官某早以周材進歴近輔均逸居外偃藩斯久政術優裕民俗畏服顧以墳墓為念桑梓是恭求易便郡頗慰明發朕惟體貌之重從欲是冝付蒲阪之奥區當三河之都㑹敬服休命益思逺績資政殿學士知鄭州張璪可知河南府制三川之地二代餘俗内守宫鑰外奉園寢居留之寄慎選所先具官某智實周務器維華國謀謨著于廊廟功業見乎舉措柱石之資民望惟允繇均逸而居外既報政而上聞爰付玉麟之符以總日圻之重冝其惇懋風化用拯陵遲龍圖閣直學士朝奉大夫盧秉可知荆南府制君子不奪人之親使之遂服先王之制既不可過門外之治有以揜恩具官某早以才化參于法從聨龍門之秘邃總戎閫之㑹繁吏最亟聞親喪致事不呼其門于今三年祥琴始終仕服宜復眷南荆之奥壤居全楚之上游剖符列城表率一道祗服光寵益思恪居寶文閣直學士知揚州謝景温可權刑部尚書制百官之本係于尚書六曹之長稱為八座朕慎選其人每加遴柬益嚴試可亦無虚授具官某禀性剛特為學堅正綿歴中外浹洽聞譽察民情之真偽練國體之詳要是冝付之秋官之任執此邦典之中噫論法之失或以便文而忘惻隠之實好生之徳乃在盡心而得哀矜之㫖慎爾官守副吾休命朝請郎王子琦可衛尉丞制中外之任非有重輕惟才所宜而後付與爾更歴州郡既有善績觀光于朝貴于爾近是以擢丞衛尉効力轂下欽承休寵勉就職業朝請郎温俊乂可大理寺丞制決平獄事下無免人作士之重所以使不犯于攸司佽助之官丞居其一以爾材力通敏大臣所稱擢而用之其必有效宜自奮勵以光任遇張番龍進奉使將軍制慕義向化獻琛修贄誠款可取甄賞冝及並從懋賞以榮種落或繇卑秩稍遷品列或起徒步而加爵服咸思忠孝以酬光寵左司諫朱光庭可左司員外郎右司諫王覿可右司員外郎制朝廷開直言之路延諫爭之臣其能愛君主于信厚論事識其大體不為苛察以取聲譽而補益之效粲然可見冝有褒崇以顯尤異惟覿學問端邃臨事屢斷惟光庭氣宇惇重見義不回並列二省有光七列文昌之為政本都司之有屬郎尤思得人以齊衆務俾從遷秩復使効材左司諫韓川可太常少卿制諫諍之臣以讜言悟主禮樂之司以制度輔化皆當精識好學乃能勝任故冝于此者可以進于彼矣具官某智慮通敏文采淳正自歴風憲之司以及諫垣之列忼慨大體激昻壯志資其餘論可謂盡心移其直清足以典禮冝付秩宗之貳用觀儒術之效朝散大夫左司郎中范純禮可太常少卿制晉侯霸者首正執秩之典漢祖馬上亦先叔孫之儀禮樂之治古今要務于其司存必付能者某生于名族幼有令聞忠信可以學禮文雅用之飭吏屢從器使皆得士譽冝寘奉常之貳俾主曲臺之論至于通古今之變使無膠柱究情文之説不為聚訟是勤職業用副奬擢太僕寺丞高士英可府界提㸃制都畿之廣縣邑棊布在周則規方千里于漢則開置三輔至其聽察獄岸調度官用何嘗不選擇使者宣布上恩以某敏恵於事久結吏課宜付傳車之任以觀美俗之效天武右第一軍都指揮使通判刺史聶達可左屯衛將軍致仕制朝廷之于羣臣壯則取用老則安存休息之所以全其恩厚也汝以武力為職至其耄老不可復任以事仍錫餘寵用光暮齡環尹之崇實為異數虎翼軍都指揮使寧州刺史張明右領軍衛將軍致仕制効力虎旅恪恭師律今其年至冝使休佚擢環尹之寵號為掛車之餘榮䝉被豐恩知其優渥新授常州司理參軍孟三英父真可承務郎致仕制夫貴老尚齒所以勸天下之為人子者也是以赦令之下常及高年粟帛之賜既有秩次九十者復命以官此朝廷恩禮逾於前世矣爾以暮齡膺兹寵數内為子孫之榮外為鄉里之觀逢辰之幸其亦至矣承務郎致仕張彀可承奉郎致仕制引年致仕弗及以政而慶賞之典與在朝者均國家養老之禮所以隆於三代也爾以暮齒膺此光寵既為幸遇亦酧素守承務郎致仕魏中庸可承奉郎致仕制告老謝事退居里宅勤勞之役既不汝及朝有慶澤顧不汝遺貴老尚齒惇篤至矣蒙是休顯汝知幸焉通直郎李周可奉議郎致仕制告老之臣弗及以政慶賞之事遐邇不遺以是朝恩迨於耆耋惟汝黄髪膺我殊寵是誠幸遇母忘欽承宣徳郎致仕吕昌符可通直郎致仕制以年致政閔勞以官職之事而慶賞之典亦不汝遺朝廷貴齒敬老之風厚矣升秩閨籍有列位者得以追贈其先不其貴歟然亦為吏廉勤無咎之報也汝知之乎儂應卿可三班借職充歸州巡檢制乃父為國守邊外禦夷獠而以疾病不任需章來上仍述知子之内舉庶幾幹蠱而克荷冝從錫命以靖逺甿承議郎翟思可祠部員外郎制尚書屬郎皆擇端士其進既難而其用有漸以思敏識深慮見稱于時冝備建禮之朝仍付冰㕔之選勉勤職業以稱推擇行門崔琪等七名授官制國之爪士居守王閑拱衛軒陛之嚴耆竭股肱之力積勞可叙甄賞冝加因其執射之後先以為賦禄之等秩膺我光寵勉爾恪修又七萃之士為千夫之長治衆以整訓勇知義隊師之選材武是艱爾陳力軍和蔑聞粃政叙遷園校用錫茂恩加團結之雄名壯貔貅之重望益崇來效毋棄往勞又國家開設勇爵養育戎昭壁壘星陳偏兩鱗次戰多則懋功疏賞平居則用勞次遷所以一内外之志齊上下之分爾陳力維舊叙進是冝齊衡五符踵武官帥壯貔貅之重望假符竹之雄名恩渥之隆敬慎勿替朝請郎解補建故父任尚書刑部侍郎致仕贈金紫光禄大夫賓王可贈特進奉議郎王詔弟奉議郎䕶故父任給事中天章閣待制贈銀青光禄大夫舉元可贈特進制能仕教忠良父之事立身顯親孝子之美朕嘉義方之成訓矜欲養而不待弗恡髙爵以隆贈典具官某父某生膺顯秩殁有餘烈肆其後嗣服此朝寀因釐事之告休沛豐澤而追逺特進之貴位次上公冝加蜜章用賁幽壤朝散大夫宋恵國弟朝奉郎輔國弟朝奉郎奉國弟朝奉郎服國故母豫章郡太君劉氏可贈榮國太夫人制合宫毖祀溥率蒙慶恵澤所加無間幽顯然非積善之門世有令人亦何能霑此優渥無愧泉壤也具官某等故母某氏婦順著聞母儀修整諸子伯仲同列簪裳褒贈之典實慰孝思縁其父之崇貴冝厥配之休顯粤疏名邦申錫象服尚惟冥漠潛喻光寵大中大夫致仕程珦妻夀安縣君侯氏可特贈上谷郡君通直郎吕元淳弟奉議郎元忠父吏部郎中充天章閣待制景初可特贈通議大夫元淳母仙源縣君陳氏可特贈潁川郡太君元忠母永康縣君魏氏可封安福縣太君制宗祀均福普及幽顯所以昭孝徳之光于四海亦不遺小國之義也具官程珦妻侯氏粤以令徳嬪于茂族輔佐君子稱為女師餘芳不泯既没如在特疏郡封以為湯沐從夫之貴當榮于室泉壤有知歆此光寵具官吕元淳弟元忠父某直清勵志端直立朝脩途騁而未窮高風没而猶振肆其後裔並列朝閨慰其蓼莪之心申以漏泉之澤進加寵秩増賁幽穸其亦有知膺我休命元淳母陳氏粤以令徳嬪于茂族輔佐君子稱為女師餘芳下泯鍾慶仍厚爰因子貴追預夫榮特疏郡封以為湯沐尚期幽壤歆此寵章元忠母魏氏韞徳幽間作嬪良奥母道既茂子貴方顯屬此合宫之祀方賚溥天之慶冝疏封邑仍畀名城既崇湯沐之榮亦慰烏鳥之報朝散大夫司農少卿同宗旦故伯父任尚書虞部郎中繹可贈朝請大夫故伯母長安縣君杜氏可贈昭徳縣君制禮之所起由義與恩尊尊親親率自是出惟宗旦懐世父世母鞠育之愛思有以報有請于朝不徒爾也用巳攷課陟明之賞推而移之可謂能不忘恩者矣雖法所未有可以義起也無害于尊尊親親吾亦安得恡而弗從加秩一等増邑湯沐用告其弟足為光寵彭城集巻二十三
