body:
  text: 彭城集巻八宋劉攽撰七言古詩和楊十七傷蘓子美蘓君在朝素機警氣排青雲力扛鼎鵷鴻遇風鄙巢栖騏驥得塗嗤坎井千金置酒宴長夜錦繡照爛絲篁静明珠盈車謗隨起白巾還家酒未醒翟公署門賓客改魏牟去闕江湖永濯纓漁父唱滄浪結廬陶令依人境時浮扁舟就什一出從數騎非造請窮途詩語尤慨慷暮年筆法加豪逞霜凋蘭蕙不待老一世驩悲竟俄頃遺書猶缺茂陵求卜宅乍許要離並生平相望不相接凛凛氣概吾能省川流既逝安可回駿骨雖買何由騁知君金石嘗定交末路人琴俱不幸大招無復修門期懐舊邈與山陽等城東觀魚東城水深色如黛居人來過不知愛我浮扁舟轉城曲蒼烟古樹寒相對忽如身在松江㳺況有漁子前操舟霜天黯黯始下鴈雪浪杳杳頻驚鷗萬魚挂網同時急赤鯉長大猶人立舊疑古潭有神物倐見金鱗却騰入檝師獻功喜相顧岸傍驩聲仍坌集主人置酒樂未央艇子行䏑輕相及吳酸縷鱠白玉盤四座相喻同加飡人生萬事豈有難我能為公成此歡興極意移令我歎落日藹藹沈雲端岸草露白天風寒觀魚清濠環城四十里蒹葭蒼蒼天接水使君褰帷乘大舸觀魚今從北闕起開門漁師百舟入大罟密􅊻雲霧集小魚一舉以千數赤鯉強梁猶百十濁醪賞功傾瓦壺公言錫爵爭讙呼餘人不及色沮喪數竒天幸相賢愚濃雲吹雨寒蕭㪚置酒移船泊前岸暴殄天物古所矜誰道於今為壯觀送張太保知冀州原注自羣牧副使除使君使敵前嵗中手為單于畫吉㓙敵人破膽不敢迕即日歸報明光宮漢家牧師三十六水甘草豐馬數足問誰虎臣司苑門極望離宮皆苜蓿長河東來横冀州雄雄大府森戈矛紅旗照天軍令肅紫髯昂藏居上頭將軍威名動殊俗天子今無北顧憂舊傳冀士多良馬嵗看北客輸旃裘廟謀將新赤岸澤強鄰猶知博望侯使君家聲仍世傳慷慨功名方壯年黄金如斗組丈二富貴光華真謂賢送裴如晦知潤州栁隂深碧黄鸝語川水平堤鷗鳥舞送君臨流眼暫明愛此虚凉少塵土何况連檣一月行吳山楚水相逢迎稻花吹雨香不絶蘆葉搖風聲正清北固樓臺似圖畫廣陵欲渡聞潮生縹壺盈前京口酒紅旆相隨北府兵少年投栗常為樂晩嵗甘棠空涕零望君鴻飛不可攀白頭方出玉門關獨向天涯共明月猶應夢裹借千山送章學士知湖州昔賢為親屈小官使君專城情更歡連山大湖水凝碧高蓋駟馬車塗丹綵衣兒戯養顔色箬酒賔宴羅杯盤吳興釣碣亦可羡悵望從事空南冠陳和叔賀蘭溪所居近有信來言水竹事戯贈北山移文那爾為淮陽招隱殊未歸流泉漲溪可厲渡修竹飽雨添舊圍鳴禽作巢皆有託白雲抱石初無機主人已知戰勝樂溪童未老情庻幾原注小謝詩云方同戰勝者去剪北山萊柿紅柿紅梨紫漫山熟冷雨蕭蕭落喬木東田收榖畝數斛築塲歛積高如屋柴車斑斑黄犢健丁男肩赬兒指秃烹豬漉酒樂社神急鼓悲笳㫁仍續田家此樂何所憂閭里至老還相收道傍滯穗如山邱何䖏老翁寜有求寄題岳陽酒務水樓洞庭蒼蒼水拍天巴陵居人無斗泉天生地勢正如此抱罋臂飲真堪憐架樓􅑆木出百尺剖竹接筒如筆直驚雷發地山鬼憂白波統霤湘君惜吾侯智與神鬼侔古來能事皆悠悠㑹令太湖變春酒更使騷客忘離憂關西行關西居人多閉屋屋底老翁相向哭縣官禁錢錢益輕百姓無錢食不足平時斗粟錢百數今者千錢人不顧大家蕭條無十金小家流離半逵路憶初鑄錢為強國盜賊無端皆得職邇來救弊因寛民盜賊自苦民逾貧安得萬物皆為銅隂陽熾炭造化工鑄錢萬萬大似尺官定足用民家豐移舟城東厭聞九衢車馬喧汎州初出城東門隂虹吐雨水勢怒河聲浩浩如雷奔棹工讙呼事拳㨗童稚變色愁驚魂濟危經險正當爾安得拱黙為希言雖無清泠可澣滌喜見黄濁來原原便風催㯭兩快意千里萬里何足論㳺濟堤傅家園亭濟水與河俱至海陶邱之北川原改由來天事不可料黄濁長存清晦在猶餘平堤十里長逶迤東注如高岡水泉味甘土脉膩固知餘潤宜羣芳君家園籞臨濟堤荆扉茅屋隨高低當軒古木密如蓋無數雜花行有蹊谷虚遙聞樵斧應晝静便有幽禽啼穿栽卜築事未巳上為層臺深鑿溪東鄰可買莫惜費臈月課原注平聲種當令齊栁綠正如陶令宅桃紅應似晉人迷城中老守厭窘束行樂得至城東西此家園亭可屢往薄酒自足充提携和楊彦文嵩山詩楊侯作邑山水中縣南百里維青嵩官閒身老詩筆健樂與邱壑研豪雄是時新凉背炎夏草木秀麗全天功重青疊碧百萬狀有如耋老携兒童懸泉落崖㵼萬丈震雷發地聲隆隆隂風巖洞忽悽愴寒生六月如凝冬祠官祀典有常秩掃除給復何其恭孕靈産異逺不極面周負鄭人殊風生雲觸石始膚寸倐忽澍雨成冥濛羣山相望不足算禮若小國來朝宗幽人羽客此獨往深䖏時與神仙通念君吏職有章綬池鴻籠鶴思長空暫留靈境寄心賞仰止萬古希遐蹤梯高逕側目力短渉厯庳下非穹崇山中居人亦富逸翠竹寒松名素封願言携家事卜築採薇飲水欣長終巖田種芝地高下茅屋遡水溪西東君能挂冠共此約何必綺季東園公送徐君章每秋送客常羡人今秋送君尤惜别白髮相知無幾何明日扁舟成楚越忘形誰復到爾汝末路轉憂欺老拙西風落葉密如雨信宿長淮見清月紫蟹出籪加二螯白魚掛網色勝雪人生功名何由致適意勿羞徒餔啜何時亦得東南征赤脚吳溪嘲釣碣送楊康公知安豐縣楊郎作文殊勇為辯如濤波㨗刺蜚相逢喜吾故人子門風宛存令我悲艾蘭驅車最先入百箭穿楊誰可及擢第勝人十改官作官不辭萬家邑勸耕課桑力有餘吏事不受崇空虚後生才資動出衆何至苦心城旦書清泉百里環芍陂楚人千年長不饑叔敖子孫負薪苦念為亷吏何可為忽憶雲臺故侯司空公五郡士馬河西東功名亦有際㑹數退讓自是雄雋風誰謂鄙夫老昏忘屈指古事猶初終作詩冩此豈有意正若指㸃山水書魚蟲天馬行漢家天馬來宛西天子愛之藏貳師甘泉貴人寵第一昆弟封侯真謂宜軍書挿羽廟選將一朝百萬皆熊羆大射盧山亦快意死人亂麻非所悲論功廟堂誰與敵外廐皆是麒麟兒白茅金印結紫綬老將流落多瑕疵天生富貴實有命寜復憶君貧賤時勢高累愚計慮逺大志落落嗟徒為渭橋祖道一語泄身釁邊鼓家流離和梅聖俞食鱠歌黄河赤鯉非龍材欲化不化煩風雷隨波浮沉偷自得網羅失身成暴腮火鬐錦鬛鱗雪霜紅眼照耀珠夜光若無鯤鮞與蝦蚌安見品格非尋常主人愛客不計錢少婦縷鱠情可憐蜀薑吳橘正相益炊菰絮􅅅還慊然燕人寸腴不足貴專諸全䏑非珍味屬饜黙懷一飰報欲令主人千萬嵗白玉換米桂作薪主人家居長不貧賣魚一值任公子厭鱠與遍長安人兗州古檜兗州宅西有古檜十尋度髙百圍大生理成全不增長半枯半榮常常在游人相與疑汝年檜不能言聊臆宣百番桃李香撲地一輩蒲桞長參天束薪尋斧不旋踵種子著花還比肩老身寂寞無顔色猶有黄鵠來枝側早行東方未明天紫色凉風吹空聲惻惻船人起語鳥奮翼蒹葭茫茫江水白石潭轉旋蛟龍窟巖壁冥䝉虎豹迹生存古木数十圍老死懸藤百餘尺民生有為俱事役豈獨覊人不遑息商歌濁酒聊慰懷君不見仲尼旅人常接淅夜携賈十五過巨源作鄙夫開年便四十白髮埀頥眼眵澁不甘老態日見侵自計多憂諸病集待詔侏儒飽欲死囊空有時都絶粒丈夫立氣須激昻豈能中夜牛衣泣朱門貴人那易見後生美仕尤難挹敝裘敗屨欲安往蹭蹬通衢還獨立賈侯游從久不厭孫君風誼今相入由來大瓠矜濩落尚喜靈珀勤收拾暮通水火並鄰居巷無牛羊時屢及汎愛己許金石堅覺我衰遲情汲汲清霜著屋萬瓦明白月當空北風急排門上堂童孺讙青燈照書簡編緝縱談自爾外形骸虚舟不值呼張翕赤桐燒酒傾玉杯念君屢空此遄給葡萄紫熟梨甘津寒葅盈盤更啜汁酒腸雖狹底能足邂逅歡娛論串習百牢九鼎亦盡空金帶玉符誰等級三更還家燈火㫁浩氣凝虚榮都邑斗杓落北草木死層氷凝水魚龍蟄何時春雷起霖雨宿雲温媚天衢濕次韻裴庫部二月二日逰傅園二月二日春意動東風生物來無垠苦憐清濟不如古却愛小園方及辰谷鳥出聲已脱俗林花一枝疑占新銀壺擔酒馬䭾妓莫辜乘興寜傷頻桃源武陵溪深山合㳫巖谷掩映秦人家仙俗迷塗不可到春風流水空桃花山中道人多百嵗翠髮蕭條神骨異漁舟往往傍林麓相逢亦問人間世黄金黄金能成不願鑄封侯可得差有求小來一意今白首世事萬變都無謀詩書已廢徒博奕交友益落空沈浮江湖漁釣足自給拂衣歸去營扁舟瑞荷西濠本連金水河天潢之下分餘波波深水静生物秀十歩百歩皆圓荷五月浮舟人不見瑞荷亭亭尤可羨連二雕成白玉盤合歡裁作青油扇浣紗女子紅蓮房背面照鏡勻鮮粧斜陽弄影並高葢下有戢翼䨇鴛鴦人情貴少瑞云羙亦自天和獨鍾此周王嘉禾獻同穎漢皇竒木誇連理君不見今年大田所收十萬倉上客為子歌吉祥鑿井旱天雨少官鑿井鑿深源長水泉冷塗人無復觸熱憂居人况有操瓢幸前王扇暍力已勞後王舞雩功不省此功一成千萬年却願炎日長當天次韻和羅著作風琴詩送畢長官君不見長風翏翏起山林大木怒㗁喧萬竅是為天籟來無方中有知音全衆妙洛陽琴工誇死桐齊魯諸儒頌清廟刻商變羽不得騁擊手高張空改調豈如風琴得自然但令雕虎長清嘯鏗鏘闡緩連晝夜已㫁復續誰能料不論九奏金石諧那辨五絃宫徴少世間俚耳何足聽幸有楊荂嗑然笑高堂置酒月如霜金盤照筵紅爉燒淵明子賤皆有琴兩君叵惜清樽醮保州亂緣邊戍兵精絶倫腹飽官粟思食人健兒睚眦殺刺史可憐百口同埃塵燕雲蒼蒼日色紫帳前血流守尉死亂兵相讙肯畏天保州去邊無百里耳病風林幾處颼颼葉石磵無時浩浩泉正欲登山驚雨過未經烹鼎怪湯煎病身老態何由避耳疾行當耳順年竹間亭作溪東雜花亂如谷溪西老樹交篁竹横槎波水纔一葦繚逕出林凡幾曲半旬霖雨泉脉動四岸春風栁芽綠眼前景物向人好心事幽憂傷局促城南行八月江湖秋水高大堤夜坼聲嘈嘈前村農家失幾户近郭扁舟屯百艘蛟龍蜿蜒水禽白渡頭老翁須雇直城南百姓多為魚買魚欲烹輒悽惻鄧聖求往為武昌令刻石元次山窪尊及蘓子瞻謫官黄州遊武昌見前刻後同在翰林因有詩示余余為次韻和之側江小屋香酒醅出林繚逕藂花栽溪風暫過響修竹嶺雪未盡兼寒梅往遊武昌值佳境白雲漫漫縈崔嵬孫家舊事頗可見樊山杳靄臨釣臺赤壁樓船不餘燼屬車豹尾空塵埃埋名腐骨彼誰子正見邱墟黄土堆三分割據亦徒話今人尚為羞缾罍謝公伏令首佳句遊衍相與期江隅次山孟宰繼有作窪尊取飲摩蒼苔兩公雄才又超拔明珠照人眸瞼開騰龍始知爪牙壯掣鷹無復毛羽摧腰金佩魚見官秩不似遷客談象雷朝廷一入不得出邱壑何事煩公來南人歌聲易慷慨公詩感激成歎哀蔡河漁叟河氷始消春沮洳老翁求魚日來去川流容船網罟䌓上流下流密如霧跳蝦潛斗不自惜時復鯤鮞聊可識吁嗟勞心能幾何信道相看猶羡他高樓青樓高高危九衢朱欄畫栱相傾扶佳人當軒玉不如紅簾翠幕深沉居危絃促柱鳴笙竽哀音感耳心意舒浮雲不行飛鳥徐㳺人駐車馬踟蹰嘉肴桂酒白玉壺浩唱爛醉何所居樂極哀多盈必虚世故萬變誰能圖飛鳶墮鼠殘諸虞里閭豪傑何時無茂陵老儒空歎息曲突徙薪纔賜帛古詩詠歐陽永叔家白飛若白鷺衆不足珍走若白馬近而易馴古來希世絶逺始為寳白玉之白無緇磷乃知白與玉比道與之貎天與神瑩然月魄照霜雪紅眼顧眄珠璘㻞山農提擕越千里主人得之誇衆賓網羅脱死鷹犬避一以潔素能超羣清江愴神龜大野傷麒麟刳腸折足不免患智若三穴方全身主人好竒意不倦有來往往䝉金銀老翁守株更有待勿使珍物遺今晨始凉夜坐八月秋風高凉風動天地漸疑晝短少閒暇況復宵長減眠睡空林露下物色清閒堂明燈門不扃四隅寂寞羣動息我與蟋蟀皆宵征劉五草蟲扇子吾宗白團扇畫作草蟲樣天時變炎凉棄置幾惆悵網蟲蒼蒼顔色晦畫工筆法依然在剪裁帖綴復生光白月團團仍可愛蒼蠅輕巧蝴蝶狂怒螳斮斧誰能當老蠶作繭意自了露蟬孤嘒殊清凉其餘百品隨變化天機所動俱閒暇座人咨嗟用筆精不知猶是今人畫畫工侯生今白頭有時看畫還涙流壯年名聲却自惜老去心神無處求始知能事湏當年盛時一過殊可憐即今拙工各自喜豈知此家先日前落筆輒得千萬錢題歐公㕔前兩鶴明公真愛鶴相鶴選仙骨遂令千金姿為君軒墀物啄腥豈復辭雞羣鎩翼欲比鳧鷖馴聆音發舞似矜客避寒孤警將依人吾聞芝田逸翮不如此世上悠悠誰識真苦熱南方炎徳非尋常六月高下俱探湯羲和未息不可避寒門安在徒相望苦憐萬物暍且死反顧一身困在牀願呼快雨洗六合徑馭微風周八荒和永叔春雪陬筒吹灰變冥朔生氣萌泉天不覺凝隂忽升氣横厲重雲大同勢綿邈通衢漫漫走流沙近甸稍稍堆喬岳焚爐姹女姿飛揚匝野神姦誰彫琢刀圭不惜透墻隙㨗業俄然垂屋角户斜尺劎未及收窓缺連環如可握鮮粧宫女喜深印紅手庠童鬭堅搦暝雞誤曉屢咿咿飢雀衝人猶啄啄雖憐林篁有摧折却喜隴苖就優渥貧廬敗褐憎破牖富屋珍裘轉深幄使君高義仍汎愛頴士多文方力學獵師得雋鮮棄薧厨釀薦甘清間濁氣隨陽春破凝烈巧奪鈞工畏名貌吾知郢人不復歌古聲比今為拙朴次韻和裴庫部喜雪歌四時平分氣升降當冬宜藏反宣暢𤣥冥羸孱失其職驟弛威權避威仰由來萬事可盡料一夕同雲迷下上始疑羣靈乆猜阻勿爾覺悟驩相訪周宣啇湯號明主圭璧垂盡虚卣鬯豈如聖神備參兩精意潛發天垂貺朔風蕭條嚴莫犯四野皜白光彌望乾施無方意必均隂殺夸多力尤壯松篁得意忍枯槁鷹隼乘時戾寛曠層樓眺遠復褰簾密室就煖仍施幛舞投墻隙到中堂響拂紙疏喧北向樵林無聲自斤斧野渡爭趨急船舫富觴屢舉極嚾呼貧屨踐行赧嘲讓誰令小邑盡華屋不覺南山失青嶂月臨静夜絶氛埃濤起風江冞蕩漾豫期晴和當勸耕徑入園林稍挾杖宿酲未觧雞三號照梁輝煥晨光亮裴侯清通思豪絶郢曲不比巴人唱老均茵憑游益歡閒藉杯酒神俱王明年三農飽牟麥病民自可逃無狀地震戱王深父原注俗云地震鼇魚動員方肇開坼積塊成坤輿漂浮大波不自止幸有萬里之鼇魚抃首戴炎州尾直崑崙墟億載不墜䧟始知力有餘揚鬐播四岳鼓鬛搖五湖豈知古今士竟以地震書自是世俗聞見拘潢汙蛙黽相隨居我從龍伯借鈎餌釣鼇惟子知非誣戱作賣雪人歌北風沍寒紅日短火爐燃薪不知暖南山闌干雪塞滿連玉疊瓊何足算時移事異不可言眼看星火埀南天道傍暍死常比肩市兒相與贏金錢徹功有時難乆全物生豈有金石堅煎湯沸騰在眼前可得意氣長矜權刁景純得假還丹陽晨霜落川水行子自相趣帝城桂為薪斗米勝白玉丈人乘老猶愛書十年厭直承明廬漢廷三最得予告此行亦是思鱸魚沙頭打鼓朝發船捩柂已見江湖天落帆京口望北固此溪此山如宛然壯年封侯豈不好金朱秪令夸者道聞公東岡長萬杉采芝何似商山老櫻桃中庭兩櫻桃枝葉密相對蟠根不十年不能開花如繡蓋前人費力後人賞曩日春風今日在世間萬事或如此富貴功名豈無待共知韶光過眼疾霞紅雪白不足賴繁華及時數快飲鳥㪚蜂飛無所悔上書行仕不至二千石賈不至五百萬此事夸者憂而非志者歎君不見下邳少年授書起幄中運籌制千里功成不受二萬户拂衣歸從赤松子君不見計倪半策誅強呉鴟夷扁舟浮五湖三致千金不自擅至今籍籍宗陶朱大賢富貴不為巳心事邈與常人殊逢時致身如反手雲蒸龍變無時無君勿愛上書獻賦稱賢豪刺繡倚市相矜高丈夫昔曾笑徒勞商賈旦旦爭錐刀題合肥縣效裕堂詩并序江侯既成縣堂以詩及序遺予而請名焉予曰夫十人之聚其曲直不可勝聽也數口之家生生之具蓋益廣且備矣況以大縣百里占籍數萬民之所以望於上吏之所以求于下不太多事哉又况風俗之好訟賦役之無常乎及至乎事修而身佚此固能吏之成效也周書曰乃其裕民孟子曰綽綽有餘裕吾故名江侯之堂曰效裕言侯之才既能以裕民又身獲其餘裕而效於此堂也肥之人皆以為知言予因復為七言以報江侯九月霜降公堂成江侯寄詩求所名定名揣稱事不易以予樸直言必誠百詞號呶片語決十役漫汗一教行令乎於此有餘裕堂以效實非無形庭羅芳草寒轉碧池有魚鳥閒不驚左經右律給嘯咏雨軒風檻含秋聲今我不樂嵗云暮蟋蟀在堂鴻鴈鳴主人愛客豈有極助爾美酒長河傾傷孫曼叔尚書金聲擲賦惟興公西河智略稱㑹宗曳裾置醴初奮發聽履題劒方從容上倚壺遂以為相衆恨王駿不得封韞吾良臣九京地此意自惜悲重重茂陵徐生歌茂陵徐生老且迂一心區區長信書拜章北闕三待報意欲霍氏安無虞那知世主心不同積惡未極難為功徙薪曲突事不爾壯侯幾人能受封高岸為谷邱淵移魯酒之薄邯鄲為人生決已各以時舊意望君君不思幽谷泉幼卿初鑿琅琊溪憶當大歴六年時歐陽今疏幽谷泉復在慶厯之六年兩公相望幾百載中間㳺客常比肩山神愛惜第一境邂逅知者方流傳乃知勝事未有盡可憐歳月猶依然穿雲斸苔色澄澈寳鏡霜刄光蜎蜒巖前濫觴如可鑒山下積石還成川如公好事誠難得推公此心人莫識且如泉源在汚泥誰道汲引非人力作詩刻石歌泉池欲問何似陽氷題熙州行自敵請盟供貢職闗西二紀剽兵革敵人歳來受金帛地雖國本常不惜帝家將軍勇無敵謀如轉圜心匪席精神動天天不隔鑿空借籌皆碩盡賈生屬國試五餌買臣朔方發十䇿偏師倐然畫西海一月三捷猶餘力百蠻解辮慕冠帶五郡掃地開城壁葱嶺陂陁蒲類深回笑秦并與禹績尚書論功易等差御史行封自明白武功貤爵十萬金徹侯印組丈二尺奮行過望理自爾少從進熟來無極憶昔漢武開西城天下騷然苦征役哀痛輪臺置肥美割棄造陽損斗僻豈知洮河宜種稻此去凉州皆白麥女桑被野水泉丼吳兒力耕秦婦織行子雖為萬里程居人坐盈九年食熙州歡娛軍事息天王聖明丞相直彭城集巻八
