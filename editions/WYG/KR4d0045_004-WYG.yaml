body:
  text: 彭城集巻四宋劉攽撰五言古詩寄題漢中三亭原注時伯父守漢中梁山屏西南漢水相縈帶古惟千騎居今亦一都㑹守邦多偉人按節森大斾治聲我家貧能事斯亭最蒼峰上盤雲清川近瀉瀨隅分地俱勝鼎搆勢争大扶危新棟梁增舊加粉繪功成人不勞事得文無害長塗擁行輈高宴羅羽葢開筵攬錦繡勸客喧竽籟陪遊慙望回請賦嗟自鄶安得凌風翰徑厲褒斜外養生世自不乏我我亦安慕時形骸與軒冕冉冉相背馳守約道可學戰勝心自知雖無一朝樂亦免終身悲崑山茲山本無玉而有崑丘名若人東南秀遂馳終古聲藍田亦若初荆山髙不傾嗟嗟九原骨千年不重生正月四日燕飲江氏獻嵗發春陽青煒煥城邑羣公三朝暇冠盖如雲集主人髙陽老原注江氏北人饌客素豐給開門陳壺觴從使來者入春盤具柔蔬香稻進玉粒髙談劇傾波縱飲甚啜汁戰碁效軍實度曲儷風什歡窮罍不空顧惜馳景急東風巻初雨泱漭天地濕震雷動龍蛇稍復離幽蟄而我獨何為無聞既三十人生行樂爾身外非所及五行王相詩長生不我欺幼學毎自堅沐浴蕙蘭芳呼吸朝霞鮮冠帶謁紫皇左右賓列仙臨官太清上拜賜玉案前帝王固陳迹聖智不足甄衰容了成稚白髪倐更𤣥病笑留侯晩妙許成子賢死者不復作塵埃殊可憐墓隧侵人居海水為桑田絶跡自此逺飄颻周九天胎化兩珍禽羽翼為我先養志幸有成眷言慙自然自蔡河至陳州舟行過林樾密樹相排擠仰視青冥天飛鳥猶不移臨流方浩歎照水分鬢眉三十有二毛中腸黙興悲除日得王深甫書因寄除日令休吏官曹停簿按深居念馳光忽忽自興歎七十稱夀翁我今已過半時命豈不知胡為此羈宦況茲山野性放蕩破崖岸應接人事間何時無謗訕屢誦小雅章懼為朋友怨忽傳故人書逺道情不問上言久别離下有加飡飯贈我新詩謠金碧光凌亂鵷鸞不鎩翮龍虎謝鞿絆乃知韝上鷹不及蒿下鷃往事那復追來今猶可諫終當潁水濱躬耕為爾伴之官廬州初至儀真寄原甫家居非不歡祿仕亦豈急愧身無所勞而茲養生給方剛幸未艾黽勉冀有立譾智無逺圖挈缾庶云及聖教非一方吾愚寧妄執所慙鷦蝘微不過枝與粒悠悠我之思去去異鄉邑大江浩東流客悲莽交集登船眺洲渚暝色際日入鬒變誰昔然悵焉寄茲什將之官清水李廷老來㑹探韻得光字四十身無聞忝官省中郎未嘗學治民繆假銅墨章置我所讀書低心課農桑況此戎馬間屬國皆軍羌隴山一何髙緹羣正相望聚糧三月過始厭西路長故人矜我勞置酒客滿堂固知後會艱慨慷俱畢觴天弧射狼星旄頭爛垂光分我一漢節繫取穹廬王江南曲江南多芙蓉水綠看最好輕舟浮江來白露秋意早露白秋已晞游子行未歸采香欲誰贈但見羣鷗飛鷗飛不避人思我平生親當親而返疎悵望空水濱題歐陽永叔新鑿幽谷泉江南多名山少有瑯琊比琅琊盛泉石晩得幽谷美將非造物者留以待君子乃知智且仁必好山與水公有髙世材此山共森峙公有濟物心此泉共清泚泉始居地中隠塞未如此今為萬丈流近自一勺始東浮滄溟廣下益松檜喜奈何公之惠及更局千里安得從公居曲肱偃吾几安得從公遊枕石洗吾耳是非付天壤塵事如脱屣當為谷中叟肯為軒冕起張六至君居衆人裏有如珠玉然世疑假渾沌我識眞神仙獨抱瀟洒意不為勢利牽少留衡門下談笑忘吾年題園樹看花前日雨吹葉昨來風羈旅淹留際年光瞬息中今朝雪消後重見樹梢紅先泊龜山夜聞後來者秋鴈去極浦寒星落逺山太虛混茫外羣動有無間中夜數聲㯭孤舟何處還次韻和蘇子瞻贈王仲素寺丞龍虎不受羈鸞鳯不啄泥仙人雲濤觀俗子閭巷迷念昔喜讀書五車號輕齎東瞻識津涯西顧分町畦博物辨鼮鼠誦賦嗤雌蜺軒冕不克求舌在徒問妻世事莫相告慕虛但攀稽賴有逍遙篇爾來頗思齊道真本微眇至言乃筌蹄壹氣中夜存大方刓角圭勉從赤松子定有青雲梯非若朝市門強力相排擠晩友王子喬如得照水犀因之喻蘇耽衰暮母噬臍緬思灊天柱雲白風淒淒築居留四鄰與子參杖藜次韻和原甫登禪智寺上方院二首訪舊起廢境賞心如此回平川似曲沼崇岡象層臺前騶經林藪飛葢凌崔嵬漏遲日向永景照春已來即事有餘勝懐古常興哀寥落江都宫壯麗安在哉方昔盛歡娛寧知名已頺一詠宜春賦悵然為停盃夫子信與㸃賜也敢望回遙知成春服復此登春臺一水近清淺衆峰逺崔嵬林端白雲暝竹下清風來谷深鶯徐囀川逈鴈仍哀賓至賦樂胥觴行詠康哉詞鋒與醉墨餘響若底頽何以喻珍奇繁露將玉杯次韻和張屯田新年六十九春風數盡九節物都非舊幕府省文書堦除減奔走慵憐啼鳥喚老藉高花誘前林通杖屨小榭勤箕帚喜逢張公子七十健少有解吟長韻詩不避盈樽酒囷倉年穀實鄰里均石斗樊圃畦隴成餘力到花栁長為子孫主擊壤歡百口人日同弟姪㑹賈夷叔遊射東園和仲馮以退之弄字韻次用宦情本羈旅節物猶戲弄歘見林下風初開水濱凍登高舉遺俗剪綵隨衆用暄和暢四體杖履率羣從觴酒從我來林塘復君共捷奕判死生勁弓嚴縱送新荑綴高栁潛穎發枯葑天空鴈相喜泉潔魚始縱馳光若漫漫來事常偬偬君看飛雲隂既去不可重從劉園至澄心寺春泥稍已熟鸛鳴天氣新野竹自有徑空林不值人悔將車馬來鷗鳥未可親獻歐陽永叔毛生重九鼎劇孟雄敵國布衣未易輕壯士多感激遍讀近古書仰求當時人膠絃非工聲直釣良苦辛舉世無與游行且三十春豈乏富貴士相視猶埃塵屈指東諸侯側聞廷中臣霜毛九臯鶴絶足大野麟往者移太常正氣横蒼旻連翩少垂翼浩蕩俄縱鱗天衢自茲亨要路實有津諫疏必焚草王言粲如綸雲霄入顧眄方牧寧逡巡豈惟國憂賢固是材致身南金一銷鑠荆玉成􅀈磷少留股肱郡不廢廊廟珍道悠任逾重文雄聲益振指掌五代論藻鑑盈門賓信陵虛左乘程子傾葢親意氣已然諾許與忘舊新孤劔雖蒯緱丈夫不羞貧願言敝縕袍試託狐貉鄰往無鮑叔知那識夷吾仁母令箕山客洗耳茲水瀕初冬晨起作四聲詩霜風吹簾櫳天高明星晞鄰雞三號呼林烏皆驚飛嚴城開重門危冠馳輕肥疎慵徒安眠隆冬方無依右平聲營居依蓬茅在我頗顯敞陽暉餘朝溫野景有逺想年華無淹停俛首已古往全生誰為賢偃仰與鞅掌右上聲山林何時歸陋巷似好遯通衢皆高軒竟歲謝訊問行歌聊逍遙衣敝信命分殊勝蒙塵埃勢利強自困右去聲開門誰頻來設榻得逸客明窻容棊枰日昃熟藿食叢蘭香襟裙雪色覆轍迹忘形非無縁拙直獨莫逆右入聲舟次淮隂寄張郎風波不可測夷險繫所遇泊舟淮南岸始知㪚千慮高秋風蕭爽日夕稍寒霧漠漠烟水深翩翩飛白鷺值景信所貪有懐勞反顧何時見歸艎嘯吟成一助記夢光彩曜白日笑語凌高風冥漠分永訣夢想如暫同當寐詎知覺視色旋成空達性悔不早百憂坐相攻夢楊十七昔游梁宋都偶與夫子並爾來各分飛豈獨歲月永往事若有亡魂交幸俄頃如從杏山宴坐弄南湖景置酒腸已開論詩心為領君言此㑹難驚悟卧南郢人生日月丙覺寐誰能省適心故為歡好夢亦所幸自吾客遐方塵事久幽屏乃知逃空虛終日思咳謦張君以六十九作詩自道其康寧余時年五十九感而自詠新年五十九處事覺陳舊敲石火難停下坡日如走詩書本拙畫孔老徒善誘誰為萬乘器謬享千金帚爾來專城居遲暮亦何有此邦白髪人夫子稱祭酒貧居玩一瓢健飲輕五斗愧君十年長顧己甚蒲栁方將外形骸餘事勿掛口送汾西髙長官堯風逺以深千載殊未央寥寥蟋蟀詩在晉謂之唐今君試宰邑正復汾一方民社非不榮腰有銅墨章安得六七十而非諸侯邦翳翳桑麻區雞犬音相望因俗固易治學古子所長勿蚩儉以勤葛屨從履霜朞年㑹有成坐見鳴鳯翔吾知尹翁歸治迹由平陽逺道悵分手游子懐故鄉離羣以索居愧慚參與商原注參商魯子子夏名也二子皆居西河故云送陳同年遊固陵送君固陵遊勿憶炎漢初天地不中裂雄傑争錙銖追兵下陽夏百萬風雨俱鴻溝不可恃平分知厚誣叱咤梁齊君王業成斯須鬭智不若諼小信良區區爾來數千歲英氣存信書山川未改舊壁壘皆丘墟寄心阮嗣宗撫掌當踟蹰汴上二首渾黄下湍流地勢東南瀉潛石激隂怒烈風鎮相假客行何艱哉極力無可者永路未遽央扁舟安得捨端思九衢塵快意堅車馬客從江湖來風水畏難測行行汳渠上牽挽意不適驚湍卷前灣怒浪潛亂石至柔動必剛況使相推激隨波歎異心枉道復退尺顧思掛高帆勇往逾箭射行險何足憂萬事亦天力望九華山初行江南道山水皆可愛忽見九華峰瑰竒又堪怪去之百餘里青翠若無類羣山特微茫屹起視其背初疑楚人劔真能倚天外快意入浮雲恥令白日晦又如羣游龍垂胡飲江瀨俯仰令人驚頃刻千萬態未知灊與霍何能配嵩岱得無失其真吾為古人悔山中多良田泉源得灌溉頗思藏其間將家事耕耒塵氛未決往暫若觀畫繪日暮飛鳥還臨風久佁儗晩春登樓川原自不改春事已疇昔衆芳生晩綠逺樹森重碧流鸎歇復歌乳燕飛暫息對酒獨慷慨惜無同心客和謝師厚鴇詩君為田鴇吟哀彼田鴇艱無舌以自鳴銜恨安所宣我徵古人詩得之唐國篇苞栩何足哀悲在不得言君看鶗鴂鳴衆芳為不蕃黔雷詎有知奮此亦已偏萬生詎可窮孰能厭多聞頗識鳥獸名從子求諸田邾園水閣煎茶溪梅已爛漫溪水方綠浄惜春聊挿花愧花還照影淹留待烹茶初覺晝日永登𤓰歩魏武廟隂崖不見日側逕劣容歩鬼神宅冢奥與物随繪塑惟惜飲馬初想見投鞍處木落山勢髙潮平洲渚露華山隠者圖六王昔崩蕩秦帝按劔興虎争四十年方隅為之平豪氣竟未已用民如不勝因河既為池起洮復堅城嘉哉諸老翁擕手西山行避世往不返逍遙塵外情明星備灑掃巨靈為友朋饑食玉井蓮手擕三秀英世事一朝變龍蛇復縱横石火咸陽焚蟻聚成臯争致身青雲外顧視不為驚萬朞乃須叟安知谷為陵爾來見圖畫真氣猶冥冥世人但蓬蒿安知鴻鵠征桃源迷去路蓬萊浪知名異時三峯遊㑹當慰平生詠史原嘗四公子養徒各三千金玉棄如沙快意當目前好士要盡心安知悉英賢雖非霸王資豪氣故翩翩生為戰國雄死亦名千年晉重未反國曹鄭方接連靳惜糞土間不能捐一錢宗社㡬不食惡名髙屬天山樞刺昭公死矣悲宛然如何萬乘邦徒為人所憐秦兵謀大梁決河灌夷門百萬皆為魚閭里無一存不用無忌謀人人皆有言天方縱秦毒蕩滌乾與坤雖得阿衡佐誰能救崩奔政先趣嬴禍指鹿遂亡秦翟義為漢謀攝省因即真為忠豈不難殺身亦已仁天道良悠悠成敗難重陳不見商山翁采芝樂全真羽翼安儲皇天子不得臣晩歸望月落日隠城頭深林已微暝相擕歩明月詰曲穿繚徑稍稍歸鳥栖四風亂鐘磬六月七日大熱及曉微雨宿雲晦城闕曉雨生微凉綠縟草木潤清虛塵土香宇宙暫掃除胷襟豁軒昻忽如沉痾去飄若凌風翔適物能須㡬執熱每相望永愧江上翁終嵗浮滄浪苦熱登樓高樓亦炎蒸况乃樓之下念彼生民微纍纍盡蝸舍上天無清風何以逃永夏顧余更縕蠖眇然用悲吒火流暑當反日暝天欲夜我躬且自閲於此猶閒暇秋熱蒸暑淹南國季秋如長夏炎涼亂平分天地錯常化短日迴朱光六龍頓其駕暵似山澤焚憚我如不暇反思歲聿暮却顧旦輒夜寜忍窺昆蟲干時事矜詫夏夜月中静夜收衆響南軒卧虛寂繁星粲文具初月懸星璧流螢急自照露華重已滴鬼神頗虛無觸事生慘戚兒童戲相驚庭有𤣥冠客夜久待不來微風動松栢苦熱生長自吳㑹北遊逾十朞來還遂衰老衰老何用知六月江湖間煩炎若蒸炊疇昔不憚暑今者殊畏之纖絺置如仇羽扇常自隨對案不得飡膾炙成蒺藜憶我童稚歲烈日猶奔馳鬭草出百品承蜩睨喬枝頳顔不待濯流汗始為嬉自憐筋力便豈謂天序移徃聞終南間盛夏含冰澌將家就髙寒長與卑濕辭酷熱堅冰念陽和廣莫思柔風天事有馴致星火俄復中飛烏炎千里羲叔頓六龍焚林墮翺翔沸鼎愁噞喁路傍在家田傴僂頭白翁惡木不得息百畝為已功如何富貴人方借明光宫秋熱百里異風土我行豈蠻越中星正常象未與京洛别肅霜乃温風授衣甫絺葛林蜩沸如羮芳草香未歇天令不可推有時倒生殺九土皆若然蒸灼何由豁憶昔過秦隴連山看秋雪隂風鴻鴈號積凍松檜折驅車渡河洛反顧尚明滅大笑咫尺途居然異寒熱次韻以道月中作月從海底出素景天外來解道千里共斯人安在哉洞庭木葉脱未央簾幕開顥氣徹霄漢炯炯不受埃羣居笑李白獨與影裴回願言常相親無使手停盃和孫少述雪同雲晦天地浩然自生明蕭條喬木風斷續過鴈聲袁公卧深巷意得神亦清豈知長沙客漂泊萬里行餓隠賤祿仕乃見終古情别黄子溫田園不遇歳羈旅常苦心問君長沙客㡬年陳武吟白髪映青春天涯一相尋傷弓雙折羽遲暮多哀音平原客如市珠履玳瑁簪擔簦義何勇歸䄂贏黄金世事不足道丈夫多陸沈何以慰别離春酒方獻斟别王深甫四海不易遇各自東西人那知汝潁間三歲為比鄰愛君故清真有以敦薄鄙亦作酒客難調笑鴟夷子一旬輒擕手曷日不寄聲相期此胸中無若平生情士貧非農商敢憚抱關役經術又不如空愧上書客飛鴻羈旅懐流水離别心長因東南風一冀子徽音與孫巨源蘇子瞻劉莘老廣陵相遇蘇請賦詩為别各用其字為韻毎篇十韻都城毎過從車馬動逾衆分飛無此歡㑹合杳如夢薄霜作微寒淺水未成凍秋花正爛斑幽鳥雜清哢此邦人事稠南北屢迎送以茲信宿間得與數君共遂將結吾廬念有用餘俸稍營負郭田畢力輸賦貢百齡欲過半來日頗自縱冀君數相存詩酒尚足用本為東方生避世不避喧仍慕管夷吾畏事復畏言外物不可期高風難重論我辭金馬門君來西掖垣淮瀕一相見握手雙淚㾗矜我鬢雪多歲月何崩奔黙然念既往所遇皆籠樊恨不值羽人拂衣入桃源腰間銀青綬車上朱兩轓專城自不惡相思徒種萱因言浙江潮憶上吳山尖八月天地空千里澄圓蟾海水為羣飛迅雷發幽潛壯士懐惴栗怯夫竊窺瞻春風潮水平青玉開鏡奩輕舟載花女翠髪腰纖纖勝事冠東南君行獨能兼吾以狂自名將老無所嫌㑹當從君遊不計歲月淹鱠魚必令鮮釀酒勿使甜嗷嗷南飛鴻羽翼何莘莘哀鳴衡山陽落影湘水濵歲晏道路長雪霜多苦辛豈無稻粱謀畢弋如魚鱗此鴈欲誰比正若羈旅人古來瘴癘地常有忠直臣扁舟慎自將勿重蛟鼉嗔鵬鳥惡似鴞端能伺承塵東風發衆芳宿莽熙陽春鴈歸君未歸悵望汀洲蘋季孫肥季孫事顓臾禍起蕭墻内秦皇築長城滅國乃胡亥蒙公不正諫地脉豈其罪戰國尚權謀阿諛彼何怪親為聖人徒鄙陋曾莫解龜玉毁櫝中危顛竟誰賴鳴鼓詎可攻菹醢死無悔約謝師直出獵師直小疾不行作詩戲之雪後原野空風髙弓矢勁歳時有隂殺自古順天令躍馬徑豐草呼鷹下空夐烈火生鼻端割鮮矧餘興此亦壯夫樂不與兒女並苦無枚叔辨試起夫子病觀獵立冬殺氣凝清霜㑹晨朝滌滌原野空烈烈荆棘燒鷹饑肯為用馬寒意逾驕旌旗帶林莽笳吹含風飈突圍狡獸怒得雋壯士囂老狐屈變詐文雉輸英翹討伐順天時未許窮姦妖翩翩馬上兒弓箭各在腰意矜百戰雄巧鬭更相招控弦落明月飛鏑來九霄雖虐終無傷為樂固已饒晩臨清汝濱寒水如落潮揮壺酌美酒醉歸遺皁貂雜詠四首衆樹日改色凉風下蕭森喬柯無定枝存葉非舊隂白露變凝霜百芳從此侵代謝不暫稽盛衰理相尋懸蟲自包藏棄巢絶來禽徘徊蒼苔地萬籟成哀音短日不能永月華代揚輝暝暗來四隅稍復清影隨迢迢河漢章天畢前南箕簸揚蹇無成掩今亦時蒼蒼城隅草地勢元有在凉風西北來搖扤色己壊天運正消殺高明彼先罪安見中國葵淺智亦足賴疾風吼籬端嘯呼隨叱吸翻翻走地葉衮衮強相及重門忽開扉窸窣如有入飛蓬自無根邂逅暫相集萬生共馮寓智愚因妄執區區古今士陳迹更綴緝是非竟何常得一已漏十歳晏莽無成白頭抱書泣廣陵蔣生死十四年尸猶温有妻子存嘗有書自逺與其家案公是集亦有此題三徑積荒草玉棺不上天初疑青竹塟有值吳門仙妻子同脱屣衣冠如蜕蟬何年獨鶴歸悲歌城市遷曹司封詩自我勝冠帶日聞鄉黨議意嫌風俗衰長老俱喻利緬懐千歲士未謂今昔替果哉曹大夫高度跨一世人皆競錐刀趨走候形勢強能弋公侯弱或丏奴婢而公獨長往亦豈惡富貴顧當拯頽波且以伸吾義昔在天聖中太后猶稱制桓桓諫議公正色風憲地王室依老臣蕭墻屏姦計一麾竟謫守襃贈身後事至今誦遺烈毎雪義士涕天倫見霜標粲粲真難弟大雅貴老成春秋有凡例吾將編野史著述二公志直清先伯夷退静後季次願為得者規不使達者愧驟雨山川近淮秀風雨向秋急初為空曠游頓喜清凉集鳴蟬斷復續沙鳥飛還立平生耽勝事未暮俱可及馳道秦皇侈心極登眺窮阻修言從峽中度復欲滄海遊車轍去不反馳道缺毎留君看鼎湖人尚畏軒轅邱樹下百芳與春違嘉樹成密葉上枝下相副朝影暮還接徐風氣清凉重露香浥裛關關變鳴禽杳杳飛孤蝶神仙彼何有静境我心愜萬期猶視䕃寸景疑度劫何用窺蟠桃滄溟憚舟楫過薦福寺下馬喬樹隂雪霜寒未晞重門開相當廣殿晴日暉問僧亦何事荷鋤殊未歸勞生每多役向此情依依分題李花得香字尋幽興不淺佳木梢己芳積雪春未融明玉仍自香赤日照未好㑹待清月光念無瓊玖報聊復進雕觴夏雨邑居苦囂塵洒掃長不給蕭條一雨餘草木遍青濕静無浮埃生清有凉風入媿慙天地功人力那能及馬死答劉先之馬惡憂敗羣馬死遂徒歩始知惡有用但愧非善御未能棄山野不得事藍轝猶當謀欵段尚取州里譽顧亭林逝者如去水賢逹無復居朅來顧亭下但見林木疎魚鳥樂深淵風煙迷舊墟徒幸百世名厯厯存緒餘齊魯齊魯大儒師專門盛章句應物非己長何以責成務乃其忠孝心足以事君父不如商利徒反道趨詭遇剝床以及膚泉貨山嶽聚賜金稱百斤封邑成千戸若無天事變豈不厚且固啇鞅既誅夷桑羊亦刀鋸寄言逢掖人施施幸安歩彭城集巻四
