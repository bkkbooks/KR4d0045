body:
  text: 彭城集巻二十四宋劉攽撰奏疏貢舉議臣准御史臺告報進詔書天下學校貢舉之法博訪臣等今得詳議者臣愚以謂人主之舉事與人臣之獻議不同人臣之議者盛言古事以為髙侈言已忠以為博迂逺而不切事情漫汗而不濟世務雖已自知其無益于治矣而猶為之何也其言之有理其持之有故其名之所存足以夸衆眩俗故敢為而不疑耳人主之舉事則不然度時之所宜因俗之所安不為虗名而棄實效不慕逺業而捐近功使令出而言必信事舉而俗必定故與其出令不當而亟改之不若謀事於始而慎慮也今陛下患選舉之法不明教育之方未善此必有以前古乆逺之事感動上聽者不可不察也本朝承百王之末創起律令雖未及三代其隨時因俗之宜應變増損不常亦成一朝之制而選舉之法行之百有餘嵗累朝將相名卿及今之所謂賢材與共天下之論議者皆非以他塗進者也而誣以未嘗得人臣竊以為過矣且臣論之今時選舉之患不在創法之未善而在有司之弗良不患試言之非要而患聽者之不察何以言之今國家求賢良異材之人則使公卿薦舉求文學經術之士則使郡縣推擇此雖三代取士何以過此帝典之言曰敷納以言孔子曰不知言無以知人也然則未知人莫如聽言故國家試士以文詞亦二帝敷納之比也誠使有司兼仲山將明之才懐孟子知言之術精聽慎擇則賢不肖豈不較然由今觀之取士之法本未嘗失而有司之聽或不能盡今以有司之不能盡而變法法雖亟變而不擇人付之雖法如三代猶將終無益也議者或謂文詞之為藝薄陋不足以待天下之士臣愚以謂今進士之初仕者不過得為吏部選人國家待門廕恩澤者亦為選人流外小吏亦為選人選人如此之卑也而天下之士以文詞應此選豈不固有餘裕哉朝廷設置何等爵禄而更艱難其選乎且進士成名者國家亦何嘗便以為才傑而任用之或以文章顯或以法律用或以善政事稱或以治財賦進皆待其來日成效而後有取則夫取士之始亦何用靳靳吝惜若不得已哉且朝廷欲更選舉之法將以想望高材豪傑之士也今天下之士至於禮部者嵗不下二千人朝廷豈能以玉帛之聘弓旌之招而遍得此乎必亦使之投牒自進耳士之投牒自進必非豪傑之士伊尹管仲之儔雖更其科試而取之徒小異其名目然其得士未有以異於前也更恐好利衒鬻之人崇虗名以亂真則取士之失又甚於徃日矣議者又謂不如一用鄉舉里選者此又知其一未知其二也夫二漢之用鄉舉里選所以得人者其時郡縣之吏自廷掾諸曹卒史馭吏亭長游徼皆賢士為之故其臨財不苟則知其亷值事能斷則知其智文武材畧莫不畢效故其譽之有實舉之不難自流品分别郡縣吏卒棄絶為賤不齒于搢紳賢士不復從此役士之居鄉里者何由察知苟憑虗名以進人後有不稱將復相與蔽䕶其短而謂之材終亦不得真賢實亷矣是鄉舉里選又不可盡用也凡此數端皆臣所以深疑者也不知臣之愚陋至此耶抑亦千慮將有一得也然愚者之志專則難移故臣願朝廷且毋庸輕變選舉之法不如因舊法而慎選有司之為愈也雖然尚有一説今有人於此明辯足以判獄訟智畧足以治財賦而文詞不足以自發經藝不至於浹洽則將捐棄終身無仕進之望其才豈不可惜哉臣願陛下為設從政科使公卿及監司舉所知以充選必有舉者三人乃召而用之且毋以為真試之三年才任其事然後命之以官即不可使復還為民而坐其舉者如此則天下之材士殆無遺逸矣臣聞教育之法所以治性也性修則智明智明則應物不惑不惑則盛徳之士也自兩漢以來學者未嘗不以利禄為心夫可誘以利禄而勉强為善則徳性離矣是故造士不及三代者由此也今陛下建學校為置明師而誨導之毋問其所學毋限其所能則資材莫不養育矣若惡文章之敝而以經藝勸之學者之志不出於為利禄也則文章之士變而為經藝雖曰不同其離於徳性也均矣天之生材有昬有明智明材大者非小智小識之所能掩也及其淺晦下材雖日撻之亦終不能以致高大士修之於家足以成材亦何待學官程課督趣之哉覆宗室遂寧郡王承範謚僖温議王以同姓支屬鬈髪仕宦耆艾沒齒更厯顯榮五十餘嵗若其闕廷之禮束帯埀纓而齒内朝者乆矣郊廟之事執膰賜爵而均福慶者多矣無錯立族談之謫有夙興夜寐之勤纎介之失未嘗上聞其小心恭慎之謂乎夫膏粱之性難正世禄之家鮮禮矯情抑心不可常也而王修身訓族嵗乆彌固其徳性温和之謂乎麟趾之詩公族信厚以為關睢之化東京諸王不失法度以為永平之羙王之樂善朝廷之教也易名僖溫謂王宜之攷功覆呉尚書謚文肅議尚書力學强記有志於從政非若世儒徒以經術通明文章竒偉為顯名埀譽而已也是故始立朝則以直言讜議開悟上聽然後舉賢良方正守稱其選凡為諫官近臣而上謂其言盡遭事不惑知無不為沮止佞邪發舉善政以至更厯二府始終一節太史公所謂扶義俶儻不使已失時立功名於天下尚書有焉其謂之忠信接物執心決斷非虗羙也太常寺論封爵狀臣等伏見周禮封爵諸侯皆有命書典策又有約劑書於宗彛及漢封功臣亦有丹書鐡契藏之宗廟誠以封爵之事傳世無窮不可不慎重其禮且以防後世之争辨也本朝慶厯中始為諸王置後傳襲其時上恩雖厚而有司典䇿不偹約束不明昨因邢國公世永亡殁冀王越王兩宫争訟尋求故事以㫁是非自中書宗正寺禮院史院皆無文書可以討論然亦非有司有所墜失也臣等以為諸宫傳襲封國者甚多今不為造作約束恐後日常有紛競不已宗室争辨薄義傷化甚非羙事本朝制度雖不盡用三代自當因宜立憲著為律令使可遵守藏之大宗副在中書太史禮官貳之合於周禮之宗彛約劑漢氏之丹書鐡契傳示無窮於禮甚便欲望朝廷特賜詳酌下禮官等參議施行舍人院奏乞再建紫微閣狀臣等伏見舊中書舍人院有紫微閣真宗皇帝御篆題榜副本刻石自重修三省紫微閣隳折御篆無所張掛伏以本朝建築省閣上法天垣前聖有作自難減損至於宸章天翰宜永垂後萬億千嵗瞻仰寅奉在周之時天球河圖兌戈和弓異代之物尚皆傳保戈圖庸器每祭陳之何況巍巍聖作其可庋置不顯有司惜土木之小費靳人力之微勞甚無謂也或謂神宗皇帝已不建閣臣等以謂先帝釐改制度次序行學實有未暇至於崇奉祖宗必有深㫖安知其構築不在方將也伏乞聖慈特賜詳酌復於中書後省建置紫微閣標掛御篆於以完本朝之舊制副前聖之埀憲事體甚大實班列之所深願臣等不勝惓惓之至辭免中書舍人狀臣准尚書省劄子告示已降誥命授臣中書舍人令臣發來赴闕承命震悚不知所措臣年齒衰暮舊學荒廢方將發揮孚號潤色典訓不當蕪漫失次以速官謗伏望聖慈鑒其悃誠罷寢恩命以安賤分兩制議秦王襲封狀臣等謹詳熙寧詔書為秦王置後其時判太常寺陳薦等議請以秦王庶孫克繼為後知禮院韓忠彦等請以承亮為後先帝兼鑒二議詔依忠彦等所定大宗正司言所立嫡庶不當乞賜詳定又詔兩制官改議王珪等議當以克繼為秦王後奉聖㫖依已得指揮承亮遂封秦王臣等聞易曰大君有命開國承家故春秋之義唯天子得以專封今承亮為秦王後詔㫖丁寧如此是大君命之開國天子所得專封承亮受國傳其子克愉已經兩世無為輒厝論議於其間且上攷前世史傳及本朝故事未有傳國兩世復議移奪者今克愉亡歿自當依禮律置其後嗣其他宗室妄有訟訴不在採聽之限論汝州合建節狀臣伏觀今月四日赦書節文其京東京西曹許州並升為輔郡者伏以萬乘之后兆衆所集内則提封千里外則别置四輔蓋欲以拱衞王圻威重帝室陛下稽古圖政憲天埀法以曹許之地當輦轂之側雖壯鉞廉車足治浩穰而神州赤縣近屬倚毗殊其命稱實偹闕典兹前代之弗及亦萬世之不遷然臣聞自昔二郡皆為甸服廟社所寓宫闕相望憲章不殊名實共貫今二郡制度既已恢大而西郊事體獨似乆缺敢陳狂瞽少禆萬一竊見汝州逺自唐室乆為輔郡爰及聖代馮翊别都距土中無數舍之遥聚生齒有六縣之衆襟帯河洛藩屏楚鄧而乃列在支郡稱可防禦於衆賢之封最為不稱在陪京之域莫有比倫且金隨僻陋之區止利巴僰之邑非要害之重無都會之稱尚且立節建牙兼官累印何況周南近壤洛宅上流可以無千乘之車偹三軍之士區區小邦自守而已翼翼商邑不亦耎哉臣愚以謂汝州既與曹許同是輔郡自宜升為節鎮如此則東西兩京左右二輔形勢壯大典法該偹足以昭寰内之巍巍増天威之赫赫且鄭州雖名右翊本以小侯近自景祐之初始賜奉寧之號故事未逺有司具存伏乞聖慈下兩府詳臣所奏議定軍額特降指揮論封太祖後狀臣伏見手詔推求太祖皇帝諸孫屬近行尊者立以為王以光大成功偉業此誠陛下追孝祖廟聖恩無已舉百王之所未嘗用而行之則傳所謂禮雖先王未之有可以義起也然竊觀詔㫖所處猶有未喻恭以太祖皇帝傳國太宗雖以兄弟為後然大統所在繼體之君皆太祖子孫也盛徳之祀澤厚流光舉在是矣何待復求諸孫而王之如是則祖廟有功不毁之稱列聖繼統丕承之羙反不及置一國乎古者惟列國之君無嗣則有求其子孫而紹封之者祖宗之重不可與此同議又諸侯不得祖天子今封王當自為其國之祖終不敢上承太祖明矣臣以為陛下欲褒揚藝祖豈無其説按春秋傳曰管蔡郕霍魯衞毛聃郜雍曹滕畢原酆郇文之昭也文王造邦為周太祖子孫封國最多後世不敢與並漢明帝亦曰我子豈可與先帝子等故世祖諸子皆封大國而明帝子才半之也然則帝者之世崇厚始祖之子當必異於繼體矣太祖皇帝之子惟徳昭徳芳二人陛下何不崇此二國之後世世不降其爵與周漢等盛宗廟祭祀使之在位則藝祖巍巍之慶陛下烝烝之孝無不休顯著明矣臣以愚戇待罪禮官知陛下推崇祖宗顧聖慮超越非羣臣所及猶願攷合典禮使其大義可以講説為萬世法故敢冒進瞽言伏望少加采擇臣無任戰栗之至太學申監狀右檢會先降勑命主判官與衆學官於學生中推文學年徳可師一學者二人以為學正學官選公正亷直者二人為學録爰自建學以來常奉詔從事皆用生員學官以蒙訪逮只從去年補孟醇為學錄今次補劉濛為學正直講不得預聞判監特然給帖孟醇曾在太學乍可甄収劉濛來自他方初不諳識化筆黙定有若疾雷博士備員不翅虗器某等自知愚戇無似拙直可惡倚席不講尸禄素飱識慮無知人之明何足取信官秩有隔品之賤不當下問豈可厚顔更伸餘議其如在學生員數逾二百郡無俊秀未可厚誣今來忽使不知何人自外突然遽相董正耳聆未聞其稱譽目擊無異于輩流誰肯自謂不如例使甘心為下又上庠教肓之盛若此祭酒樂善之廣如彼纔選一士便須外求流聞四方抑亦甚陋伏念内舍限數已依勑命施行唯此學正差人却與詔㫖違戾本末不稱義理未安欲乞少還尸祝之分薄采芻蕘之議上遵甲令下慰諸生若以謂已行之命出於特逹横議雖多不可中止卽乞明降約束斷自將來粗用詔條未令廢格少存寮屬略賜誰何者以前件如前謹録狀上侍講不合坐狀臣等議以謂侍從之臣見於天子應對顧問講論古事不可安坐自若避席立語乃是常禮今公著等自以傳先王之道求異其禮是大不然何以明之凡九經章句之説出於近世諸儒訓詁委𤨏未必皆合於聖侍讀之職傳道章句之學耳是故使與舊史諸子雜陳於前而明主一採擇之然朝廷班制猶以侍講居侍讀之下祖宗建官之本意其可知也今忘其章句之細而自謂道徳備已不察侍從之實而求以師賔見異不亦繆乎議者又謂天禧之時侍者讀者皆坐天聖之後皆立至今侍者坐而講者立以謂有司之失臣等以謂侍從之臣預於閒燕坐立不同人主可以專之不可計校前後歸過有司至於人臣求自殊異取必于上則為不可昔仲尼正假馬之名而拜下違衆曰事君盡禮人以為諂也今人主之待侍臣自始見以及畢講皆賜之坐而從容焉上意優厚亦已至矣不可復以暫立為難如公著等議臣等以為不可許薦王覿狀准敕應臺諫官館職各舉才行堪任升擢官一員令中書審察如所舉不謬取㫖隨材試用者右謹具如前臣伏見新授權潤州觀察推官王覿學問通逹不惑異説其在鄉里以孝弟見稱其於仕進所謂行已有恥者臣今保舉克應前件詔書如經試用有不如舉狀臣甘連坐謹具狀奏聞辭直龍圖閣狀臣准閤門告報已降告命除臣依前朝議大夫直龍圖閣知蔡州事者聞命震驚㒺知所措伏念臣本以羸病乞從外補聖恩開許即為厚幸今乃貼以閣職豈臣愚陋所可堪任且臣非有徳度標矩素為士林之望又無治民之最簡在王府檮昧戇拙無異於衆人非次䝉被恩寵是謂僥倖之人足玷聖化伏望朝廷察臣悃愊採其寸誠収還謬恩以安愚分臣以賤官得分民社自可竭力上報鴻造臣不任懇切之至所有告命未敢祗受申中書坤成節合罷齋筵狀伏見太常禮院定到儀注縁為荆王薨坤成節依内降指揮更不上壽其罷散道塲及齋筵並依舊看詳坤成節上壽禮院依據前例奉行中㫖即為允當其齋筵等事别不聲述稽據但云並依舊實有可疑何者坤成讌設本縁上壽今既罷奉觴又輟大讌則齋筵何可依舊罷㪚道塲對佛作樂本縁佛事可以如常至於齋筵廣陳聲伎簪珥花卉飲食醉飽倡優諧笑方兩宫惻怛之際臣子亦何心安此歡娯也若以為齋筵主為羣臣與荆王不相干渉是則然矣其如兩宫惻恒羣臣瞻奉安得如秦人之視越人都忘不相眷之義乎伏見嘉祐年中宰相富弼丁憂仁宗皇帝正當春宴特為輟止弼母於國不繫休戚仁宗但以相臣新在慘恤為輟盛㑹上恩之於大臣如此其厚今兩宫惻怛而令羣臣怡然安坐醉飽歌舞歡娛雖聖慈聽許臣子之心其亦何安臣愚以謂北客外臣可使就驛賜宴自餘羣臣何須集㑹為家兄謝除汝州狀臣准敕改差臣知汝州事續准中書劄子伏䝉聖恩以臣乆病艱於拜起免臣朝參及放辭者臣蘊材無狀移病厯時曠彤廷之奉朝廢金華之事業按舉故事皆合免歸蒙賴睿私再從賜告間者辱珥貂之臨問加苞實而是將爰暨邇臣毎聆諄誨以兹蕞陋之質微簡上心在於魂夢之交忍違帝所而臣生計無力家居屢空娶族云多仰哺者衆樵蘓不給饘粥是虞輒輸肝膽之誠竊冀乾坤之造得循近例出補小邦敢謂聖慈俯從私欲專城攸寄已叨分竹之榮及瓜告期尚有繫匏之歎洊䝉易地仍委陪京矜臣疲瘵之餘恕臣筋力之弱許臣拜命里宅免臣謁辭上臺雖復慈親鞠養之恩不能如此周至穹昊陶鈞之力不能若是曲成在臣何功遘此多幸支離受粟愧厚賜於千鍾疲馬戀軒荷深仁於短豆危心易感隕涕無從亳州奏太清宫再生槐狀伏以猶龍故里隠土奥區仙真之所顧懐協氣于焉囘復率多靈物以表珍符庭檜再生既發祥於章聖古槐條肄復效祉於昌辰朽枿不記其嵗年秀稊頓新于雨露神色還觀華蕚聨輝昔唐叔嘉禾異畆同穎而為美元狩竒木衆枝内附而告休于以比方一何遼邈葢天瑞者依類託寓以應至誠雖塗人之寡見淺聞必喻鴻造臣等目覩盛事内極歡心無任忭悅激切之至畫圖隨狀進呈伏乞宣付史策為馮翰林入院謝對衣鞍轡馬狀服章稱徳故金紫盛其光榮賚予有功則車馬示之蕃庶臣叨職禁近已愧菲材拜賜宸廷何勝厚幸矧其王閑駿足内帑禇衣環金在躬鞶纓照乘頋惟涼徳徒積靦顔此葢伏遇皇帝陛下豐用財於養賢加實幣於将厚雖在笥之慎而不吝于五章非康侯之才乃䝉休于三接仰愧分衣之寵俯迷執御之方何以上報生成無慙彼已彭城集巻二十四
