body:
  text: 彭城集巻三十一宋劉攽撰啓與王承旨啓効智小邦睎風右省雖期㑹之事幸免于沈迷而繩墨之間自慙干結約思復侍倜儻之論窺雍容之輝眇如雲霄倐更嵗律伏惟陟降帝側綏養時中恭以某官德量淵深神鋒頴擢知當世之要務自一時之偉人經義精通文采英發贊天常于筆舌明帝制于典謨海内服其詞宗主上許其國器必且擢躋柄輔代熙化工推其不世之資用格非常之業又僻守逺郡有張敞繩墨之嗟願為中郎無汲黯禁闥之望瞻仰當世之傑侍従鈞天之游邈焉雲漢之高益歎泥滓之陋㐲惟燕見多暇啟處用康恭以某官德貫道樞學優聖奥言必垂于士則智悉諧于帝謨于以經緯人文贊襄治體譬猶玉衡平物無釐毫之差元龜告猷絶幽深之阻輿論斯久休命歸焉又伏念託兹僻陋之邦迷于期㑹之務雖馳情而無極曽奏記之非時仰惟德宇之寛深察小夫之志幸未忘干曩顧猶竊冀于兼容隆暑在辰燕見多暇吉祥止止啟處休休恭以某官性茂天機學優聖域處全德以耀世振逺猷以致君所謂元精之生王者之佐且中外之任試諸難而已周而文武之材見于事而咸效上方酌輿論之僉屬峻寵章而奮庸敢冀上為宗祧精調寢餗回知府侍讀某給事啟比者寵分左符即藩巨鎮昆吾舊許是惟奥區黃霸頴川素推高第良臥資治以副輿言恭以某官學茂臨㡬志深許國調護之寄嘗羽翼于東朝丞弼之求宜股肱于近輔惟是陪京之重實觀報政之休茂風聲于一方流河潤于千里豈其謙光示好珍牘惠音詳味于三佩銘兼極為韓相公回文侍中啟比者叨膺詔策登冠鼎司愧非柱石之資猥預股肱之選遜避無所黽勉効官國家嗣五聖之丕圗接千嵗之絶統禮樂制作而大備憲度著明而日新夫惟承弼之求夢卜為重未有輕棟梁于構厦簡舟楫于濟川豈其寡材可使非據如某者學慚適道智謝興㡬驟承乏于寘行每願忠于就列已試之效曾未覩于毫分求舊之仁仍拔出于千萬震跼殊寵泚汗厚顔黙焉退思抑其有自恭以某官義敦舉類明極知微鈞冶之工既裁成于庶品吹嘘之賜早借譽于當年以是蕞爾薦䝉休命方仰遵于講畫遽流示于誨言過形溢美之辭深喻逄辰之幸佩銘于素啟處弗忘賀文侍中啟伏審勉膺詔㫖進服寵章讓徳罙髙民聴皆聳懋功維典聖睠靡移大廷拜嘉搢紳胥悦恭惟某官為國元老致時太平總金鼎玉鉉之和兼黄鉞豹韜之重文綏武服垂憲建休而粲然風揮日舒贊襄輔和而允若主上以二伯分治三公惟人外資作牧之權内倚納言之任併疏寵數粤疇顯庸重以中朝夙夜之賢方内游談之士聆其風者咸曰休哉敢圗遜與過隆緘縢荐及窺藻文之温宻俯蓬心而悚惶回判府文侍中啟㐲審寵被制文進躋左相恭惟慶慰伏以某官包人傑之偉量躬聖相之茂資總國鈞而迓衡兼天爵以經世正色率下風動乎海隅之邦無疆惟休日新乎賢人之業來全秦之舊壤當西土之奥區總制諸戎折衝萬里分閫注意資元帥之中權珥貂建旄極上公之寵數帝眷兹茂民瞻所同雖齊侯賜履之榮吉甫為憲之盛銓德度義異世同符尚復懷謙若冲遜美弗處辱緒言之來暨欽三讓之罙高佩服之誠啟居無斁賀太師司空文侍中啟伏審受策中宸躋榮右相峻上公衮章之賜兼師垣齋鉞之尊令德維宜輿情胥洽恭以某官職用道本智極時中嘗自許以􅆏䕫期致君于堯舜肇允初試靡求近功蓋犬元精所生將保佑于明主大儒之效必光榮于本朝昔阿衡之相有商畢公之輔周室禮樂制作適丁百年之期老成典刑厯贊三后之治彼竹帛所記用為美談而聖賢相逢親際盛旦海隅徯治乎風動黎民丕變于時雍而後推功名而不居執謙退而自牧主上以講畫可以勿失偃息猶之作藩重違至言詳案故事併疏優典以徇朝僉資姬旦之留周命魯公之拜後凡預觀聴孰不欣愉某跼跡小邦睎光榮座徒有執鞭之慕邈無齒録之期瞻望台階卑情不任區區之至謝留守文侍中啟伏念某樗㪚之質瓠落無庸早繄陶冶之和密預丹青之化起于病廢仍沐選掄以斗筲致寇之材濫虎竹專城之寄賜而不德固元宰之休風眷言所歸抑小人之素願屬章綬之攸繫趨門闌而靡諧仰惟居守别都惇樹寛教吉祥止止啟處休休恭惟某官道茂天經量兼人傑純固所以幹國淵潛足以禮神思致君乎勛華獨比德于伊管伯始佐漢天下美其中庸吉甫在周萬邦憲其文武蓋唐堯咨四岳以共治康王勑三后乎保釐夫帝皇之模豈不同條而共貫中外之任固將均逸而優勞方詠袞衣之詩復下玉堂之策兗州賀雍王除本州節度使啟㐲審顯膺詔策光被寵章進位上公啟封大國本朝隆建親之典東人榮賜履之儀凡屬統臨悉同歡抃某方拘印韍阻詣賓除瞻望台庭不任聳躍賀東陽郡王啟伏承肅遵詔旨恪膺命書注意所存允協士民之望撫封攸寄益知屏翰之尊㐲惟某官國器宏深天機秀發樂為善而不厭求多聞而益彰金玉其相社稷之鎮分茅胙土外則建乎懿親登槐秉鈞内則倚之元宰寵數加等盛德謂宜側跂英標俯深聳抃阻修慶謁徒極欣愉筆舌所宣萬一奚既賀潁王啟伏審涓休榖旦受冊上臺帝命往諧廷論胥慶恭帷某官藴中和之正氣挺明允之篤誠體喬梓而自修而圭璋之特達樂善忘勢綽然時敏之休處師弗煩卓爾日新之美是宜錫介圭而頒瑞加金輅而撫封啟公車千乗之尊兼附庸四等之富以今况古曽何可倫尚德展親于是乎在側聆嘉惠俯集歡悰阻叩賓榮少伸鳬藻回通判某郎中啟近者齋舲粤趨便道幸緣覯晤良副傾依遽逺風儀寖更月律承榜人之桮膠緩葵戌之𤓰時既審涓辰已新條教辱飛文之見暨戢厚意而叵量長夏絆炎嗇神泰定齊城既庶厯下為尤邦政所先治中居右佇聴宜民之詠即膺側席之求勉務保和以符言願回長官某員外啓従事侯藩託居仁里聆素譽于鄉彦辱雅游于中華欽仰風徽内多景慕何意隆謙光之厚德垂芳訊之縟辭詳味于三佩服無已伏以某官天材超越吏術該明千室鳴絃久蔚武城之化三年奉最將紬東觀之書更冀葆光以符言願謝宋相公送酒啟伏䝉垂顧具寮寵頒名酎揆嘉魚之燕衎愧小人之屬饜飲醇味和既旨且有伏惟某官位隆九牧化覃二南賜之所加世以為幸夫何懦品尚沐不忘麴蘖之精固常厚于君子缾罍之恥仍不遺于小邦拜命自慙銘衷無斁謹當推賢將簞醪之意使其上下必均法詩人瓠葉之章不以菲薄廢禮卑情無任荷戴之極囘某知縣啟闊阻風徽馳想談晤側聆敏政竊喜仰成辱惠緘題過形巽與佩銘于素居處不忘寒律向終谷神増勝更蘄善毓以副願言回臨濮某知縣啓𤓰戍有期芝書遄及俾従久任内愧無庸荷天澤之逾涯顧郡章而增惕敢圖後念垂貺華牋披繹以還佩銘奚究方隆冬之凝烈惟福履之綏寧益冀保頤以俟鶚奮回知郡某太保啓過叩朝寄假分郡符瞻賢王恭梓之區每䖍禮貌聆磐石維翰之秀載仰丰㣲豈謂謙光忽垂華翰研味勤勤之旨徒深叩叩之誠方此長贏阻前談對勉希葆攝以俟寵光又闊奉音徽倐更嵗籥疆場洵阻郵置差池懷賢之心向風増歎何意愛之過厚辱緘縢之見臨披玩于三佩銘無斁欽承藩政多裕天休降康伏以某官智畫沈深機符敏鋭威望久馳于敵國誠心素信于士林鎮靜一方既獨推于治最折衝千里曽何假于勇功行疏茂恩以酬美效與都巡某太保啓比者叨膺詔除獲貳郡治顧以迂疎之質猥當闗決之權言詢事聨側聆民譽恭惟某官智畧恢敏威名著聞佇奏課于中宸即升榮于男爵未親豐表遽辱華緘銘佩之深敷陳㒺究初寒届候保攝是祈與蘇州知府某太卿啟拜逺門墉倐移嵗律道塗夐邈居絶馬牛之風簿領沈迷遂曠竿牘之禮内訟疎慢罙集悚惶恭惟某官淵量雍容純誠厚載惟樂善而忘勢遺達尊之在躬寵薦孤生親于抗禮錫以瑤華之問穆如咳唾之音佩服珍詞銘藏丹腑始秋沆碭德履粹和神明所扶豈弟多福三江震澤擅富庶于全呉西振左司著名稱于前世牧守之重今昔攸同然而本朝舊儀上卿特揖固將坐論道于兩社豈宜専報政于連城更冀精調寢興寵綏戩穀囘致政成承奉啟今者軒車來臨談晤為慰疑年已逾于絳老畢娶何類于尚平載仰高風足論傾蓋暌别之後渴詠良深猥沐函書但多銘佩謝制置發運某待制啟伏䝉誤意謭材過形薦牘奉令承教曽未効于毫分嘘枯發生何遽承于咳唾愧慚無似起居不遑㐲惟某官智略淵微神機敏達獨究阜民之術内深當宁之知半策所施錢若流于地上一言之助士或起于塗中以是輻凑通物之賢雲集佐時之傑或冀陳力而就列畢義而願知緜厯嵗時奔走道路必著成效乃沐先容其有所譽莫非已試如某者天姿揜淺儒術闊疎講誦師言無益商功之妙顛瞑古學殆非應變之方跼蹐海邦苟逃官謗惟吹嘘之所及雖夢寐之未嘗敢圖不汝遐遺副之甄采仰揆宏量曷測深仁蓋大賢以泛愛而為懷周材以信順而具美俱收並用乃全百藥之功失少獲多無害五豝之善以兹孱弱驟玷揄揚謹當繩墨首公氷淵勵已冀收涓露之效以荅邱山之恩回教授某主簿啟伏審光膺詔選来莅郡庠鄒魯之風去聖逾逺師儒之教得民匪輕喜聆茂恩實當遴柬過承疏問良極感深即遂披瞻更希善疏回泗州李駕部啟猥承人乏得攝郡符惟舟車之要衝且牒訴之叢委稱過使客苦于㕑傳之勞期㑹簿書疲于簡對之事以兹曠日未嘗少閒雖托寶鄰實疎竿牘仰惟布宣多裕啟處集休道路之謠已熟聞于善最河海之潤亦并及于下流行佇豐恩以符輿頌謝王駕部啟㐲聞誤意譾材過形薦牘効智幕府顧為𨽻之尚新騰章公車荷特逹之已甚且今牧伯之任蓋為耳目之官知人安民前典之成訓選士報國明哲之用心固當得魁礧不世之材清修達識之善結課居最従事獨賢而後稱副旁求光輝藻鑒拔茅連茹以三陽之遘亨將車維塵祗百憂之自悔伊昔攸重豈今獨然㐲念某植性弗明従學加陋聞見不踰于區蓋論議常逺于事情幸中第于太常䝉代耕于禄仕賦命多舛已懷曽氏之悲久宦無成私慕長公之志復從銓調仍預賓筵文學備員以不材而自幸亷能應詔豈衆賢之敢偕且小官必藉累日而為勞本朝不以虚名而取士而此愚戇無似閥閲未聞雖使有斷技之稱亦宜居巳試之後敢期吹嘘所及庸暗獨先加溝斷于青黃資燕市于顧盻撫躬自愧量力奚堪㐲惟某官德度淵沖精識周敏樂善以為已任泛愛以厚人倫謂容衆矜賢以示育材之旨且拔十失五未隳得士之規忘此疵瘕樂其樹立櫟社之夢幸匠石而有成蒼蠅之飛賴騏驥而自致敢不恪修士訓祗服官箴羔羊素絲竊希于一節塵埃涓露或冀于寸長無負厚知以羞善類回沂州知郡某駕部啟疆場連屬雞犬相聞側承布政之初已洽宜民之譽方修竿牘遽沐緘題以謙光之過隆知睦鄰之深幸㐲以某官材猷敏粹知慮優長至必有聲事多厯試暫此維藩之寄即觀報政之休良務葆調以須超擢回新知州王駕部啟向被銓符獲依郡幕仰卿雲而知庇懷爵刺而自通邃乎三㦸之門喜于一見之賀遽違德表寖易馳光紫泥新書竦聞于休命青氈舊物仍復于高閎謁如道路之謠想見澄清之轡敢謂不忘曩顧曲垂緒言側承咳唾之音甚于邱山之賜恭以某官盛德濟美全材適時學與仕以皆優聲中實而並茂譽于所試去常見思是宜付千里之權當三輔之重尤異之績可俟奮飛之漸詎量某効智甚微承教有素瞻前旌而載聳依大厦而逾驩伏冀益務葆頤以符祝頌賀某省副啟伏審光被檢俞造登計府伏惟慶慰恭以某官天材長楙國器宏深刅無綮肯之勞文含經緯之氣出宣使指居為吏師貿遷有無民不加賦商度功利地若流錢果疇美俗之勲進貳大農之柄孔桑心計蓋擅譽于無垠商管利權方收功于既富某早承推顧側聴豐恩由印韍之見拘阻門闌之脩慶回富相謝官啟伏審還節將壇升榮揆路陪中宸之秘奥總行臺之會衝錫命深優服寵惟允恭以某官純誠體國丕績在民德愈盛而若沖名既遂而弗處屏翰列辟偃息足以作藩師長具僚體貌繇兹比重方深慶悦遽辱緘縢仰窺遜與之衷俯積佩銘之素彭城集巻三十一
