body:
  text: 彭城集巻三十八宋劉攽撰墓誌銘翰林侍讀學士給事中唐公墓誌銘公諱某字彦猷幼清警介特其守氣精壹而内志端直故其于為學深而簡文章髙聳其以應物不煩而逹規矩繩墨粲然有常而枉直判于彼矣始皇考待制公以清修著稱而公能世之士大夫論賢父子多舉唐氏云公初以廕為將作監主簿天聖間獻所為文章召試學士院賜進士及第除知湖州長興縣以憂去其後四遷至太常博士厯知華亭諸暨縣梧州歸州用近臣薦拜監察御史未至都丁太夫人憂既除服而薦公者適當執政以故事避嫌出知廬州御史中丞張公方平言于朝上因為留公公既在朝言事舉大體其所刺譏不避權貴初詔書設六科以求士謂之賢良方正茂材異等而許人自薦又三嵗輒一舉士大夫徒以文詞進無益于治也公始建議請使公卿薦賢良又欲如漢故事須天子特詔乃舉之不以嵗年限也天子使兩制近臣議參知政事呉公育以為不可許論難上前遂寢公自以所言直獨不可大臣意故見沮格耳即大臣有過孰當言者章疏凡七上不能得徙為工部員外郎直史館知湖州呉公為御史者也公持正不阿如此其後制舉亦竟使近臣薦之用公初議也遷江南西路轉運使總六路漕運有建議欲自重其權者請使六路諸轉運使事皆稟已其于文移當如郡縣上臺省不如是漕事不集朝廷從之諸路皆承命不敢有異公獨以謂賦入有經轉運使不待督責而足即凶年饑嵗雖盛督責猶無益也今事皆稟已是將以勢臨之有求將必取盈非祖宗之舊上疏爭之朝廷猶欲伸前議乃徙公福建路居頃之發運使亦復自請罷其議云明堂覃恩遷刑部員外郎入為三司戸部判官改判磨勘司張堯佐由女寵驟用公數刺譏堯佐陳丞相執中故嘗請建上為儲貳天子以為其功厚報之公復為上言執中何得為功上不以為忤待公甚厚出為江南東路轉運使入辭上謂曰吾今召卿未至江東修起居注闕上遂用公補之頃之召試知制誥賜金紫判流内銓遷禮部郎中奉使契丹還曽丞相在政府與公親嫌出知蘇州徙杭州數嵗徙青州遷吏部郎中道拜翰林侍讀學士今天子即位遷諫議大夫召還勾當三班院判太常寺兼禮儀事遷給事中治平元年十月九日薨于京師年六十詔贈禮部侍郎予四子官賻贈加等公善與人交意所許與堅不可間其所不可不假借矯强以為歡性嗜書畫研墨尺牘與人多珍藏之未嘗問家有無田園皆推以予他昆弟始娶蕭氏再娶陳氏皆先公卒子四人某三女子唐氏本魯北海人自公五世祖徙家杭州曾祖諱某仕錢氏為鹽鐡巡官累贈諌議大夫祖某衢州龍游縣令累贈工部侍郎考諱某天章閣待制贈尚書左僕射數世皆葬其鄉里公之為杭州嵗時盛車騎賓從上塚鄉里榮之及公之薨後一年某日月從葬于先兆以夫人陳氏祔銘曰唐氏居呉迨公五世由祖及孫浸以顯貴其貴維何侍從帝側褒章賁襚輝光幽穸維其令徳有繼有承其徳維何直哉惟清公葬舊墓有祔有從永世不忘寘銘公宫故朝散大夫尚書虞部郎中致仕上騎都尉皇甫君墓誌銘君諱鑑字唐弼曹州乗氏人曾祖鄴虢州閿鄉令祖明綿州彰明縣令贈尚書兵部郎中父載尚書屯田郎中贈禮部尚書君少學問以馴行稱于鄉里由父廕得官初調台州司法參軍斷獄詳平郡人皆愛之請于轉運使求以為州幕職官轉運使段少連謂人曰􅀈曹勢不能動人此其真善也為請于朝不從再調單州單父縣主簿㑹陜西用兵詔籍山東民為鄉兵轉運使張公奎以濟單二州諉君法雖以三丁取一而一家兄弟子姪未有約束莫適取也百姓訟訴紛紛君乃曰曷均兄弟之子先取其多寡等擇其壯者民乃悦服張公稱善教諸郡以單父為則薦君為東阿令勑既下君以親在南方辭不受調通判録事參軍三司舉君知光州光山縣兼買茶場事吏市茶求以多贏為最常數倍取之下戸益困至君不以一毫過數民皆樂輸無逋負者百姓販私茶犯法君曰貧民以茶養生亦何異于為農不忍繩以重法郡守以問君對貧民不得販茶且為他盜罪辟益重不如容之使有以自存縣吏張盛猾惡為上下患君收治寘法餘吏戰栗終君之任無敢犯令者官滿以考課轉大理寺丞知并州録事參軍曲陽縣民兄弟訟者兄告其弟非同父不分與田産弟不能自明縣邑久不決府使君治之君使人按視其父母葬告曰彼雖無石銘棺槨外當有題志者于是驗之果悉書其子孫名字而其弟在焉訟者于是首服河東用錢銅鐵二品均等鐵錢輕又盜鑄者多詔變其法以鐵錢三當銅錢一百姓奪貨失業市井讙噪經略使鄭公集衆官謀之君曰小民失職無聊宜使人往慰之耳鄭公使兵馬都監謝雲行出諭之民因求見太尉既入鄭公捕其唱率者將刑戮之百姓皆哭君曰民以無聊故願見公公重困苦之衆怨且怒將不可解鄭公乃止君又曰兼并之家典質錢舊出十乃今償三十何厚幸也而貧民失業又兩倍輸此其所以患新法之變耳今使以舊數償雖不利兼并之家可以悦衆從之而軍中猶疑縣官出錢刀猶用舊法相與竊議謀變鄭公憂之君曰兵今當給料錢比文書具更厯勾院猶二三日久可不俟文書具給之後徐入勾無害也于是人情始安鄭君以是甚重君年勞改太子中舍明堂汎思遷殿中丞徙綿州什方縣君以母老請得之監徐州利國監以母夫人憂去服除遷國子博士簽書淮陽軍判官賜緋衣銀魚駐泊兵韓遂殺都監率衆叛去知軍事韓儼恐駭不知所為君曰此疲卒主將遇之酷虐忿而報怨快意非有他謀不足畏儼晝閉城門君使開之以安人心叛卒稍稍散亡君曰可因而招來也自持錦袍往當要路呼諭之至暮亡者皆集部吏分索其餘旬日皆盡改尚書虞部員外郎厯比部通判徳順軍事以所生母憂去除喪通判瀛州事今上登極遷駕部又遷虞部郎中是時霖雨大河漲溢又深冀二州流潦猥集河堤内外浸灌危急甚君晝夜行視培裨窒塞堤得以不敗已而河北地大震瀛州最甚壊城壁舍屋無完者天雨不止軍糧皆暴露君為作苫囤稍稍覆葢創築城壘力自督視凡百餘日乃復堅峻而後疏􅅵積水乾下濕地出田數萬頃朝廷遣安撫使二人巡視河北先是侍御史張紀按獄永康軍獄具請君録問君視獄情有不盡者隨事駮正張御史不悦以酒食饋君不受張重以為恨去與安撫使遇于國門外毀君不職二使者不察既至瀛州則奏罷君君安然受之無憾知瀛州髙陽關安撫使待制李公肅之與君同救菑患慮土役者上書為君訟不直舉所完軍儲為證凡一百二十餘萬石朝廷乃下轉運使提㸃刑獄覆實果皆以優最聞君由是復舊二使者坐奏舉不實以赦免罪去後日李公還朝方奏事上自首言曰皇甫鑑已還其舊差遣李公因道君勤力事上曰是乃辛苦人也君除通判廬州事緣灜州修城得勑書奬諭加賜銀絹無幾君求以本官致仕詔許之除一子官為試校書郎君持身清苦雖為郎官五品猶若微時故其謝事就開果決無攀戀心養視兄孤子不異已出亦不為子孫多營業曰不如教使治心田也君年七十五終于乗氏縣里舎皇甫氏本望安定君五世祖純始居開封府考城縣葬桃花崗髙祖勤避後唐兵亂走蔡州西平為西平人及君祖嘗為乗氏縣尉因留居乗氏其後墳墓皆在乘氏某鄉某里君嫡母劉氏贈壽光縣太君母李氏贈長安縣太君君娶李氏故翰林侍讀學士仲容之女封崇徳縣君子四人長已同蚤亡次琮某官次琪某官次環某官女七人皆嫁士族君以熙寧七年三月終葬以元豐四年七月某日某祧祔尚書公之域西偏少南君將没教子弟竁于是惟庚穴云銘曰皇甫之先自宋子姓在漢中葉著籍安定凉州三明度遼為盛曰太尉嵩武烈忠勁迨至士安以文雄嗚後其苗裔綽綽此令惟君潔修敏于從政其所更厯實與名並誰毁誰譽患于難明彼宜有功顧詒譏評是故君子安之若命君允蹈之不侮不競覆審而明不失其正君持止足以往自鏡告老辭歸匪耄匪病拜家為郎是謂延慶生有成績殁有遺稱刻銘幽墟以讚以詠著作佐郎周君墓誌銘君諱喻字彥博姓周氏其先潁人唐之末世有謫官道州者更五代之亂因家焉君父諱堯卿仕至太常博士以善居喪聞廬陵歐陽公稱之曰其情與禮稱古君子之孝也為之墓刻博士娶黄氏金華縣君生七子君其最長君幼而敏慧讀書作文章浸浸有立既冠則能從進士舉有司以冠諸生㑹以博士憂去執喪哀戚甚家至貧奉母夫人養諸弟謹備而葬禮無違鄉里稱之既免喪益務廣學刻苦自彊其于五經春秋為最深著而為説其接交朋儀貌嚴整就之則温然有容講論誨切條理次叙人皆畏而愛之稱為先生長者皇祐五年以進士登科調鼎州司理參軍聴獄察詞明敏過人州郡恃賴之薦其可以長民遷荆南監利縣令瀕江漢築堤數百里民恃堤以為業嵗調夫工數十萬縣不足取之旁縣然嵗常決壊則廬舍田畝皆為魚鱉居及君為之身自行視得當水衝者十餘處益工髙厚築之是嵗遂不復決役民大省其後二十餘年民猶能指其處曰是周令之力也毎縣邑有致民事君為書揭之通衢百姓見之奔走相告無一後期者曰令所以不使吏居間以不擾我我其可以違之有後至者輒相咎責又以薦者言改著作佐郎知臨江軍新淦縣事江南劇縣新淦又其難治吏與民交通綴結為姦獄訟有累年不決者君至以方畧束吏不得轉側立百姓庭下為之剖判無不愜服南方人性皆慧黠既知其不可欺偽訴訟則大衰息數月縣無逋事未朞年君以疾終吏民懐其惠悲傷之寮友愛其材痛惜之年四十夫人江西黃氏大理寺丞灝之女灝喜為文章以豪氣自負一見君以為奇以女歸之生三子紳縡緄君與諸弟居友愛教飭備至至其子就學則未嘗有所問夫人問之曰視吾所以為諸弟則所教者多矣識者以君為善教君既歿夫人誨勵諸子甚有法度後若干年紳遂以進士成名以祿為養今為瀛州推官知衡陽縣事縡緄亦業進士皆可冀其有成女子二人長嫁宣徳郎李如壎次嫁推官范汝中君有文四集十巻藏于家其卒以治平三年三月二十一日即其年殯于荆南石首縣後若干年卜得吉兆于某所用某年月日襄事君之祖諱仁遂贈刑部侍郎祖母唐氏贈仁壽縣太君與君考妣皆葬道州云銘曰葢求良臣必于孝子萬石家行不言而治豈其一身子孫娓娓非若跅弛之士叨竊一時後不足齒周君之先篤孝以禮其所繼承奕世一體何以效之文采操履祿不及豐令名昭矣刻銘其藏以告萬祀處士龍泉何君墓誌銘處士諱君平字少嚴世為處州龍泉人三世未嘗仕處士初以進士舉久之無成乃歎曰夫有命者信不可以力求也我其己矣退而郊居葢年始三十云以讀書為娯自經史諸子傳説以及佛氏外典多手自寫錄或能闇記為人簡易温厚中心不隠以故人益親而樂之其出在道塗逄之者必為引避而士大夫之至門者係踵不絶處士尤喜賓客具酒食相與勸讌未嘗厭倦事有不得己則來至城郭久或十年七八年乃一到家貲靳靳粗給付畀妻子未嘗以為問有勸益殖生業者輒曰幸吾兒宦學有立吾業廣矣已而果然處士長子執中以文學應進士選名在第五鄉里翕然皆曰為善之報執中調為台州推宫而國子監欲留以為教授官執中不肯曰台州邇吾鄉里又有天台鴈蕩山水之秀吾親所安也迎處士之官人益以為榮處士年六十七以元豐五年五月十九日終于龍泉豫章里第其年十月甲子𦵏于某所處士娶李氏生兩男子執中之弟名執徳一女子嫁吳時中處士之沒執中時為亳州觀察判官吾僚也使州學教授劉跂以行狀告而請銘跂曰吾多識君鄉人道君事為詳乃為銘曰士之生世有志有願或游説萬乗以取貴顯若歸守墳墓鄉里稱善文淵少游孰隠孰見惟何君之久幽亦曰適已自便克有令子為邦之彦故吾銘其藏辭不愧㥏季弟青溪縣丞墓誌銘季弟青溪縣丞某字儀某七嵗以先公殁遣表恩補太廟齋郎年二十二調河隂縣主簿再選為滑州司法參軍㑹州廢為白馬縣罷歸而青溪初增置丞君以選授君幼敏鋭有性格讀書學文及為政效官皆有思致親舊譽之上官倚任之咸期以逺到取清河張氏尚書郎中誼女生一子方進在青溪嵗餘以習法律求試有司至京師以後期不及試歸未至家張氏卒後五十日君亦終時某年月日也家在蘇州即殯蘇州某佛舍後六年嵗在辛酉祔葬于東都祥符縣魏陵鄉祖考塋以張氏祔致君之喪來北者從兄父伯裕叔懋方進時年十嵗吾時為兗州皆不得親君葬襄事惟諸從子弟實某月某日云銘曰先公嘗為青溪佐後六十餘年而汝復官于此父老有記先公善政喜汝似也宗族亦期汝遠火而短命不幸可悲矣乎銘以誌悲已而已而嗚呼噫嘻兄子定國墓誌銘仲兄長子定國字伯于幼能誦書敏于記覽才十餘嵗五經略皆上口旁及諸子史書往往成誦仲兄平生好經書為春秋學尤深邃嘗曰是兒當盡傳吾學定國習為進士詩賦詞章㨗速精緻見者皆驚賞以為老成善隸書字如刻劃可愛性專一端静未嘗有子弟過而勤學刻苦不舎晝夜外無嗜好不幸短命十八嵗而卒嗚呼揚子雲稱童烏九齡而與𤣥文人皆疑子雲之言以𤣥非童子所能與也如仲兄之知定國謂其可以傳學孰曰不可與哉子雲知童烏審矣非欺人者也定國以祖䕃為郊社齋郎後補掌坐其卒仲兄時為知制誥知揚州事後十二年仲兄棄世明年葬祥符縣魏陵鄉祖考墓次定國祔于兆域之南少西叔父暨其弟奉世襄事熙寧二年十月二十八日也銘曰孰禀以為爾生孰賦以為爾命其有相之邪胡志氣之盛其有奪之邪而夭閼不競其皆偶然者邪嗚乎志悲于斯銘彭城集巻三十八
