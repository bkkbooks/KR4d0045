body:
  text: 彭城集巻十九宋劉攽撰制誥皇叔祖右監門衛大將軍彭州刺史克艱可遥郡團練使制考課之法周之外朝公族支屬以親授禄非取勤民之效而被陟明之典我朝惇叙之恩是其為大矣某進列環衛兼領郡符積其嵗月之勞加以團練之號宜思自修以稱成命皇伯右監門衛大將軍祁州團練使仲真可遥郡防禦使皇伯右監門衛大將軍榮州團練使仲某可叙復遥郡團練使江夏王宗室之英地近屬尊兹而遺言後嗣為念朝廷方以惇叙興治哀榮並施爾等率循嚴訓皆習謙冲遥遷寵榮以示優渥仲真進秩一等圉原註一作周禦大郡仲某其思罔愆復益勉勵毋墜休命皇兄右武衛大將軍普州刺史士匑可遥郡團練使制朝廷隆親親之愛戚疎莫不受位縁賢賢之義勤奮咸使進秩惇叙之典有自來矣具官某地聫具邇屬居則友身修足以無過家治是以為政内參環衛外領州團十稔于兹三秩維叙俾假使麾之重進居團練之雄幕府如初符章加峻益思恪慎以若寵光皇兄右武衛大將軍常州刺史令琮可依前右武衛大將軍遥郡團練使制環尹大將軍之幕府郡將二千石之符節是為榮寵實待材用國家崇惇叙之典隆甚邇之愛不恡高爵而畀公族至于歳久仍以課選是其親親源源之美異于前古矣惟令琮謹身無曠有足稱者因宿衛之舊守増團練之峻秩祇服休命毋忘恭恪朝散郎集賢校理崔公度可兵部郎官制慿熊分虎外則連城之寵含香握蘭内則建禮之直皆以材選是為美仕某文行自將勞伐夙著出守千里既有成最入司五兵實副遴柬祇服休寵益勵恪居户部員外郎劉昱可户部郎官制臺郎之選朝所慎柬雖甚清望猶以州郡為其資叙所以均内外之任而示以民事為先也爾以材敏課最聨職省部有司第其閥閲當為牧守正爾郎秩以示漸進位著禄餼悉加于舊祇服光寵益崇職業皇伯右武衛大將軍深州團練使叔兼防禦使制公族之恩殊于外朝髙爵重禄不待兵戎之績陟明進秩仍以歳月之務我朝惇叙之美邁于前古爾持身無過久次當遷進加禦侮之右不移環衛之重膺是休渥毋忘恪修皇伯右金吾衛大將軍舒州防禦使仲革皇伯右金吾衛大將軍開州防禦使仲洽可並正任防禦使制國家繇祖廟之慶廣公族之恩雖不治民隆其爵秩至于積日兼為閥閲爾等皆以近屬齒于顯位備執金環尹之列領剖符外禦之寄謹身無曠馴行有聞宜豫陟明用疇結課因其舊治遂爾為真惟此寵光奚以報效貴而能降滿焉不溢勿渝素心對越休命皇伯右金吾衛大將軍和州防禦使世程可正任防禦使制執金環衛之列防禦守帥之貴崇是品秩以待材用汝磐石之宗葛藟攸庇粤膺寵數允恊惇叙仍以年勞復從吏課公族之恩軼邁前世然非修身慎行逺於咎戾何以保兹禄位而進豫陟明連城之廣正任為重恩稱殊渥益自勉勵皇叔右武衛大將軍和州防禦使仲汾霸州防禦使仲爰並可正任防禦使制朝廷推親親之愛厚於公族故不恡高爵重禄雖無殊功成效猶使之躡等循級而進也然非馴行惇謹素守堅正亦何以綿厯嵗月無所玷缺考績之際姑有以藉口矣爾等皆以近屬驟膺寵數環衛大將軍之班列郡防禦使之號既兼之矣復以年勞進為正任國恩隆厚屬籍光顯宜思恪慎以永終譽皇叔右監門衛大將軍舒州團練使仲郵可右武衛大將軍遥郡防禦使制内參環衛外領使符名實兼副寵禄輝赫朝廷所以待材用之宅而公族縁親親而處之仍以汎恩得與外朝比列此其愽惇叙廣愛之至也具官某地居近屬身有嘉稱聫門衛之幕府縂羣舒之團結縁飛龍之在御當進爵以均慶遽罹親憂弗俟恩錫既終達禮宜申前令吏右武之貴秩増禦侮之重權懋服光華益思恪慎皇兄故右監門衛大將軍令駰可贈博州防禦使制傳云親親以睦治族之道生則致其愛没則同其哀豐禄重爵厚其生者也愍冊襚服飾其終者也朝廷之恩備矣有司之事舉矣皇兄某地居近屬身有馴行奄至不淑良用傷悼假使麾之美號為壤户之餘榮魂其有知歆此殊寵皇叔右武衛大將軍環州刺史叔滕可遥郡團練使皇叔右千牛衛將軍仲毊可授大將軍制百官奉事由功實以為資級公族論恩在久次則當遷叙此朝廷治内外之法本忠厚之意也具官叔滕天潢之别漸漬徳潤麟趾之世信厚有取備官環衛兼刺名郡既積年勞宜加爵秩假雄稱於團結資威望於使領勉服光寵益勵名節仲毊備官環衛貴視命卿既積年勞宜加爵秩不移幕府之號姑假元帥之寵勉服休命益勵名節皇叔右監門衛大將軍滁州團練使仲歜可遥郡防禦使皇叔右監門率府率仲瑈可右千牛衛將軍制公族之恩戚疎有叙存著賞延之典没隆䘏後之儀以乃父遺顧而有言矜諸子藐露而為請因從加秩以慰泉下奔駒過隙既就外除維柞疏榮肇推新命咸思恪慎以報義方皇叔右監門衛大將軍仲的可右武衛大將軍遥郡刺史皇叔太子右監門率府率仲葳可小將軍制朕纘嗣昌業覃慶列位小大之臣莫不受賜矧其屬在公族可使後於庶姓而爾等皆以親憂弗俟成命既給達禮宜申前寵或進躋武衛而領郡符或身列環尹而備幕府敬服異數益修善行皇叔右武衛大將軍袁州刺史仲逺可遥郡團練使皇叔右監門衛大將軍叔羅可遥郡刺史制吾以材能賦爵而宗室以戚屬處位吾以功事課吏而公族以年勞計最治親之禮異于外朝所以崇惇叙之典厚而勿薄雖然宗子之能畏慎無過其亦有信厚之風蒙被寵數不為濫矣仲逺備位環尹外領州符稍加團結之名以示遷擢之次叔羅備位環尹既開幕府稍假左符之重以示專城之貴祇服休命毋怠恪居右監門衛大將軍士出士蒲令括捐之士編可並遥郡刺史右千牛衛將軍仲諲可右監門衛大將軍制詩云振振公族夫能學問以知古文采以見志則可謂有信厚之風習為善之樂矣爾等咸以經術待試有司銓能程藝率有可取嘉其忘膏粱之佚安儒素之業宜有甄賞以示旌别進秩加等是謂休寵益勵操守毋怠初心承議郎殿中侍御史上官均可兵部員外郎兵部郎中葉祖洽可禮部郎中制六曹屬郎朝之精選號曰頭司尢為重任春官之掌邦禮祈父之主戎事決非美材曷當遴柬以均祖洽器識宏茂文彩贍麗或恪職風憲或収譽臺妙宜有峻遷以副衆望論其初試始被握蘭之寵銓此久次益見應星之貴勉修職業毋負渥恩金部郎中范鍔可京東轉運副使京東轉運副使侯利建可金部郎中制朝廷經費調度金榖為重内則文章地官之屬外則漕臺使者之任非其深思敏智不足以當吾慎選以某久更吏職綽著能譽惟此司存雖有中外之别至其職業非復劇易之判易地而處陳力就列益圗善最以副民望兵部郎中杜常可光禄少卿祠部郎中向宗旦可兵部郎中太常丞賈易可祠部郎中制六曹九寺所以挈提綱目釐舉庶務朝廷資以為治者也屬部卿貳是為妙選有以久次増叙或繇良材初試吾所簡閱未嘗輕付常風格幹濟陳力維舊宗旦樞機周宻應務敏達易儒學修明士論稱述此其在官皆有休譽進而用之吾何愛焉武部掌兵伍之符籍祠曹主中外之祀事光禄之任尤為繁夥非若漢代謹門户之禁而已其惟恪恭勤勩可以稱職汝其勉之水部郎中王諤可知濟州都水監丞錢曜可水部郎中制臺郎重選郡守優寄朝廷待材用之宅兼仕宦之美是皆雍容内外之望用為更互出入之地以諤効官文昌既歴歳月俾分符竹往臨鉅野以曜領䕶都水丞事修舉進升省闥仍莅起曹勉副茂恩力圖來效朝散郎守兵部郎中程博文可太府少卿承議郎陳次升可兵部郎中制太府主貨賄之藏司其出納夏官主五兵之要謹其符籍貳卿副郎皆精選也以博文綿歴省闥綽著士望以次升臨按淮甸克宣使指並用登進以攄材略夫其厠惟月之班聮應星之象為寵多矣爾其勉之朝散大夫權知曹州王彦韶可衛尉少卿朝奉大夫駕部郎中張修可鴻臚少卿朝散郎蘇注可司封郎中承議郎太常丞周秩可駕部員外郎制中都列官皆有分職地崇望髙者卿寺郎曹也非其美材未嘗輕授以某等持身端直臨事詳敏外典州郡内更臺閣久次成效皆有可紀是用遞加寵進以極智畧或佽貳惟月或上應列星至于副郎並為茂選敬副寵光敦懋職業前河北提刑王端可將作少監新差通判瀛州李敦頤可軍器監丞制百工之事萃于二監將作謹於樸斵軍器嚴於補繕非有程不可以稽其勤惰非精心不可以見其功盬命官之重從可知矣以某刺舉時當以某㑹計明審推其有餘允宜繁使或丞或貳實皆寵命勉力自强以副推擇承議郎光禄寺丞王悆可太常博士宣徳郎呂由庾可光禄寺丞承奉郎王斿可太常寺太祝制九卿之屬効職輦轂皆朝廷之精選而養材待用之地也以悆學術通敏䆒知古今使為博士可以綜練禮文以由庾持身謹飭紹其家世使丞光禄可以佽助卿事以斿幼壯好學傳其父書使為祝官可以陳信正辭並承休命所思圖報朝議大夫充集賢院校理諸王府翊善王汾可中散大夫直祕閣差遣依舊制大夫以上皆高爵也至于中散品秩益崇禄餼益厚吾所以待材用之士其能自致此者鮮焉以汾敏學多閑内行兢兢緜歴詞館久次王府有以自守事常裕如考課當遷俾從明陟昔子雲叔夜偕在此官貼延閤通直之選仍藩邸置醴之舊祇服休寵益思恪居左司諫朱光庭可左司員外郎右司諫王覿可右司員外郎制朝廷開直言之路延諫爭之臣其能愛君主於信厚論事識其大體不為苛察以取聲譽而補益之效粲然可見宜有褒崇以顯尤異惟覿學問端邃臨事屢斷惟光庭氣宇惇重見義不回並列二省有光七列文昌之為政本都司之有屬郎尤思得人以齊衆務俾從遷秩復使効才新差京東轉運判官張景先可權發遣河北轉運判官京東西路提刑胡宗回可京東轉運副使制朝廷之任官必于其事乃可求其稱職為其達民情之薄厚審吏材之髙下而其舉措時當績用有叙也以宗回詳按庶獄表率一路既有成效益宜重任俾持餫輸之權用謹金榖之賦今河流未復隄繇方興商度功利實頼智畧惟景先前在都水陳力有謀復付北道仍貳漕事慎簡之意夫豈易哉各務悉心以副休寵朝請郎權發遣宣州周之純可廣東提刑朝奉郎新差福建運副張修可知宣州朝請郎權江西運副王祖道可福建運判朝請郎淮南西路提刑蘇解可江南東路轉運副使朝請大夫江東轉運副使李莘可江南西路轉運副使制商度金榖之盈虚詳按獄岸之中失使者之任朝廷慎選葢所謂將王命而明邦國若否者矣爾等咸以幹力屢更繁使付之百城之富一道之寄或以初試鋭精來效或以易地習慣成事悉堅乃心廣集善譽惟修擢自省郎出總甌越疾病自上黽勉勿任假其左符足資卧治江南諸郡宣城為大敬服休命知其厚恩朝請郎行太常博士辛廱可太常寺丞奉議郎權判登聞鼓院劉唐老可太常博士制太常禮樂之司博士議論所自參訂今古折衷内外非宿儒成學不足以居以廱洎唐老文采質性見稱搢紳和而不流毅而不固是用擢簉秩宗之列專主曲臺之業勉服休寵益圖善最太常博士充集賢校理孔平仲可祕書丞姚勔可太常博士制祕書圖籍之府奉常禮樂之司國家以待碩儒之士而養育其材非夫博辨通識温恭守義未嘗得而居之爾等咸以徳藝見稱搢紳銓能授官實宜其任易地而處亦為允稱勉自崇勵以副光寵兩浙運判葉伸可權發遣轉運副使朝散郎鞠承之可權發遣兩浙運判官制總率一道澄察百吏金榖之繁夥獄訟之紛雜非精心不能盡物非强力不能輯事惟伸奉使二浙綽著能效不有旌擢曷以示勸稍正官號以重權委惟承之幹力强濟心術開敏可以佐伸究其智畧同寅恊恭夙夜職業無隳前功益収來效新差知越州張詢可福建轉運副使新除開封府推官田子諒可河北西路提刑廣東轉運判官毛漸可湖北轉運判官制宣力四方為上耳目使者之任也金榖功名之㑹繁獄岸鞫讞之大小非有敏智孰堪劇治以某等既更歴試皆有稱譽並假節傳往明若否夙夜匪懈以酬寵數太府少卿王子淵可權京西轉運使知北外都水丞公亊張景先可京東轉運判官制陪京之地東西二道連城百千生齒鉅萬而民俗有齊魯楚鄭之别物産兼桑麻魚稻之殊賦税之入多寡不類有司總其經費均其移用儉無蹇乏富或羨餘則不孤委寄而稱良使者矣爾等皆以幹力久更器使是用並假傳車各當一路其亦悉力徇公以集課最夫東人經水潦饑饉之害必厚其粒食西方有雈苻追捕之餘宜絶其枿肄欽哉惟時毋忝休命宣徳郎范鉞可知太康縣制宰字之職風化所從在漢則三輔異選於唐則兩畿為重今之甸服亦當慎簡以爾智術有餘足任治劇付兹民社密邇輦轂承流所以宣布有善易於上聞其勉之哉毋舍勤恪朝奉郎吳沛可知開封府考城縣制邦畿千里郡國之首縣令一同子男之政然王澤所布莫近於京畿所向莫親於宰字是以銅墨之寄詔除惟重爾以幹譽粤膺妙選其克精心慎事平獄察訟夙夜無怠以集課最通直郎孫述可知開封府長垣縣制王畿千里縣邑棊布北道之出長垣居首冠葢走集使客踵繫銅墨之寄擇材匪輕用汝充選思所稱職毋怠毋亟以恊民譽承議郎張亞之可知開封府祥符縣制東畿屬縣十餘二赤居其首所以扶助尹正敦厚風化令事重矣今以付某昔陸雲在浚儀民為立生祠雲文士也而惠及此汝將勉之乎奉議郎新差簽書鎮海軍節度判官廳公事章顯可知開封府尉氏縣制畿内諸縣古稱三輔之劇也兵屯所在尤號難治以某久更宰字習知民務擢而用之宜有顯效思自奮勵以副推擇河北運副唐義問可河東運副兵部郎中程博文可河北提刑制瀕河之壤晉魏為大使者之任耳目攸繫九賦所充于以給邦用五刑所蔽在乎折民情故將漕之寄察獄之官朝所慎選人所輕授以義問屢宣使指居積民譽以博文内佐浩穰夙效材敏是宜並假四封之傳往治百城之富足食足兵下無愁歎庶獄庶慎法如畫一乃為稱職汝敬之哉權提㸃兩浙刑獄公事朝請大夫張安上可湖北轉運副使權知潤州朝散郎楊傑可兩浙提刑制朝廷疆宇濶逺所以存恤幽隱耳目之寄付之使者惟興利除害于民務決平申枉于岸訟吾甚重之未嘗輕授以安上幹力强固智慮開敏荆楚之區襟帶蠻徼足食足兵漕事實嚴以傑儒學自修心術愈壯三江之濱民俗輕揚庶獄庶慎中興具存並付傳車之寵以當外臺之選思其恪居副此任遇翰林醫官殿中省尚書奉御李永昌可𣙜易使西綾錦副使兼翰林醫官副使殿中省尚藥奉御卓順之可軍器庫使翰林醫官殿中省尚藥御醫史晉中可直翰林醫官局翰林醫官班漢卿可尚藥奉御制執技事上莫貴于醫惟其精心慎慮以輔其術則可以動無不察期于十全矣爾等尚勞殿省陳力既久功效顯著由是道也宜加遷叙以示褒進祇服休寵無怠素志朝散郎右司郎中杜紘可大理卿制哀矜庶獄明清單辭所以一萬民之情葢不出三尺之律必得忠信之長明辨之士使之亭疑決平可以弼教輔治矣具官某禀性通敏用心精詳能傳家學頗得法意閥閱所載鞫讞為多宜付棘寺之治且正月卿之秩服我光寵思所報効不犯于有司雖非爾力之所及自以為不寃庶乎古賢之可學耳大理少卿李鳴復除大理卿制朕近觀勅令所編類舊典我孝祖宸筆逐事㸃勘増修刪改曲當情法於恤刑之條尤加詳焉企慕不已因親劄以示輕用徒刑之戒廷尉天下平可不遴擇爾表于西州儀于王朝心夷氣龢藹然君子長者之風迺者俘纍之獄咨爾聽之簡稽得情弊成以宥而朕好生之徳被于貉𨽻之徒達于窮髮之北良用嘉歎晉躋九列帥屬棘廷使四方司政典獄咸知朕欽恤之意念之哉刑期無刑以長我王國權涇原路兵馬鈐轄皇城使萬州團練使張之諫可轉兩資西上閣門使制料敵制勝憺威發謀行陣之功雖貴其訊馘鎮守之重實資其籌畧懋賞所及美秩奚恡具官某勇鷙絶人寛裕得士躬履戎行分守私壘近者羌人犯順邉馬坌人統帥部伍猛銳齊奮完固城壁安堵無懾深得治戎之要宜膺禦侮之賞上閣之峻使聫維重祇服休寵益自勉勵朝散大夫韓宗師可衛尉少卿制九寺輔治長貳維貴地崇望重朝有定秩雖事務差簡而材者是處以爾率身謹行臨事鋭敏門廷之養稱於士夫治可移官于何不濟以是命汝貳于衛尉祇服訓詞亟成職業前江西提刑宋彭年可司農少卿制朝廷試吏於邦外用材於都内以其效智於彼者已信則其宣力於此無忝爾往者詳刑奉使既結成課稍進卿列俾貳大農督視倉庾謹察㑹計惟其勤恪無怠小大必周則為稱職而知報矣爾慎之哉朝請大夫直龍圖閣葉均可太府卿制傳稱六官之長皆民譽也區區小邦用人若是況吾九寺之重乎具官某心術通敏儒學兼劭早列詞館出試政事持節剖符緜歴斯久率有可紀是謂老成宜進惟月之班以觀竭節之效勉務彊力不孤寵遇京東轉運副使李杲可太府少卿制表率一道副貳九列皆朝廷之精選亦搢紳之美仕授賞之際曷嘗輕哉爾素以吏幹見稱士論將漕之久終更宜代惟太府之繁㑹實中都之要劇進聨惟月益佇來效奉議郎管勾機宜文字魏章可團練使制師旅之行將帥以其精鋭陳力于外幕府以其文墨論議于内至于成功皆當懋賞今西師告㨗爾豫有勞俾進秩叙以示旌勸祇服休命益思來效蕃官皇城使簡州刺史若沮没移可遥郡團練使制軍旅西出將帥盡力罙入深阻蕩覆部落焚燒橋梁斷絶要路爾豫當隊伍克奮精鋭上功計獲足為戰多宜加懋賞以示勸奬増團結之寵名仍使聨之美號祇服光寵思所報効宣政使嘉州刺史内侍省右班副都知劉有方可遥郡團練使制出入禁闥宣布内令樞機周密是其職業夙夜匪懈見其智慮歳月之久始終如一第其優最宜有遷寵増團練之美名壯使聫之重望膺服優渥益思報効皇叔武衛大將軍磁州刺史叔儺等並可遥郡團練使制環尹之貴拱衛天居開大將軍之幕府可謂盛矣而又外領州符兼總使節徒以公族惇叙之愛得用歳月之久而授之國恩隆厚思所報稱試太學正葉濤可瀛州防禦使官監蘇州糴納倉彭汝霖可並太學博士太學録李格非可太學正真定府真定縣主簿盧訢可太學録制太學賢士之闗博士正録皆師表之任也非其經術修明内行峻潔不足以當是選爾等籍甚士林或已試庠序並從遷擢以究職業太史局直長許孝恭可太史局丞制隂陽之説拘而多忌拘則災祥之辨不可不究忌則時日之異不可不避爾執技從事自信其術魏王之葬指言其失不墯師法能屈衆論嘉其守官俾從増秩皇叔祖保信軍節度使宗隠男仲䙼等可並太子右内率府副率制公族之子屬近愛至未及有知膺受光寵非以祖廟之隆慶朝家之惇叙耶副率之貴是惟通籍勤身戒事以就長立彭城集巻十九
