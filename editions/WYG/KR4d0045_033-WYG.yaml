body:
  text: 彭城集巻三十三宋劉攽撰論重黎絶地天通論形而上者謂之天形而下者謂之地天者陽之積也地者隂之積也陽用其精隂用其形鬼神者視之不見聽之不聞精之至也故屬天人物者言而為聲行而為事形之至也故屬地周書曰重黎絶地天通重者治神之官也黎者治民之官也民神易治則幽明不相亂清濁不相惑是謂天地不相通矣然則神何以亂民曰鬼神之情㣲矣茫洋乎其不可以智通也恍惚乎其不可以類求也故古者惟事神為難謂其必無邪天之垂日星地之列山川宗廟之居祖考皆物也謂之必有邪光景不見于民嗜好不通于人必有責之殆不信矣故聖人之事神處于有無之間致其不可知也然後民信之示其不可黷也然後民畏之及世之亂民于是以有責于神所以亂民也然則民何以亂神曰民者𡨕也欲利而避害情所同也福者利之大者也禍者害之極者也禍福者鬼神之所為也民棄常而好異舍明而事幽祀非祭之鬼祈無妄之福則民亂于神矣然則為其治者奈何曰祭祀以其時兆位以其常尊卑以其等如此則神治矣業有常治事有常法教有常俗如此則民治矣春祠夏禴秋嘗冬烝三年而禘五年而祫冬至祀天夏至祀地山川日月風雨江海皆有其日祭也祭天圜丘祭地方澤兆五帝于四郊山川丘陵各因其方建國之神位左宗廟右社稷常也徳盛者祭廣徳薄者祭卑天子祀天諸侯祭土大夫三廟士二廟無田者不祭犠牲衣服鼎俎籩豆各從其命數等也三者明則祀有常典而神不亂矣士農工商四者謂之業士者為學農者為耕工者治器商通有無此之謂事父子有親君臣有義夫婦有别長幼有序朋友有禮此之謂俗三者明則人不妄求而民不亂矣故重黎之絶地天通者由此道也好善優於天下論賢能技藝人之美材也足以出衆矣未可以治衆也夫賢而自矜能而自用技藝而自得若是則雖有美材足以自孤危而已矣譬猶高山峭岸之無輔也其頽必矣是故莫若好善之美夫好善者賢雖不及人能雖不及衆然而見一善行則悦然服聞一善言則怡然樂有過焉樂人之規已有疑焉不恥于問人若是則賢者將告之以道能者將告之以事夫天下之道天下之事不可勝究也計人之所知不若以其所不知者衆然而雖不能必有告之者是舉無失道廢事也君以此待其臣則百官之善莫有遺矣臣以此待其下則衆人之善莫有棄矣是故閭里有善可問而知也匹夫有善可官而使也又況在左右親戚乎天下雖大不難治矣又況有國家者乎夫治天下者不出于得人心人之有善莫不願人之已知苟能好善則有善者見知而悦矣不肖者慕善而隨矣天下之心一旦歸之矣故曰好善優于天下此之謂也雖然好善也有道見賢而悦之間善而樂之此有好善之志矣然而外無其信則百姓不從外有其信矣而禮不備則賢者不留故苟好善耶則必推爵禄以崇其人厚禮貎以效其心則百姓信之矣以身先之以貴下之讒邪者不得居其間則賢者留之矣昔者虞舜起于畎畆至有天下莫非取于人而為善者故至于今言人君之理者莫有先焉周公之相成王也身下白屋之士故至于今言人臣之聖者莫有高焉夫天下之士豈能及二聖者乎然而不自用焉者知好善之廣也夫好善之美若是其易見也然而愚者莫之為之何也是無他故忌與驕云耳忌者畏人勝已故聞一善言曰予所知也見一善行曰予所能也若是則賢者將深閉固拒豈有自致者乎驕者不能下人君謂大夫曰是臣我曷足嚴之乎大夫謂士曰是事我曷足聞之乎士謂衆人曰是居我下曷足師之乎夫不肖者之見驕也猶將諂䛕以求進若夫賢能之士則必深引而逺去焉肯留之乎夫不肖者競進賢能者引去天下雖大亡可立須也又况有國家者乎論出母繼母嫁服與王介甫儀禮齊衰章出妻之子為母又曰父卒繼母嫁從為之服報據文繼母不言出因母亦言嫁或曰上文繼母如母則繼母之出猶因母也因母之嫁猶繼母也或曰不然古人婦人有子則父卒不得更嫁故繼父章妻穉子幼子無大功之親乃可與之適人使子能自立而有大功之親則不得嫁矣昔秦之為俗薄矣猶云有子而嫁倍死不正况三代之厚乎故不言因母之嫁非以其無服也有子不復嫁也繼母則不然夫死妻穉而無子則可以更嫁雖更嫁而從為之服以貴終故著言之然則繼母之出殆將無服乎夫母子以天屬者也故雖出無絶道今繼母以義合者非有天屬之愛而又以罪見出則恩也義也為所無施是以雖不服焉可也故于上言出妻之子謂所生也而下特舉繼母之可嫁則明其出與因母不同矣故因母之適人為不得已則服可以繼母之嫁而見之繼母之出為義已離則服不可以因母之出同之禮固有文約而義不相害者如此之類矣或曰出何以異于嫁曰出者得罪于父者也嫁者不得罪于父而又嘗服三年之喪終始之義備矣故子不可不終也此二説者何如幸一裁擇之處士論上漢世之譏處士皆曰處士無用處士純盜虛名為處士者莫不愠而不服也雖然使處士而有用于漢世其無貴于處士矣何以言之夫所謂處士者古之逸民也夫所謂逸民者王徳之人正已而物正道徳純備于已矣而無明君與之興化是以隱其身而不出也傳曰舉逸民天下歸心焉聖王莫不以逸民為先是故其舉之也非盛禮貌不足以接之非父師三公之位不足以處之非强以厚其身也非資以取其名也以為其道徳足以懐來天下故任而不試其謀慮足以安定國家故聽而不疑是故非有王者之君不能用逸民逸民亦必待王者之君而後出也今如漢氏之治天下其建國非以道徳基之也其使民非以禮義率之也權詐之與謀苟且之與居其為公卿大夫誦數守法奔走聽受趣得失而國家之事舉之于是焉以王徳之人語之是猶與越人之章甫也謂之無用焉固其職矣非處士之名也尚何愠而不服哉夫國家之治嘗必積仁累義兢兢業業而後興者也君人者不能躬行而身化之徒使匹夫冠冕壇塲而跪拜之天下之治非可祝詛一朝變也其用處士若是是能舉逸民者乎若夫智不出于尋常之域而自視缺然因以挾持高論誇言上古帝王之事罔誣世主矯厲為名以希來世之譽而邀當時之福謂之純盜虚名不亦信乎不亦信乎處士論下凡貴于處士者為其知道也知道者不以已徇物不以外傷内是故雖貧賤不改其樂富貴不移其志伯夷叔齊餓于首陽顔回居魯簞食瓢飲子路衣敝緼袍與衣狐貉者立而不恥如此故可以大有為于世世衰道敝處士之風流而與㳺俠同衣食必求其甘美居處必求其佚樂内有聲色之奉外崇名譽以誇人如此而曰我無求于世而高尚不預事也則孰不能為處士哉又曰我能為人君興治立政必三公卿相求我為人君者樂聞其夸嚴而謂其良有益也不知其與世俗無以異矣猶且汲汲焉而求慕之不亦大惑乎齊人有為窮里之社者聞客有得周鼎而葆之請以百錢賃而用焉客聞之笑曰子來夫周鼎者非萬人不足舉之陳之南郊以饗上帝是享百太牢而九韶之舞三公灑掃諸侯執俎豆乃其宜也今子將何以求我乎齊人閫之罔然啓其鄰有完瓦鬵者而即用之反燕賓客醉飽而歸乃以豚蹄謝之夫窮里之社而待周鼎用焉雖有不稱且不如瓦鬵之適于用也而乃希周鼎之貴不亦兩失之乎夫古今王霸之異也不若里社之與郊天乎而處士之居其間不若用周鼎之與瓦鬵乎故不度其實而徇其名雖得萬處士安能有益于世哉桓公不用伊尹論予向與友人王深甫論齊桓公不能用伊尹著為文詞後失其書今深甫既殁追念前語尚未忘也因復叙而記之以寄思深甫之悲云王深甫喟然嘆曰世之無良臣也夫以齊桓公之用管仲豈非大有為之君也哉由管仲之器小故桓公不至于王也使齊桓公與伊尹並生其有不能用之乎劉貢甫曰時無伊尹則已矣幸而有之桓公必不能用也深甫曰何以言之貢甫曰仲尼有言中人以下不可以語上也徒語之云爾聖人猶難之況信其道而用其身乎夫度量之不同人之情也或相倍蓰或相什伯聖人之所以為聖賢者不能喻焉賢人之所以為賢不肖者不能知焉譬夫醫巫百工智相師巧相視雖錙銖不可及也故學于仲尼者甚衆其得道惟顔氏而已故曰終日不違如愚于吾言無所不説其餘則嘗違而不説矣彼學于聖人如是其難而用聖人者獨以為易乎桓公無顔氏之明審矣智足以用管氏而已矣雖有伊尹吾知桓公必不能舉國以從也雖然桓公比于他諸侯為賢他諸侯雖得管仲亦不能用猶桓公之于伊尹然無可疑也深甫曰昔者衛靈公之無道也仲尼賓之齊宣王之不智也孟子臣之桓公之賢猶足以高于二君顧不足以用伊尹哉貢甫曰子所謂用之畏聖人之言暫而禮之之謂乎將聽從其謀以奉事而大有功乎如畏其名而禮之也則豈特桓公哉雖甚不肖之君亦將勉而一舉矣如將奉事而大有功則孔子行乎季氏矣三月不違而已耳彼聽其至言不知此其美也而以為迂循其至道不知此其要也而以為誣倀乎茫然若蹈滄海而窺青天雖强為之容而心已離矣故仲尼亦未嘗三年淹而歴聘者七十國也獨如桓公也乎哉深甫曰桓公之才子惡乎知之貢甫曰聖人吾不得而議之矣有仁者之言焉仲尼曰仁者靜夫靜者天地之大死生之變無足以動其心者若是故可以王也夫桓公之事殺兄篡國姑姊妹之不嫁七人其猶足以謂之靜哉不至于靜而欲用聖人此商君之干説孝公以帝王之道甚矣其欺于時也深甫曰噫子之尚勝也以世無伊尹與桓公並生故慤焉畢子之説也貢甫曰予之所尊信者孟子也孟子嘗言曰伊尹伯夷栁下惠得百里之地皆可以王若是則三人者之為聖均矣方桓公之時栁下惠魯國之士師也桓公審能用伊尹則胡不求展禽而相之而顧得管仲之説而止焉夫可説以淺近可謾以卑汙則桓公之智亦可知矣深甫于是黙而不言明莊論楚王聘莊子莊子辭之魯侯聘顔闔顔闔逃之夫賢士君子固將以不仕為貴逺人為名平論之曰是大不然子未聞聖王之治世也上不重任于民故易從下不大望于君故易事三公九卿大夫士而天子逸焉君有常道臣有常職民有常業各當其分而無私焉故無非常之譽則無非常之咎無卓詭之賞則無憯厲之罰夫亦安其性命之情而已矣是故賢士君子從事于其間而無愧焉故可仕也逮徳下衰上之所以任于民者重矣故常匱而不給下之所以望于上者深矣故常危而不安君失其常道臣去其常職民奪其常業皆私其實而利其名故有非常之譽則有非常之咎有卓詭之賞則有憯厲之罰性命不安而天下大駭于是時也賢人君子且羞其所為而其國可以從事乎昔者晉主諸侯而衛人伐陳及晉人討衛孔達死之以辭于晉而世謂之忠中行之難趙鞅出奔董安于自縊以定趙氏而世稱其材晁錯為漢畫䇿謫削諸侯七國發難而錯極刑宗族灰滅成帝之時天文變異丞相方進受策自殺以當其咎故世主待其臣若此也高位重禄厚利美貨不近乎宗廟之犠乎古之君子未嘗不欲仕也察主量之奚若䆒世治之何如而後出耳故從事于道者道久而逾安從事于利者利重而逾憂斯古今賢士之所以辯也是莊生所以持竿不顧顔氏所以遣使者而逃也昔者大夫種為越謀吳既得吳而勾踐殺之商鞅為秦立法既成霸業而惠王族之韓信為漢戰勝攻取既一天下而高帝滅之三子者皆其盛者也而俱若是又況不及者乎嗚呼後之人惟母從事于刻薄私其利而求其名則幾于免矣説王天下説王天下者得天下之心者也明其政刑修其禮樂能者任其事智者任其謀大國百里小國五十里百姓親而歸之矣賢者在下位修其徳教明其仁義能者學其事智者學其道大師數千人小師數十人百姓尊而敬之矣故王者之于百姓非能家至而户曉也然而賢君以其國歸之賢師以其道歸之天下亦可謂之治矣當是時也列國有不從則為逆中國有不從則為亂誅之可也伐之可也天下無異議矣是故非賢者百姓不從非聖人賢者不歸故一鄉之善士一鄉之望也一國之善士一國之望也天下之善士天下之望也天下之望歸之天下之民何往乎故聖人之服天下如斯而已矣彼蚩蚩之甿不與焉蚩蚩之甿耕而食織而衣有餘而佚不足而怨利之斯善勞之斯望雖有聖人彼安知之故聖王之作不待蚩蚩之甿知之及其一天下也蚩蚩之甿亦無由知之詩曰自西自東自南自北無思不服有道之賢者歸之也易曰百姓日用而不知蚩蚩者不知也昔者堯授舜舜授禹天下之歌謳朝覲者遷而從之文王之時太公伯夷或居東海或居北海相率而歸周孟津之師諸侯㑹者八百彼皆賢者也是以一天下如反掌焉武王之伐紂旋孟津是時比干者存比干固天下之善士也天下之善士存天下之望未去也及比干死而殷亡矣晉獻公將伐虢憚宮之竒竒固一國之望也是衣食足得百姓心未可也仁義修得賢者心大者王小者伯衣食不足失百姓心未害仁義不修賢者去之天下雖大亡矣問曰古之王者率由此乎曰然後之王者亦由此乎曰後之王者似而非者也古之所謂賢者非仁無為非義不動可以禮致不可以利求百姓以為望後之所謂賢者貪得不厭詐虐不羞可以利動不可以徳求百姓雖欲不往而能以智數驅之故古之王者以禮致賢而賢者悦服後之王者以利致賢而賢者為用故其得賢者之心而王則同其所以得賢者與賢者之用心則不同是故古之王者以禮致賢賢者亦以禮報之繼而王者亦必有禮如先王而後一天下故不數千百嵗禮不大壊則不能易姓後之王者以利致賢賢者亦以利待之繼而王者亦必使利重如先王而後一天下故十嵗亦失之百嵗亦失之利重則易姓矣彭城集巻三十三
