body:
  text: 彭城集巻六宋劉攽撰五言古詩作假山幽意難具陳静境可因就逺求澗側石置彼窻中岫前為嵩華髙側構衡霍秀巖崿倐天成風煙若神授他時看圖畫應接頗意究氣色形似間人人輕宇宙嘗聞山林士既往又不復此語我知之衡茅非所陋暑行憇馬道傍舍解衣仍佇立四簷庇隂涼蕭蕭風氣入雖云茅茨陋枕簟亦自給已勝鞍馬間筋力苦倦急田野歸去來餘年猶可及赤日成畏途相與逃熱行中宵寢不安兩舍雞初鳴據鞍寢夢間墮䇿忽自驚官身跨官馬倦􅓈奈有程愧負田野翁安穏眠到明傷胡二古人雖千嵗我見如接迹今人雖比肩我視猶異域乃知相知情心識非貌識所以識胡君不得同硯席今朝滿衣淚哭君寢門側傷逝二首去水不可還逝者日已疎悲憂若沈痾百藥無能除英英韶華子夭夭昔同車令徳其芬芬佩玉聨瓊琚舟移悼藏壑天祝嗟愁予蕙蘭秀不實徒見荆棘墟含悽撫衆稚弔影還室廬髙天杳茫茫日月空居諸我昔曾逺遊嵗晏不得返又嘗懼而夢百怪紛亂眼迨今疑若人虛實未敢辨促駕逝將歸驚呼寤何晩百年非淹期愚智俱不滿彭聃與顔殤究竟同是短愁憂浪無端衷腸若湯涫巢父井訪古慕髙逺回首笑流俗千世得巢父蕭然慨遺躅古來知生民滿腹所願足何為讓天下牛口信為辱髙風𣺌不嗣世態日局促至今西山翁恥甘首陽粟愛此盈尺泉百尋瑩寒玉遷陵復改邑缺甃常湛綠君懐浮雲志塵埃茲可浴君有冰炭憂清泠相為沃長塗接周楚軒蓋密相續能令貪夫廉更使賢士勗豈如漢隂叟抱甕傷窘束我遊阻勝槩長謠慰心曲題李白祠舊聞謫仙人多以我為似三生去來今惟獨變名字泊舟姑熟溪風月不如意舉頭望青山酌酒聊一醉漢宫三十六當時各自貴昭陽與華清究竟誰為愧奴輩不自省脫靴更誰避而令棄賢材孤負青雲器宿蔡口竟日鑑寒水泊舟復新月浮光鏡上下空寂照毫髪華星湧波際人語自天末潛魚躍相聞去鳥飛漸沒明生思慮盡清入心源豁洗耳事誠非濯纓情愈闊立春嵗隂已暗去春色復潛動嘉樹欲芳華歸鴻雜清哢乾坤自長久節物厭迎送濁酒歡我愁浩歌為誰縱古人盡流水世事皆宵夢白日少借留青春亦公共舉眼向髙天吾謀不能用次韻和楊叔恬贈鄭秘丞緯蕭棄明珠龜手安絣漂浮生毎殊塗吹萬亦異竅傳劍不成顯談舌無與掉圜冠豈誤身儒術真寡要嵗時不我與壯年更稚少白髪綠鬢多班班已盈照安排慕無悶推命獨孤笑趨愚甘就迂遣累稍夷峭嵯峨天門開事業寄周召登賢如弗及得士故頗料乃知古猶今孰有賀隨弔寸善曾不遺有功輒先調驊騮自西極翠羽出丹徼黄鐘陋巴歈文鼎嗤畚篠況聞邱園秀得以虛名釣唯憂有道巻莫敢後時誚食苹鹿相呼在鶴雞羣呌飯牛歌何哀築巖貌惟肖顧予乃迷方黥劓誰與療章甫期適越風帆欲踰嶠敦敦樂瓢簞耿耿甚熒燿聊讙龜曳塗猶畏犧入廟同聲邈難期僻陋常耳剽逢君獨欣然夙昔共明詔屢聞諸侯辟復見尚書召奈何竟棲棲塵土翳光曜西山悲采薇鼎食歸洒削飛將不得封重侯付嫖姚新篇一何工大巧全衆妙上言道路勤山海窮聽眺次述疇昔遊弁髦迨冠醮下云厭屢空藜藿甘咀嚼英賢困奇蹇為善誰復劭譬如飲洪鍾偉量乃能釂鄭公亦全材大厦方䆗窱珉瑤謝尺璧絲管讓清歗同當鵠翻雲肯為魚在􅴔千里由咫尺西城始春燒吾聞天祐賢柞棫民所燎胡為沮溺儔躬耕老蓬藋寄劉道原秘丞君家廬山南雲水當戸庭丈人懸安車鯢齒頭髪青吏隠粟三釜繙書十二經胡然辭羇旅大江急揚舲太史司馬公老成兼典刑周南歎留滯武庫森長扄叩關起九州授簡歡真詅自茲訪都邑乘興及郊坰清洛湛寒玉嵩髙環翠屏宫觀想舊躅叢祠記遺銘俗物不挂眼俚言誰載聽畢事黄鵠舉翩然問長亭念昔始相從子少予壯齡定交自傾葢結好深鶺鴒放懐脱羈馵髙論窮杳冥縱博恣叱梟極飲常虚缾後㑹十五年見子雲龍廷官書職讎校舊簡同編硎瓠落無所容柘彈緣蜻蜓河梁一分手南北如漂萍嵗月不肯留瞬息無暫停跳丸指飛鳥急雪看凋蓂壯懐益漫漫衰鬢成星星勞生百年間所恃七尺形從衰得老病詎足稱最靈而君復何為疲茶非康寧目視亂白黒奇瘡出潛丁飲腸日以狹永夜甘獨醒南方多奇藥芝术餘芳馨引年亦多術何必非豨苓徃昔志讀書苦心過聚螢期以怪幻聞豈秪辨文鼮班白乃自悟有為皆濁腥古來豪傑士蒲廬祝螟蛉埋骨蒿艾間鬼火猶青熒孰知出宇宙浩蕩浮滄溟翳昬照白日幽蟄驚迅霆道心不可傳法語容親聆懐君意無涯永望㡬涕零寄書南飛鴻矯矯雙翅翖送楊秘丞結髪仕明世四十列朝籍漢庭殊多賢向子每歎息羈旅間何闊相逢頭已白車馬故匆匆復為北州客蕭條大河渚疲瘵空城域思得愛人長而君著吏迹去思常藹然所居不赫赫推此化百里坐當致繁殖常服子路言有志千乘國饑饉師旅餘可使義且力由來騁騏驥厯險始盡識尚恨此中小頗復拘繩墨太平進取難子雲嘗執㦸金張許史間無所用奇策不如課農桑絃歌樹風績無由之武城贈詩慰相憶題孫昌齡歸來亭丈人髪如漆筋力不知老七十置官歸時人以為早多公逍遙志所向豁懐抱雖云容膝安不减專城好忘機睨雲水寓興植芳草世故不經聽塵軌從却掃壯子官瀛洲濟美擅詞藻親歡適為主家事意承考古云陶淵明避俗非達道息交以絶遊自處何枯槁公為鄉先生里邑毎傾倒一言可鎮浮不啻千金寶宦遊失門户駑蹇悲棧皁祝身得如公毎食心再禱江南田家種田江南岸六月纔樹秧借問一何晏再為霖雨傷官家不愛農農貧彌自忙盡力泥水間膚甲皆痏瘡未知秋成期尚足輸太倉不如逐商賈游閒事車航朝廷雖多賢正許貲為郎寄題蕭山嵗寒堂直已亭我兄昔髙第時論推捷敏由也政事科五人實親近古者邦諸侯今之縣令尹試材非不難善政知所藴投虛刃若新利刜鐘已泯遂馳能者聲肯作俗士窘髙堂久頽挫往者嘗隠忍即事新棟梁開軒凌隠嶙後凋抜天材破的見標準山川濯襟塵藥餌紆客軫嗚呼九州間勝事豈有盡向觀松檜姿稍欲死蒿堇始知巖穴士自古須汲引願賦嘉樹詩為公廣招隠與亭搆亭彼為誰髙士自相與與遊皆可人與言是真語與醉不獨醒與歌從和汝與忘形骸迹與偕同出處實與不待求久與非強許世塗異冰炭咫尺或齟齬開此與者風寧當轉棄予次韻穆父送仲至使北結束大使車張旜理輕䇿八荒已信浮萬里無直責由來昆弟歡庸非一日積冠帶引弓民長城限疆埸邉人安晝眠老不逄鬭格將帥剽甲兵褒衣垂韍縌金繒出王府百萬載書籍候館如魚鱗相望交國客外門名家駒長大儼且碩誦詩三百篇豈減崔亭伯斯焉思無邪羣書矧探賾指掌幽冀州左右皆阡陌皇華一何逺區脱為我役前驅弩在䪍郊候抹紅額天聲暢無外不必闗塞斥但看書同文依然具㸃畫夷羞珍湩酪胡舞喧匏革獵圍得孤割鮮亦奚擇儒生自古貴忠信行蠻貉雖令博望侯何敢輕逢掖西都大内作太紫異垂象河洛殊出符卜食綿往祀宅中雄别都旋宮千萬門層城十二衢佳麗帝王州爽塏神明區過位思自飭簷闕在必趨瑠璃映瓦翼瑲琅耀金鋪白日互蔽虧凉風倐來蘇仰視制作雄疑有神物扶始知壯麗功不使來世踰擇材自千章衒巧非一圖儻無日新美何以除規摹西賓尚餘諭望幸猶踟蹰何當樹翠華萬玉趨赤塗慈孝寺送顧待制㳄韻和孔舎人丈夫老益壯鬢毛豈知秋多君志慷慨不避千里遊躍馬過黄河北視三四州要官在東序河圖間天球古來功名人未就不肯休譬如鑿空使尚致安石榴況今南畝民往往東西流還定安輯之千倉仍萬輈新作西池呈王守清源注長波縈回十里内泓澄鑒羣物雜細分毛介旱歲未嘗減隆冬方可愛傳云五龍舊疑有神物在惜此去人近久隨荆棘廢賞心一朝同版築四面㑹鑿池兩漢集抗榭羣山對種花漸成蹊栽竹俄自倍荷芰入四鄰鷗鳥盈千輩魚遊明鏡中人語紅塵外眷茲仁智樂況乃登臨最滄浪歡濯纓藥餌勸飛葢訟閒固材勝神逸自形泰願言載筆間屢得從公邁泛舟出郭已清思浮舟暫長嘯水雲兩涵泳青翠相照耀賞心隨值遇物色相顧召逍遙忘迴期頃刻攬衆妙白鷗亦知機潛魚不可釣飛沉信樂然迴首寄一笑和黄節推陪王守泛舟清池堪百畝珍木多十圍灌泉昔未盈移樹今更肥境豁自心匠宴游及韶輝居然坐髙齋不減臨郊扉青旗貰凍酒春服成單衣游人半童叟好鳥偕鳴飛彤䄡照銀章賓從相因依置觴面髙軒密坐羅芳菲清笳急鳴皷紅粧耀遲暉澄潭止可鑑畫檝相與揮曳裾載筆簡自顧才也微之子傾葢賢賞心諒云稀長歌善必賡舊令繁勿違徒令夕陽暝不醉終無歸舟行川形直如線川水疾如箭扁舟急鳴㯭頃刻異州縣晤語不及聞注視目己眩川后扈予橈黄鵠莫我先客行自超越快意令人羡寄語幽并兒勿誇鞍馬便題卞大夫西湖所居獻玉晩見售刺虎有餘勇宦游四十年老髪成種種乘軒非不榮半刻未為冗而有田園歸末路益光寵平湖澹空闊古木俱秀聳樵斧間漁舟稻畦連麥隴田舍易所求達生厚自奉晏眠勝飲氷一笑異將恐予亦濩落人不知物外重賣書問東家此計行接踵重用前韻贈卞大夫辭滿苦不早獨往始為勇聞君湖上田二頃容五種力農有休期雜費寧謂冗歲事副夙心素封彌假寵若人夀者相眉豪耳秀聳陶公請息交林類歌面隴諸侯非得友明詔期不奉叢茂鳥所安淵深魚勿恐由來浮雲志九鼎未加重胡為突不黔憔悴摩頂踵江行移舟次北渚風水亦有説隠几見羣山昻頭看新月田舍煙微茫江舡火明滅夕陽歸鳥盡入夜人語絶勞生間憂虞各自有怡悦趣取一時歡誰能問蠻越題劉羲叟著作澤州園亭王屋連太行重關束其左自古悲摧輪多君識髙卧鑿泉深百尺養竹成萬个詩書滿髙屋談笑驚四座人常求贏餘世每敝名貨看君逍遙風陶阮不遠過次韻落泉無時休洩雲常自還居然萬峯秀共此亭戸間擘華力何壯鑿隴巧已艱造幽非近規會心寧愧顔朝扉面蒼蒼夜枕聽潺潺蒔以松桂藂葱翠皆可攀長歌發真賞錦繡先斕斑座客齊起予清玉聨玦環夙齡慕逺遊未能遍人寰學仙理茫昧遁俗事間關風波天一隅不到三神山終當振衣徃對境聊自閒賀呉九儒術喜迂濶學官毎留滯君侯誠百一才智兩自異新書三十章慷慨天下事毎聞一篇奏左右稱萬歲峨峩蓬萊山冊府上帝祕紬書必英才念子方厯試前此三數公致身自容易心知青雲路已識翰飛地豈獨鈆槧間是正瓊瑤字顧念傾葢交寂寞彈冠意盆池覆杯坳堂上兒戲種蓮芰自憐守甔石及物功己細蟲魚共涵泳蘋萍生自恣清澄照毛髪列宿鎮三四炎風久無雨淮海日騰沸豈不潛蛟龍莫肯救憔悴惜哉萬里波貽此升斗愧人當問能否何必嫌小器贈黄安期推官案攽本傳從知兗亳二州吳居厚代為轉運使奉行法令致財賦乃追坐攽廢弛黜監衡州鹽倉詩内言我來衡山陽當即監鹽倉時也退之謫陽山始得區生喜其後遷揭陽頗復稱趙子窮荒非人境瘴海絶涯涘親識久去眼此言不到耳所歡誠易為未必盡泃美諭如逃虚空聞人足音爾我来衡山陽情況本異此一意等萬殊何嘗分逺邇四海皆兄弟蠻貊固州里而於擇友間頗戒不如已乃得黄夫子風韻淡如水為學本之性言文貫於理遺我累幅書磊落字盈紙不詭亦不矯不華仍不俚胡為連城珍韞藏匵與匭賞心一何快區趙非所擬昔我在朝廷嘗得二三士聲名未振發自任以為恥於今復何能有志而已矣譬將助飛遷身方在泥滓作詩寫吾心詞殫意未巳同韓持國遊五嶽觀時原甫暨諸公先在因寄江鄰㡬梅聖俞簡服車馬輕出郭塵埃逺況兹偶同好慵惰重推挽夀宫如屯雲重門謹關鍵五城十二樓瑤池芙蓉苑境深日遲永天近春纎婉異花秀的的弱栁垂宛宛初從鈞天游列帝皆龍衮俗骨已屢驚凌虛翻自忖却逄桃源客笑語何繾綣尚留樵叟棊競勸胡麻飯金醴泛餘杯芝英餌豐本平生此遊勝餘恨相知晩重來恐己迷盡興仍忘返羣公謫神仙吏隠亦肥遯尚平夙昔志讀易明益損寧知五嶽期不待越崖巘何當謝羈束相與同息偃夏夜露坐林卧霄露清仰觀衆星暉上天垂光彩樓觀何參差閣道絶銀漢華葢臨紫微凝神雲霓表忽與汗漫期整衣閶闔門濯足牛女磯酌酒援北斗鼓箑招南箕極意謝囂煩塵世良喧卑雨後雨後炎氛減空堂起清凉蕭蕭野風聲淡淡孤月光晩睡夢亦短常苦秋夜長停燈覽羣書坐以待未央鷄犬互争栖鄰里舂黄粱中夜寂無喧蟋蟀嗚我傍送福州范文學兼寄張宜山林忍長饑君門不易入今時行路難自古志士泣范生岷峩秀學古名字立流沙萬里駒未恨晚羈縶一命吏甌越扁舟去鄉邑文學亦備員海禺更卑濕揚帆下三峽南斗安可挹問津頗浩蕩蹈險實蹇澁吾聞養賢俊不但糠籺給乃知黄金臺始隗衆士集送行勿惆悵人夀期七十古來功名士白髪亦可及因君謝張老青紫未易拾且當黄鵠舉不爾𤣥蛇蟄送孫巨源衰老不擇交傾懐未嘗悔非吾相知心亦有中獲罪誰能若楸柏雪霜不變改自念孤劔心炯然鎮長在識君始恨晩及此將十載相與忘形骸依然見樂愷翔鳯刷羽儀天真輝文彩清泉濬長源濫觴己自倍乘間輒相過慰我胷傀礧使我意軒昻脱我中心痗今君官南州揚帆盡淮海腰綬盤青緺兒衣閒繒綵蘭羞當及時倚門方有待一值歸飛鴻寄聲尚無怠登城望山城隅見連山蒼翠横座中白雲巻霄漢千疊張屏風此地有佳致望望情不窮忽如出塵寰相對前後峯古墻有石色草樹仍䝉籠樵隠事不一養痾方易容同謝二兄弟游城南王氏園坐竹中水上昧旦從吏役中昃既休閒慨然田野興策馬從近關謝公雖朝裾雅意存東山相期物外游待我季孟間晴陽煦烟郊藹藹春氣還南溪已浮氷亂石聲潺潺意得境彌好形勞心詎艱名園得暫息奇樹多可攀去水貫林竹脩篁夾澄灣波光龍蛇行微風鳴佩環窄徑偶深入交柯存勿刪並流一長嘯照影清心顔勝事豈有盡向此同蒯菅發興自我輩忽如逺塵寰嚴城迫歸鞅夕陽稍朱殷後游期不忘秀卉春斕斑潁州始居伐樹聖不憂奪鬲賢不羞士生志四海外物非預謀乘流既孤逝擇廕方暫休俱非田園歸而媿鄉黨投卜室逺人境開門面良疇車馬寂不喧水火仍易求主人邦之良高義逾九秋傾葢仍舊交食薇亦願留如何千旄詩千載令更酬春葺所居貧賤智不逺終年謀一身北堂甫成冬西軒已送春開窻納清風掃地祛凝塵今是覺昨非㑹意成日新一悟蓬蓽興寄言當世人時事亦寒暑無為迷舊津寄傅推官堯俞三川帝王宅二周官葢都上公釐徳化多士盛中區是年詔有司使獻賢能書傳納事匪易吾與夫子俱率馬仰騏驥治玉慙礛䃴同舟共艱難傾葢聊歡娛浮雲儼髙冠白雪紛長裾馳辭若波濤掌握皆明珠詆訶詎敢然倚辦實有須從子驂之靳相與歩驟趨棘圍似南宫大暑臨通衢不遺老成人頗多君子儒丞相顧而歎里閭共稱譽狂士或妄談衆人皆揶揄至今頗自矜快意勝過屠不言世所無請問誰弗如微官苦繩墨離别天一隅向風願相従不及單飛鳧雲中多賓鴻河中多鯉魚契闊誠未忘寄聲當勿疎和原甫同諸公飲郇公園車馬何籍籍相從城南陌大第鏁名園朱閎間素壁即事覽勝㮣撫舊歎陳迹零落歸山邱慨吒西州客春風㡬時還顧盻生顔色雜英綴初紅宿荑吐新碧故池無還波喬樹實自昔賞心及兹辰緬想締構力十千置尊酒玉斗雪霜白飲醉半歡哀浩歌懐感激天地亦旅人川谷故變易歡娛瞥過目百年猶暫覿即令西馳暉稍復向禺昃我輩不盡興將為後時惜穎州和永叔羈鳥能擇木游魚知赴淵飛沈豈異志行止私自憐玩世本無術辟人庸得賢卜居幸樂國負郭依良田心與地俱逺我徒共熙然生涯亦何有聊以忘吾年送謝大城南還遊集禧觀寄謝大得箕字驟雨墮河漢烈風振南箕秋隂變蕭爽重此田野期森木蔽嚴籞交流㑹清池幽鷺起豐草鳴蟬嘒喬枝客車忽已逺樽酒難重持誰令語言適罙作别後思夕霽歸馬輕叩戸仙真祠羽人披衣笑宫殿涼參差黄鵠自飛來青竹方可騎相從豈無術望君隔前陂書懐幼學慕髙逺讀書不求解志為逍遙遊恥以聲名賣寧從子桑簡不願伯夷隘未常憂瓠落豈復顧機械遯時良無悶渉俗適得怪但使心休休那論行夬夬世塗劇坎穽人理甚蜂蠆低顔費將迎非意成睚眦鐵冠喜彈畫法吏樂罥絓洗濯出瘢痍丹青恣描畫抗言畏不傷奉職謂匪懈指擿本無瑕銷鑠緣鼓韛羣嬉更嘯呼鬭巧逾狡獪抵巇加捷翻取必期稱快上恩初優假一𤯝猶縱解雖䝉三面寛未免六翮鎩全生愧液樠有道羡瘖聵失馬未必悲墮甑何足喟后皇物羣生大塊為之噫在盈或時虧有支那可壊行葦無踐履甘棠勿翦拜猶將采葑菲詎有棄菅蒯寧當置韶濩始欲薦任韎厭飫椒與蘭玩惜饐而餲宿名守枯槁知命遺芥蔕猖狂蹈大方屈服嗌若喝腰舟雖云慎吹虀亦已憊既往誠無追有來當自戒蕭蕭鬢毛改杳杳歲月邁愚謀向千失晩悟猶一灑龜手世絣􅀈支離保鍼繲鬻渡學操舟閉肆從問卦念皆賢者為亟聞古人話有田倚江湖往歲成畝澮還歸豈無圖緒業顔未敗采菰仍得魚種榆因及薤小屋蔽蓬茅大囷輸精稗逄迎具壺漿稱貸償私債暑從泉流濯寒有簷日曬何苦事明經區區矜地芥剥棗棗下人不行四旁生蒺藜秋來見成實粲粲青紅垂敲樹落碧瓦濺石投赤磯紛紛競口實聊混兒女為樹上已空枝樹下亦有蹊人事但如此桃李真自欺彭城集巻六
