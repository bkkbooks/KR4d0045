body:
  text: 彭城集巻十七宋劉攽撰七言長律送王相公白麻詔出鳯凰池金節銅符副錫珪故事周公不之魯是行山甫亦徂齊百年禮樂更檮杌萬國車書載狄鞮開闔乾坤容海運斡回樞極寄杓攜故都形勝餘龍虎開府文章盛璧奎列坐諸生親絳帳縱談禪伯得金箆四山嵐氣連松梓二水波濤亂鼓鼙里老傍車㸔畫鹿江靈低首避燃犀鴻河帯地長餘潤蟠木開花亦有蹊躍冶空慙折鉤喙在鈞仍似落巢泥苦心刻鵠纔成鶩卑意函牛祗洎鷄早晚重開丞相閣為公嬴馬踏沙隄和楊褒早春二首雪色留寒風弄和新陽淺淺故隂多池氷漸盡泉初潔徑草猶微菊未莎歸鴈聲音矜久客晴雲意態似妖娥杖藜窮巷貧非憊隱几衡門嘯也歌身外閒愁從撥棄眼前詩景得遮羅亦知白髪非春事老伴相尋奈我何少年意氣屬時和春入青門樂事多試著青衫迎暖日閒騎駿馬踏青莎御風直欲從仙子奔月猶能及素娥鴈鶩陂前來膾鯉芙蓉園裏去聽歌舞狂相屬揮如意醉起馳歸擲叵羅寄語子雲天禄閣新書尚白竟如何寄齊州李學士并呈蘇密州濟水由來徹海清兩州偕得水南名遺人頗記睢陽曲原註濟隂本分梁國説士猶談厯下兵碧落羽翰俱失路白頭章綬偶専城東秦表海知君重左輔陪京莫我輕賔客此邦多長者原註漢語云梁多長者詩書前古聚諸生不知高密何如彼試仗西風問子卿送王兖州卧閣偏州獨老夫三年化盡白髭鬚故人始得班荆語督府相觀剖竹符舊學翰林君子澤雄文䇿府列仙儒蛟龍莫作池中物老驥幾為轅下駒腰底印章馳傳乘道傍冠蓋棄闗繻黄金上冢家相樂文弩迎官吏疾驅甲子可憐同歩武光隂稍覺近桑榆掛車正爾思前路畢娶由來異壯圖笑謔㑹須矜此酒分飛何必待長塗側身東望艱梁甫猶冀君家有隻鳬次韻宋職方新修㕔事事從梁棟拯隳頺民有餘工庫有財不待公輸洎玉繭肯論新甫與徂徠經營結構無遺巧壯麗宏深要必該廣砌水平鋪淡碧應門風過絶纎埃雲山噴墨文屏合金獸銜環洞户開勢似名翬飛夭矯喜知巢燕到裴徊陳平社宰非無意薛惠郵亭信不才㑹道曹風如魯衞輔州元作帝京陪再和宋職方萬緣𠖇數有興頽不為勞民與費財常怪丘淵猶改舊足令蓍蔡可知來黄圖左輔今仍重甲令名藩此正該過去英賢聨踵武幾多能事悉塵埃僝工匠石三農隙唾手公堂一旦開妙選棟梁虹宛轉觸新廊廡雁徘徊落成幸有羔羊酒能賦欣逢錦繪才衰老専城無異術祗將勤拙任家陪次韻酬李推官少無風力致雲霄老寄東藩愧節旄渉境已憐清濟涸開門猶喜岱山高智㣲黒蟻穿珠竅術異游魚出鼎膏思古循良深自歎視身尸素欲何逃流光去去車馳轂過事新新海駕濤屈指家聲歡上客惬心風什幸詩豪青春小圃饒佳卉遲日芳樽付濁醪傾蓋强君留一醉相㸔前路釣連鼇答鄭秘丞見寄長韻鄭公真率故難攀夙昔相期季孟間晝錦鄕閭嗤拓落藉糟官局壓清閒飲腸縱逸巵無當詩句清新玉作環屢舞自矜能舉袖少歌誰復顧酡顔南金不足償棊進魯酒頻聞輸罰鍰豪忤里儒連束矢狂侵醉尉欲翹闗婢勤織衽幾無欲男飽詩書僅有鰥疲馬踏泥如得絆弱弓支肘不成彎權材未恨原中秘領邑那知寄百蠻説將正憐胡越異問津空復鬢毛斑江連楚蜀無窮水路繞巴渝不盡山青嶂呌猿寒寂寂亂泉衝石暝潺潺有生誰得辭羇旅良苦遙知冒險艱高興由來向人盡尺書仍喜不吾慳雨後小園雨多三逕似荒郊處處秋隂紫翠交照水白蓮霜雪朶倚天喬木夕陽梢池光俯見游魚窟樓角遙臨宿羽巢倚杖移時㸔蟻鬬操舟繚岸試杯膠墻隂静色憐甘菊垣上懸藤識苦匏老圃不須譏抱罋野人無事伴誅茅五言絶句終南山終南際滄海千里張屏風落月沈山西朝陽生嶺東火浣壇天游神不虚火解形復見明明學道心不與刦火變許真君祠舊怪神仙事燕齊得浪傳丹青此堂上想像為依然酒舫美酒留人飲乘風縱客槎秋潭夜深月春􅤍雨餘花竹岡夤緣映層阜蒼翠復春苔君知愛霜雪若个是龍材寒食後聞雁後雁來何暮春風萬里情江南多燕子無處覓同聲丹井古井𤣥泉色仙人玉鏡寒照來知骨相作意就金丹初夜栖雞已登屋宿羽復歸林不語聽鐘坐黙黙千里心郡樓晚坐同陳掾雲來湖外雨樓倚樹梢風不惜清凉意持將與子同人日立春花勝已宜春剪綵更為人風光今日好顔貌一時新送韓玉汝司封奉使兩浙聞諸公先分題用池塘生春草園栁變鳴禽字合為十章章四句赤驥脱馵羈軒然視瑤池公持漢使節不減豸冠時三江亘東南波浪浮日光峽中起奔濤積錢僅成塘吳帆若飛鴻千里長風生組練白玉粒一月來上京利術析秋毫心計遊無垠亦有甘棠䕃蔽芾如舊春忽為嚴霜誅慘戚動秋草狐狸不足問豺狼詎横道諸公惜分手置酒倚名園長廊蔽修景晝無車馬喧露光洗高花風力曳埀柳上客請賦詩主人起為壽春濃芳菲雜日夕境氣變望望檣上烏去去令人羡壯年呉會遊常有懷逺情想見瓜歩南草長鸎亂鳴驛騎傳梅花書牒封來禽何以慰别愁遲此瑤華音花嶼孤絶池心嶼高低水面花若無舟楫到應似隔仙家池上罷客棊仍在留書巻未終荷喧知過雨萍聚見來風嘯臺高臺見百里長嘯海風生為問塵埃耳能聞鸞鶴聲鼎池仙去遺金鼎年深認刼灰懷人何限意時向鼎池來故人謝師厚刻唐賢淳于先生墓詩于善謔驛系語其後刻石後二年師厚去世明年余過善謔驛讀詩悲之因作淳于墓詩又題二韻追悼師厚平生忘形善謔莫逆惟師厚為然也故人墳宿草翰墨想遺風善謔知君意何傷睿武公與持國約游環溪大風不果徃又過曾氏值主人之病人事不如意出門安可期終須賞春物那問主人為蓮池蓮花水底紅荷葉岸邊風五月蟬鳴後君應愛此中東樓樓前淮水上逺樹似魚鱗來帆與去櫂腸斷倚欄人長門曲凝笳來鳯輦玉宇開深殿君恩春風廻那向秋時怨君心似明月月缺應再圓但令黄河水到海還上天書堂對雪幽居逺人境竹柏映吾廬滿目山林意今晨霰雪初積風寒玉折驚鳥落花餘定有麕麚迹環林未掃除雨後回文緑水池光冷青苔砌色寒竹幽啼鳥亂庭暗落花殘旅舍不寐作回文四句定雲浮黒月驚風觸巢鳥暝燈客單寢短夢恨遲曉彭城集巻十七
