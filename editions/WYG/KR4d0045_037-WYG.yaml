body:
  text: 彭城集巻三十七宋劉攽撰墓誌銘吳公墓誌銘公諱奎字長文姓吳氏居齊州之禹城五代之亂徙濰州北海自徙至公不知其㡬世而公曾祖考皆未嘗仕至公生而聰敏好學始授經藝祖母李氏因其篤志而強教之年十六業成州郡舉以充貢明年遂中第與傅卞于大問同時三人者皆以年少既命以官而許其歸養親公時授施州清江縣主簿不赴後數年年二十始調福州古田縣主簿厯開封府長垣縣主簿權廣信判官宦官楊懐敏興河北屯田懐敏矜功專事盛氣自用無敢與之抗者公獨上書論其不便時知保州事王果亦與懐敏迕屢爭不從懐敏使人訟果它姦利事詔置獄推劾公又為果辨其事曲直果竟得免而公始以強直著稱矣河北轉運使以令舉監便糴故事糴中率者得改京官倍之則為朝官公糴倍常數纔為大理寺丞朝論以為未售乃除簽書武寧軍節度判官事前後守將事無大小皆以委公監司有疑獄求清強官治之者又多付公其為公所決平者無不愜服始公為小吏晝則治公事夜輒讀書自六籍諸子史無有正偽無不觀覽嘗不寐者積二十餘年性既開敏彊記不忘作為文章覈實有法度由是中外大臣交口稱薦求得校書三館中或侍講經筵其他稱其才能可任以事者章疏相繼也公遷太子中舍殿中丞自以朝臣得以抗言明白是非於是上疏論取士貢舉之法及時政得失九事又欲召見口論事仁宗深器之會舉賢良方正翰林學士葉公清臣等四人以公應詔對䇿髙第拜太常博士通判陳州遷尚書祠部員外郎入為右司諫直集賢院明堂覃恩以起居舎人同知諫院事公始對䇿極論内降恩澤之為蠧政也及在諫官遂專以禁切左右於是近臣有承用中㫖而不言者坐而下遷及羣臣有因事僥倖雖已得官皆褫奪之朝廷為肅然御史有言事非其實者詔許問從誰受公奏言御史擇於風聞以言事朝廷用之以救過失使其擇之不詳朝廷能容之不能罪之可也若求主名則後莫有以事告御史者矣是自蔽塞其耳目也上立罷不問是時郭承祐有以舊恩為宣徽使知應天府事數妄作不中法度又張堯佐以後宫戚屬自三司使為宣徽使公連上疏極諫終之承祐奪宣徽使堯佐雖不去位出知河陽是後遂不復遷官上又著令后妃之家不得為執政官云其他排擊非義救解過失條舉善政顯用才士巨細疏密苟為有知必言言之不從未嘗但已也時因天變為上推致休咎而舉人事消復之應上嘗聽受之賜緋衣銀魚頃之出知密州徙兩浙路轉運使未㡬召還判登聞檢院糾察在京刑獄同修起居注遷兵部員外郎知制誥賜紫衣金魚奉使契丹契丹羣臣為其主加稱號相與行禮喝公使入賀公自以使事有職賀無預也不為徃契丹主畏其守義甚重之及還中路與敵使遇敵人衣服以金冠為重而紗冠次之其與漢使接衣服重輕皆有以相當至是敵人紗冠邀漢使盛服公不許亦殺其禮坐是二事出知夀州召還同判吏部流内銓知審官院同知通進銀臺司兼門下封駁事吏部審官銓能否銀臺主司出納公所至綱目修舉其所建言改更糾正雖至於怫上意不憚為之兼判集賢院尋為翰林學士權發遣開封府事公明於從政前後厯兩郡皆著治稱人知未盡其能也及領京師獄市浩穰公應事敏速吏不敢欺富人孫氏京師大豪專𣙜財利負其息者至評取物産及其婦女公發其宿罪奏徙逐其兄弟於淮南福建而羈管之豪猾畏威斂手居三月聲聞赫然遷端明殿學士兼翰林侍讀學士知成都府公以父老苦辭改知鄆州凡四月復召為翰林學士充羣牧使兼史館修撰遷左司郎中復權知開封府兼畿内勸農使嘉祐七年三月拜左諫議大夫樞密副使初仁宗皇帝春秋髙而皇嗣未立公自為諫官即為上言天下大計願早有所係其後因大水日月蝕之變又以為言天子察其至誠及為學士因奏事上留語曰將有所置以維大本公再拜賀因復進勸已而皇子遂定英宗即位公遷給事中再遷禮部侍郎公辭不拜詔報不許曰卿在西掖有儲貳之言人乃知公嘗密謀定計也時樞密使富公張公舊皆嘗薦舉公而與同列時人榮之㑹丁父憂去既卒哭天子必欲起之再使内臣往又召公子男璟上殿諭㫖故事所未嘗有也公固請終喪上不得已許之召給半俸用璟為鄆州判官公又辭俸許之公性至孝居喪毁瘠甚廬於墓側終喪不飲酒食肉不至城邑既服除先帝升遐即吉然後赴國哀召臨梓宫今上見其羸瘠驚閔之甚諭使自頤養時方藉卿復以為樞密副使時四年二月也月餘除參知政事又月餘改資政殿大學士知青州事兼京東東路安撫使居二日上復留之九月以公疾遂復行前命公至青十日疾病上疏求徙兗州不許七月二十七日薨於位年五十八初公為學慕韓退之及有疾謂子璟曰吾年既過退之矣已而竟不起若知命然上為輟視朝一日贈某官謚曰某積階至金紫光祿大夫勲至上護軍爵開國公食邑二千戸實封四百戸賜號推誠保徳翊戴功臣考諱某以公貴初為將作監丞致仕稍遷及公拜樞密至太子賓客耆耋夀終後公厯二府累贈金紫光禄大夫太師祖諱某贈金紫光祿大夫太師中書令曾祖諱某贈金紫光祿大夫太師曾祖母王封某國祖母李封譚國前母王封莒國繼母王封安國皆號太夫人初公遷三世葬於鄆州東阿縣盂栅里公從祔焉時熙寧元年某甲子也公初娶趙氏父名立為遂州遂平令再娶張氏父名輿為郊社齋郎張封延安郡夫人仁宗明堂公求為趙氏追封亦得贈信都郡夫人公五子長則璟為大理評事環祕書省校書郎瓊琯皆未仕幼未名女五人長適都官員外郎胡稷臣早卒次適大理寺丞王孝寛次適太常寺奉禮郎呂元淳三尚幼公初與鄉人王彭年善稱道其能為致名宦彭年客死於京師公使長子主喪事周恤其家嫁其二女焉及他姻族有不能自存者為畢嫁娶數人以錢二千萬買田北海號曰義莊以賙親戚朋友之貧乏者公自謂學韓退之此又其次者也故其終家無餘財諸子無宅以居嗚呼可謂篤義君子矣可無表哉銘曰矯矯吳公矢言正色是曰諫臣國之司直提綱絜維補􅑆苴隙或謀於㡬密焉無迹祿不獨豐推以施逺位不獨享俯以進善公睎古人心慕身踐言長課多彼古亦鮮其志獲伸而年則那其夀不遐而名不磨即宫於泉公乎奈何勒銘不忘如山如河贈兵部侍郎王公墓誌銘公諱嘉言字仲謨翰林尚書元之之次子翰林以文章正直著名兩朝而公幼好學未嘗嬉戲翰林最愛之人亦以為宜其家兒也生十三嵗而丁翰林喪哀毁過甚有成人之風事母福昌太君以孝聞翰林之亡遺言不為子孫乞官真宗聞而嗟悼賜公同學究出身後數嵗公益成人貧無以養調官於吏部而年未及格判銘事周起以聞於朝特授鄂州司戸參軍祥符五年舉進士第改揚州江都尉七年上閱書龍圗閣得翰林奏疏愛其切直因訪後嗣孰賢近臣以公名聞而曰能世其家遂遷大理評事監海州稅天禧元年用薦者言徙知廬州舒城縣兼𣙜茶稅丁福昌憂服除知蘇州長洲縣縣既翰林舊治而公年與官又皆同士大夫賦詩榮美之遷大理寺丞仁宗即位遷殿中丞徙知南雄州代還遷太常博士通判齊州工部侍郎李及薦御史以公洎張錫二人應詔故事當擇用其一而上謂執政曰及清慎少許可此皆時俊也遂並用之召為監察御史遷殿中侍御史判三司開拆司奉詔案信州獄還賜牙緋明年出為福建轉運使賜金紫明道元年恭謝禮畢遷侍御史入為兵部員外郎三司鹽鐡判官景祐二年出為京柬轉運使夏四月感疾卒於廣濟軍之官舍享年四十七公性厚重宏深不妄喜怒外嚴内恕善於為治守南雄時開大庾嶺故道徃來便之郡當二廣之衝行者交錯去水即陸易輿以舟有至者輒滯留旬浹公一皆善視之以已俸給費未嘗亳髪擾人通判齊州時郡守性剛烈視僚佐蔑如也公正色持法不為少屈郡事賴以平允守後徙治他郡坐事下獄每嘆曰同僚得如王御史無此咎矣其為御史所論列必時政大體未嘗掇拾小過抉發隂事天聖中洞真宫夀寧觀災兩宫有意修復公力諫止之信州鉛山富民程氏獻石綠數萬斤詔蠲本戸徭役公爭以謂所獻有限而所蠲無窮天下豪族皆以貨得蠲則貧民將獨受其弊上用公言復程氏三嵗而已為轉運使部吏有過失屏人面數之皆慙服悔謝得自改郡縣大治其薦舉士尤推精鑒故參知政事吳公奎初調福州古田主簿天章杜公杞以廷尉評監建州茶公皆薦之其後顯達人謂公知人平居閱書史為辭章以嗣續前烈為志手寫翰林小畜集三十巻藏於家獻翊政論十篇究切世事仁宗嘗錫宴苑中時得唐明皇刻石山水字使羣臣賦之皆不能下筆奏篇纔十數上令宰臣銓次之公第為優初丁晉公舉進士時翰林為推挽延舉卒使成名及其當國嘗語公曰先正引薦之徳未有以報公曰相公逢時得位當以直道報國無恤私恩也晉公不悦公亦不復至其門逮朱崖之貶捕治黨人公獨不預焉豈所謂上交不諂其知㡬者邪惜其藴蓄未及大施中年而隕其命矣夫朝廷聞其喪賜一子官又命其長子自大名尉易右班殿直監曹州稅使不以喪去有祿以濟其貧云公娶周氏先公亡公卒後三十餘年以子貴累贈兵部侍郎周夫人追封僊居縣太君以熙寧二年七月二十一日葬於開封府開封縣宰輔鄉鳯池里先塋之次公四子長曰延度前潭州觀察使次曰延禧庫部員外郎通判荆南府次庚庾未仕二女長適故夀州錄事參軍杜襄次適進士張誘孫七人鴻浩淮汴漸淑沇浩為廣州東莞尉餘未仕公之葬公從孫度支員外郎集賢校理同知太常禮院汾實與襄事集賢君以某同官使來請銘某叔父祕書監往為建州從事公薦之升朝是某世有舊乃為銘曰翰林之生正直自信驟進無愧屢黜不愠宜有後人嗣守其訓譬彼川流其源已濬公幼而學守其家法天子矜之始優以禄文施於謀智効於職果其世賢罔有不克遂司風憲奉使察舉施未及光業其有緒天奪其年有藴有貯四方馳驅躓於中路公歿餘慶覃後昆矣贈官貳卿由子恩矣祔於先塋屹其墳矣請銘惟誰公從孫矣故將仕郎郡守太子中允致仕賜緋魚袋蔡君墓誌銘熙寧四年秋銘塘蔡子難將葬其親中允君請銘於彭城劉某某與子難為同年進士又同省郎官又同守海陵其於子難哀喪恤憂所宜述也孝子之事莫重於葬葬而埀名後世者莫重於誌銘是其深長思勿之有悔焉爾某其何辭雖然中允君潛徳遯時不顯其光功不於人於其家吾將何言以表之尚書屯田郎吳君君平以狀告曰君孝友惠和人也曠逺有識慮幼而好學家貧無以自給乃始勤力治生十餘年間家事給足贍及鄉里施予不倦族人與君别籍既復求分財君亦推與族人後貧不能自存又収養之君之家疎逺而聚居者百餘人存撫教導凡五十餘年始卒如一鄉里宗族於君無怨尤而更稱譽君殿中丞盧君中甫曰凡富而多怨者專利而不顧也愈富則愈纎嗇剝刻徼射人與為仇蔡君則不然其於鄉里視貧下者愈矜之厚施而薄責故逺近歸心秉常為錢塘官終三年中允君未嘗以豪髪見求可謂善人矣秉常為君拜鄉里之仕宦者莫不屈下之君凡二子長則子難君教子難讀書􅔤其與賢士遊費用不計子難成名才學幹力見稱於時有位於朝出為郡守及君存見之善人報施之效歟某曰二賢士之言可以信後世吾其何辭蔡氏木望陳留自司徒謨過江子孫㪚居吳錢塘之蔡未有顯者葢自君父子始君諱某字某子難初登朝英宗即位推恩君始命為大理評事其後郊祀及今天子即位郊祀三遷至太子中允子難當賜五品服又推以授君享年七十二以葬前一年十一月某甲子卒子難時為職方員外郎知泰州事次子曰詵亦舉進士君四女子皆嫁名家京兆宋緽潁川陳惟億太常博士葉昌言餘姚縣主簿錢堯卿其壻也君聚余氏追封錢塘縣君先三十嵗卒君卜葬於吳山鄉吳山里斥廣其地衆為兆城曰兄弟子孫葬而相從死生之義備矣有告曰是於隂陽之説為不利請徙之君不許刻石墓門戒子孫母以妄求福及君之葬祔之某日某甲子也銘曰蔡君不仕而家事治宗族歸之疎逺不棄鄉里親之愈下愈施克生賢子以振其世郎官郡守實顯實遂天祐君年宿留待遲命官四遷於朝有位朱衣魚符帝以更睗古云五福獲以備四黄髪歸全靡悔靡愧卜葬吳山君徃戒誓宜於後人是固是利右侍禁江君墓誌銘君諱某字某姓江氏祖某父某贈某官季父某為度支郎中君少讀書善寫古篆字用筆精健有法士大夫家多葆玩之用季父䕃為三班備職五遷至右侍禁厯州郡官亦五任一監漳州龍巖銀銅又監荆南白沙鹽酒其後三任皆在廣南為兵馬監押始居容州遷化州末在雷州遂終於官年六十九異時仕宦嶺南者常患其地荒雜惡草毒蛇海祲山霧鬱蒸蓄積中人為病或以為死不得盡其天年而君居之且二十嵗夀㡬七十與齊州中氣無以異然天命固有所制也而君亦可謂果於從事而知命矣君凡三娶夫人魏氏林氏陳氏皆先君死男子二人曰沛魏出也曰潛林出也女子三人其二人與潛同母一人魏夫人所生沛早死潛舉進士女皆嫁士人江氏自君祖以上占數南劒州度支始葬江州徳安度支之孫懿叔於君為從父兄弟之子君殁後諸孤幼懿叔皆養視之迨其長大為畢㛰嫁又迎君喪祔葬徳安去度支墓若干里以林氏夫人從君殁于慶厯某年月日後若干年得嘉祐某年某月日襄事懿叔時為衛尉寺丞銘曰江本小侯見於春秋其後以國為氏名數遷徙或以官為家乃不可紀延平之江遷於徳安自君季父始季父之孫再世而相䘏厚生周死稚􅑱有立宅兆用完不知其逺矣納銘墓中萬有千年母有壊毁内殿崇班康君墓誌銘内殿崇班康君諱某字某生二嵗失父三嵗失母育於大父及長大孝謹詳慎事大父竭力盡子職念慮之所及筋力之所能無不備具器皿衣服飲食藥餌必躬進之如是者二十七年未嘗一日離也大父官職難劇亦未嘗不隨及大父將求致仕君預為營居處計生事什物纖微必具如大郡大府始至官矣大父終君哀毁逾禮卜葬陳州宛丘縣松柏皆手植刻石誡子孫無毁伐者初大父愛君育為己子十歲䕃為官君讀書書好學善為詩人多傳誦之者賈丞相文元公見而悦之謂曰我薦士可得進士出身君謝不願曰兄弟皆已出仕吾親以我獨留為恨吾懼其戚戚也方衣道士服而講養生事以示無仕宦意而吾親安之其可以從公辟乎文元公嘆息稱善既終喪乃出仕初監亳州衛真縣鹽酒稅㑹縣令闕州使君攝之田訟有十餘年不決者君為辯明之歲凶賑恤其餓者疾病予之醫藥民以不流殍咸願得為真都水使者辟君巡惠民河河水貫京師秋夏漲溢則為虞前此者都水為木閘尉氏西為水暴至則將閉隔之既又懼其衝激敗壊遂不敢閉君使治水澾以殺水勢是嵗水漲數丈閉閘以禦之閘安固自如而京城無水患云官滿留再任有欲薦君治大河者君辭曰官卑利害不專在已大河事非小川比也陜西都轉運使奏舉君為鳳翔府監押兼買馬未行定州路安撫使辟勾當廣信軍𣙜場𣙜場在軍城外有障壘而無防兵不置兵器㑹北寇十餘夜襲軍城箭射𣙜場如雨時君宿場中安存北客之在者率直兵與守門卒自壘堞上投磚石擊賊賊遂㪚去官滿辟管勾順安軍順安寨此兩薦皆安撫使樞密直學士薛向力也其後西方用兵樞院選軍赴涇原路準備可為邉守初權原州後威勝軍其在原州計漕給軍内嚴守備存撫老弱招集流㪚事皆濟辦後以國有營造程督技藝使者按視旁午急甚君戒主者不得過為鞭朴百姓安之有嘉禾隔五壟合穗者民以為善政之祥既二年有餘君自以老厭事願退而就閒求管勾中嶽廟詔許之時君甫年六十二云未除以疾終君自爲借職凡八遷官三以覃恩一以大父遺表餘皆磨勘年勞勲騎都尉初大父既以君為子君念父甚至為傷大父意未實敢言及身登朝可以追榮先世君益自悼恨遂言於朝求改正昭穆未報詩集十巻藏於家君父某大父某某官曾祖某某官君娶閻氏封長安縣君生三子長曰倚某官次曰位進士及第某官少子佾亦舉進士君以某年某月日葬宛丘縣受節鄉東原祔果州之塋康氏世河南洛陽人自果州葬陳遂占籍宛丘銘曰孝友篤行是施有政顯允康君為孫之令生集休譽沒將餘慶東原砥平卜亡其應表泉作塗種柏為廷宜爾後人嬩嬩其盛故宣徳郎守大理寺丞知隴州􅊈陽縣事王府君墓誌銘君諱伯先字孝公其先系出於琅邪五代之亂自太山徙江東至君曾祖徳輝仕李氏為羽林參軍江南平徙居六合君祖諱可則以孝謹聞州里兩世皆隠不仕至君父綸以進士舉中第官至太常博士告老致仕以令得一子官君補太廟齋郎初調通州司戸參軍始至官有告婦罵姑折其齒者獄既具君獨能察之以直其冤郡守恱服因使攝海門縣事校戸籍第其高下君以術參伍知之貧富無差由是益有聲以父憂去服除為錢塘縣主簿用使者薦再遷潤州金壇縣令縣多陂澤民以漁釣為生而豪富人規占陂湖各有分地自擅入其中者則執以為盜君悉使表識顯其疆畔於是豪富人名占有限而細民漁釣有所後莫相犯而獄訟衰息矣㑹郡守有求於君不能得恨甚時獄有囚病死者即奏抵君坐去官吏民人人冤惜之初君伯兄名某不喜為吏故以官與君而閒居海陵及君免歸亦自以剛特寡合遂將退㐲不出家族故舊人人敦勸久之乃復為啇州錄事參軍諸公交薦其才三年代還猶以金壇事纔得應天應推官然上旨許其遷矣自應天府還遂除大理寺丞知隴州􅊈陽縣事君性端厚亮直為文敏速遭事明辨名公鉅人多知之者勢可顯仕於朝而中以文法齟齬躓踣似有命者然君奮迅自振而名公鉅人終相之以出於厄窮滯淹與夫遭命而顯仕者不辨也君年若干伯氏年若干其將往􅊈陽縣歸省其兄至家之五日無疾而終熙寧三年十二月十一日也君娶江氏故某官某之妹生子彭拜為密州觀察推官女嫁某官江夫人前君若千年終葬於六合王丞相誌之君合祔焉以君卒之明年二月某甲子鄉曰永福里曰梅原王氏祖墓也銘曰君敏從政事稱其賢惡吏困之乃仆而顛善人佑君咸竭其力如滌垢取白如伸鈎取直其卒有成而緜以嵗月迨君之遷年則耆耋於生無厭於殁無悔誌銘泉宫萬世勿壊彭城集巻三十七
