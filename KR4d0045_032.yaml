body:
  text: 彭城集卷三十二宋劉攽撰記直講題名記自三代以上教學之官為重其在周師氏保氏是也漢世以四科辟士一曰德行髙妙志節清白此三公之任師賔之材也其二曰經明行修能任博士溫故而知新可以為明正已而物正可以為修蓋所謂德選者至于文能案章勇足決斷非不切且重矣任為御史三輔縣令非不劇且要矣然而三輔得及之焉其重輕先後豈虛言而已哉夫治起粗就事以趣辦由武夫崛興文吏一切莫不言材計功者當是時也人謂學校無所用及夫治世隆平既庶而富武斷無所施其謀強固無所售其力在上者方使百姓興行幼學孝弟耄期稱述修其胸中之誠以應事物俯不怍于人仰不愧于天然後知教學之為逹材成德也是故學官之重輕繫世法之上下非強有所左右也賤生于無所用貴由于不可得已爾宋有天下百有餘年庠序之教遍于四海乃京師太學之盛近古未有朝廷法號施令名臣建議興事未嘗不以為先由是觀之其為太平至治不其然乎唐制博士三科上為尚書其次出為部刺史其下不通政事者悉以補諸侯王師傅是故公卿之選由博士升者最多自建隆末學官之至相府侍從者蓋嘗班班焉惜其未嘗紀録無以詔後問于耆舊老人得某甲巳下若干公故必作記刻石具列名氏遷徙嵗月不知者蓋闕俾來者得嗣而志之焉羣牧司題名記代韓龍圗作國馬之政周以校人中大夫漢以太僕中二千石掌之則國朝羣牧使之任也周禮天子十二間馬六種以給齋道田戎之役周之制也約漢京師有六廄五監邉郡則三十六苑以盛武事漢之制也侈大本朝監于前古國馬之政由舊至于熙寧大新制度綜核名實以監牧之在郡縣者寒暑暴露不能致息而惜其土田之良寧以與民于是盡斥賣其地聚其賦以市馬而以芻秣度支移之三司馬不復在牧餼秣以時蕃庶維嘉益輸金帛以與西戎市馬之來束者躡迹銜尾千萬不絶費不出于大農而國馬大備于是內供郊廟之祀外儲軍旅之用義勇保甲之士當受馬于公者及近臣之賜豫使車之驅馳無不給足昔者魯僖公有明德詩人頌之其序曰務農重穀牧于坰野國人宜之夫馬固武備雖諸侯不可闕也而牧馬者或以妨民及魯侯之善在不妨民不妨民是之謂務農重穀而遂稱之曰儉以足用寬以愛民其不信乎魯雖諸侯小邦而頌詩所褒尼父有取焉尼父之所取則我朝之所用夫聖人之治四方風動何逺之有故國馬之數兼于周漢而宜民之善存焉駉之詩曰思無邪思馬斯才夫以區區之魯諸侯之事必當思焉無邪而馬斯才況以天下之大法駕之奉居其官者豈易為之哉某年某以某官領羣牧使事適當更制立法之始思之無邪豈敢自謂能庶幾于古人惟前日之在官者戰戰兢兢猶吾志也于是刻石作題名而著其語于敘端漢書公卿表太僕名氏厯厯可考今之題名猶班氏之志于以備史官之採可以無遺自某年始從某人以下凡得若干人來者可繼而書也開封府南司判官題名記舊京府皆置少尹二員及他官領尹事則少尹更為判官與推官二員通掌府事四員者名品雖小殊無分職也國家太平日久生齒增息京師至三百萬家盜賊獄訟文移簿籍十倍于初故府官力有不暇給矣治平三年始詔增置判官一員領使院事民間謂之南司自是府事始分盜賊獄訟北官主之南司惟文移簿籍是察于是事舉無留而官得休息暇逸云好事者或侈大文書之多猥云日一更筆其實不然其最盛時在朝晡以二辰決之無遺然來事源源不絶逮昏黑而後止強敏者有餘不及者不足理之常也初置官孫坦領之至熙寧十年凡若干員某得承諸賢之後因録以為題名記并敘其端來者得嗣而書之于是某視事嵗適期月日無餘實元豐元年九月四日也曹州修城記曹與鄭滑故皆為輔郡今二州地入于王畿維曹白若夫曹固古之成國也故振鐸文王之昭定陶濟隂二漢帝子之封以至于今董三軍之衆建牙揭節為東藩首而親賢領之其亦重矣哉古之制禮者貴其稱是故諸侯臺門門阿城雉之數皆有常制所以為威重不踰國家承平嵗久天下之民日服禮義白首之老不見兵革自邊圉城守之固或外戶而不為修曹之壁壘隳頓不如古制亦何怪焉雖然是亦長民者之過也易不云乎王公設險以守其國以為可得已而不為者不智者也以為不可得已而直重勞惜費而不為者不仁者也百姓之議如是其可不畏哉于是命工板築而更新之營室之中立栽亢事期而告工休凡周九里有畸其髙二十尺其厚上殺下什七度以尋焉益為四門門皆有亭既成擇令名名之夫古者作器能名以為德音之音四方之賔至者將以觀政焉宜乎其名之必可言也可無慎哉自曹西行二百里則至上都間無異州郡上都東北門亦曰曹故名西門曰陪京亭曰承流見風化之所先被也詩曰薈兮蔚兮南山朝隮今南山雖庳實曹之舊薈蔚雖微足以澤物故名南門曰隮雲自南門行百里則至商丘衛風曰誰謂宋逺跂豫望之故名亭曰跂望河水東過定陶而為泛謂之泛者欲其泛愛之道不可不廣故名東門曰廣泛古稱陶為天下之中陶多富人故名亭曰既富自曹東北三百里則至岱宗髙山仰止景行行止非泰山吾誰仰止乎故名北門曰岱陽朝日之所自出故名亭曰賓日昔衛文公之城楚丘豈得其時制詩人歌之大雅亦云溥彼韓城燕師所完王命仲山甫城彼東方春秋築城皆書于經重興事先民務也記新城之役蓋春秋風雅之旨云于是書之河南府密縣新作縣學記密古侯國也在周天子時為王圻惟洛陽處四方之中天地溫仁之氣始乎東南肅殺之氣肇于西北氤氳磅礴起而相接至于地中而大和會故四序節于是風雨時于是降而在人其溫仁肅栗蓋均有焉以學則逹以從事則明是其履中氣而不偏者也先王之所以建都豈特取其道里逺近均哉亦因人之易化而政易行也密于洛陽為近在周時賢君聞人固多事久不傳去周三百年而卓公始治之勞心愛人教化興行百姓至不忍欺焉由卓公至今千餘嵗矣其上遂無善政可述其鄉遂無聞人可稱豈天地之中氣更于前乎抑化之者失其術耶七年友人楊君始為此邑楊君儒者好古而甚詳故其從政知所先後既至則平辨曲直誅其無良而拯其無告豪猾大姦始畏威而知有刑罰焉曰此足以制獷民矣所以惠善民者未也革簿書均貧富籍丁口田畝桑柘廬舍馬牛民人之數一毫不以任吏上有賦役視其財力而等差之百姓始得其職兼并者不獨逸鰥寡者有以自活曰此足以惠善民矣所以興秀民則未也于是始為學因仲尼之廟而權輿焉財不出于府而木石磚甓之費備農不失其時而朴斫塗塈之役饒其顯敞足以行禮其儉素足以為法益求經籍增置廩米迎明師而居之身為執經以先諸生于是里人舉欣欣然慕從夫縣令南靣而治有人君之道焉其于化民風下足以移易又況因天地之中先王之教素著乎孔子曰三年學不至于穀不易得也縣令雖亟遷固嘗三年淹此楊君之去吾見密人之學而成德者多矣邑多賢者則百姓興行忠信相與于以繼卓公不忍欺之政不其然乎故為作記刻石以示來者以風鄰鄙以識密政之可法以知吾言之信也汝州推官廳記天下之命官鮮有以賓稱者凡賓者主所與敵體而亢禮者也是故酒醴幣帛之養莫厚于賓進退周旋升降之禮莫隆于賓咨諏聽受議論可否莫嚴于賓道合則從不合則去莫逸于賓天子無客禮以先代二王之後為賓諸侯以其國相賓卿大夫士以位相賓至于鄉黨宴射以其賢者老者為賓賓之貴通于天下若夫百官官府之治有正有二有參有師有旅上之所以待下下之所以奉上督責行焉考察用焉是無預于賓者獨州郡從事位下祿薄無列于朝顧其稱曰賓職何哉凡州郡之治非兵戎則盡農事獄訟簡書也縣治民于內將治戎于外獄訟簡書則諸曹分治之而從事居于其間出入風議周爰咨詢無所適主無所不察將順其美拯救其惡是誠有賓客之道焉謂之賓職也固宜雖然朝廷之命稱甚詳既豫其名則不可無其實名實之間士大夫之所當辨也將由夫守道好禮之君子乎則端直其身深謀而逺慮使其語言必見信居處必見嚴其主又能優遊敦尚之如是則兩得之矣將由夫好利冒進之小人乎則將倍力為巧侵取百吏之治以為已勞其語言不信其居處益溽其主又且迫切督促之如是則兩失之矣是故為賓職者不可不察也皇祐四年豫為汝州從事始事衛尉卿林公其後資政殿學士吳公又尚書郎王公又太常少卿張公郡小無事四公皆賢豫固優遊竊幸於賔焉自昔官府皆有題名記書其所嘗為吏者郡獨無有求於簿書歲久漫不可省他日尚書屯田員外郎張君景伯過汝君亦嘗為州從事為豫言之自張至豫凡若干人豫取以為記而載其説張君恬厚信士也其為從事蓋良賓客矣故自張君始泰州玩芳亭記楚辭曰惜吾不及古之人兮吾誰與玩此芳草自詩人比興皆以芳草嘉卉為君子美德無與玩者猶易井泄不食云爾海陵郡城西偏多喬木大者六七尋雜花桃李山櫻丁香椒棣數十種萱菊薛荔莎蘆芭蕉叢植穭生負城地尤良朱氏居之益種修竹梅杏山茶橙梨異方奇卉往往而在清池瀠洄多菱蓮蘋藻於是築室城隅下臨衆卉名曰玩芳於是乎喬木森聳百歲之積也衆卉行列十歲之植也雜英粉糅終歲之力也俄而索之不易得也天施地生非為己設也能者取玩焉能主客也惠而不費莫相德也非易所歎泄而不食為心惻也於是刻石亭右以記歲月云兗州美章園記魯泰山二郡國四千石所治今合為兗州都督東方大府也自昔典城剖符皆達官巨人吾問於耆舊老人其遺風餘烈蓋罕傳焉獨府舍園池亭榭得二三公之遺事李丞相鑿池為濟川擷芳亭孔中丞名嶽雲亭傅侍郎新柏悅堂李右司作蒙觀緑野三亭凡此遊觀皆爽塏而高明邃深至今以為美用是觀之惟諸公曩昔之治其亦若此固多愜於人心者矣夫教令因民而設施者也賓僚與時而聚集者也方其時以為善既過則泯默寂寥然古人有言目前之事或存或廢千不識一況此數十年之久其能勿忘乎自豫從宦四方閲州郡園圃如此府者蓋鮮而無令名以顯之亦可惜也座客聞吾言而請之為其多喬木焉因目之曰美章夫珍章嘉卉所以逞顔色娛心意者可一日而具也今此長林美蔭高十尋大連抱非千百年之積不能至此以謂有老成畜德君子之風資以定名不亦宜乎乃命除道南出闢大門揭榜書之既又刻石廣其説以示後曰凡塗塈梁棟梓匠之所可勉也戒勿隳廢而己良幹豐本受命於天非人力所能及戒勿翦伐之爾北望岱宗南眺鄒嶧巖崿蒼翠泄雲興雨天下之壯觀能者面之明耳目就空曠以逹其胸中之氣不能者面之亦何隳廢翦伐之虞乎象山縣西谷記在五季之世州郡兵事為重吏以武猛威暴能取民者處右是故縣令養民之任益輕所用多非其人人之相嘲每靳愧者皆以縣令為諺及宋興始以廷臣行縣事於是大縣劇邑稍得良吏矣然僻陋窮逺之鄉尚略如舊方此之時象山絶處海上官無令尉獨主薄為治其重者一切為簡易吏民酒食相通繇是士大夫莫不以為諺云慶厯初詔書益重縣邑之選使州郡以令舉才而用之象山亦增置令一員自爾至今且三十歲所更九人象山今遂有善政見紀於民遂有聞人見用於朝夫民無近逺莫不可以興治而為吏者安可以不審擇如此吾又以見太平之世其治詳而賢者衆多也舊説徐福為秦皇帝以千童子求神仙遇海道此古事未必盡信今其民魚鹽粳稻歲時自足不待求於外外亦阻海水雖求莫致也為之長者能母擾而安之此豈老子所謂至老死不相往來者耶縣令長樂林君旦次中以文學為政邑民宜之令嘗大病民有割股肉以療者令之所以重見愛於人其亦不擾使之然乎昔仲由居蒲子賤治單父夫子入其四境見其成效而後稱之惜象山遐逺士大夫莫之往令之善不盡傳也然吾聞令通西沙港以道利涉海者板築縣城而正社稷夫子位堂宇壝埓皆應古典既可謂之知所務矣修治西谷益植花卉因其老木修竹築為亭榭以眺望滄海而相蓬萊非其有餘力而暇及此哉雖吾未嘗往而令之善固己信矣於是為作記刻之而谷中自林君以前令有顧方者始有治迹踰年而死民哭之哀祠之又任永德治石碶以禦海潮郎某濬河畜水以待旱歲民皆賴之皆林君告我者吾因以著之且以見林君樂道人之善焉耳寄老庵記勞而求休久客而願歸人情所同也惟賢者知所休知所歸嗟負擔之勤肩赬足繭其色焦然有益以十鈞之重貪受而不避去家越鄉漂搖異域衰老疾病將復夸為胡粵之遊則人皆笑之古今之士縻於爵祿之重任騁於功利之修途力竭矣愈多益而不辭歲宴矣方馳鶩而不己則何以異於是惟賢者不然未嘗不量已而受任未嘗不畏滿而知止舊史遺文所稱道者略可得而見矣於陵仲子辭三公為人灌園邴曼容仕不過六百石輒自免去蓋為是爾廣陵孫莘老以文章經術顯於朝廷嘗為諫官右史出領大州郡者七八年甫五十自以多病遂有歸休之志嗚呼賢矣平日士大夫歸常患其無所寓止其志落落難合獨莘老有以素具又可信其必往也始時莘老嘗至烏江浴於野之湯泉而樂之泉出山中其源大溫大涼適平凡三等至平地為池青石八角道人浮屠師主領辦治浮屠精舍甚盛莘老於其旁得勝地羣峯四合紫翠萬狀泄雲鳴禽娓娓昏旦登高而望大江洶涌千里不極長松二本對峙岡上下有奇石十數石有窊樽可以酌飲莘老歎曰此地去人不逺而眺聽曠闊超脫凡濁是其為勝乎於是剃草築居以二松為門命曰寄老庵噫山林泉石之勝必待賢者而後出或曰天為賢者而設之大不然今夫韶夏濩武之作衆人聽之或以不知而不愛或一心以為有鴻鵠至將繳而射之雖近而不聞故山林泉石之美未始無有也惟知者為能得之好之故獨見之樂之故安居之莘老名庵曰寄老吾又有以知其志也矣凡居地上者莫非寄也知此則吾所攀戀固無往而不逍遙嗚呼寄老於軒冕富貴之間者危殆傾敓之患日至寄老于山林泉石而人莫與之爭可謂知所寄矣不亦仁且智哉太原府資聖禪院記惟元聖以神武撥亂出民塗炭之域所乘者時也惟大雄以慈悲衍法濟民生死之海所會者因也夫治道陵遲彝倫斁敗方隅幅裂聲教否隔運極數還乃復一統故西伯崇壘再駕而後服武王牧野一戎而大定聖人不能先時而亟其欲焉四生異稟五藴殊感空性迷沒邪法肆行德非宿殖莫聆真謗故舍衛吃食肇允一音毗耶問疾乃至不二如來不能無因而唱其端焉在昔偽漢竊號盜有汾晉資魏氏河山之寶倚并州兵馬之盛曰實夏𨽻蘄亢劉宗及衆正龔行小腆負固藝祖無𠞰民之念神宗收卒伐之功而後氣祲清蕩書軌無外遷商餘民用誥多士本堯舊俗謂之唐風自是里閭逸居田畝昏作中外一體遐邇禔福世厯三紀重熙纍洽邑具五民既富而教明則禮樂幽有鬼神習豆籩而率職者必惟新於後生袵金革而強死者或未悔於前日益茲象教用照大迷上以儲二后之冥祐下以副兆姓之洪願蓋資聖禪院是始權輿焉然則元聖建功循斯教於休命大雄妙覺繇信向於方來乘時會因不其然乎故知辨冕端委莫匪帝力塔廟莊嚴則為佛土於是中外虛心氓庶就義崇茲勝果底於日新詔發祕藏申錫舍利既而肇建茲廟儀形天表軒臺靈威懍懍如在帝梵極樂亹亹現前嘗試揚榷以告比丘惟此晉國始封叔虞疆以戎索啓之夏政孰若清淨寂滅至於無爭闕鞏密鼓分器之薄孰若示現靈迹持以堅固九宗五正域民之陋孰若四衆招提十方無礙而況有先王之别廟實曰都城稱使者而侍祠付之官守兼是數者其亦盛哉自禪院初建敕選名行僧二十八以充供養嵗度學者并錫命服暨舍利之降始創鴈塔劫火變壞更置寶閣及太宗神御落成輪奐蜎蠖金碧照爛中人營辦冠蓋相望爰田上腴之錫蠲其國征邸舍廛絘之布厚厥緡算上恩賚豫至於再三歲計會最始盈千萬其餘則元臣巨公競加外護里豪居士樂輸檀施於是高閎大廈長廊邃宇經行禪誦香積宴座各有攸處矩模畟然鱗次翼舒星陳棊布始由工度儼若化城自天聖初元至元豐紀號垂六十載能事斯畢總若干間以殿名者幾所鐘樓經閣香壇廳事凡若干名於以資薦純佑弼成鴻化豈特憂深思逺之俗益知用禮權變縱橫之士舍其業結抑自實沈曠林悔懺尋戈之咎負二盤石解脫囚械之苦矣丞相韓公某樞軸均逸開封作牧分閫秉鉞威憺殊俗惠孚小民禮賢下士常若不及博古求舊未之或遺僧正檀江總特淨衆綿厯歲月緣化積纍之勤經營卜築之盛不愆於素率與有勞求刻珉石以垂不朽公嘉允其意樂道人善以愚有志鉛槧見命刋述某晚聞道要無所折衷能讀書史豈曰多學為之歌唐竊季子見微之妙其若有佛愧靈運先成之知辭不獲免因直書云爾重修廬州蜀山廟記昔先王命祀山川之神神能興出雲氣以致雨則祀之言泰山之尊亦曰觸石而起膚寸而合不崇朝而雨天下是故神靈之動民者莫如時雨百姓之歸依於神者莫如旱禱夫惟民神之相與非有真宰者主之其孰能應而不二蜀山廟載于祀典景德二年太守相國陳公始新治之去後五十三年今太守趙公復修舊而侈大之前太守所以新廟者旱禱而應也今太守所以新廟者為致雨而報也用是推之茲山之神靈動民其前無始其後無卒其於廟祀不亦宜乎然茲山之髙不逾里大不盈百頃四平無附以蜀為稱而自舒肥之民方數百里咸奔走望祀之固天地鍾粹神靈之區不在大而威靈著焉百川之交也而濟為四瀆列星之多也而觜昴序於西陸事猶此矣趙公字某以嘉祐元年至郡明年某月去郡治民事神恭順不懈前後凡三禱歲以有年新作廟若干楹餘合舊修之彭城集卷三十二
