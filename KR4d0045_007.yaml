body:
  text: 彭城集卷七宋劉攽撰七言古詩赤甲競渡古潭蒼蒼照毛髮龍藏水心波色活風雷如在石壁下有時雲雨何倉卒今年大旱百昌死神物亦恐俱埋沒南人厭龍抱珠睡駢舟伐鼓探龍窟皆言龍驚當上天九河翻雨石湧泉君不見朝來積水上魚鱉死盡龍安眠酴醿軒雨中積雪猶殘雨復新正朝日晦只逡巡浮雲未省見白日細草何事知青春杖藜苦恨泥汚客解衣生憎寒著人遷鶯來燕勢未可天意靳靳留芳辰在郡作案本傳攽曾為京東轉運使又從知兗州此詩云今時督府雄漢魏魯國太山四千石當係此時所作末句云乃不及舞文巧詆為詐忠豈受吳居厚之譖將去時作朱門深沈十二戟髙槐蔽庭有佳色令時督府雄漢魏魯國太山四千石讀書作文五十年齒牙脫落頭半白平生心事竟何許衮衮簿書為報國吾衰不復夢周公聞道家邱居在東垂老才為少司冦殺一正卯那為功詩書誤身既可信却憶扛鼎之重瞳宰割山河一何壯指麾天地如回風背關懷楚更齷齪沐猴而冠塗遂窮區區諸老為城守頭臚曉入旌旗紅魯人之臯乃自昔猶復絃歌一畝宫聖賢萬事盡有命世人何用誇材雄府丞久吏掾史健時雨霑足年榖豐深居閉閣不復出曲肱甘寢日正中昔聞汲黯淮陽亦如此乃不及舞文巧詆為詐忠楊之美彈棊局歌漢皇初厭蹙鞠勞侍臣始作彈棊戲東方諸公盛得名魏文以來稱絶技後宮粧奩乃可為客著葛巾尤更奇誰令朱墨異貴賤百世紛紛無已時君從何處得此局石理溫華瑩寒玉山形四隤澗谷深别將望秦森在目少年博戲日益新古事不復傳今人君能興此亦先覺辟雍老儒悲絶學過王氏弟兄出城問窮僻負郭正瀟灑主人著書長閉關嘉樹當門宜繫馬下馬上堂還讀書新詩古琴雙起豫昏鴉棲雞欲斂翼興盡將去猶須叟徒見城中軒冕客不如吾人一逢掖安得茅茨同里居子在東阡我南陌和陸子履魚膠亦名阿膠可以羽箭又宜婦人貼花鈿漢家金繒撫絶域逺夷畏威亦懷德南琛北珍不自惜譯官賈人多未識此膠出從遼水魚居人釣魚取專車秋風時節候可折白羽鋪綴隨呵噓赤車使者來穹廬繡鞶玉玦通函書黃河之清那可俟美人紅袖應時須丈夫辛勤萬里外少婦深閨苦凝待京兆眉憮傳長安翠鈿彩飾令人愛鳯凰得髓麟取角將來續弦弦不覺更嗟珍物空傳名欲倩張騫問方朔昭君怨戲贈武皇聽歌長太息傾城不難難絶色連娟修嫮果自得三十六宫寵無敵君不見孝宣既沒王業衰優遊時事牽文辭延壽丹青最叵信無鹽侍側捐毛施此時昭君去宮掖邊風侵肌雪滿磧穹廬旃墻燒􅪈蠡琵琶怨思胡笳悲猶憐敵情不消歇子孫纍世稱閼氏傳聞漢宫翻可愁紈扇緣衣長信秋燕啄皇孫兩悽惻當時無事成深仇覆杯反水難再收深淵瞬息為髙邱塵沙蕭條猛虎塞邊民獨記和親侯春日春波淫淫泉脈清揵災作擔芳草生女桑柔弱欲動色落枝投斧聲敲鏗山前一雨杏花白布榖來往相和鳴鞦韆繫樹徑路熟童稚翁嫗歡逢迎田家此樂世豈知人生所急食與衣計謀雖拙日有效筋力無餘身得為幽州圖鄙夫平居常歎息薊門幽都皆絶域安得猛士守北方力排敵人復禹績田生手攜朔漠圖丹書萬里之強胡挂圖髙堂素壁上壯或隂山來坐隅長城迢迢屬滄海古塞厯厯生黃榆縱橫指顧皆舊物撫事慷慨時驚呼太平壯士多虛死念君避胡來萬里九關深沉虎豹惡布衣何由説天子卷圖還君意黯然咄嗟世事非余恥送王仲素寺丞歸灊山原注名景純灊山隱居七十四紺瞳緑髮初謝事腹中靈液變丹砂江山幽居連福地彭城為我駐三日明月滿船同一醉丹青細字口傳訣顧我沉迷真棄耳來年四十髮蒼蒼始欲求方救憔悴他年若訪灊山居慎勿逃人改名字汲潁水城中鑿井非不深苦泉欲飲先煩心天生潁水似碧玉盛夏一酌逾千金野童潔壺不盈斗清能照眉甘適口未曾一飰過閭里猶以空瓶纍川后次韻范內翰西圻老人詩大行宫車千乘強翠華晚駕煙蒼蒼龍髯墮地長秋草白雲悠悠飛帝鄉先驅軼出塞門外天宇寥廓初無傍凄風疾雨走道路萬靈奔走誰非常漢家德澤遍四海戎夷執紼虛邉疆翾飛啄息願效死以彼壤穴皆容光詞臣宗功筆力壯感激顧遇思揄揚周宣中興在雲漢武皇最著惟宣防道旁老翁話舊事靣目黧黑情摧傷賜縑如雪身獨得無衣自幸方同裳桑田變海不可測慟哭白日悲風長君不見封禪之君皆不死豈以衣冠之葬疑軒皇和蘇子瞻韻為石蒼舒題長安材豪雄五都五陵意氣誰能除作人不入遊俠窟寓興聊從草𨽻書崩崖壞山出衆寶石刻鼎鑄周秦餘江東諸家擅逸氣宜官鍾蔡幾不如騰龍翥鳯動光彩淥池滉漾華芙蕖石生臨書得微妙神凝意會下筆初濃纖巧緻若出一老庖利刃投空虛人間流傳不得辨錦囊玉軸爭貯儲以兹得名號醉墨聊取勝事題精廬豈與西山少年輩射獵狐夸里閭杜陵詩仙有祖風筆灑雲霧揮瓊琚我今才薄厭數語勉力和歌慙起豫傅堯俞草堂歌漢朝名臣有傅伯諫諍由來犯顔色蘭臺下筆不自休義陽封侯勇無敵石渠昨者承明直虎符今為二千石邀我請賦草堂詩草堂欲歸那可得太行之上無髙山濟水之外無清源聞君築居山水際清髙正為若家言上有無心之雲出幽谷下有徑節之竹森寒玉四鄰空地猶幾許容我東西一茅屋虎子秦山十月朔風起寒巖蕭蕭虎㩦子樵蘇繞山不敢採赤豹黃羆相向死關西少年勇似飛白羽利鏃黃金機解胸陷脰心應手功名一決何辭危坐皮食肉已自快況復猛毅充提攜雄姿英氣實少並不堪籠檻長羈縻至今求食每搖尾摧剛逺害誠其宜君勿愛澤麋山鹿大如馬牙角雖具無能為厄窮隱約豈足諱會見白額跳踉時和李公擇題相國寺壞壁山水歌蒼山本自千萬丈怪爾斷落盈尺中枯松挂崖正矯矯白雲出谷方溶溶憶昨髙秋十日雨百川湧溢騰蛟龍丹青壞劫不可駐金碧拂地俱成空人間流落萬餘一掇拾補綴幾無從當時畫手合衆妙得此誠是第一工松隂行人何草草秃幘小蓋馬色驄長塗未竟不得息嘯歌正爾來悲風巨靈擘華疏黃河夸娥移山開漢東海波芥子互出沒大雄遊戲神與通我今與君未嘗覺指視壁盡將無同新詩飄飄脫俗格得間會復來從容空同汝山不髙鮮喬木汝水不深無巨舟荒草連天荆棘壯土脈疏緩多廢疇三年力耕食不飽一時不雨人相憂負薪代炭集市井耳聾眼瞑垂白頭土風薄陋趨向狹一金之子稱良謀百年人物可料數里閭未見興公侯君不見廣成昔從空同居猗玕亦云隱商餘千年兩士炯若日希世之才安可誣畫龍南人謁雨爭圖龍畫師放筆為老雄煙雲滿壁奪畫色雷電應手生狂風觀者皆驚牙爪動攫拏意似翻長空吾疑奮迅出戶牖何事經時留此中共言葉公初好畫當時亦有神龍下天意為霖非爾能世俗慕真聊事假冬蜂房割蜜留度年中林置罝長擊鮮朔風吹空塞北戶束薪明暖初無煙缺籬補疏已乍密敗屋鬋茅元自堅官租事空不復出積雪塞徑長晝眠田家此樂不知老兒孫滿前俱夀考世俗榮名多變更不似田翁一生好蘇子瞻家畫松圖歌君家圖畫皆所見近得此松尤可羡根蟠平石蹙蛟螭幹出青冥起雷電樛枝橫斜復幾尺緑葉茸聳鋪繡線空堂深沈白日寒謖謖似有風吹面此圖翦裂人不知塵外分張數流轉能令神物還相從非君苦心誰與辨更惜良工名不傳可憐世俗多夸衒為君作歌君志之後千百年無復賤赤甲祈雨是日獲之君不見赤甲之淵色如墨中有神物不可測潛雖伏矣心念國翕忽變化誰能識五月亢陽裂金石婦女悲號望膏澤簫鼓甘香樂靈德須臾晦冥天正黑風雷硼轟震穹碧霧雨雱𩃱掃炎赫生物欣欣動顔色樵童牧豎亦歎息千秋萬嵗無終極市朝市朝老去無希慕枕簟秋來覺靜便何事連宵夢顛倒猶應三世業攀緣蟯蟲飽足尸鬼健尚寐翻令愛不眠貧交行貧交多相憐富交多相捐貧富尚不保死生安可道人能無以聲利為貧交富交皆不欺君不見蕭朱隙末張陳死惟有管鮑真相知古信陵行薛公藏賣漿毛公藏博徒侯嬴抱關叟朱亥市井徒我思信陵君下此四丈夫富貴胡為棄貧士能令君存為君死方仕致仕在家出家古有此方仕致仕吾自嗤晏眠足當几杖賜散髮每從田野期息交便爾賓客絶省事何説課最為山濤非隱亦非吏仲元不惠仍不夷北門行慕道逍遙遊不作枯稿語二年客都城卒嵗厭貧屢乃知北門詩聖人亦有取自於萬事捷若機今日已晤前日非五月披裘不取金放歌會採南山芝衰老蒼耳嬰末疾浴蘭殊未解枲耳傳愈風及秋始堪采惟昔沙塞隂偶從羊負來葡萄安石榴安可同語哉雞雍與狶苓適用即為貴何必黃金盤磊落薦滋味老人學道破諸妄猶有塵緣為疾恙安得澡身并澡心使我有意煙霞上次韻孔常父老翁衰遲為日久自知不是文章手紫微熒煌十二星青閣彤庭掖垣右誰令孤翼此飛棲正似枯槎犯牛斗諸公可親復可望黃鍾渾宏秋水光但論四海矧故鄉清詩翻翻鴻鵠翔願言與子同升堂太液池建章宮中太液池水象星漢波漣漪鳧雛鴈子相羣嬉黃鵠來翔金為衣主人勿惜稻粱恩主人勿矜羅網繁暫來可見不可親乘風一舉超崑崙送原甫帥永興讀書當為王者師論兵要作萬人將古來志士希兩遂白首儒生彼無望騏驎一出凡馬空豫章蟠根嵗逾壯金華事業爛然新徂西謀謨誰與讓旌旗蔽日紅半天笳鼓隘塗車萬兩中軍令出聽無譁秦山渭水皆東向荒夷憺威霜雪明屬城陽和春日亮趙張成事不足論方虎遺詩猶可尚龍文金鉉待調飪璿樞斡中付羣當西人歡歌公肯留公車雙鹿畫轓上晚起黃昏就枕日午眠入春夜短常獨然不嫌時世欲無覺每為身謀私自憐夢為嘉魚潛九淵夢為飛鳥翔髙天喜來寢覺了不辨安知此興非神仙漁翁老翁年侵耕作苦官田稅多不敢住身攜兒孫事漁釣編竹為家寄江浦朝尋菱芡逗煙水暮飰魚蝦宿風雨人生如此亦自由何用車馬稱公侯和羅著作漁翁漁翁結網求魚子得魚滿船心始喜豈知陂池水不深但有鯤鮞少魴鯉漁翁結網安得疏漁翁用力常有餘心疑他人得厚味滿眼看來池無魚古來任公不如此期年得魚雄浙水龍伯國人連六鰲二山漂流不能止由來萬事不同調説似漁翁翁必笑大風朝風吹沙天宇窄暮風吹沙地載薄視天昏冥畏其壓視地震蕩憂其坼一春三月風不息局天蹐地勞筋力波濤翻空礔礰怒行路之難行不得安得重雲十日雨洗眼去眯分白黑初調江隂主簿小來讀書非為名約身不肯遊公卿秪憐狂簡真吾黨謾有文章慙老成漢廷好武臣尚少郎官十年不見調青衫黃綬赤詔除落拓敢辭流俗笑送直史館孫兵部知陝府侍臣數厭承明廬太守何妨太史書十里九坂二殽道駟馬髙蓋朱輪車分陜已信召南貴補郡詎比平原疏諌垣風彩東觀筆不待上計看回輿湘中阻風十月北風不肯回湘中白浪髙成堆小如飛鷗大奔馬一輩才去羣復來一旬隂雲色死灰劃劙掀簸初全開晨陽照空幸澄徹蜚廉暴怒猶喧豗繫舟沙渚依曲隈嵗晏永路真悠哉棹夫卷縮亦何恨時乎寧有材不材欲雨寄張壁北山雲起南山雨返照却見南山樹逆風燕子能疾飛隔葉黃鸝猶獨語憶君池上波悠悠憶君翠竹聲颼颼興來冒雨故相視薄暮雷電歸何憂寄楊十七楊侯論詩銷我憂昔嵗相逢偕旅遊梁多長者不虛語傾蓋結交子所求三年契闊意不展歎彼栖栖為藪幽窮愁著書亦自足有䇿肯説東諸侯長安富貴易反掌末路功名猶捶鈎天公於豫豈愛惜由來萬事非人謀隂風朔雪五湖凍嵗窮髙卧思同裘春寒越羅裁衫春服新寒爐委灰無復溫夭桃著花紅滿檻弱栁吹線青映門豈知天事有反覆假借專物矜餘恩平明雪片白似玉敗裘死灰仍紛紛女桑吐葉蠶欲生東郊草緑方趣耕玄冥欺人人弗信百蟲奮蟄雷已驚沈隂驅除生可待白日隱隱浮雲外清明東風零雨頻曉來料峭寒著人人言夭事不可測欲回暮春成早春花紅柳緑皆自若一氣變化宜有神漆園老人惜光景求術却老無聲影忽聞春有再韶時亦覺身當還壯境花前一酌心熏然敢道朱顔非少年戲謝師直買伊陽田雒陽東周蘇子賢兄弟馳説雄當年一身曽兼六國印舉世皆羞二頃田君才十倍鬼谷子期年已出揣摩篇公侯將相可自致何竟髙蹈伊陽川陽翟賈人歌潁川陽翟趙邯鄲大衢如砥車班班重裝富貴名遊間輕紈寶玉髙若山關西王孫龍虎驅此中奇貨奇可居千金入秦藉短䇿立談須臾分王符華陽松柏成髙邱壽陵蔓草令人愁沈沈相府士如市山東共事河南侯和王平甫韓幹畫馬行韓幹畫馬出曹霸得名不在陳栩下詔令師栩辭不可苑中萬馬師在我王侯讀書愛此言由來能事須天然看圖作詩寄慷慨錦文織字珠聨聨乘黃騕裊久埋沒安西大宛路超忽丹青能令千萬年不比燕人空市骨霜蹄踣鐵精權奇耳截筒竹稍垂絲超然抉後三十尺一日千里御者誰舐筆和鉛人所同爾今獨成第一工神凝意會不可料天駟降精來此中少陵作詩譏畫肉惋惜驊騮氣凋縮未知良工嘗苦心空使時人爭賤目九臯相馬觀天機神雋不辨黃與驪君知畫手貴自我何若相法非有師拙工俗子紛紛是畏避權豪如畏死生棟濕塗多覆屋巧書掣肘真難使吾知公詩正如此丈夫特立嗟已矣次韻蘇子瞻韓幹馬贈李伯時韓幹畫馬名獨垂氷紈數幅橫素絲諸公賦詩邀我和我如鈍椎逄利錐區中才容三萬里正可騕裊一日馳朝燕暮吳亦其亞幸得夷路無縶羈此問三馬皆國馬瑰資逸態成崛奇有如秋空見霜鶻下睨衆禽俱伏雌良工苦心為逺到天機要眇潛得之區區駑駘浪自負豈可醜骨包妍皮李侯灑筆定超詣尚有天驥君未知宛王母寡今授首汗血不敢藏二師送程少卿原注江西轉運使使君船舸如浮宮蕩蕩帆影垂白虹苦無三江五湖水安見一日千里風長蛟巨魚逺避去水府泉室深玲瓏使君按俗不異此意氣自覺凌虛空滕王閣前流水白西山落日銜微紅城頭臺榭眺望極玉壺置酒光融融勝遊重臨不隔嵗塗歌巷祝歡南公作官得此亦是少況復章綬彌尊崇南金折鈎富九鼎荆揚塗泥多嵗豐會令利術析毫末萬古江流常向東故鄉秀水三百里送逺遊子情無窮遙知屣履待髙士安得羽翼隨飛鴻懷信驛亭晚望題其楹吳檣東風曉來入楚客齊橈暮去急行人西行人東逢迎送歸景不同夕日春煙一望中戲題西湖中魚重明水深波洗空嘉魚萬族連西東鯤鮞細碎長者惜赤鯉成就隨飛龍南風吹雨中宵雷衆鱗不去真常才魴魚如玉鱠第一安得大網相隨來盆山青泉盈池底白石中有高山髙不極連峰絶壑知幾許朝霏暝煙無定色山下清波清淺流魚龍浩蕩芥為舟今君欲渡何由得縱有神仙君不識出門無馬行市兒暮歸錢滿把田翁秋收禾滿野人生勤苦必有獲天事豈常遺拙者鄙夫能言知讀書十五著論驚羣儒文章不作少壯用白髮垂領皮肉粗作官不如間日多得祿無若飢寒何百年陳人誰比數滿眼貴士難經過欲為揣摩心智短欲學造請顔色赧黃金難成丹砂貴紫芝將秀白日晚退居長安百不為出門無馬還步歸髙天報施固有待可得不如翁與兒次韻子瞻贈橋道人昔有仙公項曼都去家十年若斯須還歸壯語驚妻孥月邉朝拜雖勞軀流霞一杯真味腴世人但怪醫多盧不知列仙山澤臞隂陽變化隨指呼日新無窮非故吾喬公築居近濰都交遊洞賓儕爾朱又言其師奇丈夫璞玉粹美名不沽郎官仕晉更五胡我今老病須人扶衰顔白鬢日已渝捐書絶學休守儒去不為少猶雙鳧公能濟我良藥無俠少行戲王子直長安少年俠自任一生意氣過人甚許身直以豪取名快意那知武犯禁寶刀強弓千里馬風馳電射無敵者有時獨醉倡樓春一身歌舞兼百人休來著書吐胸臆脫落章句嗤邱墳王侯願交不可得貴者雖貴猶埃塵君不見漢家雲臺畫良將髙冠長劔森相向由來落拓塵土中不妨論議巖廊上乃知功名為世賢安知輕欺惡少年王家酒樓案此詩自夷門城東門以下詞意與前不相屬疑有誤君不見天漢橋下東流河渾渾瀚瀚無停波遊人閲水看白日駭浪瞥逺紅影蹉感歎世事亦如此振頓兩足行吟哦提錢買酒聊取醉道傍高樓正嵯峩白銀角盆大如斗臛雞煮蟹隨紛羅黃花滿把照眼麗紅裙女兒前豔歌樂酣興極事反覆舊歡脫落新愁多夷門城東門南對屠兒墓信陵今安在賓客散如霧竊符事可鄙袖椎復何慕猶令主人成大功千嵗英名若可遇笑殺平原君恥從毛薛遊選士十九人毛遂晚見收丈夫一身貴特逹因人成事良足羞和章都官洞庭詩閲水須閲秋水時洞庭八月為最宜百川湧溢注平曠倒卷溟海翻天池瀟湘沅澧紺碧色千里一片清琉璃蜀江亦濁遠不雜正若黃組縈鑑匜長風簸軒一何壯雪浪成山相蹙移奔霆擊電恣轟磕素車白馬交橫馳朱垠騁望更無地翼軫落影光參差南極老人坐盤石赤足皤鬢濯項頤修鱗巨鬛出萬族窟穴鱣鮪泥蛟螭身軀長大竟無益機械利器潛相隨但令漁師賈餘勇冒突死地常安之巴蛇斷骨不自免此曹么麼何能辭秦皇屬車八十一赭衣伐山豪不羈九疑不到二妃泣聖賢失勢令人悲憶登洛陽值搖落暮霞新月含風漪古今光景共一瞬獨繞四壁觀題詩神官威嚴鬢似戟樓船持節森畫旗湘靈奔走伺顔色鼓瑟獻巧招馮夷新篇秀句遠為寄清風白芷叢余思呼兒疊紙作報語衰老撫事情孳孳新灘行巴江之水西南來峽束川壅聲若雷瞿唐五月不敢下灧澦中流大如馬風波雖惡石不去太古以來怨行者君不見前日巴山復摧裂萬仭臬兀江中絶孟冬水涸石角見上流下流盡精鐵當時長年皆有語後來難危從此數上天設險知為誰但恐妨人如灧澦彭城集卷七
