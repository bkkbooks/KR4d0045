body:
  text: 彭城集卷二十八宋劉攽撰啓賀參政某侍郎啓伏審先膺詔䇿進二台司伏惟慶慰恭以某官率性純粹踐行中庸奧學究乎天人令望允於文武暴陽秋之和氣諧金石之正聲乃其育粹元精稟符人傑周雅所詠老成重於典刑荀卿有言大儒所以美俗而自雍容法從輝光本朝雖北門靖深之謀一歸於基命而公鼎燮和之寄仍觖於具瞻函錫袞章坐陪國論主上勞乎求輔安於仰成且師錫所同夢賚惟允聖賢於此胥㑹禮樂其有不興休命甫行輿情大洽某早以孱瑣幸蒙顧憐局迹小邦睎風賔閣無庭燎照客之望徒愧其不材懷巢燕賀廈之誠尚矜其弱羽賀資政吳侍郎啓伏審光被詔函出臨侯屏本朝恭讓方均逸而優賢三輔浩繁資陪京而作鎮矧惟召南之所覃化單父之存去思蒼生具瞻周邦咸喜恭以某官比德伊管致君勛華謀大而志深器逺而任重輸元忠於廟禮被成烈於鼎彛蓋秦伯至仁帝以之賜夀博陽隂德世知其必封今搢紳仰畫一之規黎俗期可久之業豈其淹袞衣而信處局霖雨於一方必將下玉堂之書正金鉉之拜某早以孱弱獲際輝光親聆咳唾之音兼辱匍匐之賜頂踵之報私誓於所天燕雀之誠復歡於成厦又恭審光被綸言還躋祕殿峻金華之茂選撫召南之舊封伏惟慶慰恭以某官具體上仁秉彝迪哲主盛德而不牽於俗守經事而皆得其宜降半千之昌期遘億萬之休運佐王之略先信於合心格天之功厯試於柄輔惟長波之所蕩芳風之所懷雖復偃息寰中優游事外足以師保兆衆羽儀本朝昔周公碩膚由新迎而遘止伊尹先覺暨纍聘而幡然何則太公之規必圖任而求舊尚德之度亦屈已而濟時今昔同符聖賢胥契介圭繡衮相見於蕃之儀羔羊素絲矧按已成之俗某久繫陶冶素辱顧憐聆休命之甫行俯懦衷而增慶瞻望門宇無任喜躍舞抃之至與揚州知府某侍郎啓某早歲嘗叩賓閎獲親諄誨屬介藩之均逸阻巖石之具瞻景行於懷向風增聳茲者叨膺詔檢獲二海邦稽方伯賜履之尊仰元侯撫封之重惟我褊小實所依歸恭以某官清德鎮浮壯猷經逺藩守之寄憬夷憺乎威名繩直之風當朝聳乎正色蓋大雅所頌老成重於典刑以商書之言圖治貴於舊德必且登進機密旁副僉諧敢冀上為宗祧精調寢餗回留臺吳侍郎啓近者伏蒙垂顧具僚寵頒溫教忘位貌之敻絶辱咳唾之緒言蓋簪履至微大賢存心於軫舊荆棘雖陋卿雲均廕於不遺藏弆為榮服之無斁青陽播物流籥過中惟練氣而葆和固若時而集福今朝端夙夜之士海隅誦詠之氓揚𣙜英徽惟第成烈而皆悵衮衣之來暮思霖雨之及遐俯掇輿情面稽天意必正富民之拜以速迓衡之期敢冀上為廟朝精調寢餗謝留臺吳侍郎啓伏蒙垂顧敝居寵頒雅什愧衡泌之甚陋聆韶夏之至和詎能審音祇其忘味恭以某官德著而言立氣盛而化神賡載九歌之餘優游二南之域吟咏乎情性敦厚而溫柔皆可以播于管絃著之廊廟惟先公之舊事有上仁之所廬彝鼎猶存松菊未廢果貽鈞念賁以縟辭雖音韻趣高靈均之所未覩而文章公共賜也可得與聞䝉賚逾涯俯己多幸縻於印韍阻叩軒墀詹望台先無任區區之至賀知府某給事啓阻逺賔閎浸更歲律風波失所邈在海隅繩墨見羈居抗俗狀惟舊恩之未報加景行之素深馳精鎖闈結戀心石茲者伏審光膺詔旨移領介邦稽方伯賜履之尊仰元侯撫封之重繄我褊小實所依歸輒同謝人均慶鳬藻竊惟跋履長道綏固天倪恭以某官清德鎮浮壯猷經逺器深中而周用刃無厚而有餘宣風外臺則賦輿辦于心計授鉞方面而戎索著於威名雖偃藩以均勞實注意而有漸必且進登機密旁副僉諧敢冀上為宗祧精調寢餗賀知府某誎議啓伏審光膺言綍復秩諫垣先守經邦德何嫌於一眚次公為郡善仍及於重臨舊物復還豐恩惟允恭以某官材任國器智為吏師臺閣頌其風規藩翰著於治最惟洪河之奧壤當北道之要衝堤繇遂寧繄王尊之壯節父老為請宜寇恂之借留將疇茂庸豈徒中復行被光華之選以崇豈弟之風更冀保頤用符言願賀知府某侍讀啓向者叨被詔除出分郡組治任戒道懷謁詣辭悵隴坂之遽遙瞻階符而棲戀旋聞峻春官之茂秩釐須句之奧區皥濟遺風一變可以至道股肱重寄四國是以於蕃仰惟涓選休辰條布寬教神明所勞啓處用康恭以某官德貫道樞學優聖閫言必垂於士則智必諧於帝謨搢紳推乎儒宗主上許其國器大雅所謂老成重於典刑春秋有云空言不若行事故復輟侍從之邇列極循良之逺圖即觀報政之期以趣登庸之命與杭州知府某資政啓伏審均逸鼎司宣風南國舳艫銜尾牛斗為之生輝壺漿溢塗江海知其增觀豈獨周邦有良翰之喜東人興信處之謠仰惟條布政經惇懋黎俗神明來舍啓處降祥恭以某官育粹中和存誠博厚懷幾深之妙略極經緯之逺圖致身熙朝協德聖相四方從欲以興治九功惟叙而可歌蓋堯以三公出居方嶽周以二伯外倡甸畿體貌所隆股肱攸寄實資天揖之重以陪王室之尊方下玉堂之書即正衮衣之命海隅所傒霖雨是期某樗散之姿瓠落無用方枘圓鑿徒齬齟於迷津深淵薄氷每戰兢於投足下流所處屢憎維塵荷鈞化之無垠矜孤根於易拔鎔造之賜邱山敢忘縻跡小邦阻前賔席有簡書之寅畏乏羽翼之奮飛瞻望軒墉祗勞心石敢冀上為廟社精調寢興謝太師杜相公啓近者調官還南假道過府竊緣世契前造賔榮維父師赤舄之崇加丞相安車之貴一見符照如登龍門矧復厚元禮之通家矜女侯而撫舊垂貺墨妙分沾鼎珍老成典刑雖景行之莫及飲食教誨荷仁心之弗遺藏弆為榮服之無斁逼旅瑣之靡暇悵門闌之遽違阻待話言忽將旬日仰惟練氣自若嗇神致和恭以某官翊亮本朝緝熙帝載出入四輔之要贊襄萬務之微地平天成乎湛恩於無外名遂身退體至道而不居陽報則多福履罙邵畢公茂德在小物而克勤衛武耆年方懿戒而自警彼魯侯之頌夀富洪範之叙康寧舉集在兹夫孰為比敢冀益務遵攝下副觀瞻謝西京宋相公啓恪守官針坐遙恩館夫以惟良共治之寄付之瑣材然其小邑寡民之間幸焉自守徒以簡書攸畏繩墨所羈趨槐府以無緣瞻階符而載聳恭惟尹政千里居寄二宫自天降康龎福善應惟民所止多士攸歸昔平津厚東閣之賔晉公有緑野之集盛德相望休風益隆顧此孱姿獨窘賤事曾不獲預簪玳之下列陪畫鹿之前行苑結所深啓處無己敢祈上為宗祏精調寢興為韓汝州謝諸執政啓比者忝被詔除榮分郡寄獻納無補愧徒重於髙門綜覆非優復叨榮於聖治矧惟陪京近壤遵汝舊封三組夸鄉兼備銀黃之寵駟馬置傳得陪玉輦之尊內省庸虛良深幸遇伏以某官陶甄品彚銓綜材良程其器而任能因所資而借寵竊以惟民共治之任付之不敏無似之人習雖生常事亦匪易且當屬役治賦必謹於期㑹之間聽獄察辭或論於繩墨之外雖曰小補倘或有成庶無曠官以纍塵史為司馬中丞謝翰林啓叨膺詔檢擢躋禁林上德敷施寬任能於求備瑣材蒙幸懷致冦以為虞視草玉堂簪筆省户地嚴禁密或號為私臣言聽計從則稱之內相常以德選乃充詔求夫何妄庸輒當遴柬伏念某賦性檮昧為術闊疏無方朔之淡辭守兒寬之朴學據經入對悉鄙心之所安無言弗酬濫豐恩之薦及勸華光之講幄參延閣之貴游寵實逾涯望無他覬豈謂發中之詔驟疏躐等之榮且孚號四方垂鴻來世爰訂代言之選曷容彼已之羞循墻自驚甚履冰之增栗渙汗莫及終襲組而拜嘉內省攀援抑由推奬伏遇某官至誠樂愷髙誼并容噓枯發生密借寵於餘論陶冶致用不遺力於寸長以是小材堪叨異數謹當秉心正學刻意慎詞竭其毣毣之愚效此容容之計為趙祕監謝官啓大計吏治非敢望於陟明無曠天工奚獨蒙於虛受仰承恩渥俯集戰兢伏念某賦性顓愚為學疏略進不能守據經義引大體於廟朝退弗能勸課農桑樹風績於郡邑年既運而逾邁智加懵而無堪屢更分士之權久汚居卿之秩但虞官謗以速刑書敢緣年勞復膺懋典重以蘭臺祕奧䇿府深嚴圖書所藏著述兼領厯數近事皆用名儒其在私門均實世守睎先軌而無能為役踵前哲而胡可與同恩深叵量感極至泣揆茲際㑹抑自陶􅀈伏遇某官秉國之鈞致君以道同一德而熙載審八枋而贊襄故疏逺於焉不遺而纖介得以叙進敢不繩墨自檢夙夜惟寅無負浚明之心仰答曲成之造為某郡守謝罷任某瓠落於時沙汰為郡迂直自守老而益疏將迎之材智所不逮斷斷之技已竭赫赫之譽無聞爰及瓜期得還魏闕揣蕞軀之幸㑹實大度之并容何則精鑒之前毫髮無隱下流所處風波易生至其脫致冦之災獲伸眉之慶非夫卿廕廣茂瑜德深純何以致茲為感曷已方瞻雲而迅邁阻踵門而侍言益冀葆調以候飛擢為傅學士謝除直昭文館啓湛恩驟委蕞品無庸據非所安寵以為懼國家博極古志購藏羣書敞石渠金馬之庭法東壁春山之府其以待逺方之選致席上之珍仍踵舊規别疏儒館由是寵學士之職常以加元宰之尊至其屬僚略皆精選向非文純貫道學茂致知智輻湊而軼羣量深中而大受何以驟充妙選進預俊遊伏念某生質甚愚天機尤淺無斷斷之薄技懷毣毣之愚忠早繇鄉書亟躋仕版㑹冠豸之承乏得簪筆而備貟念無橫草之勞驟玷伏蒲之列內思報效姑自激昻龔勝之議寢園詎知時變夏侯之止廟樂竊異詔書黜典方州尚叨符竹何不天之寡祐遽陟屺而纒哀駒隙浸遙心灰己極違負米之始願餘絃琴之甚悲朅修覲於天臺復參華於郎省幸簪履之未棄愧蒲柳之已雕敢期詔旨發中班寵逾望擢道山之祕奧委銓管之㑹繁光華一時局蹐萬狀俯思際遇抑有攀授伏遇某官邁德兼容至誠樂善推陶冶之賜密濟其剛柔暴陽秋之和曲成於品彚致兹謭陋驟爾甄收謹當勉懋初心堅持一意晞浚明於夙夜慕蝎節於風霜上酬乾施次答鈞造為王郎中謝晏相公啓某蟠木之姿飛蓬所歎早緣世舊獲見師門叔譽深仁矜女侯而撫子孔融幼齒預元禮之通家祇服誨言激揚懦志希先業而自勵逮壯嵗而逾勤簣土終虧敢期於與進東隅既失奚望於收功荷中庸大雅之風極泛愛矜賢之量樂其樹立振以聲容使得預齒儒紳盱衡朝列竊自惟濩落之品無以謝特達之知然而小夫竿牘之間稗官道塗之說竊常從事時以白心筆墨所成狂斐盈帙蓋牛角陋曲或可感賢侯龜手賤工猶足于霸主竊自忘於器窳思有效于已長妄綴蕪音冀塵當軸過雷門以布鼓眩魚目於驪珠愧心靦顔欲進不敢輒因門下之容憑寫胸中之誠悚負己深啓居交戰伏蒙某官至誠教育廣德并容許其纍己之心錫以盈紙之誨春秋之法毫毛必收官師所材瞽矇不棄賜出望外光生目前夸於稠人甚乎至寶孺子可教昔蒙咳唾之音五十無聞今被衮褒之寵感愧之極肌骨為銘賀鄆州某安撫啓伏審光膺詔檢出總使符曍濟舊封實自魯邦之重圗書祕府益推龍馬之嚴爰屬僉求抑為德選恭以某官天材長懋國器宏深刃無肯綮之勞明照忽微之表輝映中外陟降便蕃風采聳于諫垣功利集于邦計老成之望眷與益隆亟躋廷閣之華暫委東藩之寄歷遐故事仍察輿詞報政之期殆弗淹於五月秉鈞之任行峻陟于三階某託乘傳車幸依侯屏聆休命之甫集拊懦衷而載歡為王郎中謝官啓祗荷寵靈不任榮懼竊以郎官之選上應列星炎漢以還皆用名士國朝憲章前代之舊允惟是職上臺之司崇其班資號為通貴非特入備九重之闥出宰百里之邦相其美遷豈其輕授伏念某機非頴悟幹力支離學無適道之方治鮮宜民之效濫預冥行之拔振茲濡滯之嫌惟考績三年大比羣吏方多匪稱之虞更被逾涯之寵靦然自幸不能為容此蓋伏遇某官秉持國鈞緝熙帝載具毫毛之善必使合于春秋無寸用之材皆不遺於匠石致茲非據得以叙遷敢不夙夜惟寅繩墨自檢既以逃曠官之責亦償其竭德之心瞻望軒墉不任區區之至回鄆州賈諫議啓叨被詔除出董漕事無精明之敏智加壅蔽而朴愚方將刺舉屬城宣布上指商功利於毫末貿有無之化居是猶求鉛刀一割之能致駑馬跬足之效其為弗稱蓋不待言伏惟某官德為吏師智出人表嘗辱顧於菲薄亦曾賜於吹噓以是無庸過當繁使瞻言德宇徒切銘衷方便道而之官阻踵門而上謁春和伊始福履惟休更冀保頤以符祝頌為王駕部汝州謝二府啓明詔屢下深惟共治之難蕞器無庸繆辱維翰之寄祗膺寵渥罙極怔營伏念某器宇至卑天機甚淺學雖勤而功半智不足而道悠徒以襲先世之遺榮階昌辰之膴仕奉令承教竭其毣毣之愚曠日逾時止於斷斷之技甘心自守絶望見知曩者方嶽之賢繼有公車之奏使得從尚方之給筆紬石室之成書譽出不虞聲弗中實鉛刀一割何足收功劒首吷然於焉濫吹內惟極陋曷意逢亨遇沐鴻私俾分侯社待詔云久可嗤東郭之貧懷章來歸良甚㑹稽之寵姑薄游以從告驚傳舍之易人幾成朴被之羞竊有遺簪之難尚䝉記録不汝遐遺舊物復還戍期加近失馬為福益欽北叟之風躍冶效祥私有鏌邪之願顧茲幸㑹誠賴攀援伏遇某官掌握國鈞陶冶士類矜一夫之弗獲使寸善而必收葑菲不遺菅蒯代匱致茲懦品驟玷寵光夫長人之官專城為重提封至廣生齒實繁自非循良鮮不曠乏田室荒露由勸農之靡親刑政放紛繄奉詔之或闕敢不冰蘖勵操夙夜自公庶茲毫髮之能仰答邱山之賜為司馬中丞謝參知事與二府啓丹誠自竭鴻造靡還遂玷豐恩濫塵近輔竊以廟略所任國威至嚴非智敏不足以預機謀非質厚不足以參聽斷何其虛授並集譾材默究所緣實繄幸㑹伏遇某官弼諧熙載贊襄逺猷喜密借於餘光仍垂譽於所試致茲忝冒敻越等夷佩服之深敷宣罔既為韓相回前兩府啓叨膺詔䇿足踐鼎司智不逮於亮工材靡周於經國夫何僉俞所及光寵驟加密計無庸抑其有自伏遇某官夙敦風義嘗借提評致寸進之弗遺蒙上仁之求舊方深懷德遽沐寄聲研味絢辭祗增愧服為韓端明知河陽謝二府啓短材屢試常無補於本朝多病亟衰尚見容於便郡內惟僥幸實用㥏羞竊以陪京近區孟津重鎮溫麥之富著在信書河魴之珍流於詩詠且民朴訟簡雖卧治而易為蓋地近望優非均逸者莫處豈茲無似可玷分符伏遇某官持平國鈞樂育士類曲借噓枯之論益敦求舊之仁以是孱姿得蒙寵寄方且布宣明詔惠養寡民內推悃愊之心庶竊循良之效阻遙賓館祗畏簡書馳戀之誠敷宣罔既彭城集卷二十八
