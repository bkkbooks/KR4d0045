body:
  text: 彭城集巻十一宋劉攽撰五言律詩遠信清秋萬里夢久客一封書長日看鴻鴈呼兒問鯉魚涼風郢路遠落葉洞庭初無限歸鳧翼南飛最跂予金沙花苒弱金沙樹花竒名字珍移從今日晩恨失去年春嫩綠藤垂架深紅棘刺人東風㑹入手照眼萬枝新贈鄰翁與彼茅茨接看渠卜築初丈人真耄矣孺子復何如翁且勤杯酒兒敎讀道書衡門來往近時為過吾廬初晴贈某翁雲隨夜色改日與曙光升已變前除雪猶餘北户冰鴻飛知適意鶴語若矜能天事寛羇旅幽人亦有朋晨起斷角續鳴鐘惜時春已空曉星猶伴月早雨不禁風眠食須頤老衣冠強自公庭隂全綠色無復見殘紅挽胡元夫母夀安縣太君二首應嫗金琛社桓釐邑致膰母儀真盛徳祿養現興門尚想君羮遺那悲口澤存蒼山松梓暮弔鶴去翩翻清徳畏人知傳家賴母慈何時丹桂擢相戒白華詩戲綵歡無極藏舟事密移千鍾已不暨後日可勝悲孟冬十月江南暑居人尚葛衣秋花看不絶沙鳥聽忘歸氣鬱愁成瘴霜輕嘆失威異方覉旅思歲事毎多違午睡浮雲蔽白日風雨近秋天車馬欲安適尸庭方閴然世塗髙枕外身事曲肱前似覺松生腹迢遙不記年古槐二首地有藏丹井人傳不死鄉南柯經腊李黑葉勝枯楊甲錯龍鱗斷花明鼠耳黄離宫縁望幸仙檜儼相望仙人鍊形骨枯槁不知年秀色倐還觀陽和仍宛然今古山川異乾坤雨露偏東陽無歇息生意㑹綿綿復和前韻二首遺履事悠遠白雲飛帝鄉潛真社寄櫟觀化肘生楊秀葉髪垂綠雜英牙變黄犧尊與溝斷俗骨爾何望父老見枯朽皆從童稚年孫枝復秀色仙事故依然巢鶴千齡異源泉一溉偏頗笑海棕陋崎嶇留在緜秋暑呈馮守秋律何時效炎雲莫肯隂烈風長鼓鞴去水亦流金藿食無求飽單絺不自任開懐幸寛政事省得清心宿荆門山行厭曲折小邑正讙譁流水纔一帶居人聚兩涯池偏饒草木山晩聚雲霞郢路定未遠夢魂還到家西湖水決平原出大水蟻壤潰長汀舟檝疑藏壑波濤駭建瓴蛟龍隨過雨魚鼈問滄溟聞道蓬萊水桑田亦屢經素屏陋室避塵雜深居惟此屏虚空自生白樸素擬忘形畫手山林迹先生几杖銘長來師絶學未肯事丹青燒殘樹異時龍起蟄一夕鳥焚巢摧落殘孤幹荒涼委近郊莓苔深蟻穴風雨詫神交尚想知音遇空心或遠庖避風南風多疊浪逆水暫回船畫鷁秋相對沙鷗靜獨眠微明見雲樹孤絶問人煙吾道常如此聽歌枉渚邅同原甫詠秘閣詔藏古器圖昔占金寶氣天瑞告成功繪事今時絶書文自古同剖鈎記巫錦按刻異桓公塵世無由覩崑山策府中王廣淵郎中挽詩家本秦川貴舊傳淮水占省郎時望在公族主恩兼轉燭風何急棲塵草正纖襄陽今罷市涕淚萬人霑劉彞學士挽詩傳聞四君子同是五經師獨以功名誤空思俎豆為不成宣室召長負鴈門期賴有銘泉室千秋無愧詞重過觀音精舍舊讀書房往作關東客來携一束書旅人觀所主野性樂𤣥虚過事都如夢精廬宛若初空憐兩蓬鬢蕭颯十年餘過雍熙院興師房習靜未離解悟空猶著禪齋居性所近古寺境蕭然缾水寒生凍爐香暝裊煙老僧眉雪白晏坐已忘年夜雨天暝龍蛇化風高鳥獸呼塵囂一洒盡暑病暫時蘇電火將焚野雷車若隘塗坐疑陵谷變明發蹈江湖江上夜雨江黑暮潮生雲深驟雨傾風波兩舟語燈火一川明短夜苦難曙覉懐方未平空憐夢中路依約盡歸程慶壽挽詩二首史占書五鹿世徳活千人孝養東朝盛徽音赤管新濯龍虚望幸繭館不知春厯數姜任事寧如復辟辰鹵簿嚴仙仗笳簫去掖門晝閒長樂衛春寂灞陵園壹徳詒謀地羣生顧復恩神遊餘仿像日入際崑崙營冬二首羇旅殊多事崩騰欲老身連年俱異邑幾地愧鄰人板屋秦詩舊衡門泌水新何時仲長子卜築離風塵薙草元畱徑開窗祗近簷成冬須少有為客未嘗淹朋舊看都絶詩書賸欲嫌自知踈懶劇決意老幽潛思歸扁舟到北郭屣履向東門不改蓬蒿陋猶憐松菊存因秋動歸興值物愴離魂早晚城頭月呼兒坐小軒楊花不分春色晚楊花意氣驕吹嘘輕一羽容易㸃層霄細細穿簷隙姍姍學舞腰暫來幽僻地還復去人遙移居觀音寺棲息避城市塵埃將凂人虚空見佛性簡傲得吾真霜過草木改齋餘鳥雀馴席門常晝閉誰與駐車輪題陜西圖三首干戈今日事關塞此圖看白日長安近蒼山壠坂寒由來名百二自古有艱難指以安西道凝情意據鞍萬里靈州地他年漢朔方山河從割棄關輔急隄防轉益豺狼窟㻣嗟禮義鄉拔胡須壯士看晝意蒼茫河源來積石天馬涉流沙耳目成千古丹青在一涯荒涼都護府斷絕使臣槎安得山河將收功似漢家五月二首五月黄梅熟江邊晝雨初鏽痕侵匣劒潤氣蠧囊書亂恐翻銀漢喧愁洩尾閭時時雙水鳥往往上吾廬榻移隨樹影杯側見山岑白鳥渴求水𤣥蟬清噪林道書無近語天籟有遺音向北新開逕行苔過竹隂江上雨中江雲似無信山雨易翻盆鵬起天形黑龍驤水面渾大舟纔弱纜孤樹小前村濯熱吾知慰風波勿重論和王待制湘東王故苑故園悲帝子髙興復清秋密竹娟娟靜通波細細流干戈餘魯殿池沼似滄洲魚鳥應無恨山公肯醉遊冬暖南瘴無消息𤣥冥為失威水深鴻鴈宿霜薄鷓鴣飛處處憐喬木人人慣祫衣生涯卑濕地日飲自知機忝官忝官東北藩老拙復何言曹事輒付外客車稀到門臨池看魚樂倚杖聽禽喧莫恨三年最從今長子孫雨中沈隂連日雨六月似髙秋凉冷宵眠稳泥塗晝事休塵昏舊銅鏡朽蠧敝貂裘賴有盈樽酒能為懶病謀雨後積雨黄梅後多風夕景天少隂囘玉燭秋氣變薫弦孤鳥爰居外殘雲螮蝀邊羽陵書蠧盡數怪絶韋編欲雨久晴驚礎潤信宿候風囘仰月光如瓦燒雲色變灰讙鼃疑自得青鷁競飛來正想江南地清涼接過梅北牕聞雨庭梧不隱響秋入意蕭條過雨喧天籟髙風㑹海潮寒侵知洒近氣豁想雲遙歲晩看搖落無衣恥敝貂雨繁隂晝漠漠日雨暝紛紛鬭蟻仍移市乖龍亦過雲泥塗休不出鐘鼓遣相聞願得辭昏墊長風破宿氛酴醿軒雨中二首小雨疎隂響髙風綠幕斜冷吹能却暑細滴不妨花輕濕苔痕滑連隂草色加路長車馬少暫喜息飛沙病身常自力杖屨及比鄰繼日傷霖雨深居若避人隂苔無數綠秋草一番新入夜添涼冷書燈頓可親巢湖阻風二首重雲迷日月異縣失西東苦畏連天水何須竟夕風微明分白鳥搖落望青楓久客嗟留滯吾生事事同四月風猶北湖邊氣似秋天時如反置吾道信淹留望遠還吹帽憎寒更擁裘無由開白日晦瞑使人愁安河阻風隨湖寄漁浦村戍起孤烟水色連天黒沙禽亦晝眠柘田春種麥客渡晩爭船盡日無他事尋村聽野泉凝翠堂聳聳排修竹蕭蕭拂蠧簷秋聲送凉雨晚影碎寒蟾居處貧非病生涯智養恬著書聊自守非欲效幽潛留張十二宿靜外塵土息故人從我遊襟懐已瀟洒杯酒聊勸酬大笑呼五白浩歌遣四愁勞生如此少歎息為君留王太傅河北閲馬豐草河壖地平沙冀北區離宫連苜蓿舊苑半騊駼夫子深詩者無邪頒使乎寧令漢馬少不議擊匈奴庶幾堂碧草衡門裏涼天過雨初驚秋數甲子隱几讀殘書近郭多鳴鶴坳堂可釣魚異方無到客非是故人疎歲除立春乾祜縣獻梅除日應無歲新春不待年風光生意裏梅信客情邊冷艶來冰谷疎風暎雪天不逢江上使相與競芳姸挽胡太傅二首州來推博物伯始貴中庸論道宜黄髮銘功遍景鐘龍門餘舊客馬鬛悵新封後世瞻遺徳南山萬丈峯路車申伯去白馬庾公歸殄瘁人相弔哀歌露易晞石麟森立木密印鏁泉扉絮酒慙徐孺回看旅鴈飛挽西京左藏使石太保二首勇擲諸生筆終乘使者車家聲唯孝謹將略亦詩書鶴髪遺榮始瀧岡卜兆初謬承公叔薦曽未撇衣裾青綬股肱守毳衣方伯監威名真落落碩望自巖巖道遠年如待才長志尚緘家多二千石㑹見集門凡挽宋司空丞相二首斗樞齊七政鼎鉉象三公文武兼人際安危注意同規隨餘故事止足暢高風他日雲臺畫依然想竇融宻印加泉室哀簫去國門降龍嚴冕服畫鹿並車轓山甫中興業臧孫既殁言定應天壤内長與日星存月夜吹簫長路見秋月空江連夜明吹簫不能寐舉酒遞相傾賈客或垂淚羇人多失聲湘絃苦沉絶曲盡一含情秦國公主挽詩渭陽追舅氏婺女嫁天孫平日諸姑問當時赤綬尊烟波空北渚荻竹自長門後夜秦樓月哀簫閟九原宿峴山寺二首睠予倦羇旅坎壈林壑間落日投古寺秋蟲吟亂山月明露已白風定雲方還王事殊未暇悵兹清夜閒蒼山若無路落日聽鳴鐘旁舍適眠虎古潭微見龍空窓向雲月高枕聽風松幽境昔未遘仙游如可逢觀虎翼士戍宜州虎賁王爪士銅柱國南門魑魅非人境蠻夷盡鳥言瘴烟旗纛黑霧雨劒鋩昏即路皆無色何時見北轅再見士卒戍桂陽驛書頻挿羽漢士逺征蠻四月天將暑三苗舊阻艱悲笳背城邑苦霧濕關山後夜東南望妖氛翼軫間悼楊公緼二首得君雖恨晚白髪幸前期分手遂陳迹晤言成獨悲隙駒得未久風燭不勝危詎有修文選髙天可易知寄書曽未報題墨宛如新長路歸丹旐孤兒泣晝輴江湖餘氣概星月聚精神冥漠九原上空將萬鬼鄰秋懐二首搖落看秋色淹留倦郢城登臨想自昔風圡最含情白露黄橙熟清風綠桂生異鄉隨衆醉須爾析朝酲蒹葭晚巳變天宇向來髙風露一瀟洒江湖久欎陶鱸魚越人膾白露廣陵濤歸興憑三烏悲秋嘆二毛夕霧日落山氣改汀洲寒霧生深沈轉墟落迢遰失重城樹裏迷人語沙頭見火明商帆宿何處髣髴棹歌聲簽判承議携官酒并具殽炙晩飲檜下二首煩攜光祿酒愧舉使君觴伏盡轉秋熱月明纔夜涼暗蛩聲蕊蕊古檜影蒼蒼衰老淡薄味殽蔬猶徧嘗風月近秋好君來䝉十觴塵勞我休息炎暑此清涼玉露衣襟爽金波鬢髮蒼知心一為足何必似原嘗送儀父清溪縣丞雖方六七十皆有萬千家贊府亦製錦到宫殊及𤓰山苖甘筍蕨溪飰飽魚蝦為爾傳清白遺黎每歎嗟次韻和周承議登仙源宫樓屏星駐真境喬木盡蕭森野曠日偏永山寒雲更深九皇容盡信萬事盛來今囘首靈光殿飛鴉起暮林送從兄思甫尉富陽南州吏數千尉事獨神仙平日稀桴鼓端居數醉眠潮聲雷出海山色劍横天㑹盡登臨興淹留昔計年送劉誼先輩尉涇縣原註先輩補監生予定為第三人詔除芸閣吏名屬太常書髙第余無愧同宗誰不如鄉情歡賜服壽酒慶安輿正復秋風起滄江厭膾魚周節推移曹州原註此君凡換五幕府珠履幕中客行行亦倦游勞歌一長鋏厯聘五諸侯捧檄為親喜問程輕族愁遙憐在陳士無友重悲秋送張益宣州法曹謝守宣城句偏矜呂法曹郡齋應似舊廷掾不徒勞東北歸流駛空虚去棹髙木𤓰因贈客并擇千毫韓康公挽詞三首初還丞相印併授上公封門戟交行馬衣章雜繡龍䇿書休命畢拜老未臨雍遺愛無時息淒凉在輟舂八龍歸濟美四輔號無官魯衛聯三夀韋平屬二難大勲流竹帛盛事絶衣冠今日哀榮禮賢豪共永歎乘輿錫臨弔朝士盛班辭笳鼓千人仗輼輬數仞旗壊梁蕭畫在藏壑説舟移無復龍淵劔空傳禹甸詩傷王都官正鄉巍然積徳門識此貴公孫譬彼芝蘭秀行看鴻鵠軒誰令武子死無復孟嘗言寂寞繐帷暝流塵空酒樽傷胥平叔都官欲為大招賦期子入修門昔爾南宗學慙予莊叟言清樽湛凝綠丹旐杳飛翻晨夕髙堂念此情難重論傷楊元明都官原註知國子書學判吏部南曹晏相外甥傳家推徳祖似舅識劉牢刻意鴻都學精心常侍曹萬金酬六體一字秃千豪詎有修文事蒼蒼空自髙歸鴈楚水幾時綠歸鴻前後聞江湖久漂泊南北忍辛勤意氣融融日聲音漠漠雲青冥易凌厲況復未離羣雪中聞鴈四海困横絶經年長往來雪霜空盡力道路有餘哀水宿稻粱薄雲深羅網猜北方有殺氣緩緩及春迴新雁南飛洞庭鴈稍復過衡陽宇宙同為客春秋各異方邊塵猶處處殺氣苦蒼蒼恐有傷弓翮哀鳴少稻粱觀南戍士膂力三軍士由來百戰經舞旗翻鳥隼疊鼓㑹風霆殺氣過銅柱驩聲塞洞庭九州防盜賊儒服媿青萍彭城集巻十一
