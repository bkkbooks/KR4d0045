body:
  text: 彭城集卷三十宋劉攽撰啓回致政王侍郎啓伏審需章得謝溫詔榮歸擢文昌之近聨二春官之峻秩允兹寵數繄屬老成恭以某官政為吏師道兼士則慎白圭而無玷逮黃髮而好修雍容龍馬之嚴左右虎符之寄遂從所好髙蹈乎止足之風洪惟茂恩閔勞以官職之事安車之寵賜几實榮身沐謙光首垂珍翰銘佩于愫敷述奚周與運使某郎中啓叨被詔函濫分符竹連城十數書社萬餘無尤異過人之稱有蒙蔽寡聞之纍將何以布宣明詔周察輿情俯章綬而若驚按吏民而自愧伏惟某官清規格物盛德鎮浮利術析於秋毫精鑒甚乎止水洪河之潤福并逮於京師慶雲之輝蔭不遺於叢棘顧惟孱弱方賴芘庥謹當悉心刑政之間竭力農桑之本庶立涓微之效不貽刺舉之憂縻此簡書逋遙軒戺伏冀精調寢餗以副禱詞又假守左符浸更流籥無昔人報政之敏嘗以自慙瞻使車攬轡之嚴每懷多畏然而卿雲之廕有素大海之蕩攸歸知其不遺賴以蒙免伏惟宣布多豫葆光益休恭以某官令望映時純文貫道天材超乎不器心計逮於無垠利術析毫泉貨流地聽聲察實九牧無以居其先宣化承流千里莫不被其澤即疇異最行奉豐恩敢冀順此長贏益綏祉福謝中書舍人啓選掄所及無間孤生綸綍惟行抑為重任冒寵已甚撫躬若驚竊以發號施令之謂王猷考禮正刑之謂典訓鼓舞四方之悟動裁成百度之經綸如春霆之有震驚喻大辰之為喉舌上德司契中心無為必付代言之人以著揚廷之事有子産之智則潤色無疑兼相如之材而視草惟允其體甚大非賢莫居伏念某稟生𡨕頑為器甈窳寡聞無約以自守曲學多辨而逾迷經為泛通不如子雲之浹洽文實骫骳同在方朔之抵娸耆指何言心術彌落悵燭武之內省少不如人愧袁修之自強老而好學方其多士之鱗集敢謂寸長之彚征擢躋內史之聨驟陟右垣之奧漸階籲俊效智贊書厯數英遊中有近屬家學見付愧弗嗣於前兄宅相猶存敢自矜於似舅揆量幸會實繫扳援恭以某官偉度兼容英心樂育善不啻於已出士由是而朋來巍乎熙載之功赫矣備官之節眷兹斷技振以餘光夫屈首受書信於朋友者自喜以文飾吏用於州黨者已希而此逢亨奚以圖報臨深履薄誓堅夙夜之心潔大度長頗論繩墨之外仰謝乾陽之造次酬宰匠之私原注一本云噓枯發生嘗曲加於餘論陳力就列不見棄於昌時造次頺齡竟蒙殊遇猶當潔修一志黽勉百為有益毫分頗論繩墨之外靜思深薄誓堅夙夜之心上酬天造之恩次答已知之遇賀某相公冬啓伏以伯趙司辰天元正統迎律風于廣漠肇卦氣于崑崙恭惟某官茂德格天純仁濟物惇大謨明之業慎徽講畫之規一日萬幾贊贊而惟允六府三事巍巍乎可歌履此今辰倍迎丕祉某濫叨符竹側企台躔頌山甫之清風既深於心禱瞻平津之材館方阻於賓榮又伏以星象回天嵗朝更厯和陽逮通而發滯青煒登平而應期恭惟某官配德元精合符聖旦規模著于廊廟明聲照於海隅傅説成功非阿衡之專美周公信處將衮服以來歸端序惟新泰來協吉迎長之慶受祿罙昌某縻此小邦阻前材館荷大鈞之賜既被於陶埏惟鳧藻之誠則深于豫附賀宋相公冬啓伏以清臺測景候南發于建星神瞽考聲協黃宫于元律乾陽伊始君子其亨恭惟某官懿德秉夷潛神格物慎徽訓民之典寅亮代天之工澤惠無疆功侔不宰蓋靖恭守位猶足以格神豈弟不回亦稱乎求福況師尹之寄勳業共兹方順履長之休罙集降康之慶某久依鈞鑄適縻小邦趨門棨而莫諧仰符階而增禱賀賈侍中冬啓伏以氣萌黃宫律正天統景迎長以建極陽來復而遘亨恭惟某官忠亮秉彛肅恭宣哲惟幾所以成務謨明是以弼諧藝之風聲世幾久大之業載其清靜興講畫一之歌履此令辰倍迎丕祉阻前修慶罙劇馳誠慰李端明侍郎啓伏念數舍非遙一官攸繫國風庶見棘欒是先繩墨所羈倥偬無暇瞻德閎而載聳搖心旆而實勞雨露益濡松檟增逺孝思不匱福履無他昔曾參過哀子思謂其難繼辨人孺泣尼父稱其可傳必惟扶世而道民有以順變而就禮仰蘄寬抑庸副禱詞回省元劉槩啓伏審光被恩詔顯登上地伏惟慶慰恭以先輩天機粹茂心術淵通審問慎思獨潛精於道奧席珍待聘屬嘉會於昌辰夀王則海內少雙陳遵為後進之冠率馬以驥雖蹶塊其何傷濟河焚舟顧收功之未晚利器動而不括先聲勇以無前多士並驅咸嚮風而斂衽有司妙選若刈楚而合符中以前期復兹舊物主上聆子虛之説喜於同時擢平津之文亟躋異等修塗自此廣譽藹然某早以宗盟復聨世契情同叔譽每流連於女侯事類陶丘喜奮翔於正禮敢期厚眷垂貺長箋研味絢辭想見丰表佩銘之至敷述奚周回劉齋郎啓原注恕之子逺承芳訊知拜新恩追惟昔遊恍若宵夢嘉素風之克紹喜少成之自然周南滯留尤積子長之歎女侯盛德徒深叔向之悲未卜披瞻但多馳仰炎暘在序福履增和益務保調佇觀翔奮回謝曹相公啓恭審光被䇿書進升鼎輔伏惟慶慰恭以某官英猷濟美偉量映時知略信乎士心倜儻以為已任厯試繁會擢置深嚴肺腑懿親穰侯有旦暮偃伏之愛股肱重寄申伯成方國蕃宣之勞上惟敦崇異姓之賢褒優元舅之重國典該備廷論僉諧亟疏茂恩粵躋上衮俯聆休命方激鄙悰何謙光之過中示服寵之增戒曲垂珍牘冞挹髙風銘佩之深敷宣曷究回宗相公啓局迹小邦棲蔭上府德化所及實被賜於下流咳唾之音屢承教於諄誨近者仍蒙鈞念寵賚醇醪東閣優賢雅資於燕喜西曹容士兼忍於鴻茵自惟懸瓠之姿非復曵裾之列敢期不遺疏外過沐涵濡恩顧所深麯蘖加厚感銘之素啓處不忘印韍攸縻門闌伊阻仰祈上為宗祏精調寢興回新館職某啓伏審光被綸言進躋書府伏惟慶慰恭以某官稟秀翹穎立誠粹和包衆美以禔身緯醇文而輔德學積微以至著身藏器而待時蓋人不易知或大材莫之汲引而士亦難進雖聖朝有所滯淹及其詔書籲俊而思皇宰匠精心於推轂拔十一於千萬謂寡二而無雙於是騰聲帝臺取雋衡石沛乎巨魚之縱壑肅然振鷺之充庭萬乘為之虛懷多士是焉屬目聚觀李雍之顔采紙貴左思之文華奮飛叵量修途自此蓬山道室未足喻其英遊金門玉堂佇前觀於逸步何謙光之過厚亦氣類之不忘垂示長箋鋪宣麗藻願言佩服曷罄敷陳回章某啓伏審論士賓興登名舉首恭惟慶慰解元著作學規聖奧文貫道真蓋好古而敏求則於政乎何有士林華甚官閥蕩然興廉公車著書東觀昔馬周既貴恨不接於俊科陸遜厄封尚復從於州舉蓋鄉書之重儒者為榮髙材軼足絶景橫騖無出其右益知田叔之賢喜於同時方就上林之賦猥勤車騎垂顧衡茅仍墜珍函獲窺絢藻既瞻風表我心則降佩服徽音永以為好回鄭先輩啓伏審光膺遴柬榮擢俊科伏惟慶慰恭以先輩懿實清修瞻辭敏給升堂而覩奧拔類而軼羣本行著於州閭英聲騰於庠序蓋登髙能賦縻爵之端敷納以言取士之柄詔書所以興賢而論秀主上於是明試而程衡果惟全材實當茂選方賀得人之盛未遑削楮之儀敢謂謙光曲垂華簡均與祭之深慶敦泛愛之純誠感佩之深敷宣曷既回謝諸先輩啓伏審光被詔俞擢升上第伏惟慶慰竊以服仁義者貴際先名實者為人故懷寶迷邦皆曰嵗不我與贏糧躍馬懼乎時弗再來矧惟右文遘辰好德錫福砥節厲行孰不畢義而願知並驅爭先亦獨得道者多助乃其羣百郡而秀出冠千英而奮飛側跋高風實曰盛德恭以先輩氣函經緯學際淵源本行配乎鄉評令望藹於士論衣錦尚褧蓋君子暗然而愈章超駕絶塵則衆人瞪乎其若後且中多可以與祭而能賦謂之德音有司由是以名聞明主固許其試可得人之慶在廷所同敢謂虛懷若沖謙光自牧迂軒騎而左顧捐箋牘而見貽佩服緒言啓居無斁回趙通直啓伏審程文華省更秩外朝伏惟慶慰恭以某官器宇宏深機符明粹力學為已立操不羣信厚之風固有光於麟趾詩禮之訓蓋兼得於鳯毛暨於發䇿決科席珍待問聲舂容而愈逺刃綮肯之未嘗言必中倫動而有獲遂分休渥粵置周行自昔宗英率居郎選子政參石渠之論騊駼與東觀之書以多士之歎譽加本朝之惇敘奮飛自此修塗叵量想見英徽側深聳慕敢期厚顧垂貺華箋雖傾蓋之未遑而雜佩之為好感銘之素敷述奚周回頴王啓伏審光膺命書進啓成國伏惟慶慰恭以某官純粹天挺溫文日躋大雅不羣必造次於懦術為善最樂實光輝於本朝由是剖符大邦書社東夏上惟立愛始於自近進律所以疇庸咨詢在廷若稽前訓備物典䇿益隆夾輔之尊錫山土田更重陪敦之數誕告伊始輿情翕然豈期謙光若沖遜美自牧流示絢藻曲形至言申畢于三銘表無斁回東陽郡王啓伏審受䇿大廷分茅南服兼鼎司於上袞總兵要於中權寵數優隆輿情悅洽恭惟某官經德淵懿秉心粹和要道適乎時中力學見乎日益是實麟趾之美所謂磐石之宗國朝隆親親之恩益胙土以蕃王室惟善善之意資論道以持國鈞大公不私敻古無愧方修鉛槧馳上慶詞遽沐函封曲垂芳翰寵至而戒仰欽能降之風卑不可踰罙挹謙光之素佩銘之至啓處弗忘與宋相公啓向審觀文相公改鎮許田俶裝周道路車乘馬實元侯之舊儀袞衣繡裳幸屬城之覯止輒復掃除郊次瞻企鸞音猶謝國之喜申侯甚魯人之望髙子遽承改轅便道抗旌屆塗雖階符之暉不遙於霄漢霖雨之賜猶遺於陋邦怊悵所深啓處罔措伏惟跋履永久綏固和倪逼章綬之攸拘趨門墉而弗遂跋數兹舍之近邈有三嵗之恩惟祈上為宗祧精調寢餗與孫觀文啓局守陋邦坐賖賔館誰謂河廣曽微杭葦之艱畏此簡書居積道隮之歎恭惟節宣時若啓處用康伏以某官德崇國華智兼人傑幾深開物以成務倜儻扶義而濟功內參帷幄之謀外膺方靣之寄夫倚伏之效巧厯猶知其必然汚隆之期賢者蓋有以無悶是故稱子文之美為其去令尹而弗憂言仲華之賢亦曰褫龍章而無愠矧以全德邁衆逹生循天宜其捐芥蒂而何疑寓逍遙而自得推數循理已符傾否之占求舊記功方盡樂終之義勉祈善育以副禱詞與富蔡州啓拜逺階符驟更嵗序奔走道路壅蔽朴愚雖竿牘之儀闕於自逹然門闌之願未之敢忘濫承乏於小邦幸偃風於上府涵泳洪河之潤瞻仰巖石之崇縻此郡符阻前賔席伏惟偃息惟屏翕受龎禧恭以某官體經緯之純文極皇王之本務輸忠廟社協德股肱蓋堯以四嶽統諸侯周以二伯倡九牧今之開府而作鎮亦曰陪京而右王然而搢紳之心則在霖雨之望佇正台袞以副輿情回呂內翰啓伏審膺明詔之敷求首禁林之遴束持橐簪筆極侍從之深嚴大䇿髙文兼號令之溫雅德選攸繫僉謀允諧恭惟某官操履端沖文華珍粹正容足以悟物令福由乎殿邦世稱髙陽實濟其美士推李固是復為公簡在淵衷亟疏寵秩豈特追長卿之視草偕楊秉之授經方將訏謨逺猷攄發素藴必復其始永觀厥成自聆休命之行甫慶得賢之盛敢期厚顧垂賜華箋佩服之誠敷述奚究賀葉內翰啓伏承光膺朝綍入踐玉堂蓋侍從之上遊實文章之劇選伏以某官積學窺奧沈機照微經緯之氣甚高謀謨之術維懿久宜振纓內相矯翼鑾坡以富國之偉材奪司會府因飛蠅之餘謗暫屈英藩朝廷思賢士類引領果亟下於明詔方入見於北扉某辱知頗深聞命增慶念守挈瓶之智莫伸進靣之儀延睇軒旌祇勞肺腑伏冀上為宗祏精調寢興謝樞密某諌議啓向膺中詔出預專城剖符得人深愧逾涯之寵負乘致寇匪惟不稱之羞由蒙化於大鈞幸不遺於蟠木夫賜而不德此誠真宰之風貪於自私兹乃小人之智輒捐竿牘母溷髙明馳光寖移恩閎坐阻睎符階而載聳搖心斾而靡寧伏惟贊襄萬微翕受多福恭惟某官學躋聖奧智為帝謨躬人傑之茂姿韞王佐之妙略運籌制勝固千里而不達舞干敷文亦七旬而來格行正鳯池之拜以副海隅之心回孔朝議啓叨膺中詔濫預專城奉使典州既繆澄清之寄剖符蒞郡未知豈弟之方矧東魯之奧區餘姬周之遺化禮義好學士風甚修桑麻養生民業既富將以不擾庶乎有成言詢鄉校之賢實得聖師之裔峻秩惟月髙義薄天夙叨傾蓋之遊兹有垂仁之便遽承珍翰垂喻深衷佩服之誠敷陳罔逮回參政某諌議啓伏審光被制函進參機政賢才之舉不待次而後宣聖賢之符必非常而胥遇夢卜以之先協占象動而吉期上心定于勿疑僉論由是允若伏惟某官全德具美逢辰致君雖巽避而弗居如譽試之已效側聆成命方慶逺圖過墜珍題曲形謙德回留守某諌議啓兹者被命來東承乏居守會隼旟之稅駕奉麟玉以交符京兆五日之期此仍半古詩人三秋之思顧已積年既挹髙風豈勝厚幸爰及簡書之畏敢踰信次之間遽逺英標益榮吝腑力息床而就舍謀裁楮而置郵敢謂謙光猥貽華翰佩銘于素啓處增榮伏惟某官學茂幾先智深物表論議出于亮直文彩著于弸彪式嚴公輔之求僉許爭臣之選即期登拜以副輿詞更冀寅為宗祧精調寢餗彭城集卷三十
