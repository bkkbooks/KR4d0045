body:
  text: 彭城集巻三十五宋劉攽撰行狀故朝㪚大夫給事中集賢院學士權判南京留司御史臺劉公行狀曾祖贈大理評事祖皇任尚書工部員外郎判三司都磨勘司累贈户部尚書考皇任益州路轉運使尚書主客郎中累贈光禄大夫工部尚書公字某尚書中子天性明徹淵粹自為童子有老成人量初學進士詞賦已為人傳誦稱道之至年十五乃更習為古文讀書心悟理解志氣開發日增月益河江委注不可丈尺斗斛校也其十七歲所著撰至今存者尚多自两漢之後豪傑之士所為文章雖皆以理為主偏局所見致逺則不通又其論五經皆欲明王道而惑於曲説駮雜瞀亂不能自解聖人之道不明及公為之正徳性别仁智舉中庸明天命條逹理遂交貫旁暢愈深愈逺未嘗一躓焉嘗論曰荀子不知性揚子不知命韓子不知道荀子言人性惡則善無所起揚子畏死而投閣韓子汲汲求用於時以不得出王公大人之門為已憂是三子其盛者也而其蔽至是況其下者乎至説春秋其所發明尤多論宋襄公事或以為文王之戰不過或以譏不能鼓儳殺敵公以為文王之事亦當内治其國家外信於諸侯何嘗不治不信而強争之既争而輕棄已民其猶足稱之仁且智乎凡公之言大約反其本正已而物正者也書公子季友卒三傳皆以為賢公以謂季友之賢因其有事而著之今卒而書季者蓋自是世季氏也公之論春秋如此自前世鉅儒宿學皆所不至概舉二者可以類知焉為三傳權衡解駮三家媺惡毫髪無得以形遁者慶厯初有司更正貢士令士不從學官者州郡勿舉舅氏王源叔以書招公來太學公答不可曰焉有伯夷孟軻段干木之儔而自致愽士弟子乎其後此令亦廢閣不用公舉進士慶厯六年三月御試選為第一會内兄翰林學士承㫖王公堯臣時為編排官以嫌自列編排者用考試官所定等第受成事而甲乙之耳誠無預於與奪可無嫌也王公固辭之上不得已以為第二拜大理評事通判蔡州事吳正肅公育舊聞公之賢傾遲之及罷政事守蔡得公歡甚事無大小皆聽公州以清静與公日賦詩飲酒為樂蔡人傳以為盛事蔡州十縣五居高仰地轉運使符郡變民諸榖悉以粳糯充賦皆市於旁縣以輸官民益困急㑹詔書問可以寛民力者公上疏陳其弊因言方今用不足盡如古難宜敕轉運使必不得已折變母變其所無與不可得則民雖病不困事頗施行八年十一月丁先公憂去官皇祐三年二月服除還為大理評事召試學士院擢太子中允直集賢院是時方議定大樂天子使中貴人參其事公諫以謂王事莫重於樂今材學滿朝辯論有餘足以增朝廷之光而顧使若趙談者居間臣恐為袁盎笑也明年同判登聞鼓院改判吏部南曹南曹兼考功事於是夏丞相薨將葬故事考功當請謚太常集百官議之上以舊恩特賜竦諡曰文正不復關有司公上奏請收還詔書更屬有司得以公議之因陳竦備位將相無正直聲陛下不當侵臣等官而假人以寵書三上上嘉公守正為改諡曰文莊八月權判三司開拆司後徙他部亦未離南曹也儂智高亂嶺南樞密副使狄青宣撫四路而朝議不為置副或曰使中官副之公聞遽上奏曰狄青起於行伍而列樞近權兵而出宜得正固幹略之臣參共其事今不置副置副而用中人皆不可秦州與羌人爭古渭州上以問左右棄之存之孰利公時從三司奏事聞之上奏獨請棄之以謂假命新城足以蔽秦州長無羌人之虞雖傾國守之可也不然地形便利賊能乘之以擾邉圉雖傾國爭之可也今何所重輕而糜國財困民力捐士卒之命以貪咫尺之地而有棄明信規小利之名使其有以窺中國非計也時議者不同竟留之秦州坐是應接多事財用匱竭矣五年四月遷權三司度支判官始解南曹賜緋衣銀魚至和元年正月張貴妃薨追號温成皇后有獻議求為立忌日禮官請對不許公奏言太祖以來后廟四室猶不立忌奈何以温成私昵之愛而變古越禮恐祖宗神靈不樂於此上乃止八月同修起居注居一月召試超拜右正言知制誥賜紫金魚袋權同判吏部流内銓初陳丞相以公不附己論議不能右公唯天子察公忠直數得公奏議開納無疑故亟用公知制誥陳丞相以修注未一月為言上不聽曰此豈計官資日月邪公謝日上又靣諭曰外間事不便有所聞當一一語朕矣無㡬何朝廷從禮院有所詢問禮生擅發印狀以報禮官莫知知禮院事吳充謫罰禮生而坐以出官公奏以為朝廷久安吏習因循百司庶府苟且已甚稍激厲振職未知如何而使充以此得罪豈不傷事害政也請追止前命已而修起居注馮京復以言事奪職公因奏事上謂公曰吳充乃是振職馮京意亦無他中書惡其太直不與含容耳公奏言自古唯有人主不能容受直言或致竄謫臣下今則不然上意慈仁好諫而中書不務將順聖徳之美排逐言者乃是蔽君之明止君之善必且感動隂陽有風霧日食地震之異居五日地果震鎮戎軍而都下雪後累日昏霾太陽色黄濁畧皆如公言公义宻勸上収擥威權無使聰明蔽塞法令不行以消伏災變上深納之時親睦宅方築神御殿天寒休役公建言禮諸侯不得祖天子公廟不可設於私家所以明一統也今神御若於禮為可則不宜以人勞輟作若不中禮則遂止之何權罷也廟事遂寢宦官石全彬縁葬温成皇后賞勞除宫苑使領利州觀察使全彬不厭後三日後換正除利州觀察使公封還詞頭上言全彬閨闥之臣如此姑息有權勢重於全彬者何以待之事竟得止二年兩制諸公多求補郡者公上疏論邪臣正臣進退之分正臣常難進而易退邪臣常易進而難退願陛下參伍觀之呂溱蔡襄歐陽修賈黯韓絳皆有直質無流心論議不阿執政有益當世者誠不宜許其外補使四方有以窺朝廷啓姦幸之心上悟乃留歐陽修等不行八月假翰林學士右諫議大夫充北朝皇太后生辰國信使契丹遣其臣馬祐求迓行自幽州東北入古北口更長興白隰山路詰曲繚繞或折而西南行千餘里乃出山至柳河公問祐曰自松亭直北趨柳河徑易不數日至中京何不行此敵人本欲以山路迂回使中國信其阻逺常祕諱之不使漢使知及得公問驚謝曰實然然自通好以來置驛如此不敢改也祐復問順州山中有異獸如馬食虎豹人以為山神此何名也公曰以某所聞駮也其狀如白馬黒尾鋸牙音如鼓洀桓迎日而馳為誦山海經管子書曉之祐釋然相視喜曰真是也前此者漢使徃或以輕肆不為敵人所重又有畏懦拘守約束惴惴不敢蹉跌者獨公坦懐意氣自若敵人畏服加禮焉二年三月王文安公遷參知政事公自列親嫌求知揚州詔許之初狄青自南伐歸為樞密使京城小民聞青驟貴相與推説誦詠其材武青每出入輒聚觀之至壅路不得行上自正月不豫青益為都人所指目公憂之㑹將赴揚州辭行見上因言陛下愛青不如出之以全始終今外説紛紛雖不足信要當使無後憂寧負青無使負國家上頷之曰可語中書公過見三丞相謂曰向者天下有可大憂者又有可大疑者今上體復平大憂去矣而大疑者尚存具以青事告之丞相應對唯唯公既至官拜表又徧遺公卿書汲黯之忠不難於淮陽而眷眷于於李息朝廷皆知為青發也至八月京師大小青避水徙家相國寺坐殿上都下喧然執政聞之始懼以熟狀出青判陳州先是有彗星見青去之夕而彗沒自皇祐末有日食之變公嘗獻救日論三篇備言所以防姦禦變之術青見而惡之謂所親曰劉舍人以此洗滌青邪公之建言或以為過計及後乃大服云揚州雷塘即漢江都之雷陂也舊屬民自唐以來耕種其中往數十嵗官取蓄水以備漕運舊田主二十六家皆奪業失職官始議以他田償之竟無與也然塘亦破決不修漕運未嘗賴此發運使因以假揚州種稻而舊田主二百餘口皆饑寒縣官莫省及公至持太和年契書詣府自訟公即判還之發運使猶以漕運事動朝廷靳留之公用種稻事證明其無用朝廷乃聴公杜公丞相衍致仕居南都聞之喜曰真良太守矣九月恭謝天地改元嘉祐進公朝㪚大夫封宣縣開國男天長富人陳乚殺人捕得賕縣吏脫已而以誣王甲甲貧弱不能自明遂受誣囚至府公察之心知其冤而囚畏吏不敢言公以委户曹杜誘使精意鞫之誘不能有所反而獄益傅致證左牢不可破將論囚公親訊之囚得公語言知其能為已直也乃敢告冤果陳氏殺人遠近傳以為神明年四月遷起居舍人知鄆州兼京東西路安撫使公初治揚前守政苛吏民不安公以寛簡拊之而民大和及至鄆鄆比易守政事不治市邑攘奪公行不禁訟或累月不決公撥遣簿書決平獄訟不數日則已無事乃更約束明賞罰下吏奔走承命月餘境内正清盜賊屏息使客行夀張道中遺錢一囊人不敢取以告耆長長為守視頃之客還取得之又有暮遺物市中者旦徃取故在其所先是西路久旱麥不登鄆州尤多蝗蟲公入境而雨至州數日蝗自出境亡去嵗以有年居鄆五月召還朝糾察在京刑獄充宗正司修玉牒官四年正月同權知賢舉是嵗始更貢士令奏名者才二百人其罷黜者雖多莫有不服者至有為賦以頌得人上例賜近臣墨字公得稽古二字時論榮之楊佐判都水監請鑿京北孟陽河盛冬興役死者數百人又壊民廬舍發掘丘墓百五十餘所而河訖不成百姓遮宰相自訴執政乃收檢計工役官匠屬吏因呼冤不承獄久不決公奏理之曰佐始相度此河使生者勞敝死者暴露百姓怨痛謗議沸騰皆佐為之今置佐不問而專罪餘人不合人情求以佐為首㑹有詔疏獄一槩解縱不問是時士大夫稍矜虚名每得官輒讓衆亦予其恬退之稱讓不失始利而得名益高讓端無窮或四五讓至七八讓天子嘗優容之下至布衣福州陳烈等初除吏亦讓賜之粟帛亦讓公以為此皆挾偽求名要上迷衆其漸不可長乃建言諸讓官或一讓或再讓或不得讓宜一以故事舊典為凖以防未亂是嵗天子將親大祫於太廟丞相欲加上尊號公以禮部兼領名表丞相請譔表辭公止之曰陛下自寶元以來不受徽號至今且二十年天下之人咸知天子持盈好讓今復加數字既不足盡聖徳而前美並棄誠亦可惜願加深思富丞相不怡曰適已奏聞乃是上意欲爾不可止也公曰諾退謂子弟曰吾備位近臣當獻可替否寜得罪權門豈可使主上受虛名而棄實美耶遂上疏曰陛下尊號既已云體天法道欽文聰武聖神孝徳盡善極美矣復加大仁不足増光而曰至治有若自矜今百姓多困倉廩不實風俗未清賢不肖混淆獄訟繁多盜賊羣輩水旱繼有四夷雖粗定然本以重賂厚利羈糜之非畏威慕義也未可謂至治然則讓而不居於聖徳彌高矣臣謂陛下永執至道以當天心必有一謙四益之報增加數字未必發揚光輝而反累二十年昭升之美又入今嵗以來頗有災異日食地震雨雷大雪飛蝗涌水傷害廣逺以理論之陛下寅畏天命正當深自抑損豈可於此時加上尊號昔伊尹戒商王曰有言逆放汝心必來諸道有言遜於汝志必求諸非道誠望陛下求諸道而已章凡四上天子得公奏顧侍臣曰我意本謂當如此遂斷章表不受於是忤時相初郭后既以廢薨天子加恩追復其號而不許諡與祔廟且二十餘年至是禮官乃倡議請依禮祔郭后於廟朝議將許之公疏爭曰昔春秋之義夫人不薨於寢不赴於同盟不反哭於廟不言夫人不稱小君徙以禮不足故名號闕然郭后之廢雖云無大罪然亦既廢矣及其追復也許其號而不許其禮且二十餘年今一旦欲治以嫡后之儀致之於廟恐其未安於春秋也春秋之夫人於彼三者一不備則不正其稱而郭后於三者無一焉而欲正其禮恐其未安於義也且傳曰不有廢也君何以興廢興之間固必有正不正之禮存焉今欲扶所廢以為正必將抑所興以為不正古者不二嫡萬世之後宗廟之禮豈臣子所當擅輕重哉謹案景祐詔書本不許郭氏祔廟議已決矣無為復紛紛以亂大禮宜令諸儒極其論難有詔並張洞奏狀重議洞論景祐詔書以謂追復郭后是人主意停止廟諡則執政所為公以議不同不連章已而丞相召太常趣定議將以祫前升祔公聞之又上奏曰臣觀洞之言乃是曼辭飾說苟蔽前失以追復郭后則出於天子以停止廟諡則出於大臣共一詔書也而論之異同若不幸而此言傳於後且歸過君父虧損聖徳此其一也且臣前奏最要切者以為廢興不兩立而人君無二嫡備萬世之後禮分不明也洞既不以此為辭若不幸朝廷過聽之是雖自以能訐上起廢為功而猶且隂逼母后妄瀆正禮此其二也願并下臣章令兩制詳議有詔是公議者乃止於是祫祭有日禮官建白請以孝章皇后以下四主享於别廟不升合食上重其事有詔兩制集議公與故宿等共上議曰案春秋傳曰大祐未毁廟之主皆升合食於太祖國朝事宗廟且百有餘年至祫之日别廟后主皆升合食遵用以為典制此皆祖宗制節垂法以貽子孫者也未易輕改且行之已久祝嘏宗史即守以為常一旦輕議損益恐神靈不安亦未必當先帝意也傳曰祭從先祖如其故便公以論列未盡又特上奏曰九經所載祫祭制度最明備者莫如春秋公羊傳自漢以下皆引為証所謂未毁廟者豈有帝后之限哉此乃國朝所以依縁循守行之且百年者也命羣臣不務推原春秋之法而獨引後儒疑近之説不務講求本朝之故而專倡異代難通之制不務將順主上廣孝之心而輕議宗廟久行之儀欲擯隔四后使億萬斯年永不得合食於先帝臣竊恨之昔貢禹議罷園廟匡衡議遷郊兆羣臣和之者非一自以為周公孔子復生不可得變元帝成帝信之然而通人未以為當既而皆悔之則無及矣夫宗廟之禮神明之位豈可使舉措數有後悔哉此自陛下所當留聖思也初上春秋高朝議或有恐上勞拜起者而禮官承旨遂造此議上微聞之又得公章謂近臣曰朕初謂禮當然苟以拜起為煩吾猶能之何憚也遂手詔罷議蜀人龍昌期者著書傳經以詭僻炫衆至詆毁周公雜用佛説擁弟子十數人至都文丞相薦諸朝以所著書示兩制公與同列並奏昌期非聖不經請下益州毁棄板本事未行而昌期用薦賜五品服帛百疋中外疑駭公拜疏曰臣按昌期之書違古畔道所謂言偽而辨學非而博是王制之不聽而誅者也陛下哀其衰老未使服少正卯之刑則幸矣又何賞焉昔孔子作孝經非聖人者無法而朝廷顧多昌期之毁周公臣所不曉也且陛下使臣等議之臣等不敢不盡忠今置臣等之言而不用縱昌期之妄而不誅乃反褒以命服厚以重幣是非貿亂沮勸顛倒使迷國之計行於側而非聖人之俗倡於下臣竊為陛下不取也伏乞追還詔書毋使有識之士窺朝廷淺深詞極切直昌期亦惶懼不敢受賜裝卸營卒桑達等數十人酗酒鬭呼指斥乘輿有司不之覺皇城使以㫖捕送開封府推鞫案成棄達市公移府問所以不經審訊之由府報曰近例凡聖旨中書門下樞密院所鞫獄皆不慮問公曰此豈可行耶遂奏請自今一准定格樞密使以開封府有例不復論可否進呈報公不行公争之曰先帝仁聖欽恤以京師刑獄最煩故建糾察一司證審真偽自邇以來毎有大辟倍加精慎此則先帝不敢兼於庶獄庶慎惟有司之任今乃曲忤聖旨中書門下樞密院所鞫公事不復審察未見所以尊朝廷慎刑罰而適足啟府縣弛慢獄卒侵侮罪人銜冤不得告訴之弊又朝廷舊法不許用例破條今顧於刑獄極慎人命至重之際而廢條用例此臣所不喻也天子乃以公章下開封府著為令翰林學士韓絳上言國朝官制未立如中書門下為宰相職號令乃以近臣兼判兩省例已重諸如此類宜加裁定正其名體他官典領一用舊例百司常務多闕二府請擇重輕移付於下走吏章服與公卿不殊宜著為等級臺閣省寺無所傳錄可依倣周禮唐六典著為一書天子以為可行召公與翰林胡宿受詔同詳定公以謂此帝王能事朝廷大務必將損益沿革成一朝之制不獨空言而已當得其人乃能成事前日朝廷欲正大樂先定律吕自景祐至今近三十年而功不就今之所為又重於樂自非周召管蕭之才恐雖三十年亦未可望也凡再辭不許既受命公乃奏請未至局先條可改正裁損申明數事送中書門下參詳可否然後刪定詔許焉未及上明年三月韓再奏趣行之公乃與胡公詣政事堂略條一二事諮丞相曰國家必欲興修官制勒成一經為後世法則宜先簡别條貫澄清流品使事事有法不然者虛列官府徒作空文無用也今且以數事言之如樞密院五代以來始與中書對掌機務名體不正無甚於此尚書二十四司今為虛名官冗貟衆蠧財害政即欲改正官制則當罷樞密院廢三司省郎官不治事者以前資㪚官處之可乎審刑院審官院羣牧司提舉司糾察司駢衍於官皆當省還屬尚書九卿此裁損者也可乎唐制諫官史官隨宰相入立仗下唐制中書出制勅門下審之而後尚書出告身唐制學士下領外職舍人分判六曹皆美政也必欲申明官制無先於此者可乎當開元時官有定貟職有常守故李林甫之為六典也易然猶僅成一書耳卒之不能行也本朝隨事建官取便事而已有司奉法守職可矣苟不能爾恐雖成書猶且復廢宇文之周官唐之六典是也丞相久之度不能行曰然此誠難事業已行姑徐徐為之居月餘韓以中丞言事出知蔡州又數月公帥長安然胡公猶在朝而朝廷亦不復問官制云十月上親祫祭太廟禮畢公以加恩上騎都尉進封開國子初翰林侍讀學士呂溱自真定府召還監司積與溱不平捕溱親吏按騐窮治得溱嘗借官麴作酒及以私貨徃河東交易二罪溱先謫知舒州而後獄具大理寺約法溱乃未嘗受推法不當蔽罪自溱事起外議紛紛言溱有死罪十獨天子素知溱薄過不致於理奪溱侍讀分司南京而已公行制書具道上所以待溱意許溱自新上恩如此詔詞理當爾非有所左右也而自中丞知雜諫官御史争上言溱罪大責輕公制詞不直天子察公無過以其章示公既而言溱者終不息上厭甚不得已為不用赦再削一官他舍人命詞與公無異言者乃止御史吳中復嘗薦文學鄭叔熊於朝故事御史薦士無特授官者前數年觀文殿學士王公舉正嘗薦叔熊既不行矣己而執政以中復故乃更追用舉正前章除叔熊以官叔熊實以醫自名為中復治嬖妾有功中復故稱之公刺譏中復中復聞之恨甚又憾前詆欺不遂而公潔廉無私無可加誣者公前議郭后廟有語云上之廢郭后慮在宗廟社稷之際不得不然耳中復即深文排詆析言搆語云此欲開導人主廢后是許敬宗之倫中復既唱其端隨者翕然執政諸公雖知其不直然亦惡公數正言異已欲因事擠之以御史章上將開陳其端緒冀人主意動則挻之矣而上輙曰此豈可行勅封去之毎上輙然至十餘章後日有御史復上殿上逆謂之曰是又將言劉某耶此御史實自欲言他事皇懼甚退更相告言諫官御史本亦承望上旨雖數妄作不能不反顧己患既揣知上意即噤齚不復言當是時非人主素知公公幾不免公為人亮直正固某處已明甚循理蹈義志之所充乃形於言不以纖毫異内外也又以為徳性苟充則功名可遺學問苟明則文章不足事也其以待人亦推己意而同之然世俗方以夸嚴無實為成名虚譽崇飾為尚賢内不能自知則髙自期待外以悦人則復以才能許人士之浮薄慕名者喜樂之與公異操故與世多不合其夫人嘗謂公曰人以君為傲宜有以接俗弭謗公曰吾何傲也哉老者吾尊之少者吾賓之貴者吾嚴之賤者吾安之自謂宜矣世俗之人又欲其足之隨之諂之狎之然則是鄉原已吾不為也是時執政為上與太平復行王化取其文致與周漢等隆而已士大夫知旨者趨讙附和咸得顯仕公乃介然獨立上下交忤謗言益多執政滋不悅公在西垣七年詔誥典重褒貶有體不可増損一字為上尊號表時凡五請一謝不移時即具文嘗一日有詔追封皇子公主九人宰相得旨即日待進公將上馬遂不解帶援筆書之凡數千言詞意皆不同吏謄白不暇徃反才食頃執政皆驚視以為所未嘗見吏有竊言曰公乃以此見忌耳故事舍人遷翰林者皆以久次執政不欲公在内每有闕輒置不用㑹永興軍闕守公自請治之執政喜公之去疏奏即除翰林侍讀學士知永興軍府事公謝曰臣本求永興不望侍讀不敢受詔不許既行六日學士闕遂越用范鎮衆人為公惘然公之辭行面陳用將之術且言頃来邊吏頗以飲食傭役得罪即今武吏多不願臨邉如孫沔呂溱貴重有功名猶以此見廢設復有孟舒魏尚之徒臣固知議者之不能容此乃馮唐所以疑漢文帝不能用頗牧也臣願陛下容邉臣濶畧細過無督以微法又言馬軍都指揮使張茂實本周王乳母子嘗養宮中往年市人以狂言動茂實近者御史中丞韓絳又以傾宰相重搖人心臣謂要令兩善莫若解茂實兵權處以外郡於茂實不失富貴而朝廷得逺嫌疑上皆然之是後邉將遂無以酒食坐者茂實頃之亦出知曹州公以十二月至雍部先是關中比嵗不登百姓流移長安尤甚公開倉廩賑乏絶寛賦歛止逋責省徭役緩期㑹約束豪右母敢固糶民苦大錢數變法疑惑公使官吏俸錢一皆中給民因知官不復變法矣事必當請者請而行之其餘則皆以便宜厝置視事三日大雪盈尺雍人喜曰此公賜我數月流民稍自歸明年大豐熟是時朝廷遣使均田欲以等貧富以致頌聲上因公之西勅至部徐訪利害以聞於是孫琳主均河中府及耀州召聚吏民暴露田間百姓相傳縣官且增賦税所在斫伐桑柘關中囂然公遽上言方今災傷流移恐未可以均田願且召還孫琳别俟豐歲以安民心初琳以方田法歩地千歩為方以方度之誠使其覈實無頗然但為能知田畆髙下耳至于均稅之法以地肥瘠為差其勤力從事田畆修治者則賦重自若其惰窳不事事而田畝荒瘠者因獲減賦然此當以肥瘠言也吏非廉明用心不一或不能盡知田事或挾私與奪上無由察也故均田之害人皆知之獨言事者樂其名公所以求待豐嵗者惡斥言之耳琳之度田起自萬泉龍門此兩邑皆山田崎嶇二三百里間人以謂審如琳法非旬嵗不可周徧也琳皆不出一月而奏畢功論者驚笑其謾㑹公奏至中書猶信琳言以公為不曉用琳章報公勅牓告民毋得殘桑柘而已頃之河中民果訴增減田稅不平凡數百戸七年四月遷禮部郎中九月大饗明堂進封彭城郡開國侯公與歐陽公永叔相厚及歐陽參知政事嘗為丞相韓公言公所為不如謗者之言也久之韓公謝曰雖失之東隅可以収之桑榆乎歐陽曰公能如是大善將還公為翰林學士㑹上不豫事且寢八年四月英宗皇帝即位進吏部郎中公治長安豪猾斂手良民得職大姓范偉積産數巨萬冐武功縣令范祚為其祖偉所取信者持祚為令時黄勅耳偉家不徭役者五十年更西事調發下戸困敝而偉自若盜相祚墓以已祖母合塟之謾云祚繼室也雷簡夫以處士登用能為文辭偉賂簡夫使為墓碑以信其偽偉因此出入公卿間持府縣短長數犯法至徒流輒以贖去長安人皆知偉罔胃畏偉不敢言吏受賕者輒為偉蔽匿公因事發之窮治偉伏罪長安中讙呼稱神明㑹大赦未斷而公去雍偉因謀反變前狀自後連五獄證逮四五百人展轉二年朝廷以委御史乃不得變而偉亦以更大赦枤之而已長安人恨之公在雍三年治聲四出巴蜀人皆願得公為守引領冀望或相與至界上問使客劉公何時來是年公以疾自請八月召赴闕勾當三班院徙判太常寺兼禮儀事上初即位有疾皇太后嘗臨朝上疾愈乃歸政適有小人言二宫不歡諫者或訐而過直公以謂當以義理從容感諷不可以口舌争也是時方進讀史記至堯授舜以天下公因陳前説曰舜至側微也堯越四岳禪之以位天地享之百姓戴之非有他道惟其孝友之徳光於上下何謂孝友善父母為孝善兄弟為友辭氣明暢上竦體改容知其以諷諫也左右屬聴者無不嗟喜動色即日傳其語於外既退王翰林謂公曰公直言至此乎慈夀聞之亦大喜治平元年四月公得驚眩疾數月不朝告且滿百日公求便郡養疾上謂執政曰劉某器識才學朝廷未見其比者雖病固當留乃復賜告嘗一日講畢上謂學士諸公曰曾見劉某否病今何如可往省之於是王范兩學士來見公道上語㑹内苑橙實初熟上使中貴人以五十枚賜公面問公起居所以慰撫甚厚公拜表謝而病亦少間因自陳家貧復求補外上愴然許之九月除知衛州換汝州郡久廢不治公召曹吏謂曰吾以病來此汝無以吾病故習前態謾欺分毫黥罰汝吏人素聞威名戰栗不敢犯已而更以吏事委屬僚時時更改判畫舉大綱而已其所以賑饑窮省徭役誅鋤黠惡方畧如舊吏皆竊言公病猶爾況不病耶二年十一月上郊進封開國公三年四月遷右諫議大夫公謝曰臣久病苟禄已無愧恥誠不敢復望遷秩重招譏議詔不許公前後拜官未嘗輒讓唯初拜侍讀及除諫議辭之其誠心以謂所不宜處則不欲苟受之非以邀名也居無何召還闕公自陳病篤不能朝願罷學士治南臺許焉十一月改集賢院學士權判南京留司御史臺四年正月今上嗣位改給事中明年四月八日薨於位享年五十所著春秋傳十五巻春秋權衡十七巻春秋説例二巻春秋文權二巻春秋意林五巻弟子記五巻七經小傳五巻皆成書易外傳二十巻元滋九篇通古五巻古風五巻皆未就文集若干巻公學問廣博無書不通自浮屠老子以及山經地志隂陽卜筮醫藥天文略皆究知大略求其意義合於聖人者而世人所謂善者亦不廢也嘗與呂溱濟叔同在禮部夜視填星指曰此於法當得土不然乃得女居數日使者來因言宫中兩夫人皆當就館呂相視笑數月果生兩公主又嘗齋太乙宫與内弟王欽臣夜語曰嵗星往來虛危間色甚明盛以吾觀之當有興於齊者嵗餘英宗以齊州防禦使入繼大統遂登大位云在長安時得三代時鍾鼎器皿數十皆有篆刻銘識文字奇古公按讀之因以考知前代制度用匜敦簠簋與前世學者所説不同其所言齊黄同冕亦書傳所不載也公珍惜之嘗曰我死子孫以此烝嘗我及病累年嘗使子弟誦書其側時閲古器以自適嘗歎曰我所著書皆聖人微旨而不及盡有成豈非天哉公與人交不求其備得一善則稱道之其推進者甚衆而與江休復鄰幾最善嘗曰鄰㡬和而不流柔而不犯當求之古人阮籍陶潛之倫也薦之於朝鄰幾所以驟用修起居注公有力焉又嘗稱賈直孺人或譏賈者公曰賈何必全美居今之世而勁直有守不阿貴位此其足以過人逺矣凡公論交如此及鄰幾死哭之慟曰唯君知我時歐陽永叔為誌墓石公為書之以致意焉梅堯臣聖俞與公親且舊既卒其家不能自存公哀之未有以助也聖俞嘗欲書程丞相神道碑病不果公為成之程氏喜餉白金五百兩公不發封盡以賻梅氏公平生未嘗輕為人書銘特此二事以經營二友云公兩娶武威倫氏皆侍御史贈某官程之女前夫人先公十七年卒繼以女妹累封河南郡君子男四人長定國郊社掌座早死次奉世進士及第大理寺丞次當時大理評事少子安上太常寺太祝女子三人長嫁大理評亊韓宗直二尚幼公於宗族賙給甚厚家事未嘗問有無嵗時朝廷行禮得以推恩輒以旁逮疎族先人有田在蘇州公未嘗取一粒皆以畀内外親屬及其終家無餘財公既殁朝廷推恩以兩子孫望旦皆為將作監主簿又除族子安世試將作監主簿安世父敦坐法墮官公常憐之雅意欲官其子故諸孤以安世名聞所以成公意也某年少公四嵗及某能讀書則公學問成立矣故某所學所聞資取於公而公志之所存某竊預焉公於某友愛天至嘗曰唯得兄弟可以忘我病公不幸至於大故哀痛感慕無心以處豈復能詳記其徽美耶日月有期將以來嵗某月從袝於先公誠冀自託於大賢君子垂名無疆而懼他人聞見之不詳且世俗之多諸惡不敢盡也故自抑推割而纂述其大槩唯執事憫憐而賜纂述焉謹狀彭城集巻三十五
