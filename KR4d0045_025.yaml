body:
  text: 彭城集卷二十五宋劉攽撰表謝神宗御集表伏惟宸章下賁蔀室為榮祗荷寵靈不任榮抃伏以神宗皇帝聖繇天縱道隆日新受命穆清饗國之歷綿永儲思參兩稽古之事著明亦猶唐堯之煥乎文章夏禹之躬于律度睿藻奮發聖謨精深寫河漢之昭回暴陽秋之和粹此蓋伏遇皇帝陛下孝惟善繼文極化成明發徽猷繼承祖武不獨祕河圖于東序嚴䇿府于春山乃眷具賚錫之副本承宣室之顧問嘗耳訓言畏軒臺之威令恪遵遺法感慕往遇炫耀新恩企聳怔忪罔知所措兖州謝皇弟授泰州節度使表伏奉詔書以皇弟皓進封雍王特授司空仍舊充鎮海泰寧軍節度使告諭軍民存問父老者臣即時奉行宣布訖天慈深厚民望悅隨伏惟皇帝陛下仁撫萬邦愛先九族並建明德用啓金路之封加等懿親申錫袞章之賜眷齊魯之奧壤餘聖賢之舊風俗本詩書地崇藩屏以元帥中權之任兼上公賜履之榮自我熙朝備茲典䇿臣猥以蕞質叨持左符寅奉德音側深鳧藻為馮參政久旱待罪表臣聞精祲交感盛王之所以靣稽陰陽失和代工者乃宜蒙責惕思天職博究輿情其敢飾辭以祈免咎伏念臣等器識淺近智術迂踈濫叨調鼎之司獲預二公之寄上之不能將順德美睎萬一于清光下之未嘗進顯材良資參贊于善化曠日逾久竊位既彰足以感動皓蒼乖戻協氣是以亢陽為沴閔雨歷時宿麥秕稗而莫收首種萌芽而復瘁陛下憂勤民瘼寅畏天明避正寢而不居貶常珍而弗御簡賦已責議獄緩刑詢芻蕘之片言走圭璧于羣祀何聖心克已之至此而善應旋日之漠然豈其有他凡在臣等乞從故事以正刑書策告咎殃退遷士位益從夢卜之舉庶格股肱之良于以上當帝衷下慰民望又近以旱暵為災燮和無狀需章自請罪斥是甘聖恩含容尚加宿留靦顔踧踖彌用戰兢臣等聞應天之理必先實而後文行法之要常始近而略逺以臣等厠迹公輔預聞幄謀不能廣宣上思導迎善氣惟天人之際悖理者既多故風雨之節咎徴其有在致陛下躬雲漢之憂閔甚桑林之禱祈重祿所私何心自處然則推應天之實責臣等之尸曠實亦至矣論行法之近顧臣等之忝竊近何加焉伏冀淵衷垂奮英斷敕從罷黜以戒負乘闢賢路于方將協天威于陟降輿情既洽吉祥遽臻臣等雖復退迹于編氓固亦蒙恩于鴻造謝中書舍人表處非所據榮以為憂命屬己行辭不獲免祗膺寵渥內集靦顔臣聞憲度著明帝虞則二典之制號令溫雅炎漢有三代之風是皆鼓舞羣黎丹青醇化覃渙汗而莫返騰英聲以無窮洎于本朝尤當茲事彛訓皇極筆舌天常爛乎河漢之章擴黃風霆之運是以贊書之任稱曰材難代天之工率由德與豈容膚淺得預柬求伏念臣文謝天成學非師授窺陳編而竊取逮暮齒而益衰可以小知詎為逹士暗于大較是謂鄙儒方踐迹于鳯池必貽譏于鵜翼而况上恩深茂睿旨稠重置衡石之程書異臺郎之近例所以待老成碩學之士欲全其難進特逹之風愚敢望回事同始隗此蓋伏遇皇帝陛下神謨妙萬聖度惟幾九德敷施既能哲于多士一善兼取無求備于匹夫致是蠢愚猥承甄擢敢不灑濯狷志磨厲下材出身加民必愼樞機之正極天蟠地用期輗軏之行謝太皇太后表右垣司槖內史贊書世謂殊榮士惟愼柬內惟虛薄默懷戰兢臣聞仲尼養徒别言語文學之第鄭國為命舉討論潤色之工蓋人材各有所長而邦事急于先務言而文則行之逺仁所厚則覆己周何况帝統當天海宇多士風動而黎氓從欲雷行而渙號必孚所使演綸每皆籲俊賦政而四方爰發馭臣而八枋贊襄未嘗乏賢豈資代匱臣早以無庸之質得陪中祕之聨文不能出衆而效奇志不過循常而執一遂從吏役浸易嵗華迷簿領期會之繁廢經術翰墨之事敢期選掄所及么麼弗遺召使遄歸不待三年之計免其課試無拘一曰之長苶然蕞軀倏躋華貫駑蹇何補衰憊愈羞此蓋伏遇太皇太后陛下聖總幾深治先本要心用若鑑效以形者莫我遁逃與物為春因其生而曲加覆露不忘承學得預代言謹當行其所聞強所不逮韋絃並用愼何至于十思寢寤周防幸無違于四禁賀克復交趾表伏聞安南將帥充復交趾李乾德請降以廣源州置順州者廟勝萬全方隅底定闢地千里申威四夷伏惟皇帝陛下仁育羣生化周無外以乾坤之覆燾在跂喙莫不涵容而陰陽之慘舒施雪霜致其肅殺是以豫順之舉爰整惟時乃眷海蠻敢侵徼堠譬蚊虻之螫在所驅除而介鱗之微何煩經畫先聲臨境醜類望風破膽殞心折馘係頸尚遊魂于頃刻復徼幸于萬分露布轅門歸死軍政帝虞之苖民逆命志實昏迷周宣之蠻方不回蓋同常武土田全歸于王府縣邑樂輸于地征無鬼方三年之淹包越裳九譯之廣論我功德邁于右初臣限守郡符阻陪朝列亟聆吉語罙極歡心京東運使謝上表臣稟生窳薄為器泄卑志在詩書本求名于稽古耳剽律令亦有意于治民竊自深思嘗試勉力不知足而為屨是匪難能懲于羮而吹虀乃非適變顧惟內恕濟以敢為務合人情儻究吏術向者叨付連城之守逮及三年之淹資是愚忠謹行一意得免下中之課以逃負乘之羞豈徼幸之可常或不虞之致譽今乃驟叨持節乃寄典州爰暨海隅必宣使指核名實之臧否則吏員至繁商功利之重輕而民賦逾廣揆茲孱弱何足堪任猶用乂聞以希來效伏惟皇帝陛下幾深成務俊乂在官股肱備于惟良輪桷周于末用兼聽疏逺無棄妄庸臣氷淵置懷犬馬圗報勤將補拙必無餘終食之間力不辦心但冀免素飱之愧賀公主生日表星婺儲精椒風介祉誕彌伊始溥率同歡臣聞周宣中興詩詠維蛇之夢帝乙盛德易贊歸妹之休蓋王化大成仍備肅雍之美景命孚佑必多蕃衍之祥恭惟皇帝陛下仁育羣生道濟無外體淳素以正德躬文思而保民華夏蠻貊之區罔有後服風雨寒暑之節未嘗不時日監在茲天休斯至均序貫魚之寵驟聞就館之期然則千齡之符屬當于盛際百斯之羡甫驟于將然臣假守外藩阻陪廷列預聞休慶喜不自勝為唐參政讓加恩表陽郊受職獲與祭以為榮綈檢推恩顧空官而自愧仰慙虛授敢憚責言伏以聖王謹用人之方嚴馭貴之柄爵不嫌于遴簡賜不誤于無勞未有駢繁寵光赫奕休命驟以一旦併集非才今臣備位宰司無補國論徒以從泰壇之毖祀霑大賚之餘休慶出不訾動知非據賁有功之名號增陪敦于土田階敘己崇勳策兼茂雖三錫之命殆不過茲而四海所觀將致竊議伏望皇帝陛下矜匹夫之小諒開愚臣之自知收渙汗于繆恩息怔忪于悸魄使負乘之刺少弭于多言則乾坤之私更深于鴻造謝郊祀加恩表危誠自竭冀悃愊之聞天聖造曲成示艱難于反汗進被休寵俯慙厚顔臣聞靈承帝事哲后所以保鴻名錫豫善人有國所以均大賚蓋德所覆者大則其仁廣禮所用者重則其度深伏惟就陽上儀本朝盛節凝皓穹之駿命揚列聖之丕圖宜其霈澤九垓進律在位而臣猥以斗筲之器屬當輔弼之聨非籲俊之素材無圭璋之美譽逮茲褒賞顧所積重承命若驚措躬無所此蓋伏遇皇帝陛下道隆覆載禮備股肱顧體貌之所存推慶賜而加重用是朽鈍亦叨顯庸敢不夙夜永圖彌綸衮職庶盡致君之願以無假器之憂為韓侍郎讓加恩表崇丘蕆事均景貺于黎元多士盈廷濫徽章于蕞品仰慙非據輒控危誠伏念臣志謝肅雍器殊膚敏巢穴寡見非機衡之可居朴􅈪短材豈薪槱之宜及徒以厠幄畫之餘論陪郊畤之上儀進慙籲俊之求退乏秉文之美豈意叨蒙渥澤超越等夷疏功號而策勳增階敘而進律事盈三錫寵集一時不俟人言知其虛授雖徼天幸敢或自安伏望皇帝陛下矜悃幅之愚衷察滿盈之至戒許還休命特寢豐恩下以遂微臣揣己知分之誠上以隆聖朝酌言聽卑之要外息曹謗內寧陋軀戰兢之餘局蹐以冀謝封彭城縣開國男食邑表威顔咫尺惠澤自天弱植負乘措躬無地伏以合宫毖祀上帝眷懷乃惟逆釐于三神是用大賚于四海宜得膚敏奉璋之髦士肅雍在廟之藎臣顯相有嚴同福惟允臣智術譾薄宦閥闊踈身綰符章心馳象魏曷嘗仰瞻度筵之邃宇親覩燔燎之升煙遽沐豐思猥加寵錫命以開國殆其曠職此蓋伏遇皇帝陛下德施無頗誠心兼覆如春陽之播物勾萌弗遺譬大明之麗空容光必及以茲多幸無棄瑣材敢不勵心冰淵謹身檢柙或千慮而有得亦十思而後行庶竊微勞仰酬鴻造封開國男謝太皇太后表禮成宗祀慶及溥博厚澤所霑孤生蒙與伏以爵列非一皆號諸侯臣職雖微亦在五等本朝崇馭貴之典制開國之榮雖曰虛爵曷嘗輕授臣學術無素功緒罕聞以積日之微勞厠置行之近列詳其位著稍異等倫逮茲釐事之成非有裸將之助上惟畀胞翟之賤不忍見遺收薪槱之微足期廣照率循舊典爰假寵章夫何錫命之榮濫及妄庸之品此蓋伏遇太皇太后陛下幹維鴻造綜輯化原九德事而後乂在官五氏修而天地並位况所賚豫無間邇遐乃眷憃愚曲從甄録竊聞羲昜所戒勿用小人商書有言罔及惡德臣頗知自省敢弗盡心益修衰朽之資無負生成之賜賀平西南夷表得進奏院報伏聞經制瀘州夷賦公事林廣奏己至羈縻歸徐州破蕩蠻賊班師奏凱告語上功威震鬼方慶通寰宇臣聞玁狁匪茹周宣出征昆明不通漢武致討先王之于四海雖亭育焉不殊中國之于百蠻亦驅除之而己是以荒服崎嶇之域容致龔行豫順之師暫費永寧一月三捷伏惟皇帝陛下道周無外仁濟有生德業著于日新神武臻于妙算自跂行喙息之類皆得陽和而雕題被髮之氓率知面內何乃𤏡僮潤蠢瀘水不毛鴟梟未知于革音蜂蠆潛懷于肆螫實王愾之所不赦宜天討之所必加命將修戎槎山除道成算出于帷幄選士奮于豼貅穴處巢居不悟震霆之至草剃禽獮如經燎火之餘于小醜足以深懲在憬夷莫不畏服邉徼斥廣戍堠晏安廷議僉同固無屈朔方之策琛獻麇至方謄上槃木之詩臣官忝魚符身遙象闕預聞嘉慶喜不自勝謝授官表豐恩驟委遜請弗從袛服寵休特深戰栗伏以聖王與人不求備故裕于任能有功而見知故樂于行賞是以鉊刀一割之用駑馬十駕之勤以為成功悉均懋典如臣者智乏觀物之節材無出類之竒臨衆治民不暇乎繩墨之外奉令承教亦幸其塵霑之增悉由洪恩僅免官謗乃復宥其不逮藉以為功增秩中臺參聨近禁是實逾涯之寵抑多彼己之羞此蓋伏遇皇帝陛下化盛陶鈞仁兼天造循名責實以周務記功忘過于用人底是孱姿過叨霈澤謹當服勤無怠浚明自修羔羊素絲之風所期于正直深淵薄氷之戒增重于戰兢誓以愚忠仰酬至德賀破滅儂智髙表得進奏院報蠻賊儂智髙已行破滅者蠻區荒忽容有不庭王師飛騰古稱無戰天威振而電掃凶巢劋而霧除臣聞帝虞至明苖民後服商宗盛德鬼方弗賓或三年而有成功或七旬以之來格蓋恃險與逺敢干霆電之誅而取亂侮亡何損乾坤之化伏惟皇帝陛下常德立武至神燭幽聲教暨乎朔南德澤被于夷夏唯是反復烏合之冦其敢盜弄潢池之兵丁策墮鳶微暉吹蠱得以倔強漏刻創病黔黎陛下進厥虎臣授之廟算豫順而無遺策節制以嚴靈威醜惡殱夷遐陬砥厲反户之俗既安于震驚重譯之氓無隔于琛賮臣濫分符竹祗畏簡書懷請纓之心不得顔行而自效聞獲嘉之慶無任鳧藻于私衷賀擒儂智髙母表冦魂假息頃延漏刻之期天威照臨旋殄鯨鯢之類伏以智髙介鱗同類蛙黽與居主一女子之狂謀興數十百之羸衆晏然自得如側二之復生少焉稽誅勞方虎之復出而後鴟張斂迹鼠竄祈生陛下威信浹乎乾坤刑賞揭于日月士或請纓以思奮人皆剚刃而爭生果聞覆妖梟之巢窮狡㕙之穴係頸來獻漏罟蓋微方將淑問辟雍之庭釁鼓稿銜之邸大明中典以示憬夷臣濫守郡符幸聞戎捷欣愈之至啓處不勝為宰相賀擒鬼章表伏見蘭會安撫司奏今月某日某人領兵至洮州擊敗鬼章軍活捉到鬼章者天威照赫師律訓齊罙入妖巢生致渠首伏以鬼章裔夷小醜獷獸為心蒙被國恩不知報覆侵犯邊圉數有震驚遂敢交通種羌結為黨與解仇合意伺隙成謀賊傷屬國之人竊據乘障之地先朝所不忍貰聖算嘗此留心至于罪稔禍盈天棄神怒偏師繼出元惡就擒昔商宗鬼方至于三嵗漢元郅支逺在萬里而皆斬馘血刃之功率非係頸獻囚之事矧其淹積嵗月勞勩師徒豈加廟略無遺虎臣思奮會未信宿已報翦夷吉語亟聞戎捷交上雪邊人夙昔之憤奪諸羌前却之心追視古先莫可倫比伏惟皇帝陛下神武天縱睿謀日新任衆材而責成因常德以立事運陶鈞而獨化其易轉圜覃上仁于大同既思率服仰繄睿斷逮此成功臣等叨預弼諧無禆鴻造奉承嘉慶徒切歡愈知蔡州謝上表伏奉誥命授臣直龍圗閣知蔡州軍州事已于今月某日到任訖疲瘵之質力不逮于戡蟬濛涌之恩滎復叨于分虎未知補報徒積慚羞伏念臣賦性迂疏稟生竒薄偶不遺于昌世幸得置于周行驅馳嵗深心慮日耗脫身藩郡二職祕書本以文章蘄見收于鈞冶至于遲暮竟獲寵于蓬山質之常情實為厚願而臣結轖遘病羸苶弗支闋庭之儀每不勝于蹇步圗書之府敢不安于素飱歸誠所天冀息餘喘果蒙從欲仍獲長民擢陪東序之華付委連城之寄失馬致福有如塞叟之言受粟獨多何減離疏之疾此蓋伏遇皇帝陛下欽明天縱聖敬日躋留睿意于其難必代工之無曠中外一體法亷並修以茲孱愚不獨捐棄謹當精劭農務隱賾詔條推巳病有瘳之心用察民瘼廣天眷在安之訓庶格人和為馮內翰讓官表伏奉敕命授臣尚書禮部郎中充羣牧使者撥煩治劇念非已長陟明黜幽乃維邦典尚蒙增秩仰愧鴻私臣聞賞不當功則重爵祿無以勸下名不責實則雖愚暗可以保身是以聖王考核至精翕受有度其所頒爵未嘗假人伏念臣智術冥頑機靈檮昧懷愚忠而自喜挾斷技以無他驟玷官職遂司京邑惟輦轂之重有獄市之繁以今所聞謂為浩穰難治雖昔良吏或以毁傷失名內愧妄庸益虞尸曠需章亟請睿眷曲從恤其纍日之勞申以自天之命俾更廄尹驟正臺郎徒重髙門已極息肩之幸上應列宿敢蒙假器之羞是用端已若驚白心自列伏望皇帝陛下察其知量憫似無華特還繆恩俾全小諒使彼己不稱之刺母叢于蕞軀則有恥知格之風益明于聖世彭城集卷二十五
