body:
  text: 彭城集卷五宋劉攽撰五言古詩淮上旦起風頗涼暑薄意彌愜長懷波浪髙咫尺不得涉艤舟望連山青靄亂雲葉鷗鳥去杳然空迥晨光接卧吟新詩句閒理舊書帖呼兒飼茭茨看婦治箱篋為非急時者無事用輕楫淹留既無悶何必歌長鋏次韻蘇子瞻顧侯磊落人稱是腰腹偉不甘封侯相蔡父誇小史功名保唾掌懷寶豈能已鞅掌人所難見之心獨喜鄴中貴史公秦諺推樗里一蕢障九州亦自其名美金城上方略萬里可寸紙頂踵禹墨間掛冠復遺履蘇公相知心乃在湯湯水抑揚磕然笑吾心嘲里耳次韻孫少述二首藝苗欲其實種椒欲其繁我本正禮家世人稱二難學射庾公斯取友念必端相與今白首交通可以完羡君脫塵垢顧已羞素餐聊為鵬鷃飛各自天宇寬一月三寄詩一詩千百觀恍若從君遊君知我心歡為貧始願仕逢辰叨典州朴直守故學遲暮悲舊遊此邦詩書林處士原憲儔怪我何所為千騎居上頭君恩重泰山未有毫髮酬逺慙遂初賦清節第一流桑榆不相遺歡笑脫羈愁喜王大自固陵歸日月疾過隙生者猶行客念君於此中復久事逺役嵗暮山林閉天寒雪霜積歸來道路勤稍見車馬色田事米宜緩春冰行解釋相從今其時逮此役車息畏途畏途十殺一昧者己知戒奔航失維楫將恐亦同敗凝氷難長清甘醴復先壞桔橰獨知道俯仰非有罪椿下獨坐凱風長羣物赤日流正陽幽居似囂煩嘉樹亦陰涼偶坐方丈間吾非厭華堂愛此真不材保彼千載長仰視龍蛇形屈蟠正蒼蒼勿疑翠羽葆何以居我傍吾聞髙蓋人專寵來百殃我獨安隱幽入鳥不亂行結廬結廬東城下適當車馬路開門閲過客擾擾不知數客或為我歡客或不我顧歡我我不驚去我我不慕俯仰各異懷音容暫逢忤照影清水中默然不相語魂交夕夢間昔昔已復寤薄厚何從生善惡非有素寄語朝市人知余養生趣後浦望水春塘見游魚芳草宜白鷺溪流定幾曲花發應深處重來畏已迷堅坐不能去奉和寬叔新橋之什昔賢常奪鬲彼聖猶伐樹物情喜崎傾直道每齟齬況兹渾渾川翻覆不可據風波一生憂忠信多逢怒陰虹架層雲雨氣生寒沍操舟雖云神失勢嗟已屢早師漆園學一悟南華趣理㑹定無悶神全諒何懼吾道乘桴浮斯文以筏喻仰止金玉章煥然謝煩慮晚泊長蘆贈南來鄰船沿遡同一川風波情豈别維舟暫相從銷憂自怡悅明發南北飛離懷更秦越苦寒不敢怨雲霧不敢悲雪霜此是上帝令所以誅愆陽不見李與桃前日胡為芳不見蚊與􅀈往日胡為翔反時固為妖徼幸真不祥但令冷氣除豈敢虞凍僵吾道不終窮君看松與篁賞心亭原汪時馮當世置酒會吕翰林張舍人章學士皆在坐因以詩贈馮髙堂靣虛無水色照羣有不知歸流永但見來帆久蒼翠前後山起伏龍蛇走荒蕪六朝舊獨此存不朽涼風西北至蕭颯驚户牖秋意倐已髙𤣥蟬嘒衰栁主人厚賓客嘉贈隨所取爽豁破縈紆髙涼謝塵垢開筵窮日影玉斗湛清酒長歌激梁塵爛醉頗無負羈遊屢飄蕩攀援每遲後數公傾蓋歡夙昔故未偶夜闌天正黑出户攬星斗明發復殊方行行但回首汴渠挂帆翩翩河中舟一一西上水彼船力有餘我船力無幾力薄日一舍力壯日百里遲速詎幾何推分故爾耳今晨東南風帆席頻輕駛舳艫密相銜前後略相似如將平不平頗復令人喜因之念時事冥寞付天理寄韓持國帝都冠蓋區百吏鮮閒暇學省獨優游儒冠足休假臘前辱飛書雨後果迂駕逺道靡告勞心期莫豫詐三年坐窮山物色多可訝鶴林失昭師演門吊兩謝素交悵傾蓋陳迹空怛化孤吟不逢人默坐常逢夜朱丹親簿領蟲旱視禾稼全人猶罋盎薄賦兼倓幏君來慰何多髙論聽雖乍雄風快披襟佳境逾啖蔗從容外形骸約略陳酒䏑尋芳問名園臨溪陟纍榭數稱滍陽叟謂實龎公亞昔聞固己多今得逾可詫龍門走清洛伊水共東下舊都富形勢時卉芬蘭麝雲峯㑹深入芳草正可藉乘興寧有窮歸馬何當跨小官畏繩墨局蹐甚韁靶苟無咫尺書限此十數舍舉頭怨鴻鵠羽翼不我借終更行有期屈指計秋夏寄王深甫兄弟曹子三敗辱卞和再刖悲自古鮮其然今子何似之歷塊誤一蹶千里差毫釐白璧固有瑕黃金豈無疵識君向十年每歎時爾遺天命兹可信古學滋可疑上書欲薦君身賤不得為寄君北門詩相望空所思寄王子直三見登賢書每有千人進少年盛名聲髙士離幽遁吾憐王子秀屢黜曾不近棲遲困家食屈首仕州郡始疑造物意實于才者吝寧與朝廷分不使山野盡間令特達士竭力事推引知音與彚征干嵗名雙振憶君盛文華遇事尤精敏雷電騰火車波濤駕蛟蜃譬之逢羿射所發無不凖固窮當益堅達生尚無悶府公樞軸老治道常坐論屢聞下榻迎豈惟虛已問人生貴意氣感激多發憤想見吐胸中江河出方寸便當薦書上纍鷙推孤隼咫尺青冥天勵翼見翔奮年華不吾與二老倐生鬢祿仕久益貧拙謀老仍鈍干時尚有違得名諒無分行當鴻鵠舉判與䴢鹿渾江魚事鈎罩吳稻收囷囤君時據亨衢寄聲勿招隱决意千里遊極當何日歸終朝仍閉關室邇人竟違北風吹長空弱羽相分飛我呼君應聞何意音問希介者當鮮合俗士所見非㑹知相憶深不為輕與肥寄王深甫昔居沈邱門相過不盈里蓬蒿啓三徑杖履通彼此去潁已數年居常夢湖水陋巷君所安所居未宜徙憶昨春風時君手種桃李二年當著花今秋應結子同生記五人次卿今祿仕餘人皆反冠誰最飽書史娟娟懷中兒長女久生齒侁侁乳下秀相繼今有幾固陵好田園往嵗未疆理菑畬無廢功計程萬億秭曩時豫君謀家事最綱紀欲令囊有錢更使囷餘米伏臘足自了衣食常好美自兹謝俗徒閉門唯隱几豈論陶朱公未慕子貢氏有志懼難合到今可誰比將無尚瓢簞幸不乏甘㫖南風素輕浮衆口巧排詆往聞里中兒責望多苛禮君從段干迫詎免叔孫毁又聞澤宫射吾子時見罷有言厭塵勞自誓不再起窮通非異門出處皆一體達生知順天偏智乃私已怪君未坦然尚爾交憂喜昨來赦書下拔滯先賢士寧令有道卷近自吾人始丈夫龍蛇變蓋棺事乃已探穴必得虎叱梟㑹勝雉何能守一方寂寥事行葦吾為諸侯客正得戎曼鄙簿書每陳前弦誦不到耳時方尚鴻鵠自愧雜螻蟻匠石悲運斤郢人怨流徵非君美無度孰與裁狂斐思身若煩酲淟涊不可洗彎弓輒墮鴈投竿常獲鯉寄書非無緣勿愛繒與紙寄王子直王孫意氣壯文武兩自適著書輕古人時論有馬癖塵埃間何濶陋巷稀軼迹西郊秋欲分風露朝暮積豈惟弓失徑況乃鷹隼擊何當共馳騁一見萬夫敵寄原甫雞鳴行問津日昃未得休髙山有懸車深水時泛舟二殽避風雨太華行清秋旅遊月魄毁始覺岐路修緬然望西南落日荒維陬應知念行役天中時倚樓寄王掾壯齒行九州智當任百憂常慕馬將軍又憐定逺侯汩汩州郡役奔走無停留朝與簿書期暮從農夫遊盡力蒿艾間令人愧前籌㑹計與牛羊古來悲孔邱王卿與我同嵗晏方田疇烏攫道傍肉貂餘身上裘西風木葉零清雨天地秋歸來共尊酒歡言役車休寄王深甫昔有揚子雲著書恬勢利家貧官不達賓客罕肯至時復好書者相從問經義干載故寥寥吾人一何似天涼風雨餘草樹有秋意蟬吟燕辭歸窮士易失志陋巷可相期簞瓢固多味尋王深甫值其不在歸寄此詩幾日欲出門適此天和柔邦人皆異情我憶從君游僻居正窮巷冰水相交流旁舍代應問簷鳥聲啁啾士貧難自髙柴水勞深謀昻藏塵世間何異川上鷗我能乘興來不能興盡留清談無由接竟夕心悠悠寄王深甫原注時為亳州衛真主簿公綽志不欲滕薛非所居黃香脫枳棲仍集東觀書艅艎不挹漿鷹隼非捕魚狐裘匪負薪鼎鬲寧柱車物生各有宜得志皆自如違方易故常操末繆續初古賢貴相知末俗隨毁譽懷君乏羽翰臨風一躊躇之官汝州舟中作寄都下淺智憚逺謀弱力量所任進途逺朝廷退迹違山林代耕抱微願儋石安素心小官慕既往有道念在今問津自南郭治舟遡清潯鼎鼎去鄉悲冷冷遊子吟凌風卷晴緑喬木庇髙險黃鳥相喧呼嘉魚一浮沈晨昏偶素月信宿在青岑所遇多可歡離念頗用侵嵯峩天門髙浩蕩瀛海深髦士相提衡精義窮幽尋顧余傾蓋交問我瑤華音戒車辱祖道贈䇿悵分襟簡書甫祇畏僻陋方滯淫搖懷日三秋寄情望歸禽早春懷都下沈滯幕府官三見春華換早聞知命言豈敢竊自歎樗老謝雕刻鉛鈍繆鎚鍛幸兹省文書聊以騎欵段鄉閭越南北弟姪稍婚冠靄靄西掖垣哲兄秉天翰悠悠思者懷歷歷念可看仰視歸飛鴻何當為我伴瓜步蒼蒼林表山下惟瓜步水憶昔魏皇帝百萬嘗駐此飲馬江水渾揚旌翔風起經營竟無成歎咤有遺恥去去常畏人閔默垂五紀大江限南北天意固偶爾奈何奸雄才割據爭虎視不有神武功疇能混書軌吾聞清流戰王業實基始樓船蔽空來天塹才一葦此時東流波不足投馬箠煌煌軒臺威凜凜向千祀寄老菴兹山鞰奇勝四野窮眺覽近峯擢矛劒逺巘矗蓮蓞雲霞發光彩氣候變舒慘啼禽不能名秀芳多可攬招提就丘壑初地首鉛槧精廬爛金碧净供歡藜糝佛香書綿綿法鼓晨紞紞林風忽飄搖天樂隨簸撼靈泉初發䝉溫液遂盈坎異源判炎涼及物萬塵黕西南江路永水墨畫色淡漚鳥破青冥帆檣出葭菼吾人事探討絶境更平淡悟真心自知得雋首獨頷剪茅地夷爽築基土强㯺長松啓門扄怪石列窊窞遂初本逍遙知略貴剛敢原注孫㑹宗智略士頽齡惜鬢髮壯節露肝膽由來抱軒昻豈復甘黯黮辭滿異多秩摻祛嗟不寁髙風故難繼弱質因自感赬肩疲負任勿藥羞是㿊願言爾為鄰寧使我餘憾即今桑榆景光翳將就暗潼關上有蒼蒼山下有渾渾流兩崖類築甬中道才容輈關門密相望設險非一秋借問前代人屈指嬴與劉乃知伯王功天險參人謀百二制六國一面當諸侯東慙洛陽薄北視朝歌羞時平郡國通官守輕戈矛旅程兹出關悵然為淹留汜水關四山環若屏土色類堅石青冥積靄間古徑漏天隙虎牢一何險飛鳥不可歷狹處乃容車天形正修白山行十里盡路與洪河直驚波走狂沙澒洞踏虛壁寒光著面目噤㾕避劍㦸殷然出地雷下與干仞鬲壯哉造化功置此限南北乃知巢居民老死皆異域帝鴻始舟車夏禹勤底績輪蹄日相尋隘路遂開坼因緣楚漢交英雄因智力殺人何其悲貽患實自昔西風卷零雨昏霧白日匿泥途未遽央客子怨行役春日涼榭寄戴大臨老去苦無悰春還暫真賞念無俗慮侵得以山林往尋幽喜人逺習靜憎禽響東風日暄和觸事全勝尚晚步寄徐從道日夕興頗適逍遙步城隅連峯蒼翠間決溝見平湖鳥去一何逸白雲與之俱太虛自無礙真意寧有拘春華白靄靄欣欣動羣枯園畦亦成趣嫩栁榮寒蔬思君昨相語水木西山居況此天氣新田野多歡娛注想已自爾念歸定何如秋園夕陽下西山反照林杪赤初驚秋事早逺見霜葉色山林得吾心消散理輕䇿翠香襲晚秀柔紫拾新坼涼蟬時一聲棲鳥相斂翼還歸卧南簷初月照虛碧寄王固子堅時在固陵治田蘇秦六國相晚被讒慝名使有東郊田安得留此聲古今事可知達人盡躬耕多君家事治竭力從老農白水負郭田百頃畝一鍾耕亦勿鹵莽耘亦無滅裂秋成霜滿畦玉粒勝白雪我懷沮溺心早晚從君游且當學林類行歌復披裘陸瑁養魚池何兹水鄉士尚復穿池居寧知湖上龍不是淵中魚漪瀾杳無際緑净望有餘寂寞垂竿叟嘯歌方嵗除自舒城南至九并並舒河行水竹甚有佳致馬上成五首升㬢上南山千峰雲碧明晨風激寒水琴瑟環佩聲蠶老桑柘空麥熟黃鸝鳴浩然田野興遂爾忘都城髙髙嘉樹陰下下修竹林水光搖日影人語亂鳥吟興適盡佳境有逢皆㑹心安知道路傍前更登嶔岑一溪分百泉一泉流十家惡竹莽連雲古樹橫帶沙魚子戲稻秧鳬雛接荇花信美非故鄉無由寄生涯溪水轉山曲杳如天際流淺瀨不解衣浮查曰為舟惜無同心子此地聊淹留但愛溪上兒蓬頭坐垂鈎南山近仙居太古餘積雪陰寒五月寒松檜為之折如何車馬客塵土倦炎熱揮手謝世人吾將與君絶自曹還都舟中奉酬子中見寄結束遡都門歡言瞻上東宿舂不成裝徒御殊忽匆傾城千萬人髫稚隨老翁攬祛强我留路隘馬不通志微術無多舉動非材雄畦隧不知拙雕朽寧謂工尚憐畎畝民欲使衣食充吏課才第六名品出下中豈期此邦人念我如豳風竟慙不赫赫用底書成功人事非有常物變何必終移是趣日新應諧猶不窮恥為堅白辨判别僻與𠂻由是知命來但覺心源空思君天材異汗血流驃驄定交既非晚接武崑瀛蓬嵗月使人驚冠帶昔兒童别離過三秋㑹合今復同新詩思何深清月醒困䝉相哀蹇無成為客謝諸公奉酬孫少述意合非有求道逺義彌敦詩書獲我心將老遂不諼頺齡若馳波哀逝稍不存念君稅馵羈飲水棲衡門正容悟失道已矣將何言還家久客常念歸還家自深願雖非湖海遊早己時節變果裸施于宇蠨蛸巧相衒墻根思哀蛩危棟辭歸燕貧加鄉閭慕病益兒女戀棲遲免路旁未厭茅屋賤衡門過涼雨秋草盈芳甸耕耘倘及時筋力自此勸雪中檢故書見王深甫書因寄積雪閟窮巷天寒四岑寂常時能來人今兹亦絶迹探囊理文書卷軸浩堆積嵗序往不留其人或成昔忽如二三子共此笑言適我遊皆可人回也實莫逆詩句何軒軒有若風中翼使我多聞知令我手不釋聞君不作官作官固無益由來全生士不以時世激請問紫芝翁寧知五鼎食開門望四野天地漫無隙老鷹凍不飛何由寄消息送張七和州判官從仕如博奕百萬繫一擲君看大司馬二十好顔色與子昔獻賦共登東堂籍留滯向十年尚為諸侯客我愚數亦奇連蹇不自惜念君復何為無乃𤣥尚白時平棄奇節幕府鮮籌畫譬如塒􅀈間安用鸞鵠翼髙秋江湖深莽莽烟水碧輕舟犯蛟鼉勉子慎行役三女岡吳女飛若煙兹地留爾名上有愁雲陰下有蔓草生如此粲者何遺恨若未平寧無東平樹靡靡向孤城澄心寺後閣彈琴髙風動長松蕭瑟清我心亦有琴上絃盡得天外音試復向城市餘響終難尋首春學省同舍十一人集王彥祖為主人分賦十韻得河字意逺智無涯樂少憂常多浮生共兹理達士默謂何嵗月如奔車冰霜變陽和廢書獨長嘆倚席仍浩歌王子家千金世勳誓山河敕厨具豐羞載酒信所過重簾篩徑風暖日蘇庭柯左手持蟹螯一釂朱顔􅋳衰老愧投分愛賢心匪他相矜不及門聊欲陳四科養魚知此升斗狹鱣鱏非所容安知庖所捐後不成蛟龍為爾釋囚拘置之清冷中不有網罟憂安見拯濟功掉尾一何歡餘困猶噞喁孰云我非魚正見所樂同小雨十日無油雲一春無奔雷天事不可知號令於此頺疾風生梁棟宇宙如沈灰驚霆萬車走激裂山石開此聲昔未有曩意非所猜況聞波濤音洶洶千里來雖無為霖實猶得驅黃埃終憂稻粱枯所濟蒿與萊蛟龍樂盤嬉既往寧復回茫然怨雲漢赤日方徘徊檢覆郟城旱田示同官及寄河南諸賢昔嵗歉無年今夏仍荐饑罷民去南畎賤價捐東菑籍籍道路間餓者何纍纍藜藿不充腸􅒒然旄與倪嗟我祿代耕每食為不怡徒懷仲由志身賤那得施屬城上民訟比牒皆苦詞奉詔實有無百聞謝一窺星言說桑田行與父老期觸熱不敢休重趼寧告疲郊原赤如赭秉穗無孑遺墾藝不可分四旁生蒺藜流行誠代有愚弱豈易欺附上亦有刑殘下罪攸司鄙夫不忍此告吏咸赦之庶兹咻噢恩足以蘇惸嫠大農急經費言利析毫釐二吾猶不足一切寧謂宜國僑敏爭承鄭邑用不危馮暖焚劵書田氏人若歸區區二小邦兩士能若斯當官在必行匪石安可移諸公悉吾友此志良弗非當令徇路人一聽狂者詩退朝慮淡事從簡興發謀豈豫退朝建禮門走馬長楸路陰風脫林槁朝日破寒霧簡書亦優游賓友慰遲暮神仙未嘗學臯壤欣所慕靜境出自然勝遊非浪聚杯觴謀須㬰肴䔩訊無慮賞音愧聞弦和歌容執御引泉詩睦州龍興觀老君院作上嗣位六載吾宗刺桐川余來拜旌㦸詔下之明年是時春三月繞郭花蟬聫嵐盤百萬髻上插黃金鈿授以道士館置榻于東偏滿院聲碧樹空堂形老仙本性樂凝淡及來更慕𤣥焚香禮真像盥手披靈編新定山角角烏龍獨巉然除非净晴日不見蒼崖連上有拿雲峰下有噴壑泉泉分數十派落處皆琤潺寒聲入爛醉䀨破西窗眠支笻起獨尋秪在牆東邉呼僮具畚鍤立鑿莓苔穿灇淙一𣲖墮練帶橫斜牽亂石拋落落寒流響濺濺狂奴七里瀨縮到疏楹前跳光潑半散涌沫飛㳬圓勢束三峽拄㵼危孤磴懸㑹聞瑤池溜亦灌朱草田鳬伯弄翠蘂鸞雛舞丹烟凌風捩桂舵隔霧馳犀船況當𤣥元家嘗著道德篇上善可比水斯文參五千精靈若在此肯惡微波傳不擬爭滴瀝還應㑹淪漣出門後飛箭合勢浮青天必有學真子鹿冠秋鶴顔如龍輔余志日使疏其源和原甫鄆州樂郊詩人事有背向勝遊不長絶聞公樂郊行慷慨矜嵗月東山翠屏秀盧水寒玉直尚有昔來人借問寧異昔蓤蕖亂幽芳梧竹凝茂陰始知秋意髙詎厭徂嵗深因宜付衆妨一作妙大巧當不為島魚皆自歡賢者能勿違華堂庇深沉臯壤極虛曠清池湛明輝寒郊無近響公來㑹旌斾公晏盛笳鼓魯酒若醍醐齊謳艷巴楚采芹自胥樂食椹懷好音因成池上篇為想思歸吟劉太尉廟原主燕人劉審交世亂爭鬭繁廢興不可載磨滅幾何人獨兹有餘愛空同氣雄武燕薊風慷慨曽是鞍馬間而為治民最桐鄉舊墟好峴首遺碑在嵗久梁棟傾地荒松栝大古今猶過隙俯仰成百代咨嗟畎畝勤勳業非永賴欲雨寄張壁秋事亦已中江南故炎溽北風三日雨正氣還凄肅身老慮深簡官閒睡常足庭陰墮長梧園芳亂新菊借書喜未見釀酒欣初熟優游諒卒嵗何用恨幽獨雨中寄子直繁陰不時解雨氣如深秋朝衣始絺葛暮服乃重裘天事亟變易得為有常不如何世上士欲以全自求行身繩墨問蹜蹜空白頭唯君可語此意豪力且遒通衢雖泥途未至乘扁舟興發騎馬來墊巾故風流林都官種花休跡異從告退居乃靡祿勞心不治人寓興此嘉木客來啓荆扉側砌紛衆緑名存洛陽品秀出海南族理㑹意必歡誰能傷局促時當載酒過三徑成幽熟送邵興宗之丹陽赤日裂石土萬家如烘爐君行何事役似為貧所驅埃塵稍去眼雲景日蕭疏扁舟乘長風倐忽遍三吳六年羈旅倦一旦誰掃除慎忽忘回首浩蕩江山娛彭城集卷五
