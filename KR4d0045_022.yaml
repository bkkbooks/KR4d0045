body:
  text: 彭城集巻二十二宋劉攽撰制誥賜翰林學士蘇軾詔省所上劄子奏乞外郡事具悉昔之賢臣嘗曰雅意本朝而以出入禁闥為樂故雖多病亦不願其得郡也卿以詞學論議朕所虚佇遽請補外將異于古乎約巳就退自為謀者可矣而朝有輕内之嫌重非所宜勉恭職業毋違朕意所請宜不允故兹詔示想宜知悉朝散郎太常博士丁隲可右正言制法語之言抗直之論士友相與或莫能受況夫自下劘上以義弼主言之非難也惟其信而可復則無訕上之譏而獲將順之美諫臣之任授受之際其不易矣吾所愼也某資性温粹學問䟽達知前言之與往行有直質而無流心使之正色當朝危言抗議宜無詭隨以違道亦不訐激以取譽是用擢于曲臺躋之右省伏蒲牽裾以竚來效朝散郎右正言丁隲可左正言宣德郎秘書省正潁州萬縣令充後省刪定官葉唐稽可宣德郎差遣如故制修令二省雖未成書而其年勞自當進秩俾其稍遷以循往例脱銓管之籍為朝閩之漸欽承光寵益自勤飭尚書右丞劉摯可尚書左丞進封開國伯加食邑實封制四輔之地二公覃化王政用為粹美民人以之帖泰具瞻所寄慎選維重其有德業素著績用已效任賢勿疑吾以為準具官某全材博厚是為大器純德淵懿至于積載經濟是任鉅細必宜惟深以通天下之情惟㡬以成天下之務粤繇風憲入丞文昌六曹率職以無曠四海承風而知服今左轄虚位臣鄰莫先宜推已試之功更示峻遷之寵賜國加賦以符休命噫股肱惟人喉舌賦政任重道逺匪賢曷充惟爾夙夜浚明以副羣望同知樞密院事安燾守本官知樞密院事加食邑實封制參帷幄之謀據機衡之任折衝未兆眇微必察憺威無外遠邇咸服是所謂股肱之良社稷之鎮非我舊德曷籍勇士關決郡務會計金榖必得文墨論賛以為倅貳故常使監司薦其宜者今使者以爾上聞其所譽者必其已試往莅所職母敢廢怠朝散郎勾當左廂店宅務李敦頤可權通判瀛州制倅貳之職佽助其長事無不關謀無不預惟協恭而謹信深思而強敏奉上則順帥下則服河間大郡帥府所在用爾為倅推擇而進勉慎職業期可稱述朝奉郎孫載可通判陜州制自關以東分陜為重水陸交湊民俗繁多郡治之佐其亦難矣以爾從仕滋久効力可見推擇付之實為妙選甘棠之詩美在聽訟景行賢傑尚克有立奉議郎余景可通判莫州制郡邑被邊兵民雜處應接聽斷其任維重守將之下宜得陪貳以景練歴事務未嘗曠失足以綏輯夷漢寜固疆圉徙置文安勉就成效通判隴州曾阜可通判邠州潘行可通判隴州制朝廷之用人常使其優裕樂職無内顧之患則能盡其智力故有嫌者許其自列從其所便則上無掣肘之慮而下獲伸眉之幸矣爾等並倅藩州克勤民務惟阜避玆芥蔕與行易地而處宜體茂恩勉圖報効廣東轉運判官張升卿降一官小郡通判制蠻越遐阻聲教闊遠所以使王澤逹下人情徹上民無邪慝之咎吏絕苛嬈之敝在于監司廣吾視聽智不及是責奚可逃汝出分使指綿極海嶠而潢池之民恣肆狂狡烏合之衆圉冒城壘不能覺其萌芽至于繁熾及至興兵討捕又乏謀䇿將官使臣恣為威虐良民編戸多所殘戮論汝不職奚逭嚴罰貶秩一等以儆庶官俾倅小邦佇觀來效勉務循省母負寛宥前知華州王子文可差通判大名府制向分左符出臨劇郡弗良政術頗致人言朝廷未嘗棄材有以代匱俾為倅職用閲来效夫魏大之區千里畿甸軍府之盛一時稱雄汝之蒙榮亦為幸矣母敢以有命為説怠墮人事仍取咎戾也宣德郎知京兆府長安縣王鑒可權通判岷州制西方諸郡外禦羌戎兵事民務應接非一惟守將之重宜得佽助故敕漕臺舉能者而補之今使者以爾來上譽必有試來效可期錫爾新命勉崇善最奉議郎監粳米第八界黄思可通判大名府制魏大之為都㑹而管鑰在焉尹正之重佽助惟難爾以材選粤當時任宣布詔條盡力民務有以自表用副朝寄宣義郎向宗傑可權通判安肅軍制西北州郡被邊者非一倅貳之官不調于吏部而中詔親授之所以為慎選也今以安肅付汝無以私壘為小怠於戒儆無以蕞邑為易慢于刑政戒之愼之實副寵命新差通判滄州劉撝可通判定州制河朔重鎮威總兵要而稱帥府定為極邊益加重焉倅貳之職厥惟艱矣爾前以掄選倅于渤海今徙之中山地雄望崇宜有以稱之毋致弛懈以孤休命朝奉大夫保信軍簽判蹇序辰可差權通判滁州制案蹇序辰父周輔曾知廣州故制中有壤地相接雞犬相聞之語前為諫臣黜而仕郡思愆補咎為日巳久朝廷未嘗棄材必有稍遷俾更倅守仍付便郡而父為一道之帥壤地相接雞犬相聞爾知其為榮乎勉務恪居母孤寵命承議郎充秘閣校理梅灝可通判杭州制朝廷以學術選士政事課吏其能兼備者可謂才良矣爾讐書東觀始以文進今復命爾倅貳劇郡試其為政東南都會惟杭為大謹奉詔條深察人情事將無難民譽可致也承議郎余景可通判信安軍制仕宦者以資級為階州城軍壘夫何間焉然為副貳者奉上使下皆宜有度疆埸外禦兵戎雜處汝旣更之矣益思勉懋趙濟可降一官差唐州酒税制因縁材選得任邉寄力不能強毅威敵亷不能清白率下而耽恣博戲牽强僚佐自處必勝衆莫敢校責其償進過於奪取無恥至此為辱已甚宜從貶秩之罰以肅慢官之咎酒𣙜市征之繁足以効力克已悔過尚能自返龍圖閣直學士朝奉大夫提舉南京鴻慶官盧秉可落龍圖閣直學士依前朝奉大夫充寳文閣待制差遣依舊制王者視民如傷故常有不忍之政為仁不富故常推陳錫之惠豈其作法于凉歛怨為德使淪胥之酷被無知之甿哉具官某往以淺謀建為邦計紛更約束峻列科指見小利而欲速推忍心於必獲密網布設購賞積重牢盆之饒其登籍者無幾纍絏之害或連坐者半道東南之民父子不保事雖已往謗者未息宜示深懲以戒惡吏奪龍馬之峻秩仍琳宫之舊守尚為寛恩宜自循省知制誥吳某可加勲封食邑制詩云濟濟辟王左右趣之蓋上帝之祀以顯相為美在廷之臣以與祭為慶禮成于上澤施及下古之道也朕無間然具官某直諒多聞靖恭守位論議合五諫之㫖訓詞得三代之風兹朕寅修禋祀對越穹昊惟爾鳴玉以相奉璋攸宜方熙事之備成旣大賚而錫祉亟頒寵數以復厥勞開國書勲實有常典膺受恩遇母怠欽承知制誥石某可加階封食邑制古人有言天子之尊惟其以公卿為正長子男為師旅也國家賔禮近臣隆厚寵數開國錫命備存彛典具官石某向以美材進昇右掖服勞侍從之事贊襄禮命之書朕以寅祀昊天大賚四海凡列位著畢與慶賞惟爾聞望簡在朕志庸舉舊章亟疏新命兼官崇峻封邑陪敦班寵有加名數偕異祗服優渥無怠厥心四蕃大首領鬼章可陪戎校尉制嚮以強梁宼犯邊圉稔惡盈貫係縶來獻朝廷隆好生之德廣柔遠之略被以厚恩貸其萬死分其種姓之息嗣部族之黨類旣知服罪咸願乞恩宜崇盛典以收來效俾脱藁街之戮仍賜漢官之命膺霑殊渥母貳乃心右屯衞大將軍知潞州郭逹可觀察使知河中府制禦侮之臣嘗以一眚致咎矜其舊力收功末路爰疏茂恩以示殊渥具官某武節自劾智謀有取嘗位樞府亦分將閫留落不偶蹉跎暮年不能復鴈門之寄亦足深東武之歎宜復亷車之秩仍分符竹之榮勉爾激昻報我光寵皇伯均州防禦使世雄可觀察使制九族惇叙所以隆公族之恩三考陟明所以謹外朝之治非夫飭躬自喜辟咎無疵亦何以克播休聲膺受崇錫皇伯具官某地居近屬身載美材闕廷覲見之恭未嘗曠失宗室信厚之譽足為表儀舉其年勞詳案令緒宜示展親之典用伸加秩之榮進假廉車茂宣使指寵光之盛負荷實艱惟匪懈可以終譽惟謹度可以持滿勉焉愼思母墜休命朝散大夫致仕趙宗誨故父任給事中贈司空賀可贈司徒制宗祀覃慶無間幽顯矧為著名前朝詒法後裔宜加異數以慰幽壤具官某父某德操修立著聞縉紳官閥顯榮驟躋責𤨏旣縁子貴追賁公袞進陟教官之長用為泉室之榮魂而有知歆此殊寵故永嘉縣君姚氏可贈榮國太夫人制宗祀均澤無間幽顯矧其德著閨門慶垂後裔宜加異數以慰下泉具官某母某氏慈淑自修窈窕著稱旣縁子貴肇啓郡封進錫䄖翟之華益為壤戸之寵尚惟陰魄歆此恩榮禮部員外郎郎安詩弟司農少卿安持故父任觀文殿大學士吏部尚書贈太師開府儀同三司追封舒國公充可追封曾國公餘如故制股肱之臣社稷之鎮累功積行克永終譽生榮没哀兼極休命粤因大賚申隆贈典具官某父某事君以道謀國以忠經緯王度調飪鼎實利澤施于海内標矩存于士林臧孫宜其有後二惠迺其競爽蓼莪之報明發載懷屬此合宫之祝覃彼漏泉之澤追崇麟野之封增賁龍章之服尚惟幽壤備歆光寵通議大夫致仕李及之故父贈晉進邁可特贈開府儀同三司故母華原郡太君張氏可特贈榮國太夫人大中大夫致仕程珦故父贈吏部尚書遹可特贈特進故母孝感縣太君張氏可特贈廣平郡太夫人制宗祀均福普及幽顯所以昭孝德之光于四海亦不遺小國之義也夫為善在躬鍾慶于後閨閫之休後昆貽慶源流深永本盛枝茂慰其蓼莪之心申以漏泉之澤李及之父開府之貴禮視上公程珦父特進之貴位次上公錫兹密章增顯幽壤李母某氏親封大國兼采美郡程母某氏湯沐之邑疏以郡封雖不及魚軒之華姑畀以蜜章之寵燕國太夫人某氏可特封周國太夫人制愛敬盡于事親孝弟在乎錫類是以明堂之祀大賚漙天之澤凡預周行咸此報德具官某母某氏令儀懿行是為女師象服魚軒旣從夫貴暨以君羮之遺益為子舍之榮茲因受釐之成俾申來諗之志啓封大國書社成周崇是寵章用疇慈訓左藏庫副使致仕王慈龍圖閣直學士朝議大夫工部侍郎克臣父可贈左金吾衞上將軍母可贈普寧郡太夫人制合宫毖祀大賚子衷照天漏泉靡不周普以某等故父某故母某氏天裔之出邦族之彦鍾慶後昆克生良子尊列朝著應受顯服慰其明發之思申于幽穸之寵執金近衞普寧大郡視亡若存哀榮備矣國子祭酒集賢校理鄭穆可直集賢院充諸王府侍講制昔東平王有言為善最樂時主稱其言之甚大史臣載為美談夫以經術為意聖師之教日陳於前左右勸誦温故知新此其為善之樂其益茂矣今吾賢王蹈之求其端士舊僚以望其府惟某端懿淳諒博通藝文其在秘府綽有令譽還之講席以輔美志增麗正之峻職為儒者之榮觀宜思恪居用疇休命職方員外郎黄景可楊王府侍講制經術造士所以貴於儒林之官又況其勸講賢王曵裾大府其為愼揀良可知矣某幼壯好學耆艾稱道輟自臺郎之選俾從楚醴之游正心博古務崇職業承議郎張獻可太學博士制博士之選為人師者也身帥以善豈特經藝廣習而已乎以某前歴郡宰頗崇善譽使居太學誨誘貴游孰曰不宜其勉之哉試太學正吳師仁可試太學博士制講誦師言訓道國子太學之官未有位著於朝而以道藝為勝實儒者之美仕榮遇也不以貧賤為恥不以留滯為歎惟有志者充之然國家選第吏課選叙有等由學正而進博士是亦疇庸尚德之謂汝膺是選勉服休寵監察御史楊康國可開封府推官制京邑浩穰獄市攸繁為之長者挈提綱領於上宜得佽助張羅衆目於下以爾材具修整應物知務肇為御史休有佳稱使之貳官京兆宣布詔令宜其禆益足副遴還朝請郎工部員外郎石麟之可開封府推官制邦畿千里人以億計使萬室焉有一氓之訟不為多矣而不可勝聽也京兆之屬吾甚重之以某久吏老成居有善譽徙置幕府宣布詔令畫婉決繁足以期待開封府推官制王都千里之畿輦轂五方之地民庶雜處情偽萬端聽訟察詞發奸擿伏尹正之重其貳唯難以爾學通古今材任繁劇藝而逹則從政乎何有強而毅則臨事而屢斷是以擢於三館付之㑹府爾其虚心以輔畿右由衷以審羣情粤其愼守以永終譽才人馮氏父贈駕部郎中紹可特贈朝議大夫母崇德縣君李氏可特贈仙居縣太君制積善在躬鍾慶覃後克生邦媛列職婦官屬宗祀之受釐迨漙天而均福漏泉之澤及幽莫遺宜峻寵章以從贈典母宜易名城以隆贈典蕃官内藏庫使騎都尉李阿理可特授皇城使封清河縣開國男食邑三百戸制朝用覃慶溥及微細爾預列官次例宜進秩東班之首使聯為重開國賦邑併増異數祗莊戒懼以荅休命觀文殿學士知鄭州孫固可兼侍讀提舉中太一宫制朕博覽前載以求多聞惟古今治忽之原賢淑經綸之要粲然方冊可從稽考思得龐碩備于顧問具官某氣質渾厚心慮開敏挺然素絲之節至于黄髪之年既嘗歴位樞機陳謀幃幄忠言盈耳讜議協心是謂老成宜在法從俾造虎門之詔以緒金華之業庀職殊庭增嚴整事勉服休寵副予簡求知慶州范純粹可寶文閣待制再任制封疆之臣是付方靣之寄詩禮謀帥實得中權之要折衝禦侮不違尊爼之間知名勇功乃居繩墨之外朝有懋賞吾不汝私具官某智慮開爽量力宏厚正固以嚴戎律忠肅而得士心好謀而成從善無厭自昔分間綽著威名隱若千里之城晏然三歲之戍敵情屢効邊烽無警宣疇異庸進擢優秩登延閣之妙選仍青油之重任軍中立號以勵虎臣省戸峩冠無負儒服恩榮並進汝其念哉太皇太后殿楊氏等夫人進職制聯籍東朝承恩内闕備兹斗秩無違宫事屬中宸之奉冊方庶類之蒙慶宜覃恩渥用賁光華太皇太后殿張氏等四人進職制上册長樂是為大慶加惠小星抑亦前烈惟宫事之嚴密矧司存之等差祗服恩榮母怠勤恪龍左氏等十一人進職制某氏等咸以貫魚之序親際從龍之會依日月之融光宜雨露之溥及稍躋女御悉有司存祗服恩華益思勤恪大理正燕若古可國子監丞大理寺丞李舉之可都水監主簿制九寺之職事治獄為劇爾等皆莅官大理是巳試於其難者屬此官罷徙爾他局夫猶斧斤之於攻木根節可解若其餘則易而無滯國庠總胄子之版都水主溝洫之事以其明辨何有弗治母曰弗類勉力自効宗正寺主簿王柄可太傼寺丞朝散郎張向可光禄寺主簿制九寺之屬位下而秩薄然皆朝庭愼選可以漸於榮途矣以某等為吏有嘉聞敘而用之宜自竭力以副寵命朝散大夫衞尉少卿韓宗師可直祕閣提舉鳯翔府太平宮制公卿之世能以修行自立朝廷之所尚也為其承紹世美而可惇勸顯官豐秩夫何吝焉爾儒學吏能皆有可紀至其色養不違仍信於人向嘗擢登書館退避不就屬乃父告老得謝朝有著例復申前命以旌才良輟卿列之副貳總殊庭之釐事祗服休寵益思勉勵朝議大夫知密州王説可知涇州朝奉郎集賢校理鮮于師中可知鳯翔府制邠岐二邦皆國重鎮内修民政則良守之事外憺威聲則名將之略朝所付予是焉愼重以某出於卿族屢膺藩寄以某向更戎瑣嘗著能效並付連城之寄列居千騎之長夫中和豈弟所以愛養南畝嚴重明果所以董正師壘勉力勤恪以副推擇西京左莊庫使高道禮可知安肅軍莊宅使文州刺史朱衍可知全州制朝廷聲教化及朔南屬在邊隅奉琛面内而邊圉之在仍所戒儆常擇良守以屏要郡爾等咸以知畧夙備推擇宜付左符之寄益示專城之寵北抗河塞南極湖湘治民訓戎事惟一揆勤力匪懈以就來效知南京王震可知荆南知湖州林希可知南京制方面之寄所以屏翰百城郊圻之重所以保釐千里朝所付委二者惟均材之所宜試可乃已震學以知務智足應物希心慮通逹文采彬蔚而皆詳究吏術輝赫民譽在此無斁去常見思夫荆州全楚之舊也震徃莅之以宣布于蕃之治睢陽王業所興也希就尹之以陪輔維則之化並膺休命益思要術母有怠忘用副銓擇知趙州杜紳可知濱州太僕寺丞朱勃可權發遣虢州知濱州張奕可知趙州知虢州張仲容可知建昌軍制吏治弗修民用離散輕去田畝起為刦奪此豈元元之素心哉吾甚閔之虢略闗西之巖邑渤池東齊之奥區二邦之人今或失職汝紳汝勃以幹敏著稱是以選擇往莅撫之昔太叔誅雈苻之盜以安鄭國以猛治者也勝之而已而龔遂謹農桑之課以厚齊俗則允安之是為美焉景行前人庶必有立夫事上者不一其宜亦有工于此而短于彼度材而處孰不致治惟奕與仲容試吏之久俾其易地勉思竭力向萬聰男思遷承襲制歸義向化嵗月綿久年齒耋老求自便安願以州額付其長息宜聽承襲以光種落向思越姪載舞承襲制思越之亡子當承襲以病自上求與從弟不失種族而付印章有義存焉宜從聽許汝以非次驟膺厚福祗服恩寵毋敢曠怠故嵠峒都巡檢向思景男載舜承襲代父名目制向載舜父為漢官忠順自効今也則亡義當置後爾以適嗣法當承襲撫綏部族庇育族屬體兹恩寵當盡報効銀青光禄大夫檢校國子祭酒充溪洞恭順知州兼監察御史武騎尉田洪奬長男思世承襲制徼外向化膺受天爵父殁子繼厥為著令肆爾承襲不待功効惟盡忠孝無忝崇寵宣德郎太常博士楊國寳可成都路轉運判官制博士儒者之選也國寳居之衆以為宜而大臣薦其博學可使在讐書之列國寳辭不肯當而薦者益稱其能夫士之好古屬文信為美矣豈若施之政事有以澤民之為懿也今以國寳為刺舉之官付之百城之任凡其財用之所興出官吏之所分部舒慘澄汰其務非一蜀端逺於京師朝廷之所眷顧愼爾智術副吾遷擢奉議郎安惇可䕫州路轉運判官制前奉使指往莅左蜀未及報政以憂解去旣畢祥琴復還仕版粤假傳車之任佇俟將明之最古賢叱馭求為忠臣爾勉之矣朝散郎虞䇿可荆湖西路轉運判官制荆及衡陽洞庭之阻漕事之轉京師其行永久列郡之富百吏之治遐遠幽隔又當周察使者之任其重矣哉以某幹力著聞前在蜀道職業未究今復付以八州之寄宣布恩令思稱任遇朝奉郎江東運判劉極可淮南轉運判官制將曹之重號為外計澄察􅔣吏則上之耳目均節九賦則國之淵藪然用吏之術久次則其效乃顯爾前在江介即有成績今復付之淮甸益觀遠畧祗服休寵毋怠初志新利州路運判温益可湖南轉運判官制湖湘之阻遠於京師所以惻恤民隱宣布上㤙惟使者為能副本朝之意前以某為巴蜀今徙之南州體予推擇之慎宜有恪居之效朝奉大夫新權知撫州鄒軻可江南東路轉運判官制將王命之出内明邦國之若否使者之寄為朝耳目誠得其人列城受賜以某歴試民事舉集時譽今賦稅之出江南為重所以使百吏畏法四民就業將漕有序歲計充牣選擇用汝宜勉之哉毋隳職業以孤任遇彭城集巻二十二
