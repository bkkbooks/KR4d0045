body:
  text: 彭城集卷十三宋劉攽撰七言律詩次韻和梁郎中詠太一碑原注御篆額呂舍人撰文孫密學書翠琰盤螭近王題芝書光彩賁雄辭方從薄忌真如在事絶鴻都豈易窺幼婦色絲輝錦組銀鈎金錯照琉璃暮年無望青藜燭時就祠官效祝釐次韻和郭固太保留别長句關西兵馬盛車鄰君向吳門望緹羣聚米山川都掌內折膠天氣及秋分大將軍令窮青海三受降城起拂雲壯士不甘文學老應須一劔取功勳年三十三年光過眼日復日世事無成三十三尚子幾時當畢嫁倉公殊恨不生男老知尚白書無益貧作歸田計不堪傅劔由來笑逢掖簿書何必減清談晨起汴上口占寄韓玉汝戍鼓鄰雞催啓關繁星未墜重愁顔雲含雪意朝寒外河帶氷光曙色間去逺不堪登灞涘言歸時復念東山梁臺客在文章盛修竹何當復共攀謝霍丘靜樂亭河陽種花春已滋彭澤釀酒醉無期宣城家聲故未泯單父絃歌方爾為會知丘壑潛高興新作池塘出夢思多慙嵇呂相思意空寄羊何共和詩海陵楚江葭葦帶青楓小市魚鹽一水通度日冥茫吹凍雨欲晴撩亂起涼風秋花舞蝶蒼煙裏古木啼鴉返照中扶杖階除搔白首可憐卑濕負衰翁寄陳和叔內翰六十衰遲秖自寬讀書無味細書難一麾已愧腰銀印百選何由及治官潮過石城如雪白山從鍾嶺似虬蟠元龍豪氣踰堅壯投牽能同客醉歡寄楊元素內翰四世清名悉上公看君羽翮勢陵空戲成爐鼎誇方士妙奪蓍龜執鬼中家有秦聲居自樂書非尚白智無窮華光講罷承明直墨客無煩賦射熊同諸公晚遊開寶寺福聖院微雨吹涼晚更清老人牽強逐君行縱談灰燼疑燒劫指顧樓臺似化城盤屈庭槐為狡獪扶持山薜喜縱橫偷間光景易侵夜十二街頭坊鼓鳴奉詔再任諸掾曹有詩因次其韻案題再任下疑有脫字天下英雄將相才自銘重石畫雲臺老夫不薄淮陽守明詔幸緣黃霸來豈有豹文容霧隱更慙鵬翼待風培諸卿相與望此府詩筆縱橫武庫開感事誤以雄名薦九重天書待詔未央宫白衣不召崔亭伯賦筆猶殘亡是公魂驚晚出芙蓉輦淚墮春生楊柳風衰鬢邇來元自白可堪回首望遺弓建業華藏院此君亭原注王介甫先有此君亭詩豫因繼後何可幽棲無此君層軒高下絶囂塵金聲玉色三千士雪戟蛇矛丈六身定有霜飈驚長夏兼疑寒谷近比鄰阿戎風味真難得好事由來我輩人答張屯田朝退過閣下諸公紫宸歸路接銀臺復閣重門相望開浮俗共譏惟寂寞高賢獨肯少裴回照人珠玉驚塵骨落筆塤箎寫逸才白日自嫌天上樂不應滄海隔蓬萊衰羸衰羸因底病相和留滯俄然去日多却是天憐令夀考任從人會作風波寬心總與歡欣受述意無妨慷慨歌更有南華書數紙鵬聲蝸角奈渠何途次馬上晨起寄章運判去年候客燕趙魏今嵗述職青兖徐無窮道路不相捨將老光隂仍暗除官燭鄰雞常曉色林花巢燕總春餘未知前古才士意為底願乘萬乘車傷梅聖俞直講都官論兵自負縱橫略獻賦端從遲暮年筐篋成書莫知數田園生計獨無錢郎官列宿為時貴博士三科不待遷已向九原悲蔓草尚疑吳市有神仙送劉長官桂府掌機宜桂林風物舊宜人雪片梅花五嶺春心喜大江流瘴霧眼看南極異星辰軍中羽檄時無警徼外明珠日獻珍酒量問君能幾許越猿蠻鳥易傷神雨後向景亭春泥軟熟步成黏水外風光一頓添境為偶來生喜色情緣久住失憎嫌黃鸝慣習沙鷗野古木粗疏徑草纖更向樽中得真趣天然柔旨不因甜酬送吳潛朝奉衰翁同嵗喜相收同病同心同白頭委吏除官俱逆旅瘴煙香草等荒州六千里外拋機略二十年來謹校讎工拙是非無會處下陂紅日若為留酬送羅朝奉二年流竄逐卑棲歸奉蓬丘顔向低病到鈞天都是夢老如濛汜已平西雨轓更沗魚符寵雙鬢誰憐鶴髮齊相愧清詩無以報回將燕石塞縣黎老去光隂若電驚此身已復愧扶行歸田悔不如元亮畢娶猶能似尚平曩嵗薦賢終未效太音從古竟希聲最憐閭里人相語北部威名動帝城冬至登樓澤國風光早早催陽生已復似春回不妨野史書雲物會伴南公進壽杯塵世光隂俱短日客心冥漠過潛灰此心未厭隆中卧亦任東風起蟄雷送高士敦成都鈐轄使君出守腰銅虎東第歸來上濯龍四姓禮容均馬鄧三刀形勝夢巴賨軍中樂事隨談笑徼外威聲待指縱壯嵗勳名當自致舅家恩澤不成封留别蘇安上高閣橫霄梧十尋回廊曲檻晝隂隂期年不就長楊賦晚嵗空為梁甫吟童稚相親俱白髮風波失所更情深滄溟極目雲濤壯相見胸中快病襟與顧子惇同為祕書少監今年余以病求守汝南子惇亦除河東漕作詩紀事亦用送别蓬萊閣下枕書眠一日除官不後先并土山河多馬地汝南粳稻濯龍淵壯心自喜談兵䇿暮齒長慙守乘田别後天中相望處參旗橫注太行邊郡樓望雪繞郭蒼山高復重東風朔雪曙雲濃層樓已出紅塵境到客寧知羣玉峰萬樹羽儀翔白鷺四原鱗甲動真龍玉尊清酒留終夕更看山明霽後松和通判裴庫部城樓雪後數刻又移半日間倚樓朝雪正怡顔委蛇原色蒼龍甲宛轉城隂玉帶環曾是茵憑偕出處聊於木鴈得中間傷春一振曹風陋不羡淮南大小山復雪九江舊瘴冬無雪三峽悲風近有氷山嶽出雲寒處處樓臺倚玉照層層不憂鴻鴈飛無力直畏蛟龍病莫興凍酒一杯還自勸夜窗飄灑讀書燈次韻宋職方雪梵天銀界談非想仙府瑤臺恨隔塵何事同雲移絶境不知高宴即良因林芳散漫裝珠蘂粉面光輝照玉人别舉一樽邀老伴迎春送臘秖三旬次韻裴庫部雪二首小雨駐雲風借威回眸千里玉山輝塗人竟比麻衣色野老時驚白鴈飛梁苑正應延上客齊宫遙想闢重闈誰云自鄶無譏者一曲陽春可見微似薄凝霜不振威端凌愛日奪光輝變成鹽浦風沙亂卷起濤江海上飛西望屯雲瞻魏闕正思鳴佩賀端闈孤城牢落無來客坐待山明見翠微太一宫奉安後得雪八通除道接層霄五日同雲映泬寥靈貺那從天馬下積隂疑有海神朝潤生塵陌無窮逺甘入原田不待消陋巷苦寒方晝卧靜無人迹到瓊瑤雪中呈通判庫部宋職方冬雪并今早兩回無風韻膩白皚皚麥根得潤萌芽緑瘴氣逢寒霧露開官為勸農知我喜心緣愛客望君來城頭甚有登臨境羣玉排峯銀作臺錢穆甫楊康功使高麗還為中書舍人書此為寄天子邊人二使星滄波一笑已揚舲大明照海陽烏近黑霧迎潮水怪腥北貊左肩輸䇿略西垣右掖付儀刑授詩三百成專對更看黃麻似六經酬狄奉議病臥湘濱面嶽山每聽鳴鶴憶蘇仙三苗地闊橫千里五嶺泉分會一川門有雀羅甘棄置人今舞袖足回旋梁公孫子丹青似傾蓋歡然秀句傳酬張伯常朝議郢人蘭雪有餘風盡在君家七字中白髮塵纓深念我青郊藜杖不如公鄉心正想千年鶴老計終須一畝宫不諱求田並問舍景山何必晚為通酬黃朝議自無籌略預材難非有文華聚筆端涉厯羊腸迷坦坦穿聨魚目愧珊珊嶽猿聽久堪頭白林實嘗來厭齒酸葵藿傾心由物性日邊依約見長安蘧公四十九年非萬事當須向老知材者不如愚者樂前人多作後人資羡君黃髮初傾蓋矜我迷津數贈詩聽話朱陵仙府事慨然清嘯一伸眉酬魏朝議鶯谷相從列俊英四朝容許濫虛名忍將百老言存沒乍喜三人詠合並春入芳菲皆意思酒隨衰朽即心情新詩不怪煩先唱猶向君前畏後生贈黃朝議黃公八十健精神逺近推為五福身樽酒不曾輕賤士爐丹時復遇幽人晚夸鄉里拖金紫早見兒孫列搢紳一事世儒難學處弟兄歸老樂相親次韻和孔朝議自愧專城無到客今晨錫晏喜君同詩言泮水始可與酒勝邯鄲長不空但有葵心傾日下待看雲瑞起封中高車清興底易盡怪似林間束緼翁和張給事喜雨勿驚四野連宵雨盡是諸山觸石雲雷響透空如欲墜電光劃暗總成紋祝官陳信無虛語梵宇凝香不斷薰帝力由來人莫識始知延譽屬夫君次韻韓康公行馬門闌與古同客車連軫響隆隆定知醉飽能容士常信康寧盡屬公剽得新聲夸耳性傳將佳句愈頭風文人桃李多無數珠玉旁邊愧此翁次韻韓康公二首疊石疏篁淺藥苗淡雲清雨意寥寥酇侯僻地規摹别荀令西濠步武遙繞砌芝蘭歡內集滿蹊桃李慰佳招原情獨恨飛鴻逺悵望三秋詠采蕭清汝泱泱紫邏深緑車紅旆付重臨聖朝不逆原鴒意逹士俱存塞馬心日赤報衙容晏枕夜闌留宴縱清斟鳯池何必全勝此薄暮歸休客萬簪王史館園鳴泉傍舍水翻車修竹連雲曲徑斜謝傅東山非獨往酇侯避地此傳家丹椒紅桂隨時實緑芰緋薇觸處花到客可能忘外事斷年相與玩芳華過柏林院僧吉長老有古殿吳道子晝維摩居士又有斷碑是寶厯年中記義岑襌師住院事靈光嵗久獨巋然峴首遺碑亦未遷會向三生記前佛暫從方丈識諸天篆香徐刻黃金印梵宇時開貝葉篇門外霜風正搖落庭前翠柏自安襌館宿有懷平甫銅壺上水掖門扄岑寂回廊起獨行日下屋山三面赤月臨天井四方明校經燈火初無禁汗簡文書不計程坐憶故人清夜語淡雲飛去隔層城曲阜宣聖廟夫子手植檜二首秀色拏空四十圍問年今已倍千斯移根信假杓關力息蔭寧無暖席時文字魯恭經改觀履綦鐘意想攀枝季孫亦自譽佳樹漫負甘棠蔽芾詩伐樹商丘去被圍似於庭檜特勤斯禹腰堯顙應遺魄柏葉松身異曩時恭梓二三千學士愛棠四十六孫枝原注孔氏今為四十六世攝衣下馬低回久更就清風一誦詩城濠泛舟同畢長官緑水環城十二里茅茨帶郭百餘家侵雲柳影不見日過雨荷香全勝花幽事圍棊翻局勢清歡煮雪試茶芽眼前景物自蕭散何必青溪向若邪次韻酬姚都官時會堂見寄百里昆岡半草萊畫梁危棟一朝開清川去水縈回渚喬木濃隂映緑苔子獻人琴俱不幸武侯營壘信竒才斷鴻牢落情愁絶聞笛那堪賦七哀遊船太液滄波北下流依然清淺可勝舟浴鳬鳴鶴輝輝日折葦衰荷淡淡秋勝境陳前終不厭機心去盡了無愁宋生善賦登臨興華髮相從免獨遊和朝金部感秋秋來無悶亦無悲世味年華老遍知黃葉暮蟬擕杖處斷霞鳴鴈倚樓時淮陽汲守容多病水部何郎最解詩咫尺音書那度嵗春風已復柳垂絲雙檜雙檜森森高出簷憶昨卜鄰逢吉占清風似主我為客冠蓋相向何凝嚴愛棠不能如召伯種柳自覺勝陶潛春暉漸永羣芳麗翠影看花一寸添題王金吾園亭烏衣里巷接城隅東第名園冠上都家事從前貴公子宦遊當世執金吾舊蹊桃李春相續滿地芝蘭德不孤故有鼎彞傳盛烈况聞圖史自為娛負暄聞道帝師仍負暄遙知愛景滿維垣鷹揚肯顧踆烏逝龍衮尤憐夸父奔赤舄正宜隨步武白駒那敢離庭軒野人皆欲獻天子他日期公助一言陳通議園亭聚星休沐事依然社臘安車不計年五福何妨兼第宅一壺元自有神仙種來珍木如人立移取名花奪地偏聞道都城曾問卜始知機石不虛傳杜介供奉園亭側徑羣芳經荷鋤小窗明日喜觀書下床便得山居樂深巷仍多長者車省事即知長脫灑養生元不待贏餘客來一醉聊相向莫問經年甔石儲酬黃安期推官見寄郴江清徹照毫毛吹笛平陽舍有蒿鄉信不嫌無過鴈宦遊正復長兒曹青楓雨後如人立南極秋來出地高齊難楚稱何日就釣竿元自欲連鼇酬黃推官既將魚目换驪珠富潤囊箱足賈餘顧我能知天下馬呼兒藏作篋中書老羞流輩為千諾狂守初心付兩如相助飛鳴竟何力秪宜空手講玄虛豫所居本章丞相舊第他日友人楊彥文為余道丞相時事因作一篇豫楊丞相以郎官始卜此宅不出都門二十餘年遂至台衮故末句及之酇侯常以儉為師僻地依然草滿蹊却指舊池曾浴鳯更攀喬樹憶棲雞清泉惡石皆吾有樽酒囊書得自擕誰道為郎多白首已看霖雨出蟠泥與成太博九同年會飲成四韻原注博士成黼李之純崔度祕書丞戴莊著作佐郎張于光祿寺丞高士綸觀察推官侯利建司理王該高陵主簿張公嶽江海分龍不計年異方傾蓋意歡然壯夫白首驚相問濁水清塵默自憐萬事過前都是夢一杯相屬獨非天得朋正復同心士賦詠能忘垂隴篇遊玉仙觀寄王四十紫府仙真氷雪顔丹梯岑寂試來攀翠鬟濯玉交團扇濃霧噴香暗博山不信異人能到此正憐春意已歸還吹笙化舄知君事猶恨來遊先後間京北流人嗟爾流人亦可悲白頭老叟抱中兒不羞逺作投荒客自恨生遲外戶時魚失江湖相煦沫鳥囚籠檻苦啼飢鄉原日日生荆棘説似旁人猶涕垂觀灌園偶書一叟汲泉搖轆轤老妻分水亦擕鋤青青宿草知春入浥浥蒼苔過雨初勞力不應嗤強勉養生何必待贏餘白頭當作於陵子身教兒孫種樹書和宋次道三館曬書天祿圖書一嵗開五雲遲日近蓬萊後生得見靈蘭䇿貴客都傾內外臺不似羽陵殘蠧簡正如金谷聚英材論詩老去無情思况是陽春未易陪送張器判官平吳舊族仕中朝湯樂徐馮已寂寥吾子白頭趨幕府同年黃綬亦雲霄著鞭跨馬須爭道奮臂呼盧更叱梟顔駟馮唐俱晚遇不妨青紫老埀腰次韻和張舍人北使歸飲氷重見古人心絶幕仍當暮雪深朝出穹廬隨拜日夜鳴刁斗候橫參胡兒射鴈爭娛客羌女聽笳却走林聞説敵情親博望一言珍重萬黃金兩府新第原注張橫侍郎先作用開字韻戲次之是時缺昭文不除聖世諸公起草萊君恩東第一時開排門畫戟交行馬轉肘沙堤接上臺衛國名亭緣伐叛平津虛館為翹材猶分長史待天下衰老詎能忘儻來乙巳早春再遊玉仙觀贈陳道士十里平郊不值人解鞍依約記前春問年已復驚身老遇境猶能發興新泉漲池氷舒鴈爪霜團庭檜疊龍鱗種桃道士長無恙自愧劉郎病滯身新廣柏悅堂後軒作七言南榮曝日足娛客北牖來風亦在豫聊以維摩開丈室便知陶令愛吾廬神龜大蔡昻頭際澤雉名翬矯翼初戲問庭前雙古柏閲人無算我誰如立春謝賜幡勝口號呈子瞻沖元內翰子開器資舍人立春幡勝紫宸朝正以金璫插右貂便覺陽和生暖律俱承慶澤下層霄竒零雪片依樓角容易風威轉栁條七十無能不歸去強將衰白向顔韶和前韻雪寒常怯月邊朝乍起東風拂敝貂銀勝綵幡分節物宿雲晨霧凝璇霄君為特逹千金璧我是衰遲百尺條叩缶烏烏聊快耳寧知報響得咸韶王正仲林子中聨舟西上過睢陽寄書率爾成詩為報大帆如翼畫江來鼙鼓聲乾虺虺雷洛水登仙惟李郭園延客得鄒枚寄書上有加飱飯傾蓋何時數舉杯想到石渠尋舊境秋花著子遍庭槐呂舍人北使漢德舟車萬里通赤心持節復平戎空同氣色連窮髮當户君臣聚引弓馬酒禦寒朝伴凍貂裘衝雪晝禁風清蒲固有安邊畫可待甘陳傅鄭功仲馮北使極北空同戴斗星越疆猶有短長亭漢朝正朔原無外邊地山河不見經雪擁旃裘綿欲拆氷生湩酪酒初醒我家四世俱持節送爾皇華却涕零王仲至使北朔雪如沙萬里程幽隂戴斗正嚴凝終軍何必功橫草沈尹無煩夕飲冰茗粥邇來誇湩酪氈裘仍自愧綿繒嵗寒拜日穹廬外想見東南瑞氣升早春郊外滿城塵土無窮極出郭風煙頓掃除春淺暗泉流脈脈日長歸鴈影踈踈強將拙計仍謀野等復勞生愧荷鋤安得面山臨水地種花移竹一茅廬贈楊次公祕丞莫將陽九歸時數自為乾封致吉祥必若中興待雲漢枉教流議及桑羊相望冠蓋交馳傳躬作犧牲屬奉常膚寸崇朝看變化吾農從此萬斯箱酬潘及雨同年祕丞困學那知三代英定交良愧十年兄斷鴻陳迹悲朝露喬木孤飛念友生樽酒相逢開口笑風波逺别使人驚海邊春色青青栁淚落陽關最後聲彭城集卷十三
