body:
  text: 彭城集卷二十九宋劉攽撰啓賀省副某郎中啓竊審光被命書贊司邦計伏惟慶慰國家備用厚生之德大農為之淵商功興利之權計㑹受其質必有副二協成懋和抑惟全材乃膺遴選恭以某官心術敏劭智符廓明資肅括以禔身惟幾深而成務素所樹立實為萬夫之雄疇其功庸獨處大牧之冠故兹明詔之下僉曰休哉而大賢在朝所存遠矣必且攄阜民之長䇿集富國之成勳而後超踐亨途欣逢袁業側聽輿頌實同慶詞回賀蘇學士詔啓伏審光奉詔函擢躋史觀本朝厚多聞之選儒士榮藏室之華非夫擅三良之能兼兩如之直曷膺遴束以副僉言恭以某官積學淵微軼材超特以直諒多聞之益被賢良髙第之求豈其拘纍日之勞是以不待吹而進側聆休命方集歡悰過沐華箋亟聞讜論佩銘之素啓處不忘賀判府宋相公啓伏審涓選榖旦和布政經四國于蕃實重股肱之寄周邦咸喜庸知豈弟之風惟商序之過中繄天休之純格恭以某官比德伊管致君勛華材大而志深器遠而任重訏謨樞斗既臻偃伯之期專席鼎司罙盛勑天之業百度時序九功可歌方均逸而優賢姑偃藩而賜履蓋袞衣信處周旦居東而見思四牡遄歸山甫徂齊而興詠矧輿情之素屬將天視之俯從還復階符之尊益隆風動之化某猥惟陋質獲預下陳趨及瓜之期匪遙于旦暮積在鈞之願實賴于陶埏敢冀上為宗祧精調寢餗賀宋相公判許州啓伏審光被僉俞寵更出鎮峻地官之茂秩宅昆吾之舊邦注意允隆德賞斯在恭以某官道崇聖相澤浸生民侔古人之致君在本朝而美俗上有日新之頌下推風動之休夫保釐東郊重于大邦之攸寄藩屏王室孰若四輔之為先然而畫一之規素存久大之業已著主上所以推恩而均逸易地而優賢在于海隅之心則藴霖雨之望側聽優䇿以副具瞻某向以庸虛獲覯符采聆介圭之于邁望鹿轓而載歡區區之誠一一奚盡與西京通判某太傅啓拜遠風儀驟移月律由眄睞之過厚使慕用之實深寤寐音徽搖蕩心斾伏惟綀氣自若衛生有經豈弟之符神明來舍恭以某官吏術通逹儒學精詳敏於事而有功譽所試而已效矧王都千里之廣河南二周之餘固賴長材以崇善教叔度來暮久播譽於輿詞齊侯報功豈候時於朞月益祈葆嗇庸俟褒升回齊州通判某啓承命來東問俗從事側聆臺妙出二藩條全齊奧區首推厯下連城要任雅屬治中頃熟稔於宏材兹有望於善治矧及瓜之甫邇將投刃而有初猥辱騰書過形巽與願言佩服曷罄敷宣回王尚書啓伏審增秩天官保釐宮鑰伏惟慶慰恭以某官智深迪哲學茂鄰幾臺閣粲乎休光廊廟著其法語治戎董武外震蕩於天聲利用厚生內周洽於民譽蓋尚書百官之本而治象之法最嚴邦畿千里之居惟魏大之風尤盛主上所以疇咨全德併疏寵靈敢謂謙冲過形撝挹騰示芳翰載窺絢辭佩服之誠筆舌奚究賀致政某宮師啓伏審得謝上臺歸休里宅峻二公之崇秩參六傅之近聨止足之風獨齊蹤於老氏體貌攸寄是所望於父師休命甫行輿情胥仰恭以某官純誠貫道清節鎮浮茂方叔之壯猷兼博陽之隂德社稷是衛定帝業於無疆功名不居奉天道而時若昔疏氏有海隅之樂留侯慕松子之遊髙風如存遺躅不嗣適大賢之有作雖異世而合符逍遙道樞塵垢蟬冕是以湖海辨說之士朝廷夙夜之賢扼攬以為美談思齊若將不及方將講臨雍乞言之制修巡守就見之儀範模老成光華惇史豈特掛車以示來世揮金而樂當年某縻縶小官阻前賓謁懷門闌之願居常慨然從几杖之謀更深仰止敢冀嗇神專氣綏福考祥賀三司某待制啓伏審光被䇿書主司邦計恭惟慶慰竊以畡數經入之賦厚生利用之權唯敏智足以有功唯幾深足以成務訂兹慎簡具曰才難恭惟某官器度淵宏謀猷膚敏倜儻扶義以特立珍睟入神而不窮陟降便蕃輝映中外而自雍容表列惇懋風聲謀國以忠搢紳推其軌範作法於厚遐邇賴其規模故適道可以與權對時所以育物爰正大農之柄一專司㑹之謀地若流錢劉晏之才素著民不加賦桑羊之畫罙深既成阜俗之勳必繼富民之拜某辱知最厚受賜亦深側聆休命之行逾積由衷之抃賀制置發運某待制啓竊審光被詔函擢躋延閣伏惟慶慰恭以某官英猷邁種精義造微由敏智而有功資正固而幹事蓋不牽於俗論宜獨結於上知乃其心計無垠利百變法管氏權術曾何足云桑羊析毫殆不能過固疇庸之所遄及而奮飛自是逾量不加賦而用饒自從欲而致治以是進參柄輔誰曰不然某早以弱材幸䝉左顧聆休命之亟下撫懦衷而載歡賀張丞相除帥啓眷懷舊弼誕播明綸還祕殿之隆名建上流之巨屏五侯九伯暫尋鈇鉞之征一日萬幾即正鈞衡之任慶關宗祏喜溢神人恭惟某官道冠古今勳存社稷扶世導民之術本自得於詩書憂國愛民之忠宜獨貫於日月當國家二百載中天之運正君臣一千年際㑹之期仗大義於版蕩之中變危機於呼吸之頃取虞淵之日功孰大於昌唐封函谷之泥略豈髙於全蜀既勒銘於鐘鼎旋正位於巖廊方布德以兆謀爰整軍而經武誓清沙漠剋復神州然而功成者天道廢有命在我何憂於用舍於時實繫於重輕身雖退而道愈光望既隆而忌益衆誰為巧舌敢肆流言曽蚍蜉之不量豈棟梁之可撼九夷何陋自安孔子之居四國是遒久起周人之詠斯文未喪羣枉幸消宜以人主注想之深慰八表具瞻之望遄召還於南服聊卧護於北門何煩三日之報成即聼十行之趣覲多士聞風而喜竚大老之來歸四方扶杖而須知太平之有日某頃緣恩契蚤辱記憐逮風波之橫興方羅織之肆起念寒暄候問無益於門下而事機偵伺或致於讒言缺然門牘之陳蓋亦三年于此仰止受恩之地未嘗一日輒移雖形迹之若疏尚衷誠之可鑒倘蒙畢照少逭譴訶庶幾餘生永有依怙重念某稟資劇陋賦命數奇蠢愚涉世之甚疏坎壈抱窮而未艾緣姓字嘗汙於科籍故蹤跡偶簉於閨臺曾越日而幾何亦罹讒而遽去冒寵甘分于罷黜嘖言更玷于恩私俯仰懷慙局蹐無措兹跧伏於里舍獲傳誦於䇿書自歎未路之零丁將託洪鈞之坱北收東隅之失意敢忘於桑榆賀大厦之成情方深於燕雀精誠並竭悃愊奚殫與轉運使某啓比者叨膺詔檢出贊郡條未間從政之方非有裕民之術矧乃連城甚廣生齒實繁顧關決以無堪將尸曠而為咎伏惟某官精心格物敏智通微飾儒術而自將掩吏師而獨步勤宣使指惇懋風聲某得以庸虛之資勉強自力竊幸於奔走承命或藉之使令於前實冀餘庥獲伸素願方趣裝而便道即拜謁而踵門賀運使某啓伏審光膺詔檢出總計臺朝僉刺舉之權士聳澄清之志傳車抗節屬城望風想聞英標大慰輿頌恭以某官髙節邁世醇文析微厯試民事之難緣飾儒術之美倜儻中立固自結於主知造次義形衆必推於國器眷是典州之重暫紆攬轡之威顧惟重外之嫌將有問釐之召即觀翔奮以極藴藏更冀保調少副言願賀運使某郎中啓伏審光被詔函寵分外計陪京奧壤地幾萬里之方美俗要權任則百城之重遴東攸集長材莫先想聞風聲翕變輿俗恭以某官心術該敏智符廓明紹扶陽之音徽著伯起之清德入專臺妙出總使華方靣藹於去思臺閣誦其故事復頒節傳益試將明必無淹嵗月之期行且隆卿輔之拜某幸分符竹實廕輝光阻前趨賀之儀徒積焉依之素賀運使某郎中啓伏審光膺詔檢移總漕臺伏惟慶慰恭以某官敏智絶倫精心格物回翔中外之寄著聞尤異之聲而自欽恤祥刑澄清南服九牧稱最三年有成惟經賦之所充眷浙河而居重遴簡所付擢材叵量休命甫行輿情胥洽某竊居屬邑方芘餘庥雖欣渙渥之榮仍結疲軒之戀敢希上為宋社精調寢興賀運使某度支啓伏審光膺詔檢行趣上臺使車表率之功國賦課入之數九牧居最三年有成士論翕然帝心簡在虛邇列而延佇嚴召節以授于天衢頗修國用資始伏惟治裝為去嗇神益康某久以瑣材獲依大庇免負乘之貽謗實棲廕以知榮瞻言四牡之歸徒積疲馬之戀敢冀精調寢餗以副禱祠與運使某度支啓樗散之姿瓠落無用幸得從薦紳之後竊嘗仰當世之賢雖慕用之誠在執鞭而欣願而迂疏之效獨踵門而後期伏惟某官智略逄辰德榮冠世言行為乎士範政術存乎吏師百城畏懷名實胥用各漕所入嵗時罔虛方將極淵懿之深謀酬尤異之凝績翔奮邇列光輝本朝某庇身小官局迹下邑繩墨所約胸襟無奇私景行於高山既䝉廕於卿靄敢冀上為宗祏精調寢興賀鄆州安撫某修撰啓伏審光膺詔選出領使符躋殿撰之華資按魯邦之舊土眷兹德賞允協僉俞恭以某官國器宏深天材長懋明照忽微之表文含經緯之風居為吏師能簡睿聽惟皥濟之奧壤據海岱之上游表率百城經緯千里實藉老成之智用專綏撫之權雖輟步大農固不以重外為慊而擢材麗正尚疑其遴柬弗章諒觀報政之期即有具瞻之拜某猥以衰朽獲庇輝光瞥聞新命之行罙積由衷之慶回濟州知州某啓叨膺詔檢濫委郡符川塗阻修坐遙於化境歌謠歡屬默聽於休聲幸餘潤之及兹企髙風而增聳方修謝牘遽辱幐緘研味絢辭著銘具臆伏承節宣有術啓居降康恭以某官智為吏師材洽民譽豈弟之政固賴於惟良金爵之褒即期於不次勉加保護自副願言賀孫杭州啓伏審均逸斗樞開府吳會九命作牧寵數愈光四國于蕃倚毗尤重蓋曰股肱之寄非有中外之殊恭以某官文茂經天器深華國極皇王之遠略輸社稷以元忠慷慨立朝必欲聲教之及古倜儻扶義不使功名之後時而自流沙際于玉關服領極於南海和戎之䇿魏絳居多柔遠之勳伏波為最遂正機衡之拜用嚴帷幄之謀朞月有成海隅胥慶遽讓德而戒寵暫偃藩而處休竊惟當寧之眷懷爰暨輿人之注意必無信宿將復奮庸回知府某大卿啓阻侍音徽疊更嵗籥執鞭興慕未盡其景行之心重趼而趨居常有見賢之願仰惟偃息巨鎮緝綏太和恭以某官寬裕足以有容豈弟敏於從政宏然國器聳乎士林論盛德而必稽舉良吏以為首以秩典郡九卿之選莫髙賜爵疇庸三事之拜非逺仰希上為宗祏精調寢興賀宰相某啓王春頒厯象魏布和風入律以應期星回天而更朔恭惟某官明誠格物淵懿矢謨咸一德以相時欽四鄰而敷化泰伯仁厚宜畀壽於勾芒周公勤勞方錫命於赤舄履兹令旦倍納純熙原注一本云天以山甫實保佑於周邦帝使勾芒方下賜於泰伯回知郡某都官啓向者假守江介日奉賓車傾蓋之歡屈指可記惟髙明之令德常慕用而不忘分手闕然馳光迅若猥沐左符之寄求臨淝水之陽側詢屬城審休汝之車騎遽因介使獲烹魚之素書厚意勤劬絢辭款密披閲于再佩銘益深恭惟某官儒術自將政績兼茂廣譽備於所試遺愛存乎去思方兹求治之辰每下旌能之詔即期飛擢以懋循良勉務節宣庸副言願回知郡某官啓叨膺詔檢出領郡符雞犬相聞幸接愛棠之境簡書攸畏生賖交臂之期方企下風遽承便置載披麗藻如挹緒言聆贊治以多閒矧陽和而增勝佩銘慰懌交集衷懷伏惟某官幹力絶倫風猷邁種出總赤車之任入嚴儒館之華偃息價藩雖重惟良之寄雍容邇列方推圖任之恩勉冀葆頤以須光寵賀知郡某郎中啓伏審寵被詔函出分郡寄朝家重惟良之選廷臣先厯試之材眷惟國恩允屬民譽恭以某官智推通敏器處閎深薦揚中外之聨籍甚簪紳之論是宜總專城之重任付維屏之要權士習先聲咸想聞於豈弟帝胥成效將表用於深嚴某猥以寡才率叨聨事將遂依仁之便良多就義之歡行俟彼瞻更蘄葆育回知郡某官啓伏審某官涓休榖旦和布郡條郭伋治能亟上冀州之最㑹宗威信猶為鴈門之踦夫惟逹生徇天知命齊物道兩均於進退樂無纍於逍遙福履所綏啓居增邵且陶鈞御世嘗獨化於無垠而倚伏在人密施功於糾纒復自道其何咎於信處以奚繇勉務節宣即觀翔奮區區之禱叩叩于兹賀省主某龍圖啓伏審光膺命書進躋延閣惟河圖之祕寶邃天祿之宸居髙門之選實嚴儒者之榮尤重訂茲慎簡具曰才難恭以某官德茂幾先學躋聖奧倜儻扶義以特立珍睟入神而不窮所謂元精之生王者之佐而自總司計惇大風聲謀國以忠搢紳推其軌範作法於厚遐邇賴其規模畡數經入之㑹繁利用厚生之廣博宜其疇厥成績峻兹寵章既全阜俗之勳必繼富民之拜某效智無似䝉廕實深側聆休命之行逾積由衷之抃謝除直講啓仰承休命俯積靦顔竊以儒林之官淵源所繫太學之教道藝攸司上以聨師保之嚴下則總俊造之任非有專門名家之傑博聞强記之資清修雪白而無疵黃髮魁壘而特秀殆無以贊育材之化建首善之謨儻其倚席而無聞必也瘝官而致寇國家養徒至博任能實艱厯選代工未嘗輕授伏念某器惟苦窳志已泄卑窺陳編而幾何迷大方而見笑陋駢枝之無用愧鞶帨之增華法令為師有司空城旦之愧廉能應詔皆小官纍日之勞進陪東觀之游出分百里之命惟小邑寡民之寄加銅章墨綬之榮無汲直之才敢恥於為令乏冉求之藝安見其非邦方期勵一割於鉛刀睎十駕於驥足盡力農桑之課想見絃歌之風敢謂詔除忽膺朝選脫迹下邑彯纓上庠負乘為虞冰淵自懼伏遇某官經綸王度柱石國基程百吏之器能矜一善之樹立密借噓枯之賜曲收吹吷之微底是空疏得階甄擢謹當發憤忘老浚明自強窮經義於修行誦師言於勿失用竭鄙願仰酬厚知彭城集卷二十九
